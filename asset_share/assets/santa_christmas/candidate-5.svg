<svg viewBox="0 0 800 900" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <defs>
    <linearGradient id="snowBackground" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F5F7FA;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#E8EEF4;stop-opacity:1"/>
    </linearGradient>
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.1"/>
    </filter>
  </defs>
  
  <rect width="800" height="900" fill="url(#snowBackground)"/>
  
  <!-- Snowflakes decorative -->
  <g opacity="0.4">
    <circle cx="100" cy="150" r="4" fill="#FFFFFF"/>
    <circle cx="650" cy="120" r="3" fill="#FFFFFF"/>
    <circle cx="720" cy="200" r="5" fill="#FFFFFF"/>
    <circle cx="150" cy="280" r="3" fill="#FFFFFF"/>
    <circle cx="600" cy="300" r="4" fill="#FFFFFF"/>
    <circle cx="50" cy="350" r="3" fill="#FFFFFF"/>
  </g>

  <!-- Santa Group -->
  <g id="santa-claus" filter="url(#softShadow)">
    <!-- Body/Suit -->
    <ellipse cx="400" cy="550" rx="90" ry="130" fill="#D32F2F"/>
    
    <!-- White collar trim -->
    <path d="M340 520 Q400 480 460 520 L450 580 Q400 600 350 580 Z" fill="#FFFFFF"/>
    
    <!-- White belt -->
    <rect x="350" y="580" width="100" height="15" fill="#FFFFFF"/>
    
    <!-- Belt buckle -->
    <circle cx="400" cy="587" r="8" fill="#FFD700"/>
    
    <!-- Head -->
    <g id="head">
      <ellipse cx="400" cy="380" rx="70" ry="80" fill="#FFE0BD"/>
      
      <!-- Hair visible under hat -->
      <path d="M345 360 Q345 340 360 335" stroke="#FFEBCC" stroke-width="2" fill="none"/>
      <path d="M455 360 Q455 340 440 335" stroke="#FFEBCC" stroke-width="2" fill="none"/>
    </g>
    
    <!-- Hat -->
    <g id="hat">
      <path d="M310 340 Q400 260 490 340 L485 380 Q400 365 315 380 Z" fill="#D32F2F"/>
      <ellipse cx="400" cy="390" rx="65" ry="10" fill="#FFFFFF"/>
      <circle cx="400" cy="380" r="15" fill="#FFFFFF"/>
    </g>
    
    <!-- Face Features -->
    <g id="face">
      <!-- Eyes -->
      <circle cx="375" cy="385" r="8" fill="#333333"/>
      <circle cx="378" cy="382" r="2" fill="#FFFFFF"/>
      <circle cx="425" cy="385" r="8" fill="#333333"/>
      <circle cx="428" cy="382" r="2" fill="#FFFFFF"/>
      
      <!-- Nose -->
      <ellipse cx="400" cy="400" rx="12" ry="8" fill="#FFB3A1"/>
      
      <!-- Smile -->
      <path d="M375 425 Q400 440 425 425" stroke="#333333" stroke-width="3" fill="none"/>
      
      <!-- Mustache -->
      <path d="M370 410 Q400 425 430 410 Q415 420 400 415 Q385 420 370 410" fill="#F5F5F5"/>
      
      <!-- Beard -->
      <path d="M340 430 Q400 480 460 430 Q430 520 400 525 Q370 520 340 430 Z" fill="#F5F5F5"/>
    </g>
  </g>
  
  <!-- Gift Bag -->
  <g id="gift-bag" filter="url(#softShadow)">
    <!-- Bag body -->
    <path d="M280 550 L520 550 L520 700 L280 700 Z" fill="#D32F2F"/>
    <!-- Bag flap -->
    <path d="M280 550 L520 550 L450 600 L350 600 Z" fill="#C62828"/>
    <!-- Bow on bag -->
    <circle cx="400" cy="550" r="20" fill="#FFD700"/>
    <ellipse cx="385" cy="550" rx="15" ry="8" fill="#FFD700"/>
    <ellipse cx="415" cy="550" rx="15" ry="8" fill="#FFD700"/>
    <!-- Ribbon hanging down -->
    <line x1="390" y1="550" x2="390" y2="650" stroke="#FFD700" stroke-width="8" stroke-linecap="round"/>
    <line x1="410" y1="550" x2="410" y2="650" stroke="#FFD700" stroke-width="8" stroke-linecap="round"/>
    <!-- Gold stars on bag -->
    <polygon points="300,580 305,590 315,590 307,596 310,605 300,600 290,605 293,596 285,590 295,590" fill="#FFD700" opacity="0.9"/>
    <polygon points="340,620 345,630 355,630 347,636 350,645 340,640 330,645 333,636 325,630 335,630" fill="#FFD700" opacity="0.9"/>
    <polygon points="460,580 465,590 475,590 467,596 470,605 460,600 450,605 453,596 445,590 455,590" fill="#FFD700" opacity="0.9"/>
    <polygon points="500,620 505,630 515,630 507,636 510,645 500,640 490,645 493,636 485,630 495,630" fill="#FFD700" opacity="0.9"/>
  </g>
  
  <!-- Typography -->
  <g id="typography" transform="translate(400, 800)">
    <!-- Merry Text -->
    <text x="0" y="0" font-family="Georgia, serif" font-size="36" font-weight="600" 
          text-anchor="middle" fill="#D32F2F" letter-spacing="4">MERRY</text>
    <!-- Christmas Text -->
    <text x="0" y="55" font-family="Georgia, serif" font-size="48" font-weight="700" 
          text-anchor="middle" fill="#D32F2F" letter-spacing="6" font-style="italic">Christmas</text>
    <!-- Decorative dots -->
    <circle cx="-70" cy="60" r="3" fill="#D32F2F"/>
    <circle cx="70" cy="60" r="3" fill="#D32F2F"/>
  </g>
  
  <!-- Holiday accent - small holly leaves -->
  <g id="holly-decorations">
    <!-- Left side holly -->
    <ellipse cx="180" cy="820" rx="8" ry="4" fill="#2E7D32" transform="rotate(-45 180 820)"/>
    <ellipse cx="195" cy="825" rx="8" ry="4" fill="#2E7D32" transform="rotate(-45 195 825)"/>
    <circle cx="187" cy="822" r="3" fill="#D32F2F"/>
    
    <!-- Right side holly -->
    <ellipse cx="620" cy="820" rx="8" ry="4" fill="#2E7D32" transform="rotate(45 620 820)"/>
    <ellipse cx="605" cy="825" rx="8" ry="4" fill="#2E7D32" transform="rotate(45 605 825)"/>
    <circle cx="613" cy="822" r="3" fill="#D32F2F"/>
  </g>
  
  <!-- Bottom shadow for depth -->
  <ellipse cx="400" cy="750" rx="140" ry="20" fill="#000000" opacity="0.1"/>
</svg>