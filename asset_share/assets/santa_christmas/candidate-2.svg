        <ellipse cx="75" cy="-8" rx="8" ry="10" fill="#FFC2B1" opacity=".45"/>
        <circle cx="-2" cy="-12" r="4.5" class="dark"/>
        <circle cx="52" cy="-12" r="4.5" class="dark"/>
        <path d="M-18 -33c10-8 23-9 34-1M36 -34c10-7 23-7 34 1" fill="none" stroke="#56414A" stroke-width="5" stroke-linecap="round"/>
        <ellipse cx="25" cy="8" rx="10" ry="7" fill="#F6B29E"/>
        <path d="M18 18c8 9 24 9 32 0" fill="none" stroke="#C65B5B" stroke-width="4.5" stroke-linecap="round"/>
        <path class="white" d="M-50 22c5 45 38 79 85 83 47-4 80-38 85-83-16 7-36 11-57 11h-56c-21 0-41-4-57-11z"/>
        <path class="white" d="M-46 12c14 13 42 23 71 23s57-10 71-23c-12-8-30-12-44-12H-2c-14 0-32 4-44 12z"/>
        <ellipse cx="25" cy="97" rx="72" ry="16" class="white"/>
      </g>

      <g transform="translate(0,0)">
        <rect x="-92" y="-65" width="184" height="235" rx="70" class="red"/>
        <rect x="-102" y="-88" width="204" height="36" rx="18" class="white"/>
        <ellipse cx="0" cy="170" rx="88" ry="22" class="white"/>
        <rect x="-18" y="20" width="36" height="70" rx="12" class="gold"/>
        <circle cx="0" cy="55" r="5" fill="#D5A62A"/>
        <path d="M-92 -25c-28 10-46 31-57 65l-15 49c-8 26 11 53 38 53h18c19 0 35-13 39-31l19-76" class="red"/>
        <rect x="-170" y="126" width="62" height="24" rx="12" class="white"/>
        <path d="M92 -25c28 10 46 31 57 65l15 49c8 26-11 53-38 53h-18c-19 0-35-13-39-31l-19-76" class="red"/>
        <rect x="108" y="126" width="62" height="24" rx="12" class="white"/>
      </g>

      <g transform="translate(0,190)">
        <path class="red" d="M-72 0h52c8 0 14 6 14 14v116h-80V14c0-8 6-14 14-14z"/>
        <path class="red" d="M20 0h52c8 0 14 6 14 14v116H6V14C6 6 12 0 20 0z"/>
        <rect x="-92" y="-6" width="92" height="24" rx="12" class="white"/>
        <rect x="0" y="-6" width="92" height="24" rx="12" class="white"/>
        <rect x="-96" y="124" width="100" height="26" rx="13" class="dark"/>
        <rect x="-4" y="124" width="100" height="26" rx="13" class="dark"/>
      </g>
    </g>
