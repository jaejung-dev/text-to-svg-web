  <g opacity=".65">
    <circle cx="600" cy="325" r="44" fill="#FFFFFF"/>
    <circle cx="636" cy="333" r="28" fill="#FFFFFF"/>
    <circle cx="572" cy="336" r="26" fill="#FFFFFF"/>
    <circle cx="184" cy="294" r="38" fill="#FFFFFF"/>
    <circle cx="215" cy="304" r="24" fill="#FFFFFF"/>
    <circle cx="155" cy="308" r="22" fill="#FFFFFF"/>
