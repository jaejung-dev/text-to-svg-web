<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" role="img" aria-label="Cute smiling Santa Claus standing with gift bag, Merry Christmas">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F8FCFF"/>
      <stop offset="1" stop-color="#EEF5FB"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F04D4D"/>
      <stop offset="1" stop-color="#D83333"/>
    </linearGradient>
    <linearGradient id="bagGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#D8B078"/>
      <stop offset="1" stop-color="#B98547"/>
    </linearGradient>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#A9B9C8" flood-opacity="0.18"/>
    </filter>
    <filter id="tinyBlur">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
    <style>
      .red{fill:url(#redGrad)}
      .white{fill:#FFFFFF}
      .skin{fill:#FFD9BE}
      .dark{fill:#2F3A4A}
      .ink{fill:#364152}
      .gold{fill:#F2C94C}
      .snow{fill:#FFFFFF;opacity:.88}
      .outline{stroke:#DCE7F0;stroke-width:2}
      .script{
        font-family: "Brush Script MT","Segoe Script","Snell Roundhand",cursive;
        font-size: 56px;
        fill: #C83333;
        font-weight: 700;
        letter-spacing: 1px;
      }
      .sub{
        font-family: "Avenir Next","Segoe UI",Arial,sans-serif;
        font-size: 15px;
        fill:#8C98A8;
        letter-spacing: 4px;
        text-transform: uppercase;
      }
    </style>
  </defs>

  <rect width="800" height="1000" fill="url(#bgGrad)"/>

  <g opacity="0.9">
    <circle class="snow" cx="88" cy="110" r="5"/>
    <circle class="snow" cx="140" cy="75" r="8"/>
    <circle class="snow" cx="232" cy="120" r="4"/>
    <circle class="snow" cx="320" cy="82" r="6"/>
    <circle class="snow" cx="388" cy="130" r="5"/>
    <circle class="snow" cx="474" cy="92" r="7"/>
    <circle class="snow" cx="562" cy="120" r="4"/>
    <circle class="snow" cx="646" cy="78" r="6"/>
    <circle class="snow" cx="718" cy="118" r="5"/>
    <circle class="snow" cx="104" cy="204" r="4"/>
    <circle class="snow" cx="196" cy="184" r="6"/>
    <circle class="snow" cx="284" cy="220" r="4"/>
    <circle class="snow" cx="624" cy="194" r="6"/>
    <circle class="snow" cx="704" cy="226" r="4"/>
  </g>

  <ellipse cx="400" cy="825" rx="220" ry="34" fill="#D9E6F0" opacity="0.55" filter="url(#tinyBlur)"/>

  <g filter="url(#softShadow)">
    <g transform="translate(0,10)">
      <path d="M250 465c-26 17-43 41-50 74l-17 81c-5 24 13 46 38 46h56c18 0 33-12 37-29l27-117c8-37-10-63-49-69-16-3-30 1-42 14z" fill="url(#bagGrad)"/>
      <path d="M231 453c12 16 35 26 66 28 31 2 57-4 77-18" fill="none" stroke="#A77439" stroke-width="10" stroke-linecap="round"/>
      <path d="M211 621c27-6 58-4 86 5" fill="none" stroke="#A77439" stroke-width="7" stroke-linecap="round" opacity=".4"/>
      <circle cx="280" cy="553" r="9" fill="#EAC58C" opacity=".55"/>
      <circle cx="247" cy="594" r="7" fill="#EAC58C" opacity=".55"/>
