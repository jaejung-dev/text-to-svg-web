        <path d="M266 512c0-10 7-18 14-18s14 8 14 18M280 512c0-10 7-18 14-18s14 8 14 18" fill="none" stroke="#FFFFFF" stroke-width="6" stroke-linecap="round"/>
      </g>
    </g>

