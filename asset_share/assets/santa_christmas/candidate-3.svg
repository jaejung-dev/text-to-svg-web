<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="100%" height="100%">
  <defs>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e0f2fe" />
      <stop offset="100%" stop-color="#bae6fd" />
    </linearGradient>
    <linearGradient id="santa-red" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ef4444" />
      <stop offset="100%" stop-color="#dc2626" />
    </linearGradient>
    <linearGradient id="santa-belt" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1f2937" />
      <stop offset="100%" stop-color="#111827" />
    </linearGradient>
    <linearGradient id="gold-buckle" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24" />
      <stop offset="100%" stop-color="#f59e0b" />
    </linearGradient>
    <linearGradient id="gift-bag" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    <filter id="drop-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="10" stdDeviation="15" flood-color="#000000" flood-opacity="0.1" />
    </filter>
    <filter id="soft-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="800" fill="url(#bg-gradient)" />

  <!-- Snowflakes -->
  <g fill="#ffffff" opacity="0.8">
    <circle cx="100" cy="150" r="4" />
    <circle cx="250" cy="80" r="6" />
    <circle cx="400" cy="120" r="3" />
    <circle cx="550" cy="60" r="5" />
    <circle cx="700" cy="180" r="7" />
    <circle cx="150" cy="300" r="5" />
    <circle cx="650" cy="350" r="4" />
    <circle cx="80" cy="450" r="6" />
    <circle cx="720" cy="500" r="5" />
    <circle cx="200" cy="600" r="3" />
    <circle cx="600" cy="650" r="6" />
  </g>

  <!-- Snowy Ground -->
  <path d="M0 650 Q 200 600 400 650 T 800 650 L 800 800 L 0 800 Z" fill="#ffffff" />
  <path d="M0 680 Q 250 630 500 680 T 800 660 L 800 800 L 0 800 Z" fill="#f8fafc" opacity="0.7" />

  <!-- Santa Claus Group -->
  <g transform="translate(400, 420)" filter="url(#drop-shadow)">
    
    <!-- Gift Bag (Behind Santa) -->
    <g transform="translate(120, 20)">
      <path d="M-40 150 C -80 150 -100 50 -80 -20 C -60 -90 0 -120 40 -100 C 80 -80 100 0 80 80 C 60 150 0 150 -40 150 Z" fill="url(#gift-bag)" />
      <!-- Bag Tie -->
      <path d="M-20 -100 Q 0 -120 20 -100 L 30 -130 Q 0 -140 -30 -130 Z" fill="#fcd34d" />
      <!-- Gifts peeking out -->
      <rect x="-10" y="-140" width="30" height="30" fill="#ef4444" rx="4" transform="rotate(15)" />
      <rect x="-10" y="-140" width="30" height="30" fill="none" stroke="#fbbf24" stroke-width="4" rx="4" transform="rotate(15)" />
      <rect x="-30" y="-130" width="25" height="25" fill="#3b82f6" rx="4" transform="rotate(-10)" />
      <rect x="-30" y="-130" width="25" height="25" fill="none" stroke="#ffffff" stroke-width="3" rx="4" transform="rotate(-10)" />
    </g>

    <!-- Legs & Boots -->
    <g>
      <!-- Left Leg -->
      <rect x="-60" y="100" width="40" height="60" fill="url(#santa-red)" rx="10" />
      <path d="M-70 150 L -20 150 L -20 180 Q -20 200 -45 200 Q -80 200 -80 180 Z" fill="#111827" />
      <rect x="-70" y="140" width="50" height="15" fill="#ffffff" rx="5" />
      
      <!-- Right Leg -->
      <rect x="20" y="100" width="40" height="60" fill="url(#santa-red)" rx="10" />
      <path d="M10 150 L 60 150 L 60 180 Q 60 200 35 200 Q 0 200 0 180 Z" fill="#111827" />
      <rect x="10" y="140" width="50" height="15" fill="#ffffff" rx="5" />
    </g>

    <!-- Body -->
    <path d="M-90 100 C -110 0 -80 -80 0 -80 C 80 -80 110 0 90 100 Z" fill="url(#santa-red)" />
    
    <!-- White Trim Bottom -->
    <path d="M-95 90 Q 0 110 95 90 L 90 110 Q 0 130 -90 110 Z" fill="#ffffff" />
    
    <!-- White Trim Center -->
    <rect x="-15" y="-70" width="30" height="170" fill="#ffffff" rx="15" />

    <!-- Belt -->
    <rect x="-95" y="30" width="190" height="30" fill="url(#santa-belt)" rx="5" />
    <!-- Belt Buckle -->
    <rect x="-25" y="20" width="50" height="50" fill="none" stroke="url(#gold-buckle)" stroke-width="10" rx="8" />
    <rect x="-5" y="30" width="10" height="30" fill="url(#gold-buckle)" rx="2" />

    <!-- Arms -->
    <!-- Left Arm -->
    <path d="M-70 -40 Q -120 -20 -110 40" fill="none" stroke="url(#santa-red)" stroke-width="35" stroke-linecap="round" />
    <circle cx="-110" cy="50" r="20" fill="#111827" /> <!-- Mitten -->
    <rect x="-130" y="20" width="40" height="15" fill="#ffffff" rx="5" transform="rotate(-15 -110 27)" /> <!-- Cuff -->

    <!-- Right Arm (Holding Bag) -->
    <path d="M70 -40 Q 120 -20 100 30" fill="none" stroke="url(#santa-red)" stroke-width="35" stroke-linecap="round" />
    <circle cx="95" cy="40" r="20" fill="#111827" /> <!-- Mitten -->
    <rect x="75" y="10" width="40" height="15" fill="#ffffff" rx="5" transform="rotate(25 95 17)" /> <!-- Cuff -->

    <!-- Head & Face -->
    <g transform="translate(0, -110)">
      <!-- Face Base -->
      <circle cx="0" cy="0" r="45" fill="#fcd34d" />
      
      <!-- Cheeks -->
      <circle cx="-25" cy="10" r="12" fill="#f87171" opacity="0.6" filter="url(#soft-glow)" />
      <circle cx="25" cy="10" r="12" fill="#f87171" opacity="0.6" filter="url(#soft-glow)" />
      
      <!-- Eyes -->
      <circle cx="-18" cy="-5" r="6" fill="#111827" />
      <circle cx="18" cy="-5" r="6" fill="#111827" />
      <!-- Eye Sparkles -->
      <circle cx="-20" cy="-7" r="2" fill="#ffffff" />
      <circle cx="16" cy="-7" r="2" fill="#ffffff" />
      
      <!-- Nose -->
      <circle cx="0" cy="12" r="10" fill="#f87171" />
      <circle cx="-3" cy="9" r="3" fill="#ffffff" opacity="0.5" />

      <!-- Mustache -->
      <path d="M-35 20 Q -15 10 0 25 Q 15 10 35 20 Q 15 35 0 25 Q -15 35 -35 20 Z" fill="#ffffff" />
      
      <!-- Beard -->
      <path d="M-50 10 C -70 60 -40 110 0 120 C 40 110 70 60 50 10 C 30 30 -30 30 -50 10 Z" fill="#ffffff" />
      
      <!-- Hat -->
      <path d="M-45 -25 C -45 -80 0 -100 40 -60 C 60 -40 80 -10 70 20 C 50 0 20 -20 -45 -25 Z" fill="url(#santa-red)" />
      <!-- Hat Trim -->
      <rect x="-55" y="-35" width="110" height="25" fill="#ffffff" rx="12" />
      <!-- Hat Pom Pom -->
      <circle cx="75" cy="25" r="20" fill="#ffffff" filter="url(#soft-glow)" />
    </g>
  </g>

  <!-- Typography -->
  <g transform="translate(400, 720)" text-anchor="middle">
    <text x="0" y="0" font-family="Georgia, serif" font-size="48" font-weight="bold" fill="#1e293b" letter-spacing="2">
      MERRY CHRISTMAS
    </text>
    <text x="0" y="30" font-family="Arial, sans-serif" font-size="16" font-weight="normal" fill="#64748b" letter-spacing="4">
      WISHING YOU JOY &amp; HAPPINESS
    </text>
  </g>

  <!-- Decorative Stars -->
  <g fill="#fbbf24">
    <path d="M 150 200 L 155 215 L 170 215 L 158 225 L 162 240 L 150 230 L 138 240 L 142 225 L 130 215 L 145 215 Z" transform="scale(0.8) translate(30, -50)" />
    <path d="M 650 150 L 655 165 L 670 165 L 658 175 L 662 190 L 650 180 L 638 190 L 642 175 L 630 165 L 645 165 Z" transform="scale(0.6) translate(350, 50)" />
    <path d="M 250 350 L 253 360 L 263 360 L 255 367 L 258 377 L 250 370 L 242 377 L 245 367 L 237 360 L 247 360 Z" transform="scale(0.7) translate(-50, 100)" />
  </g>
</svg>