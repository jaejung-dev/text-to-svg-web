<svg viewBox="0 0 400 150" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bellGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a8a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000000" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <!-- Main Logo Container -->
  <g id="logo-container" transform="translate(40, 25)">
    
    <!-- Bell Icon Background Circle -->
    <circle id="background-circle" cx="60" cy="60" r="45" 
            fill="url(#bellGradient)" opacity="0.1"/>
    
    <!-- Bell Icon -->
    <g id="bell-icon" filter="url(#shadow)">
      <!-- Main bell shape -->
      <path id="bell-body" d="M60 20 L85 55 L85 75 A25 25 0 0 1 35 75 L35 55 Z" 
            fill="url(#bellGradient)"/>
      
      <!-- Bell clapper -->
      <circle id="bell-clapper" cx="60" cy="80" r="8" fill="#ffffff"/>
      
      <!-- Sound wave/communication lines -->
      <path id="sound-wave-1" d="M45 65 Q50 55 60 55 Q70 55 75 65" 
            stroke="#ffffff" stroke-width="2" fill="none" opacity="0.9"/>
      <path id="sound-wave-2" d="M42 70 Q50 58 60 58 Q70 58 78 70" 
            stroke="#ffffff" stroke-width="2" fill="none" opacity="0.7"/>
      <path id="sound-wave-3" d="M39 75 Q50 61 60 61 Q70 61 81 75" 
            stroke="#ffffff" stroke-width="2" fill="none" opacity="0.5"/>
      
      <!-- Connection dots -->
      <circle id="connection-1" cx="25" cy="60" r="3" fill="#1e3a8a"/>
      <circle id="connection-2" cx="95" cy="60" r="3" fill="#1e3a8a"/>
      
      <!-- Connection lines -->
      <line id="connect-1" x1="28" y1="60" x2="38" y2="60" stroke="#1e3a8a" stroke-width="2"/>
      <line id="connect-2" x1="82" y1="60" x2="92" y2="60" stroke="#1e3a8a" stroke-width="2"/>
    </g>
    
    <!-- Company Name -->
    <text id="company-name" x="130" y="45" 
          font-family="Arial, sans-serif" font-size="28" font-weight="bold"
          fill="#1e3a8a">BELL</text>
    
    <!-- Tagline -->
    <text id="tagline" x="130" y="75" 
          font-family="Arial, sans-serif" font-size="12" font-weight="300"
          fill="#64748b" letter-spacing="2">COMMUNICATIONS</text>
  </g>
</svg>