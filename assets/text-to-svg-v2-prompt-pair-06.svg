<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Group -->
  <g id="background" opacity="0.1">
    <circle cx="200" cy="150" r="140" fill="#6B7280"/>
  </g>
  
  <!-- Ghostly Vector Icon Group -->
  <g id="icon" transform="translate(200, 120)">
    <!-- Outer Circle (Faded) -->
    <circle cx="0" cy="0" r="65" fill="none" stroke="#4B5563" stroke-width="2" opacity="0.6"/>
    
    <!-- Inner Dashed Circle (Vector Style) -->
    <circle cx="0" cy="0" r="55" fill="none" stroke="#6B7280" stroke-width="1.5" 
            stroke-dasharray="8,6" opacity="0.7"/>
    
    <!-- Geometric Vector Points -->
    <circle cx="-40" cy="-25" r="4" fill="#374151" opacity="0.9"/>
    <circle cx="40" cy="-25" r="4" fill="#374151" opacity="0.9"/>
    <circle cx="-25" cy="35" r="4" fill="#374151" opacity="0.9"/>
    <circle cx="0" cy="45" r="4" fill="#374151" opacity="0.9"/>
    <circle cx="25" cy="35" r="4" fill="#374151" opacity="0.9"/>
    
    <!-- Connecting Vector Lines -->
    <path d="M -40,-25 L 0,45 L 40,-25" fill="none" stroke="#4B5563" stroke-width="2" 
          opacity="0.7"/>
    
    <!-- Central Triangle (Ghost Shape) -->
    <polygon points="0,-20 15,25 -15,25" fill="#9CA3AF" opacity="0.3"/>
    
    <!-- Ghostly Gradient Overlay -->
    <circle cx="0" cy="-10" r="25" fill="url(#ghostGradient)" opacity="0.4"/>
  </g>
  
  <!-- Gradient Definition for Ghost Effect -->
  <defs>
    <radialGradient id="ghostGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#E5E7EB" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#9CA3AF" stop-opacity="0"/>
    </radialGradient>
  </defs>
  
  <!-- Text Group -->
  <g id="text">
    <!-- Main Title -->
    <text x="200" y="200" font-family="Arial, sans-serif" font-size="28" 
          font-weight="bold" fill="#374151" text-anchor="middle">
      <tspan>GHOST</tspan><tspan dy="-12" fill="#6B7280" opacity="0.6">VECTOR</tspan>
    </text>
    
    <!-- Subtle Vector Line Under Text -->
    <line x1="140" y1="230" x2="260" y2="230" stroke="#D1D5DB" stroke-width="2" opacity="0.7"/>
  </g>
  
  <!-- Decorative Corner Elements -->
  <g id="decorations" opacity="0.5">
    <path d="M 380,280 L 395,280 L 395,295" fill="none" stroke="#9CA3AF" stroke-width="2"/>
    <path d="M 20,280 L 5,280 L 5,295" fill="none" stroke="#9CA3AF" stroke-width="2"/>
  </g>
</svg>