<svg viewBox="0 0 400 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Define styles -->
  <defs>
    <linearGradient id="bellGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a8a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="200" fill="#ffffff"/>

  <!-- Bell Icon Group -->
  <g id="bell-icon" transform="translate(200, 80)">
    <!-- Bell Shape -->
    <path id="bell-body" 
          d="M 0,-25 C -15,-25 -25,-15 -25,0 C -25,15 -15,25 0,25 C 15,25 25,15 25,0 C 25,-15 15,-25 0,-25 Z 
             M -5,-25 L 5,-25 L 8,-8 L -8,-8 Z" 
          fill="url(#bellGradient)" 
          filter="url(#shadow)"
          stroke="#2563eb" 
          stroke-width="2"
          stroke-linejoin="round"/>
    
    <!-- Bell Clapper -->
    <circle id="bell-clapper" 
            cx="0" 
            cy="18" 
            r="4" 
            fill="#1e40af"
            filter="url(#shadow)"/>
    
    <!-- Signal Waves -->
    <path id="signal-wave-1" 
          d="M -30,20 Q -25,15 -20,20 T -10,20" 
          fill="none" 
          stroke="#60a5fa" 
          stroke-width="2" 
          opacity="0.7"/>
    
    <path id="signal-wave-2" 
          d="M -25,18 Q -20,13 -15,18 T -5,18" 
          fill="none" 
          stroke="#60a5fa" 
          stroke-width="2" 
          opacity="0.7"/>
    
    <path id="signal-wave-3" 
          d="M -20,16 Q -15,11 -10,16 T 0,16" 
          fill="none" 
          stroke="#60a5fa" 
          stroke-width="2" 
          opacity="0.7"/>
  </g>

  <!-- Company Name -->
  <text id="company-name" 
        x="200" 
        y="150" 
        text-anchor="middle" 
        font-family="Arial, Helvetica, sans-serif" 
        font-size="32" 
        font-weight="700"
        fill="#1e3a8a"
        letter-spacing="2">
    Bell
  </text>

  <!-- Tagline -->
  <text id="tagline" 
        x="200" 
        y="175" 
        text-anchor="middle" 
        font-family="Arial, Helvetica, sans-serif" 
        font-size="12" 
        fill="#6b7280"
        letter-spacing="3">
    CONNECTING WORLDS
  </text>

  <!-- Connection Lines -->
  <line id="connection-1" x1="0" y1="180" x2="400" y2="180" stroke="#e5e7eb" stroke-width="1"/>
  <line id="connection-2" x1="0" y1="195" x2="400" y2="195" stroke="#f3f4f6" stroke-width="1"/>
</svg>