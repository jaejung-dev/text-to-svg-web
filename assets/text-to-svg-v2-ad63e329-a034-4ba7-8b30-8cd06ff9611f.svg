<svg width="800" height="300" viewBox="0 0 800 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Background canvas (invisible, provides base area) -->
  <rect width="800" height="300" fill="none"/>
  
  <!-- Decorative frame with rounded corners -->
  <g id="decorative-frame">
    <rect x="20" y="20" width="760" height="260" 
          fill="none" 
          stroke="#FFB366" 
          stroke-width="3" 
          rx="15" 
          ry="15"/>
  </g>
</svg>