<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <!-- Sky Background -->
  <defs>
    <linearGradient id="skyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#87CEEB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E0F6FF;stop-opacity:1" />
    </linearGradient>
    
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Sky -->
  <rect width="800" height="500" fill="url(#skyGradient)"/>
  
  <!-- Background Buildings (City Center) -->
  <g id="cityBackground" opacity="0.6">
    <rect x="50" y="150" width="60" height="120" fill="#A8A8A8"/>
    <rect x="130" y="100" width="50" height="170" fill="#B8B8B8"/>
    <rect x="650" y="180" width="70" height="90" fill="#989898"/>
    <rect x="740" y="120" width="40" height="150" fill="#A8A8A8"/>
  </g>
  
  <!-- Ground/Land -->
  <rect x="0" y="350" width="800" height="150" fill="#D4A574"/>
  
  <!-- Main Laundry Building -->
  <g id="laundryBuilding" filter="url(#shadow)">
    <!-- Building Base -->
    <rect x="200" y="180" width="320" height="170" fill="#5B9BD5" stroke="#3A7BC0" stroke-width="3"/>
    
    <!-- Roof -->
    <path d="M 190 180 L 520 180 L 360 120 Z" fill="#C41E3A"/>
    
    <!-- Entrance -->
    <rect x="340" y="260" width="80" height="90" fill="#2E5A8A"/>
    <rect x="345" y="265" width="70" height="80" fill="#4A90E2"/>
    <text x="380" y="320" font-family="Arial" font-size="16" fill="white" text-anchor="middle" font-weight="bold">SELF-SERVICE</text>
    
    <!-- Washing Machines (through window) -->
    <rect x="220" y="200" width="50" height="60" fill="#FFFFFF" stroke="#333" stroke-width="2"/>
    <circle cx="245" cy="230" r="15" fill="#E8F4F8" stroke="#3A7BC0" stroke-width="2"/>
    <circle cx="245" cy="230" r="8" fill="#C41E3A"/>
    
    <rect x="280" y="200" width="50" height="60" fill="#FFFFFF" stroke="#333" stroke-width="2"/>
    <circle cx="305" cy="230" r="15" fill="#E8F4F8" stroke="#3A7BC0" stroke-width="2"/>
    <circle cx="305" cy="230" r="8" fill="#C41E3A"/>
    
    <!-- Drying Machines -->
    <rect x="500" y="200" width="50" height="60" fill="#FFFFFF" stroke="#333" stroke-width="2"/>
    <circle cx="525" cy="230" r="15" fill="#E8F4F8" stroke="#3A7BC0" stroke-width="2"/>
    <circle cx="525" cy="230" r="8" fill="#C41E3A"/>
  </g>
  
  <!-- Payment System Icons -->
  <g id="paymentSystem">
    <!-- Payment sign -->
    <rect x="550" y="150" width="120" height="50" fill="#2E8B57" rx="5" opacity="0.9"/>
    <text x="610" y="180" font-family="Arial" font-size="12" fill="white" text-anchor="middle">METTI DI PAGAMENTO</text>
    
    <!-- Cash Icon -->
    <circle cx="580" cy="160" r="15" fill="#90EE90" stroke="#228B22" stroke-width="2"/>
    <text x="580" y="165" font-family="Arial" font-size="14" fill="#228B22" text-anchor="middle">$</text>
    
    <!-- Mobile Money Icon -->
    <rect x="615" y="145" width="25" height="30" fill="#FFD700" stroke="#B8860B" stroke-width="2" rx="3"/>
    <text x="627.5" y="170" font-family="Arial" font-size="12" fill="#8B4513" text-anchor="middle">+</text>
  </g>
  
  <!-- People (Target Audience) -->
  <g id="people">
    <!-- Student with backpack -->
    <circle cx="150" cy="380" r="12" fill="#FFDAB9"/>
    <rect x="140" y="390" width="20" height="25" fill="#4169E1"/>
    <rect x="130" y="395" width="35" height="15" fill="#8B4513"/>
    <text x="150" y="405" font-family="Arial" font-size="10" fill="#333" text-anchor="middle">Studente</text>
    
    <!-- Worker -->
    <circle cx="100" cy="400" r="12" fill="#FFDAB9"/>
    <rect x="90" y="410" width="20" height="30" fill="#2F4F4F"/>
    <text x="100" y="415" font-family="Arial" font-size="10" fill="#333" text-anchor="middle">Lavoratore</text>
    
    <!-- Resident -->
    <circle cx="580" cy="390" r="12" fill="#FFDAB9"/>
    <rect x="570" y="400" width="20" height="28" fill="#8B0000"/>
    <text x="580" y="410" font-family="Arial" font-size="10" fill="#333" text-anchor="middle">Residente</text>
  </g>
  
  <!-- University Building in Background -->
  <g id="university">
    <rect x="650" y="80" width="80" height="100" fill="#F4A460"/>
    <path d="M 640 80 L 740 80 L 690 30 Z" fill="#8B4513"/>
    <rect x="670" y="100" width="20" height="40" fill="#FFE4B5"/>
    <text x="690" y="160" font-family="Arial" font-size="10" fill="#333" text-anchor="middle">UNIVERSITÀ</text>
  </g>
  
  <!-- Info Panel -->
  <g id="infoPanel" transform="translate(20, 360)">
    <rect width="250" height="120" fill="#FFF" stroke="#333" stroke-width="2" rx="5" opacity="0.95"/>
    <text x="125" y="25" font-family="Arial" font-size="14" fill="#333" text-anchor="middle" font-weight="bold">LAUNDRY SELF-SERVICE</text>
    <text x="125" y="45" font-family="Arial" font-size="10" fill="#333" text-anchor="middle">Lavaggio & Asciugatura Automatica</text>
    <text x="15" y="65" font-family="Arial" font-size="10" fill="#333">✓ Sistema di pagamento moderno</text>
    <text x="15" y="80" font-family="Arial" font-size="10" fill="#333">✓ Contanti e Mobile Money</text>
    <text x="15" y="95" font-family="Arial" font-size="10" fill="#333">✓ Riduzione costi personale</text>
    <text x="15" y="110" font-family="Arial" font-size="10" fill="#333">✓ Burkina Faso - Centro Città</text>
  </g>
  
  <!-- Burkina Faso Flag Element -->
  <g id="flag">
    <rect x="690" y="400" width="30" height="20">
      <rect width="30" height="10" fill="#FF0000"/>
      <rect y="10" width="30" height="10" fill="#009A49"/>
    </rect>
    <polygon points="700,405 705,412 700,419" fill="#FFD700"/>
  </g>
</svg>