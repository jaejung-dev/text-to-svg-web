<svg width="400" height="800" viewBox="0 0 400 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="headerGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1e3c72;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2a5298;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Phone Chassis -->
  <rect x="20" y="20" width="360" height="760" rx="40" ry="40" fill="#1a1a1a" stroke="#333" stroke-width="4"/>
  
  <!-- Screen Background -->
  <rect x="35" y="45" width="330" height="710" rx="25" ry="25" fill="#f8f9fa"/>

  <!-- App Header -->
  <rect x="35" y="45" width="330" height="80" rx="25" fill="url(#headerGradient)" filter="url(#shadow)"/>
  <text x="200" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="white" font-weight="bold">ATOMSTACK P1</text>
  <text x="200" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#a0a0a0">Application de Contrôle</text>

  <!-- Main Content Area -->
  <g transform="translate(0, 150)">
    
    <!-- Import Section -->
    <text x="20" y="20" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#333">1. Importer Design</text>
    
    <!-- File Upload Box -->
    <g transform="translate(35, 30)">
      <rect x="0" y="0" width="290" height="140" rx="10" fill="white" stroke="#ddd" stroke-dasharray="4,4"/>
      <!-- LightBurn Icon Representation (Abstract) -->
      <rect x="20" y="20" width="40" height="40" rx="5" fill="#007bff"/>
      <path d="M30 30 h20 v-8 m-10 8 v10" stroke="white" stroke-width="3" fill="none"/>
      <text x="80" y="45" font-family="Arial, sans-serif" font-size="14" fill="#555">Fichier LightBurn</text>
      <text x="80" y="65" font-family="Arial, sans-serif" font-size="14" fill="#555" font-weight="bold">.LBRN / .LBCD</text>
      
      <!-- Arrow down -->
      <path d="M145 85 L145 110" stroke="#333" stroke-width="2"/>
      <polygon points="145,110 140,100 150,100" fill="#333"/>
      
      <!-- Laser preview box placeholder -->
      <rect x="20" y="120" width="60" height="20" rx="2" fill="#e0f7fa" stroke="#00bcd4"/>
      <path d="M30 130 h40 m-20 -10 v20" stroke="#00bcd4" stroke-width="2" fill="none"/>
    </g>

    <!-- Export Section -->
    <text x="20" y="240" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#333">2. Exporter Résultat</text>
    
    <g transform="translate(35, 260)">
      <rect x="0" y="0" width="290" height="70" rx="15" fill="#28a745" filter="url(#shadow)"/>
      <text x="145" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="white" font-weight="bold">Exporter en SVG</text>
      <path d="M220 25 l-5 10 h-5 l-5 -10 m-5 10 v20 m15 -20 v20" stroke="white" stroke-width="3" fill="none"/>
    </g>

  </g>

  <!-- Footer Navigation -->
  <rect x="35" y="680" width="330" height="60" rx="15" fill="#e9ecef"/>
  
  <!-- Nav Icon Home -->
  <circle cx="100" cy="710" r="15" fill="#dee2e6"/>
  <path d="M100 700 l10 10 h-20 z" fill="#6c757d"/>
  
  <!-- Nav Icon Settings -->
  <circle cx="300" cy="710" r="15" fill="#dee2e6"/>
  <rect x="292" y="705" width="16" height="10" rx="2" stroke="#6c757d" fill="none"/>

</svg>