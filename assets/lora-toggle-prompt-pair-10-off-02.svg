<svg viewBox="0 0 400 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d0d0d;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d2ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0099ff;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Phone Frame -->
  <g id="phone-frame">
    <rect x="20" y="10" width="360" height="780" rx="30" ry="30" fill="#333" stroke="#222" stroke-width="4"/>
    <rect x="30" y="20" width="340" height="760" rx="24" ry="24" fill="url(#bgGradient)" stroke="#111" stroke-width="2"/>
    <circle cx="200" cy="30" r="10" fill="#111"/>
    <rect x="170" y="740" width="60" height="5" rx="2.5" fill="#111"/>
  </g>

  <!-- App Content -->
  <g id="app-content" transform="translate(0, 30)">
    <!-- Header -->
    <g id="header" transform="translate(0, 40)">
      <path d="M20 10 L380 10 L380 50 L20 50 Z" fill="none" stroke="#333" stroke-width="2" rx="5"/>
      <text x="200" y="40" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#fff" text-anchor="middle" letter-spacing="1">ATOMSTACK P1</text>
      <path d="M280 20 L290 20 L290 30 L280 30 Z" fill="#00d2ff"/>
      <text x="300" y="40" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#00d2ff" text-anchor="start">P1</text>
    </g>

    <!-- Title -->
    <g id="app-title" transform="translate(0, 90)">
      <text x="200" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#fff" text-anchor="middle">Conversion d'outil</text>
      <text x="200" y="70" font-family="Arial, sans-serif" font-size="14" fill="#aaa" text-anchor="middle">Importer LightBurn &rarr; Exporter SVG</text>
    </g>

    <!-- Flow Container -->
    <g id="flow-container" transform="translate(0, 160)">
      <!-- Input Card: LightBurn -->
      <g id="input-card" transform="translate(60, 20)">
        <rect x="0" y="0" width="120" height="140" rx="10" fill="#252525" stroke="#444" stroke-width="1"/>
        <circle cx="60" cy="40" r="30" fill="none" stroke="#00d2ff" stroke-width="3"/>
        <path d="M45 35 L75 35 L75 45 L45 45 Z" fill="#00d2ff"/>
        <path d="M55 45 L55 55 L65 55 L65 45 Z" fill="#00d2ff"/>
        <text x="60" y="100" font-family="Arial, sans-serif" font-size="16" fill="#fff" text-anchor="middle" font-weight="bold">LightBurn</text>
        <text x="60" y="120" font-family="Arial, sans-serif" font-size="10" fill="#888" text-anchor="middle">Importer</text>
        <rect x="10" y="110" width="100" height="20" rx="10" fill="#00d2ff" opacity="0.2"/>
        <path d="M60 110 L60 125" stroke="#00d2ff" stroke-width="2" stroke-dasharray="2,2"/>
      </g>

      <!-- Process Icon: Laser Head -->
      <g id="laser-process" transform="translate(190, 40)">
        <path d="M0 0 L12 0 L12 15 L0 15 Z" fill="#333"/>
        <path d="M12 5 L15 10 L12 15 L9 10 Z" fill="#00d2ff" filter="url(#glow)"/>
        <rect x="15" y="5" width="30" height="10" fill="none" stroke="#00d2ff" stroke-width="2"/>
        <path d="M45 10 L50 10 L50 25 L15 25 L15 20 L45 20 L45 15 L25 15 L25 20 L15 20" fill="none" stroke="#0099ff" stroke-width="1" opacity="0.5"/>
        <text x="15" y="35" font-family="Arial, sans-serif" font-size="10" fill="#aaa" text-anchor="middle">Convertir</text>
      </g>

      <!-- Output Card: SVG -->
      <g id="output-card" transform="translate(320, 20)">
        <rect x="-120" y="0" width="120" height="140" rx="10" fill="#252525" stroke="#444" stroke-width="1"/>
        <circle cx="-60" cy="40" r="30" fill="none" stroke="#ff9f1c" stroke-width="3"/>
        <text x="-60" y="45" font-family="Arial, sans-serif" font-size="14" fill="#ff9f1c" text-anchor="middle" font-weight="bold">{ }</text>
        <text x="-60" y="100" font-family="Arial, sans-serif" font-size="16" fill="#fff" text-anchor="middle" font-weight="bold">SVG</text>
        <text x="-60" y="120" font-family="Arial, sans-serif" font-size="10" fill="#888" text-anchor="middle">Exporter</text>
        <rect x="-110" y="110" width="100" height="20" rx="10" fill="#ff9f1c" opacity="0.2"/>
        <path d="M-60 110 L-60 125" stroke="#ff9f1c" stroke-width="2" stroke-dasharray="2,2"/>
      </g>
    </g>

    <!-- Footer Action Button -->
    <g id="action-button" transform="translate(0, 600)">
      <rect x="40" y="0" width="320" height="60" rx="30" fill="url(#accentGradient)" filter="url(#glow)"/>
      <text x="200" y="35" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#fff" text-anchor="middle">Démarrer Conversion</text>
      <path d="M210 25 L220 35 L210 45" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>
</svg>