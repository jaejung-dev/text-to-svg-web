<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Modern Tech Gradients -->
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2196F3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0D47A1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF7043;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E64A19;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4CAF50;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1B5E20;stop-opacity:1" />
    </linearGradient>
    
    <!-- Shadow Filter -->
    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="1" dy="2" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge> 
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/> 
      </feMerge>
    </filter>
  </defs>

  <!-- Background Circle -->
  <circle cx="100" cy="100" r="95" fill="#F5F5F5" />

  <!-- Group containing the main elements -->
  <g transform="translate(100, 100)">
    
    <!-- Red Diamond (Top Right) -->
    <!-- Points: Right, Top, Left, Bottom -->
    <path d="M 30,0 L 60,-30 L 30,-60 L 0,-30 Z" fill="url(#redGrad)" filter="url(#dropShadow)" />
    
    <!-- Blue Diamond (Top Left) -->
    <path d="M -30,0 L 0,-30 L -30,-60 L -60,-30 Z" fill="url(#blueGrad)" filter="url(#dropShadow)" />
    
    <!-- Green Diamond (Bottom - Represents Basis/Foundation) -->
    <!-- Slightly stylized to look like a server block or foundation -->
    <path d="M 0,0 L 30,-30 L 0,-60 L -30,-30 Z" fill="url(#greenGrad)" filter="url(#dropShadow)" />
    
    <!-- Basis Support Symbol (The "Gear" inside the foundation) -->
    <!-- Represents the technical "Basis" aspect of the platform -->
    <g transform="translate(0, -30) scale(0.4)" fill="white" opacity="0.8">
      <circle cx="0" cy="0" r="15" />
      <path d="M 0,-25 L 0,-5 L -25,0 L -5,0 L -25,25 L 0,20 L 0,40 L 20,20 L 40,25 L 25,-5 L 45,-5 L 20,-20 Z" stroke="white" stroke-width="3" fill="none" />
    </g>

    <!-- Supporting Base Line (Abstract Server Rack/Tech Grid) -->
    <rect x="-80" y="35" width="160" height="6" rx="3" fill="#333" opacity="0.1" />
  </g>
</svg>