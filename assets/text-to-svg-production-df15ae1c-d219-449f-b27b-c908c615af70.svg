<svg viewBox="0 0 200 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Petal gradient for subtle depth -->
    <linearGradient id="petalGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#D8BFD8"/>
      <stop offset="100%" style="stop-color:#C9A8D8"/>
    </linearGradient>
    <!-- Stem gradient -->
    <linearGradient id="stemGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#90EE90"/>
      <stop offset="100%" style="stop-color:#3CB371"/>
    </linearGradient>
    <!-- Leaf gradient -->
    <linearGradient id="leafGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7FFF00"/>
      <stop offset="100%" style="stop-color:#3CB371"/>
    </linearGradient>
    <!-- Center gradient -->
    <linearGradient id="centerGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFACD"/>
      <stop offset="100%" style="stop-color:#FFD700"/>
    </linearGradient>
  </defs>

  <!-- Background placeholder (transparent) -->
  <rect width="200" height="300" fill="none"/>

  <!-- Flower Stem -->
  <g id="stem">
    <path d="M100 120 Q105 180 95 240" 
          fill="none" 
          stroke="url(#stemGradient)" 
          stroke-width="4" 
          stroke-linecap="round"/>
  </g>

  <!-- Left Leaf -->
  <g id="leaf-left">
    <ellipse cx="85" cy="190" rx="18" ry="10" 
             fill="url(#leafGradient)" 
             stroke="#2E8B57" 
             stroke-width="2"/>
  </g>

  <!-- Right Leaf -->
  <g id="leaf-right">
    <ellipse cx="115" cy="210" rx="18" ry="10" 
             fill="url(#leafGradient)" 
             stroke="#2E8B57" 
             stroke-width="2"/>
  </g>

  <!-- Flower Petals -->
  <g id="petals">
    <path d="M100 85 L100 55 A5 5 0 0 1 110 55 L100 85 Z" 
          fill="url(#petalGradient)" 
          stroke="#FFB6C1" 
          stroke-width="2"/>
    <path d="M100 85 L130 95 A5 5 0 0 1 130 105 L100 95 Z" 
          fill="url(#petalGradient)" 
          stroke="#FFB6C1" 
          stroke-width="2"/>
    <path d="M100 85 L110 115 A5 5 0 0 1 100 115 L90 115 Z" 
          fill="url(#petalGradient)" 
          stroke="#FFB6C1" 
          stroke-width="2"/>
    <path d="M100 85 L70 95 A5 5 0 0 1 70 105 L100 95 Z" 
          fill="url(#petalGradient)" 
          stroke="#FFB6C1" 
          stroke-width="2"/>
    <path d="M100 85 L90 55 A5 5 0 0 1 100 55 L100 85 Z" 
          fill="url(#petalGradient)" 
          stroke="#FFB6C1" 
          stroke-width="2"/>
  </g>

  <!-- Flower Center -->
  <g id="center">
    <circle cx="100" cy="95" r="18" 
            fill="url(#centerGradient)" 
            stroke="#FFE440" 
            stroke-width="2"/>
  </g>
</svg>