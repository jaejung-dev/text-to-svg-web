<svg width="300" height="400" viewBox="0 0 300 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Petal shape for reuse -->
    <path id="petalShape" d="M 150,120 C 180,80 220,80 220,120 C 220,160 180,180 150,150 C 120,180 80,160 80,120 C 80,80 120,80 150,120 Z"/>
  </defs>

  <!-- Petals Group -->
  <g id="petals">
    <!-- Center Petal -->
    <use href="#petalShape" x="0" y="0" fill="#C495D9" stroke="#F4C2D6" stroke-width="3"/>
    
    <!-- Left Petal -->
    <use href="#petalShape" x="0" y="0" fill="#C495D9" stroke="#F4C2D6" stroke-width="3" transform="rotate(-72, 150, 150)"/>
    
    <!-- Right Petal -->
    <use href="#petalShape" x="0" y="0" fill="#C495D9" stroke="#F4C2D6" stroke-width="3" transform="rotate(72, 150, 150)"/>
    
    <!-- Top-Left Petal -->
    <use href="#petalShape" x="0" y="0" fill="#C495D9" stroke="#F4C2D6" stroke-width="3" transform="rotate(-144, 150, 150)"/>
    
    <!-- Top-Right Petal -->
    <use href="#petalShape" x="0" y="0" fill="#C495D9" stroke="#F4C2D6" stroke-width="3" transform="rotate(144, 150, 150)"/>
  </g>

  <!-- Flower Center -->
  <circle id="center" cx="150" cy="150" r="25" fill="#FFF5B0" stroke="#FFE066" stroke-width="2"/>

  <!-- Stem Group -->
  <g id="stem">
    <!-- Main Stem -->
    <path d="M 150,175 Q 165,250 145,300 Q 135,350 150,380" fill="none" stroke="#7BB666" stroke-width="6" stroke-linecap="round"/>
  </g>

  <!-- Leaves Group -->
  <g id="leaves">
    <!-- Left Leaf -->
    <path d="M 145,320 Q 100,310 85,340 Q 105,360 140,345 Q 150,330 145,320 Z" fill="#7BB666" stroke="#5A914A" stroke-width="2"/>
    
    <!-- Right Leaf -->
    <path d="M 145,350 Q 105,330 90,360 Q 110,380 150,370 Q 160,355 145,350 Z" fill="#7BB666" stroke="#5A914A" stroke-width="2"/>
  </g>
</svg>