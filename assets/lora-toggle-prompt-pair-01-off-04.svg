<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="512" height="512">
  <defs>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0f4f8" />
      <stop offset="100%" stop-color="#ffffff" />
    </linearGradient>
    <linearGradient id="sap-teal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F9D58" />
      <stop offset="100%" stop-color="#007B45" />
    </linearGradient>
    <linearGradient id="sap-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#008FD3" />
      <stop offset="100%" stop-color="#006699" />
    </linearGradient>
    <linearGradient id="sap-orange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F47C20" />
      <stop offset="100%" stop-color="#D66615" />
    </linearGradient>
    <linearGradient id="sap-dark" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2E3B5A" />
      <stop offset="100%" stop-color="#192236" />
    </linearGradient>
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background Circle -->
  <circle id="logo-background" cx="100" cy="100" r="90" fill="url(#bg-gradient)" stroke="#e0e0e0" stroke-width="1"/>
  
  <!-- Main Group for SAP Shapes -->
  <g id="sap-geometry" filter="url(#soft-shadow)">
    <!-- Top Left Trapezoid (Teal) -->
    <path id="sap-teal-shape" 
          d="M 65 35 L 95 35 L 85 65 L 55 65 Z" 
          fill="url(#sap-teal)" 
          transform="rotate(45 75 50)"/>
    
    <!-- Top Right Trapezoid (Light Blue) -->
    <path id="sap-blue-shape" 
          d="M 95 35 L 135 45 L 125 75 L 95 65 Z" 
          fill="url(#sap-blue)" 
          transform="rotate(-15 115 55)"/>
    
    <!-- Bottom Right Trapezoid (Orange) -->
    <path id="sap-orange-shape" 
          d="M 95 65 L 135 45 L 135 85 L 105 95 Z" 
          fill="url(#sap-orange)"/>
    
    <!-- Bottom Left Trapezoid (Dark Blue) -->
    <path id="sap-dark-shape" 
          d="M 55 65 L 85 65 L 95 95 L 65 95 Z" 
          fill="url(#sap-dark)"/>
  </g>

  <!-- Gear Icon representing BASIS/Technical Support -->
  <g id="basis-gear" transform="translate(100, 100)" opacity="0.9">
    <g id="gear-outer" fill="#4A5568">
      <circle cx="0" cy="0" r="14" />
    </g>
    <g id="gear-teeth" stroke="#2C3E50" stroke-width="2" fill="none" stroke-linecap="round">
      <!-- 8 teeth -->
      <path d="M 0,-18 L 0,-14" />
      <path d="M 12.7,-12.7 L 10.6,-10.6" />
      <path d="M 18,0 L 14,0" />
      <path d="M 12.7,12.7 L 10.6,10.6" />
      <path d="M 0,18 L 0,14" />
      <path d="M -12.7,12.7 L -10.6,10.6" />
      <path d="M -18,0 L -14,0" />
      <path d="M -12.7,-12.7 L -10.6,-10.6" />
      <!-- Inner ring -->
      <circle cx="0" cy="0" r="6" />
    </g>
  </g>

  <!-- Shield Outline for "Support" Concept -->
  <path id="shield-outline" 
        d="M 30 100 C 30 60 60 40 100 40 C 140 40 170 60 170 100 C 170 140 140 160 100 160 C 60 160 30 140 30 100 Z" 
        fill="none" 
        stroke="#A0AEC0" 
        stroke-width="1" 
        stroke-dasharray="5,5" 
        opacity="0.6"/>
        
</svg>