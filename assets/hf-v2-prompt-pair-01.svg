<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="supportGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00A9E0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#007CC3;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF9F43;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF6B35;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle (optional for logo container) -->
  <circle cx="200" cy="200" r="180" fill="none" stroke="#E8E8E8" stroke-width="2"/>
  
  <!-- Base structural block (SAP-inspired cube element) -->
  <g id="baseStructure">
    <!-- Main 3D block -->
    <path d="M 140 140 L 200 110 L 260 140 L 200 170 Z" 
          fill="url(#supportGradient)" opacity="0.9"/>
    <path d="M 200 170 L 260 140 L 260 200 L 200 230 Z" 
          fill="#007CC3" opacity="0.85"/>
    <path d="M 140 140 L 200 170 L 200 230 L 140 200 Z" 
          fill="#0066A5" opacity="0.8"/>
    
    <!-- Accent support element -->
    <rect x="170" y="155" width="60" height="12" fill="url(#accentGradient)" rx="3"/>
  </g>
  
  <!-- Support network/infrastructure lines -->
  <g id="supportNetwork">
    <!-- Horizontal connection lines -->
    <line x1="50" y1="200" x2="140" y2="200" stroke="#00A9E0" stroke-width="2" opacity="0.4"/>
    <line x1="260" y1="200" x2="350" y2="200" stroke="#00A9E0" stroke-width="2" opacity="0.4"/>
    
    <!-- Vertical connection lines -->
    <line x1="200" y1="110" x2="200" y2="70" stroke="#00A9E0" stroke-width="2" opacity="0.4"/>
    <line x1="200" y1="230" x2="200" y2="270" stroke="#00A9E0" stroke-width="2" opacity="0.4"/>
    
    <!-- Diagonal support braces -->
    <line x1="140" y1="140" x2="180" y2="110" stroke="#FF9F43" stroke-width="2" opacity="0.6"/>
    <line x1="260" y1="140" x2="220" y2="110" stroke="#FF9F43" stroke-width="2" opacity="0.6"/>
    <line x1="140" y1="200" x2="180" y2="230" stroke="#FF9F43" stroke-width="2" opacity="0.6"/>
    <line x1="260" y1="200" x2="220" y2="230" stroke="#FF9F43" stroke-width="2" opacity="0.6"/>
  </g>
  
  <!-- Support icon (shield/guard element) -->
  <g id="supportIcon">
    <path d="M 175 185 L 225 185 L 220 225 L 200 235 L 180 225 Z" 
          fill="url(#accentGradient)" opacity="0.9"/>
    <!-- Cross mark -->
    <line x1="190" y1="200" x2="210" y2="200" stroke="white" stroke-width="3" stroke-linecap="round"/>
    <line x1="200" y1="192" x2="200" y2="208" stroke="white" stroke-width="3" stroke-linecap="round"/>
  </g>
  
  <!-- Circular support base -->
  <circle cx="200" cy="250" r="40" fill="none" stroke="#00A9E0" stroke-width="3" opacity="0.3"/>
  <circle cx="200" cy="250" r="35" fill="none" stroke="#FF9F43" stroke-width="2" stroke-dasharray="5,5" opacity="0.4"/>
  
  <!-- Bottom text placeholder for "BASIS SUPPORT" -->
  <g id="labelText" transform="translate(200, 340)">
    <ellipse cx="0" cy="0" rx="80" ry="20" fill="white"/>
    <text x="0" y="5" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#333">
      BASIS SUPPORT
    </text>
  </g>
</svg>