<svg viewBox="0 0 300 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Define styles and gradients -->
  <defs>
    <linearGradient id="bellGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d2b4d;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1a4a7a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d2b4d;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Logo Icon Group -->
  <g id="logo-icon" transform="translate(15, 15)">
    <!-- Bell outline -->
    <path id="bell-shape" 
          d="M 30,50 L 30,60 Q 30,70 25,75 L 25,80 M 35,50 L 35,60 Q 35,70 40,75 L 40,80 M 30,50 Q 15,50 15,35 L 15,25 Q 15,15 25,15 L 35,15 Q 45,15 45,25 L 45,35 Q 45,50 30,50" 
          fill="none" 
          stroke="url(#bellGradient)" 
          stroke-width="3" 
          stroke-linecap="round" 
          stroke-linejoin="round"/>
    
    <!-- Bell fill area -->
    <path id="bell-fill" 
          d="M 30,50 L 30,60 Q 30,70 25,75 L 25,80 M 35,50 L 35,60 Q 35,70 40,75 L 40,80 M 30,50 Q 15,50 15,35 L 15,25 Q 15,15 25,15 L 35,15 Q 45,15 45,25 L 45,35 Q 45,50 30,50" 
          fill="url(#bellGradient)" 
          opacity="0.2" />
    
    <!-- Communication wave lines -->
    <path id="wave-lines" 
          d="M 10,35 Q 15,40 20,35 M 40,35 Q 45,40 50,35 M 15,45 Q 20,50 25,45 M 35,45 Q 40,50 45,45" 
          fill="none" 
          stroke="url(#bellGradient)" 
          stroke-width="2" 
          stroke-linecap="round"/>
    
    <!-- Center bell clapper -->
    <circle id="bell-clapper" 
            cx="30" 
            cy="35" 
            r="4" 
            fill="url(#bellGradient)" />
  </g>

  <!-- Text Group -->
  <g id="logo-text" transform="translate(70, 55)">
    <!-- Main company name -->
    <text id="company-name" 
          x="0" 
          y="0" 
          font-family="Arial, Helvetica, sans-serif" 
          font-size="32" 
          font-weight="700" 
          fill="url(#textGradient)" 
          letter-spacing="1">
      Bell
    </text>
    
    <!-- Tagline/subtext -->
    <text id="tagline" 
          x="0" 
          y="18" 
          font-family="Arial, Helvetica, sans-serif" 
          font-size="12" 
          font-weight="400" 
          fill="#5a7a9a" 
          letter-spacing="3">
      COMMUNICATIONS
    </text>
  </g>

  <!-- Decorative underline -->
  <line id="underline" 
        x1="70" 
        y1="70" 
        x2="200" 
        y2="70" 
        stroke="url(#textGradient)" 
        stroke-width="2" 
        stroke-linecap="round" />

  <!-- Company identifier dots -->
  <circle id="dot1" cx="205" cy="70" r="2" fill="#1a4a7a" />
  <circle id="dot2" cx="210" cy="70" r="2" fill="#1a4a7a" />
  <circle id="dot3" cx="215" cy="70" r="2" fill="#1a4a7a" />
</svg>