<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="600" fill="#f5f7fa"/>
  
  <!-- App Container -->
  <g id="app-container" transform="translate(50, 50)">
    <!-- Window Frame -->
    <rect width="700" height="500" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>
    
    <!-- Header Bar -->
    <g id="header">
      <rect width="700" height="60" rx="12 12 0 0" fill="#4f46e5"/>
      <text x="350" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="white">
        AtomStak P1
      </text>
      <text x="650" y="40" text-anchor="end" font-family="Arial, sans-serif" font-size="14" fill="#e0e7ff">
        Converter
      </text>
    </g>
    
    <!-- Laser Engraver Illustration -->
    <g id="laser-engraver" transform="translate(50, 100)">
      <!-- Base Platform -->
      <rect x="0" y="80" width="200" height="20" rx="3" fill="#64748b"/>
      
      <!-- Vertical Rails -->
      <rect x="20" y="30" width="10" height="50" fill="#334155"/>
      <rect x="170" y="30" width="10" height="50" fill="#334155"/>
      
      <!-- Horizontal Rail -->
      <rect x="10" y="20" width="180" height="10" rx="2" fill="#475569"/>
      
      <!-- Laser Head -->
      <rect x="60" y="0" width="80" height="25" rx="4" fill="#1e293b"/>
      <rect x="85" y="25" width="30" height="20" fill="#ef4444"/>
      <!-- Laser Beam -->
      <line x1="100" y1="45" x2="100" y2="80" stroke="#ef4444" stroke-width="3" stroke-dasharray="2,3"/>
      
      <!-- Work Area -->
      <rect x="20" y="80" width="160" height="50" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
      <text x="100" y="110" text-anchor="middle" font-family="Arial" font-size="12" fill="#64748b">
        WORK ZONE
      </text>
    </g>
    
    <!-- Import Section -->
    <g id="import-section" transform="translate(50, 280)">
      <rect width="200" height="150" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
      <text x="100" y="30" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#92400e">
        IMPORT
      </text>
      <!-- File Icon -->
      <path d="M60 50 h60 v60 h-60 z" fill="#fff" stroke="#f59e0b" stroke-width="2"/>
      <path d="M90 50 v30 h20" fill="none" stroke="#f59e0b" stroke-width="2"/>
      <text x="100" y="105" text-anchor="middle" font-family="Arial" font-size="14" fill="#78350f">
        LightBurn
      </text>
      <text x="100" y="125" text-anchor="middle" font-family="Arial" font-size="10" fill="#92400e">
        .LBRN / .LBRL
      </text>
      <!-- Upload Arrow -->
      <path d="M170 75 h20 M180 65 l0 20 M175 70 l5 -5 M185 70 l-5 -5" stroke="#92400e" stroke-width="3" fill="none"/>
    </g>
    
    <!-- Arrow/Process Indicator -->
    <g id="process-arrow" transform="translate(260, 350)">
      <line x1="0" y1="0" x2="180" y2="0" stroke="#4f46e5" stroke-width="4" stroke-dasharray="6,4"/>
      <path d="M190 -5 l10 5 -10 5" fill="#4f46e5"/>
      <text x="90" y="-20" text-anchor="middle" font-family="Arial" font-size="12" fill="#4f46e5" font-weight="bold">
        CONVERT
      </text>
    </g>
    
    <!-- Export Section -->
    <g id="export-section" transform="translate(450, 280)">
      <rect width="200" height="150" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
      <text x="100" y="30" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#166534">
        EXPORT
      </text>
      <!-- File Icon -->
      <path d="M60 50 h60 v60 h-60 z" fill="#fff" stroke="#22c55e" stroke-width="2"/>
      <path d="M90 50 v30 h20" fill="none" stroke="#22c55e" stroke-width="2"/>
      <text x="100" y="105" text-anchor="middle" font-family="Arial" font-size="14" fill="#15803d">
        SVG
      </text>
      <text x="100" y="125" text-anchor="middle" font-family="Arial" font-size="10" fill="#166534">
        Vector Format
      </text>
      <!-- Download Arrow -->
      <path d="M170 75 h20 M180 85 l0 -20 M175 80 l5 5 M185 80 l-5 5" stroke="#166534" stroke-width="3" fill="none"/>
    </g>
    
    <!-- Device Info -->
    <g id="device-info" transform="translate(50, 460)">
      <rect width="650" height="50" rx="6" fill="#e0e7ff" stroke="#a5b4fc" stroke-width="1"/>
      <circle cx="20" cy="25" r="8" fill="#22c55e"/>
      <text x="40" y="30" font-family="Arial" font-size="13" fill="#1e3a8a">
        ATOMSTAK P1 Laser Engraver Connected
      </text>
      <text x="480" y="30" text-anchor="end" font-family="Arial" font-size="12" fill="#64748b">
        v2.1.0 • Ready
      </text>
    </g>
    
    <!-- Action Buttons -->
    <g id="actions" transform="translate(350, 470)">
      <rect width="120" height="35" rx="6" fill="#ef4444"/>
      <text x="60" y="23" text-anchor="middle" font-family="Arial" font-size="12" fill="white" font-weight="bold">
        Import File
      </text>
      
      <rect x="145" width="120" height="35" rx="6" fill="#4f46e5"/>
      <text x="205" y="23" text-anchor="middle" font-family="Arial" font-size="12" fill="white" font-weight="bold">
        Export SVG
      </text>
    </g>
  </g>
  
  <!-- Decorative Elements -->
  <circle cx="750" cy="50" r="40" fill="#e0e7ff" opacity="0.5"/>
  <circle cx="770" cy="70" r="20" fill="#4f46e5" opacity="0.3"/>
  <circle cx="760" cy="30" r="15" fill="#22c55e" opacity="0.3"/>
  
  <!-- Connection Lines (subtle) -->
  <line x1="80" y1="350" x2="150" y2="350" stroke="#4f46e5" stroke-width="1" opacity="0.2"/>
  <line x1="450" y1="350" x2="520" y2="350" stroke="#4f46e5" stroke-width="1" opacity="0.2"/>
</svg>