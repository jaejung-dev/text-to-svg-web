<svg viewBox="0 0 400 150" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradient for ghostly effect -->
    <linearGradient id="ghostGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    
    <!-- Vector glow effect -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  
  <!-- Main container group -->
  <g id="GhostVector-Logo" transform="translate(0, 0)">
    
    <!-- Icon group -->
    <g id="GhostVector-Icon" transform="translate(10, 25)">
      <!-- Ghost silhouette with geometric twist -->
      <path id="Ghost-Shape" d="M 45 10 L 45 35 Q 45 45 55 45 L 65 45 Q 75 45 75 35 L 75 10 Z" 
            fill="url(#ghostGradient)" opacity="0.9"/>
      
      <!-- Vector arrow pointing right -->
      <path id="Vector-Arrow" d="M 20 25 L 35 35 L 20 45" 
            fill="none" stroke="url(#ghostGradient)" stroke-width="3" opacity="0.8"/>
      
      <!-- Digital particles -->
      <circle id="Particle-1" cx="15" cy="15" r="2" fill="#667eea" opacity="0.6"/>
      <circle id="Particle-2" cx="12" cy="25" r="1.5" fill="#764ba2" opacity="0.5"/>
      <circle id="Particle-3" cx="18" cy="35" r="1" fill="#667eea" opacity="0.4"/>
      
      <!-- Ghost eye dots -->
      <circle id="Eye-Left" cx="48" cy="25" r="2" fill="white" opacity="0.9"/>
      <circle id="Eye-Right" cx="55" cy="25" r="2" fill="white" opacity="0.9"/>
      <circle id="Eye-Bottom" cx="51" cy="30" r="1.5" fill="white" opacity="0.7"/>
      
      <!-- Subtle outline for vector feel -->
      <path id="Vector-Outline" d="M 42 8 L 42 37 Q 42 47 52 47 L 62 47 Q 72 47 72 37 L 72 8" 
            fill="none" stroke="white" stroke-width="1" opacity="0.3"/>
    </g>
    
    <!-- Text group -->
    <g id="GhostVector-Text" transform="translate(110, 75)">
      <!-- Ghost part in gradient -->
      <text id="Ghost-Text" x="0" y="0" font-family="Arial, sans-serif" font-weight="bold" 
            font-size="42" fill="url(#ghostGradient)">Ghost</text>
      
      <!-- Vector part in solid color -->
      <text id="Vector-Text" x="82" y="0" font-family="Arial, sans-serif" font-weight="bold" 
            font-size="42" fill="#764ba2">Vector</text>
      
      <!-- Subtle underline accent -->
      <rect id="Underline" x="-5" y="35" width="195" height="3" rx="1.5" 
            fill="#667eea" opacity="0.4"/>
    </g>
    
    <!-- Corner accent elements -->
    <g id="Decorative-Accents">
      <line x1="5" y1="5" x2="25" y2="5" stroke="#667eea" stroke-width="2" opacity="0.6"/>
      <line x1="375" y1="5" x2="395" y2="5" stroke="#764ba2" stroke-width="2" opacity="0.6"/>
      <line x1="5" y1="145" x2="25" y2="145" stroke="#764ba2" stroke-width="2" opacity="0.6"/>
      <line x1="375" y1="145" x2="395" y2="145" stroke="#667eea" stroke-width="2" opacity="0.6"/>
    </g>
    
  </g>
</svg>