<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200">
  <!-- Background -->
  <rect width="400" height="200" fill="#1a1a2e"/>
  
  <!-- Ghost Vector Graphic Group -->
  <g id="ghost-vector-icon">
    <!-- Main ghost outline (semi-transparent) -->
    <path id="ghost-body" 
          d="M 140 60 
             Q 100 60 90 90 
             L 90 140 
             Q 90 160 105 160 
             Q 115 160 115 140 
             L 115 120 
             L 135 120 
             L 135 140 
             Q 135 160 145 160 
             Q 160 160 160 140 
             L 160 90 
             Q 150 60 110 60 
             Z" 
          fill="none" 
          stroke="#6366f1" 
          stroke-width="3" 
          opacity="0.9"/>
    
    <!-- Ghost inner glow -->
    <circle cx="110" cy="100" r="35" 
            fill="none" 
            stroke="#818cf8" 
            stroke-width="2" 
            opacity="0.4"/>
    
    <!-- Vector nodes -->
    <circle cx="90" cy="90" r="4" fill="#a5b4fc" opacity="0.8"/>
    <circle cx="160" cy="90" r="4" fill="#a5b4fc" opacity="0.8"/>
    <circle cx="145" cy="140" r="4" fill="#a5b4fc" opacity="0.8"/>
    <circle cx="105" cy="140" r="4" fill="#a5b4fc" opacity="0.8"/>
    
    <!-- Vector connecting lines -->
    <line x1="90" y1="90" x2="160" y2="90" 
          stroke="#818cf8" stroke-width="1.5" opacity="0.6"/>
    <line x1="160" y1="90" x2="145" y2="140" 
          stroke="#818cf8" stroke-width="1.5" opacity="0.6"/>
    <line x1="145" y1="140" x2="105" y2="140" 
          stroke="#818cf8" stroke-width="1.5" opacity="0.6"/>
    <line x1="105" y1="140" x2="90" y2="90" 
          stroke="#818cf8" stroke-width="1.5" opacity="0.6"/>
    
    <!-- Vector center point -->
    <circle cx="125" cy="115" r="6" fill="#6366f1"/>
    <circle cx="125" cy="115" r="3" fill="white" opacity="0.9"/>
  </g>
  
  <!-- Text Group -->
  <g id="logo-text" transform="translate(220, 110)">
    <!-- Ghost -->
    <text x="0" y="0" 
          font-family="Arial, sans-serif" 
          font-size="36" 
          font-weight="bold" 
          fill="url(#text-gradient)">
      Ghost
    </text>
    <!-- Vector -->
    <text x="110" y="0" 
          font-family="Arial, sans-serif" 
          font-size="36" 
          font-weight="bold" 
          fill="url(#text-gradient)">
      Vector
    </text>
  </g>
  
  <!-- Text Gradient Definition -->
  <defs>
    <linearGradient id="text-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="50%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
  </defs>
</svg>