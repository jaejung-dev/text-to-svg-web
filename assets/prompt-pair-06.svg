<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="ghostVectorTitle ghostVectorDesc">
  <title id="ghostVectorTitle">GhostVector Logo</title>
  <desc id="ghostVectorDesc">A logo featuring a solid geometric arrow merging into a transparent gradient trail, symbolizing a ghost vector.</desc>
  
  <defs>
    <!-- Gradient for the ghostly tail -->
    <linearGradient id="ghostGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00E5FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00E5FF;stop-opacity:0" />
    </linearGradient>
    
    <!-- Filter for soft glow effect -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <g transform="translate(200, 200)">
    <!-- Background Circle (Optional subtle branding) -->
    <circle r="180" fill="#0B1021" />
    
    <!-- The "Ghost" Trail (Right side, fading out) -->
    <path d="M 50,0 L 160,-40 L 220,-20 L 260,10 L 260,30 L 200,60 L 160,40 L 110,20 Z" 
          fill="url(#ghostGradient)" 
          transform="translate(0, 20)" />
    
    <!-- The "Vector" Core (Left side, solid shape) -->
    <!-- A stylized 'G' or Arrow head pointing right -->
    <path d="M -80,-50 L -40,-50 L 10,0 L -40,50 L -80,50 L -80,40 L -40,40 L 10,0 L -40,-40 L -80,-40 Z" 
          fill="#1E293B" 
          transform="translate(0, 10)" />
          
    <!-- The Solid Vector Point (The tip) -->
    <path d="M 10,-5 L 120,-30 L 120,-20 L 40,5 L 120,35 L 120,45 L 10,10 Z" 
          fill="#00E5FF" 
          filter="url(#glow)" />
          
    <!-- Connecting line to bridge the ghost and solid parts -->
    <line x1="120" y1="-20" x2="160" y2="-30" stroke="#00E5FF" stroke-width="4" stroke-linecap="round" opacity="0.8"/>
  </g>

  <!-- Text Label -->
  <g transform="translate(200, 320)" text-anchor="middle" font-family="Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-weight="bold" font-size="28">
    <text fill="#FFFFFF">Ghost</text>
    <text x="65" y="0" fill="#00E5FF">Vector</text>
  </g>
</svg>