<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <circle cx="32" cy="32" r="28" fill="url(#bgGradient)" filter="url(#shadow)"/>
  
  <!-- Shield icon for DLP protection -->
  <g id="shield" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M20 24 C20 18 26 14 32 14 C38 14 44 18 44 24 L44 40 C44 46 32 52 32 52 C32 52 20 46 20 40 Z"/>
  </g>
  
  <!-- Lock icon for security -->
  <g id="lock" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <rect x="24" y="28" width="16" height="16" rx="2"/>
    <path d="M26 28 C26 25 27.5 22 32 22 C36.5 22 38 25 38 28"/>
  </g>
  
  <!-- Transfer arrows for SFTP -->
  <g id="transfer-arrows" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M14 32 L20 32"/>
    <path d="M18 28 L20 32 L18 36"/>
    <path d="M50 32 L44 32"/>
    <path d="M46 28 L44 32 L46 36"/>
  </g>
  
  <!-- Data protection indicators (data points) -->
  <g id="data-points" fill="#ffffff" opacity="0.8">
    <circle cx="26" cy="30" r="1.5"/>
    <circle cx="32" cy="34" r="1.5"/>
    <circle cx="38" cy="30" r="1.5"/>
    <circle cx="28" cy="38" r="1.5"/>
    <circle cx="36" cy="38" r="1.5"/>
  </g>
  
  <!-- Secure connection line -->
  <line x1="20" y1="44" x2="44" y2="44" stroke="#ffffff" stroke-width="1.5" stroke-dasharray="2,2" opacity="0.6"/>
</svg>