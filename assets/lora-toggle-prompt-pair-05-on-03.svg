<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <!-- Definitions for gradients and patterns -->
  <defs>
    <!-- Crimson carpet base gradient -->
    <linearGradient id="carpetBase" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6b0f1f;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8b1a30;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5a0a15;stop-opacity:1" />
    </linearGradient>
    
    <!-- Gold accent gradient -->
    <linearGradient id="goldAccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c9a66b;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#e8c98b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b89652;stop-opacity:1" />
    </linearGradient>
    
    <!-- Dark shadow gradient -->
    <radialGradient id="shadowGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#2d0a0a;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#1a0505;stop-opacity:0.6" />
    </radialGradient>
    
    <!-- Decorative pattern pattern -->
    <pattern id="ornatePattern" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
      <!-- Central diamond motif -->
      <polygon points="16,0 32,16 16,32 0,16" fill="none" stroke="url(#goldAccent)" stroke-width="1" opacity="0.6"/>
      <!-- Corner accents -->
      <circle cx="0" cy="0" r="4" fill="url(#goldAccent)" opacity="0.7"/>
      <circle cx="32" cy="0" r="4" fill="url(#goldAccent)" opacity="0.7"/>
      <circle cx="0" cy="32" r="4" fill="url(#goldAccent)" opacity="0.7"/>
      <circle cx="32" cy="32" r="4" fill="url(#goldAccent)" opacity="0.7"/>
    </pattern>
  </defs>

  <!-- Group for carpet tile -->
  <g id="carpetTile" transform="translate(2,2)">
    <!-- Main carpet base -->
    <rect x="0" y="0" width="252" height="252" fill="url(#carpetBase)" stroke="#3d060d" stroke-width="4"/>
    
    <!-- Inner shadow for depth -->
    <rect x="4" y="4" width="248" height="248" fill="none" stroke="url(#shadowGradient)" stroke-width="2" opacity="0.5"/>
    
    <!-- Ornate border frame - outer -->
    <rect x="8" y="8" width="240" height="240" fill="none" stroke="url(#goldAccent)" stroke-width="3" opacity="0.8"/>
    
    <!-- Ornate border frame - inner -->
    <rect x="16" y="16" width="224" height="224" fill="none" stroke="#c9a66b" stroke-width="2" opacity="0.7"/>
    
    <!-- Corner decorative elements -->
    <g id="cornerDecorations">
      <!-- Top-left corner -->
      <path d="M16 16 L32 16 L32 32 Z" fill="url(#goldAccent)" opacity="0.8"/>
      <circle cx="24" cy="24" r="6" fill="url(#goldAccent)" opacity="0.9"/>
      
      <!-- Top-right corner -->
      <path d="M240 16 L240 32 L224 32 Z" fill="url(#goldAccent)" opacity="0.8"/>
      <circle cx="232" cy="24" r="6" fill="url(#goldAccent)" opacity="0.9"/>
      
      <!-- Bottom-left corner -->
      <path d="M16 240 L16 224 L32 224 Z" fill="url(#goldAccent)" opacity="0.8"/>
      <circle cx="24" cy="232" r="6" fill="url(#goldAccent)" opacity="0.9"/>
      
      <!-- Bottom-right corner -->
      <path d="M240 240 L240 224 L224 224 Z" fill="url(#goldAccent)" opacity="0.8"/>
      <circle cx="232" cy="232" r="6" fill="url(#goldAccent)" opacity="0.9"/>
    </g>
    
    <!-- Central medallion design -->
    <g id="centralMedallion">
      <!-- Outer medallion circle -->
      <circle cx="128" cy="128" r="64" fill="none" stroke="url(#goldAccent)" stroke-width="2" opacity="0.8"/>
      
      <!-- Inner medallion -->
      <circle cx="128" cy="128" r="48" fill="none" stroke="url(#goldAccent)" stroke-width="2" opacity="0.7"/>
      
      <!-- Decorative diamond at center -->
      <polygon points="128,80 176,128 128,176 80,128" fill="none" stroke="url(#goldAccent)" stroke-width="1.5" opacity="0.9"/>
      
      <!-- Center point -->
      <circle cx="128" cy="128" r="8" fill="url(#goldAccent)" opacity="0.6"/>
    </g>
    
    <!-- Ornate pattern overlay -->
    <rect x="32" y="32" width="192" height="192" fill="url(#ornatePattern)" opacity="0.3"/>
    
    <!-- Vertical stripes for added texture -->
    <g id="verticalStripes" opacity="0.15">
      <line x1="64" y1="8" x2="64" y2="248" stroke="#d4af37" stroke-width="2"/>
      <line x1="128" y1="8" x2="128" y2="248" stroke="#d4af37" stroke-width="2"/>
      <line x1="192" y1="8" x2="192" y2="248" stroke="#d4af37" stroke-width="2"/>
    </g>
    
    <!-- Horizontal stripes for added texture -->
    <g id="horizontalStripes" opacity="0.15">
      <line x1="8" y1="64" x2="248" y2="64" stroke="#d4af37" stroke-width="2"/>
      <line x1="8" y1="128" x2="248" y2="128" stroke="#d4af37" stroke-width="2"/>
      <line x1="8" y1="192" x2="248" y2="192" stroke="#d4af37" stroke-width="2"/>
    </g>
    
    <!-- Subtle texture overlay for fabric feel -->
    <rect x="4" y="4" width="248" height="248" fill="none" stroke="#8b1a30" stroke-width="1" opacity="0.1" stroke-dasharray="3,3"/>
    
    <!-- Corner geometric accents (Persian-style) -->
    <g id="persianAccents" opacity="0.7">
      <!-- Top border corners -->
      <path d="M16 24 L24 16 L24 32 Z" fill="url(#goldAccent)"/>
      <path d="M240 24 L232 16 L232 32 Z" fill="url(#goldAccent)"/>
      
      <!-- Bottom border corners -->
      <path d="M16 240 L24 248 L24 224 Z" fill="url(#goldAccent)"/>
      <path d="M240 240 L232 248 L232 224 Z" fill="url(#goldAccent)"/>
    </g>
    
    <!-- Decorative dots along border -->
    <g id="borderDots" opacity="0.7">
      <circle cx="40" cy="20" r="2" fill="url(#goldAccent)"/>
      <circle cx="80" cy="20" r="2" fill="url(#goldAccent)"/>
      <circle cx="120" cy="20" r="2" fill="url(#goldAccent)"/>
      <circle cx="160" cy="20" r="2" fill="url(#goldAccent)"/>
      <circle cx="200" cy="20" r="2" fill="url(#goldAccent)"/>
      <circle cx="220" cy="40" r="2" fill="url(#goldAccent)"/>
      <circle cx="220" cy="80" r="2" fill="url(#goldAccent)"/>
      <circle cx="220" cy="120" r="2" fill="url(#goldAccent)"/>
      <circle cx="220" cy="160" r="2" fill="url(#goldAccent)"/>
      <circle cx="220" cy="200" r="2" fill="url(#goldAccent)"/>
      <circle cx="200" cy="236" r="2" fill="url(#goldAccent)"/>
      <circle cx="160" cy="236" r="2" fill="url(#goldAccent)"/>
      <circle cx="120" cy="236" r="2" fill="url(#goldAccent)"/>
      <circle cx="80" cy="236" r="2" fill="url(#goldAccent)"/>
      <circle cx="40" cy="236" r="2" fill="url(#goldAccent)"/>
      <circle cx="36" cy="200" r="2" fill="url(#goldAccent)"/>
      <circle cx="36" cy="160" r="2" fill="url(#goldAccent)"/>
      <circle cx="36" cy="120" r="2" fill="url(#goldAccent)"/>
      <circle cx="36" cy="80" r="2" fill="url(#goldAccent)"/>
      <circle cx="36" cy="40" r="2" fill="url(#goldAccent)"/>
    </g>
  </g>
</svg>