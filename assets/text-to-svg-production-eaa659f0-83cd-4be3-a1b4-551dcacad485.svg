<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Browser Window Frame -->
  <g id="browser-window">
    <rect x="20" y="20" width="360" height="360" fill="#FFD93D" stroke="#FFC107" stroke-width="8"/>
    <!-- Window Controls -->
    <circle cx="360" cy="60" r="12" fill="#000000"/>
    <circle cx="330" cy="60" r="12" fill="#000000"/>
    <circle cx="300" cy="60" r="12" fill="#000000"/>
  </g>

  <!-- Desk Surface -->
  <g id="desk">
    <rect x="20" y="250" width="360" height="130" fill="#FFD93D"/>
  </g>

  <!-- Stack of Paper -->
  <g id="paper-stack">
    <rect x="100" y="220" width="200" height="80" fill="#FFFFFF"/>
    <rect x="105" y="225" width="190" height="80" fill="#FFFFFF"/>
    <rect x="110" y="230" width="180" height="80" fill="#FFFFFF"/>
    <!-- Lined Paper -->
    <g id="paper-lines">
      <line x1="115" y1="250" x2="285" y2="250" stroke="#B0BEC5" stroke-width="2"/>
      <line x1="115" y1="270" x2="285" y2="270" stroke="#B0BEC5" stroke-width="2"/>
      <line x1="115" y1="290" x2="285" y2="290" stroke="#B0BEC5" stroke-width="2"/>
    </g>
  </g>

  <!-- Person's Body -->
  <g id="person">
    <!-- Head -->
    <circle cx="200" cy="140" r="50" fill="#FFE0BD"/>
    
    <!-- Hair -->
    <path d="M 140,140 Q 140,90 200,90 Q 260,90 260,140 Q 260,160 255,155 Q 245,155 240,150 Q 230,160 220,155 Q 210,160 200,155 Q 190,160 180,155 Q 170,150 160,150 Q 145,140 140,140" fill="#3E2723"/>
    
    <!-- Face - Eyes -->
    <circle cx="180" cy="140" r="8" fill="#3E2723"/>
    <circle cx="220" cy="140" r="8" fill="#3E2723"/>
    
    <!-- Smile -->
    <path d="M 185,165 Q 200,178 215,165" stroke="#3E2723" stroke-width="3" fill="none" stroke-linecap="round"/>
    
    <!-- Neck -->
    <rect x="190" y="185" width="20" height="25" fill="#FFE0BD"/>
    
    <!-- Body/Top -->
    <path d="M 155,210 L 155,280 Q 200,290 245,280 L 245,210 Q 200,215 155,210" fill="#F44336"/>
    
    <!-- Arms -->
    <path d="M 155,220 Q 140,240 160,260 L 180,250" stroke="#FFE0BD" stroke-width="18" fill="none" stroke-linecap="round"/>
    <path d="M 245,220 Q 260,240 240,260 L 220,250" stroke="#FFE0BD" stroke-width="18" fill="none" stroke-linecap="round"/>
    
    <!-- Hand writing -->
    <circle cx="235" cy="265" r="12" fill="#FFE0BD"/>
    
    <!-- Yellow Pencil -->
    <g id="pencil">
      <line x1="225" y1="280" x2="275" y2="240" stroke="#FFD93D" stroke-width="8" stroke-linecap="round"/>
      <line x1="225" y1="280" x2="275" y2="240" stroke="#FFA000" stroke-width="2" stroke-linecap="round"/>
      <polygon points="275,240 270,250 280,250" fill="#8D6E63"/>
      <polygon points="280,250 280,245 275,255" fill="#FFA000"/>
    </g>
  </g>
</svg>