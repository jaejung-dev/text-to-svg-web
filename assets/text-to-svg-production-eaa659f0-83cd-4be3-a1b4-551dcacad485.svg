<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Transparent Background -->
  <rect width="400" height="300" fill="transparent"/>
  
  <!-- Browser Window Frame -->
  <g id="browser-window">
    <rect x="20" y="30" width="360" height="250" rx="8" ry="8" fill="#FFE57D" stroke="#F4B400" stroke-width="2"/>
    <rect x="20" y="30" width="360" height="40" rx="8" ry="8" fill="#FFD93D" stroke="#F4B400" stroke-width="2"/>
  </g>
  
  <!-- Browser Window Controls -->
  <g id="window-controls">
    <circle cx="310" cy="50" r="4" fill="#333333"/>
    <circle cx="325" cy="50" r="4" fill="#333333"/>
    <circle cx="340" cy="50" r="4" fill="#333333"/>
  </g>
  
  <!-- Yellow Desk -->
  <g id="desk">
    <rect x="50" y="200" width="300" height="60" fill="#FFD93D" rx="5"/>
    <rect x="50" y="260" width="300" height="20" fill="#F4B400" rx="3"/>
  </g>
  
  <!-- Stack of Lined Paper -->
  <g id="paper-stack">
    <!-- Bottom papers -->
    <rect x="80" y="180" width="140" height="90" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>
    <rect x="85" y="175" width="140" height="90" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>
    <rect x="90" y="170" width="140" height="90" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>
    
    <!-- Top paper (active) -->
    <rect x="95" y="165" width="140" height="90" fill="#FFFFFF" stroke="#BDBDBD" stroke-width="1"/>
    
    <!-- Lined text on top paper -->
    <g id="lines">
      <line x1="105" y1="180" x2="225" y2="180" stroke="#C5E1A5" stroke-width="1"/>
      <line x1="105" y1="195" x2="225" y2="195" stroke="#C5E1A5" stroke-width="1"/>
      <line x1="105" y1="210" x2="225" y2="210" stroke="#C5E1A5" stroke-width="1"/>
      <line x1="105" y1="225" x2="225" y2="225" stroke="#C5E1A5" stroke-width="1"/>
    </g>
  </g>
  
  <!-- Smiling Young Person -->
  <g id="person">
    <!-- Hair -->
    <ellipse cx="165" cy="130" rx="35" ry="30" fill="#2C1810"/>
    <ellipse cx="155" cy="135" rx="8" ry="25" fill="#2C1810"/>
    <ellipse cx="175" cy="135" rx="8" ry="25" fill="#2C1810"/>
    
    <!-- Face -->
    <circle cx="165" cy="145" r="28" fill="#FFE0BD"/>
    
    <!-- Eyes -->
    <circle cx="155" cy="140" r="4" fill="#2C1810"/>
    <circle cx="175" cy="140" r="4" fill="#2C1810"/>
    
    <!-- Smile -->
    <path d="M 158 155 Q 165 162 172 155" fill="none" stroke="#2C1810" stroke-width="2" stroke-linecap="round"/>
    
    <!-- Red Top -->
    <path d="M 135 175 L 135 220 L 195 220 L 195 175 Z" fill="#E53935"/>
    <path d="M 135 175 L 165 190 L 195 175" fill="#E53935"/>
    
    <!-- Arms -->
    <path d="M 135 185 Q 120 200 140 215" fill="none" stroke="#FFE0BD" stroke-width="12" stroke-linecap="round"/>
    <path d="M 195 185 Q 210 200 190 215" fill="none" stroke="#FFE0BD" stroke-width="12" stroke-linecap="round"/>
  </g>
  
  <!-- Yellow Pencil -->
  <g id="pencil">
    <path d="M 200 220 L 230 240" fill="none" stroke="#FFD93D" stroke-width="8" stroke-linecap="round"/>
    <path d="M 200 220 L 225 238" fill="none" stroke="#FFE57D" stroke-width="6" stroke-linecap="round"/>
    <path d="M 225 238 L 235 243" fill="none" stroke="#2C1810" stroke-width="3" stroke-linecap="round"/>
    <ellipse cx="235" cy="243" rx="3" ry="3" fill="#2C1810"/>
  </g>
</svg>