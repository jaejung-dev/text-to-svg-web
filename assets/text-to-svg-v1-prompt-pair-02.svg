<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Shield Base -->
  <defs>
    <linearGradient id="shieldGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4A90D9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2C5F8D;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Shield Background -->
  <g id="shield-background">
    <path d="M32 8 L50 16 L50 32 C50 48 32 56 32 56 C32 56 14 48 14 32 L14 16 L32 8 Z" 
          fill="url(#shieldGradient)" 
          stroke="#1A3A52" 
          stroke-width="2"/>
  </g>
  
  <!-- Lock Icon -->
  <g id="lock-icon">
    <rect x="24" y="28" width="16" height="14" rx="2" fill="#FFFFFF" opacity="0.9"/>
    <path d="M28 28 V24 C28 21 36 21 36 24 V28" fill="none" stroke="#FFFFFF" stroke-width="2.5"/>
    <circle cx="32" cy="35" r="2" fill="#4A90D9"/>
  </g>
  
  <!-- File Transfer Arrows -->
  <g id="transfer-arrows">
    <path d="M20 24 L24 28 L20 32" 
          fill="none" 
          stroke="#FFFFFF" 
          stroke-width="2" 
          stroke-linecap="round" 
          stroke-linejoin="round"/>
    <path d="M44 32 L40 28 L44 24" 
          fill="none" 
          stroke="#FFFFFF" 
          stroke-width="2" 
          stroke-linecap="round" 
          stroke-linejoin="round"/>
  </g>
  
  <!-- Security Badge Text -->
  <text x="32" y="44" 
        text-anchor="middle" 
        font-family="Arial, sans-serif" 
        font-size="6" 
        font-weight="bold" 
        fill="#FFFFFF" 
        opacity="0.8">
    SFTP
  </text>
  
  <!-- Subtle Glow Effect -->
  <g id="glow-effect" opacity="0.3">
    <path d="M32 8 L50 16 L50 32 C50 48 32 56 32 56 C32 56 14 48 14 32 L14 16 L32 8 Z" 
          fill="#4A90D9" 
          filter="url(#glow)"/>
  </g>
</svg>