<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e94560"/>
      <stop offset="100%" style="stop-color:#ff6b6b"/>
    </linearGradient>
    
    <radialGradient id="glowGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffd700; stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#ffd700; stop-opacity:0"/>
    </radialGradient>
  </defs>
  
  <rect width="800" height="600" fill="url(#bgGradient)"/>
  
  <!-- Decorative Circles Group -->
  <g id="circle-decorations" opacity="0.3">
    <circle cx="150" cy="150" r="80" fill="url(#glowGradient)"/>
    <circle cx="650" cy="450" r="120" fill="url(#glowGradient)"/>
    <circle cx="400" cy="300" r="60" fill="url(#glowGradient)"/>
  </g>
  
  <!-- Geometric Shapes Group -->
  <g id="geometric-shapes">
    <!-- Main Diamond -->
    <polygon points="400,100 500,250 400,400 300,250" 
             fill="url(#accentGradient)" 
             opacity="0.9"
             stroke="#ffffff" 
             stroke-width="2"/>
    
    <!-- Left Triangle -->
    <polygon points="200,200 100,350 200,500 300,350" 
             fill="#4ecca3" 
             opacity="0.8"
             transform="rotate(-15 200 350)"/>
    
    <!-- Right Triangle -->
    <polygon points="600,200 700,350 600,500 500,350" 
             fill="#ffd700" 
             opacity="0.8"
             transform="rotate(15 600 350)"/>
  </g>
  
  <!-- Connection Lines -->
  <g id="connection-lines" stroke="#ffffff" stroke-width="1" opacity="0.4">
    <line x1="400" y1="100" x2="400" y2="600"/>
    <line x1="100" y1="300" x2="700" y2="300"/>
    <line x1="150" y1="150" x2="650" y2="450"/>
  </g>
  
  <!-- Accent Circles -->
  <g id="accent-circles">
    <circle cx="250" cy="250" r="15" fill="#ffd700"/>
    <circle cx="550" cy="250" r="20" fill="#e94560"/>
    <circle cx="400" cy="400" r="12" fill="#4ecca3"/>
    <circle cx="300" cy="500" r="10" fill="#ffffff"/>
    <circle cx="500" cy="500" r="18" fill="#4ecca3"/>
  </g>
  
  <!-- Grid Pattern -->
  <g id="grid-pattern" stroke="#ffffff" stroke-width="0.5" opacity="0.1">
    <line x1="0" y1="0" x2="800" y2="0"/>
    <line x1="0" y1="50" x2="800" y2="50"/>
    <line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="150" x2="800" y2="150"/>
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="250" x2="800" y2="250"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="350" x2="800" y2="350"/>
    <line x1="0" y1="400" x2="800" y2="400"/>
    <line x1="0" y1="450" x2="800" y2="450"/>
    <line x1="0" y1="500" x2="800" y2="500"/>
    <line x1="0" y1="550" x2="800" y2="550"/>
  </g>
  
  <!-- Title/Text Area -->
  <g id="title-area">
    <text x="400" y="580" 
          text-anchor="middle" 
          font-family="Arial, sans-serif" 
          font-size="24" 
          fill="#ffffff" 
          opacity="0.8">
      Creative Design
    </text>
  </g>
</svg>