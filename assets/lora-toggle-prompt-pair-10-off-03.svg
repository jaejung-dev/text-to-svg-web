<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" id="atomstak-p1-app">
  <!-- App Background -->
  <rect width="800" height="600" fill="#1a1a2e"/>
  
  <!-- Header -->
  <rect width="800" height="70" fill="#16213e"/>
  <text x="40" y="35" font-family="Arial, sans-serif" font-size="24" fill="#e94560" font-weight="bold">ATOMSTAK P1</text>
  <text x="40" y="58" font-family="Arial, sans-serif" font-size="12" fill="#888">Laser Engraving Controller</text>
  
  <!-- Sidebar Navigation -->
  <rect x="0" y="70" width="200" height="530" fill="#16213e"/>
  <circle cx="30" cy="120" r="15" fill="#e94560"/>
  <text x="55" y="125" font-family="Arial, sans-serif" font-size="14" fill="#fff">Import</text>
  <circle cx="30" cy="170" r="15" fill="#0f3460"/>
  <text x="55" y="175" font-family="Arial, sans-serif" font-size="14" fill="#fff">Preview</text>
  <circle cx="30" cy="220" r="15" fill="#0f3460"/>
  <text x="55" y="225" font-family="Arial, sans-serif" font-size="14" fill="#fff">Settings</text>
  <circle cx="30" cy="270" r="15" fill="#0f3460"/>
  <text x="55" y="275" font-family="Arial, sans-serif" font-size="14" fill="#fff">Export</text>
  
  <!-- Main Content Area -->
  <rect x="200" y="70" width="600" height="530" fill="#1a1a2e"/>
  
  <!-- Title Section -->
  <text x="230" y="110" font-family="Arial, sans-serif" font-size="20" fill="#fff" font-weight="bold">Lightburn to SVG Converter</text>
  <text x="230" y="135" font-family="Arial, sans-serif" font-size="14" fill="#888">Import .lightburn files and export optimized SVGs</text>
  
  <!-- File Import Section -->
  <g id="import-section">
    <rect x="230" y="155" width="540" height="100" fill="#0f3460" rx="8" opacity="0.6"/>
    <text x="250" y="185" font-family="Arial, sans-serif" font-size="16" fill="#fff">Import Lightburn File</text>
    <rect x="250" y="205" width="400" height="40" rx="5" fill="#e94560"/>
    <text x="320" y="230" font-family="Arial, sans-serif" font-size="14" fill="#fff" text-anchor="middle">Browse Files (.lightburn)</text>
    <text x="670" y="230" font-family="Arial, sans-serif" font-size="14" fill="#888" text-anchor="middle">No file selected</text>
  </g>
  
  <!-- Preview Canvas -->
  <g id="preview-section">
    <rect x="230" y="280" width="540" height="200" fill="#16213e" rx="8" stroke="#0f3460" stroke-width="2"/>
    <text x="250" y="300" font-family="Arial, sans-serif" font-size="14" fill="#888">Preview Area</text>
    <!-- SVG Grid -->
    <defs>
      <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
        <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#0f3460" stroke-width="0.5" opacity="0.3"/>
      </pattern>
    </defs>
    <rect x="250" y="320" width="500" height="160" fill="url(#grid)"/>
    <!-- Sample Laser Path -->
    <path d="M 350 360 L 400 380 L 450 340 L 500 380 L 550 360" fill="none" stroke="#e94560" stroke-width="2"/>
    <text x="350" y="350" font-family="Arial, sans-serif" font-size="10" fill="#e94560">•</text>
    <text x="400" y="370" font-family="Arial, sans-serif" font-size="10" fill="#e94560">•</text>
    <text x="450" y="330" font-family="Arial, sans-serif" font-size="10" fill="#e94560">•</text>
    <text x="500" y="370" font-family="Arial, sans-serif" font-size="10" fill="#e94560">•</text>
    <text x="550" y="350" font-family="Arial, sans-serif" font-size="10" fill="#e94560">•</text>
  </g>
  
  <!-- Export Section -->
  <g id="export-section">
    <rect x="230" y="495" width="540" height="80" fill="#0f3460" rx="8" opacity="0.6"/>
    <text x="250" y="520" font-family="Arial, sans-serif" font-size="16" fill="#fff">Export Configuration</text>
    <rect x="250" y="540" width="250" height="35" rx="5" fill="#2ecc71"/>
    <text x="375" y="563" font-family="Arial, sans-serif" font-size="14" fill="#fff" text-anchor="middle">Export to SVG</text>
    <rect x="520" y="540" width="250" height="35" rx="5" fill="#3498db"/>
    <text x="645" y="563" font-family="Arial, sans-serif" font-size="14" fill="#fff" text-anchor="middle">Advanced Settings</text>
  </g>
  
  <!-- Status Bar -->
  <rect x="0" y="580" width="800" height="20" fill="#0f3460"/>
  <text x="20" y="595" font-family="Arial, sans-serif" font-size="11" fill="#888">Ready</text>
  <text x="750" y="595" font-family="Arial, sans-serif" font-size="11" fill="#888">ATOMSTAK P1 Connected</text>
  
  <!-- Decorative Elements -->
  <circle cx="750" cy="120" r="8" fill="#2ecc71"/>
  <text x="765" y="125" font-family="Arial, sans-serif" font-size="11" fill="#2ecc71">●</text>
</svg>