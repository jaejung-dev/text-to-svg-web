<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
    <defs>
        <!-- Gradient for the shield to give it depth -->
        <linearGradient id="shieldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#0f3a59;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#001475;stop-opacity:1" />
        </linearGradient>
        
        <!-- Gradient for the gear -->
        <linearGradient id="gearGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#ffd234;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#ffcc00;stop-opacity:1" />
        </linearGradient>

        <!-- Shadow Filter -->
        <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
            <feOffset dx="2" dy="2" result="offsetblur"/>
            <feComponentTransfer>
                <feFuncA type="linear" slope="0.3"/>
            </feComponentTransfer>
            <feMerge>
                <feMergeNode/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>

    <!-- Main Group: The SAP Shape (Trapezoid Shield) -->
    <g transform="translate(50, 50) scale(0.9)">
        <!-- Background Shield -->
        <path d="M 25,10 L 475,10 L 490,120 L 490,490 L 10,490 L 10,120 Z" 
              fill="url(#shieldGradient)" stroke="#ffffff" stroke-width="2" />
        
        <!-- Subtle Grid Background (representing data layers) -->
        <path d="M 25,120 L 490,120 L 490,490 L 10,490 L 10,120 Z" 
              fill="none" stroke="#ffffff" stroke-width="1" opacity="0.1" stroke-dasharray="20,20" />
        
        <!-- Group: The BASIS Engine (Gear) -->
        <g transform="translate(250, 250)">
            <!-- Gear Teeth -->
            <g stroke="url(#gearGradient)" stroke-width="6" fill="none">
                <polygon points="-20,-80 -10,-70 10,-70 20,-80" />
                <polygon points="20,-80 30,-70 40,-70 50,-80" />
                <polygon points="50,-80 60,-70 70,-70 80,-80" />
                <polygon points="80,-80 90,-70 100,-70 110,-80" />
                <polygon points="110,-80 110,-60 90,-50 90,-30" />
                <polygon points="110,-30 110,-10 90,0 90,20" />
                <polygon points="90,20 100,30 110,30 110,50" />
                <polygon points="110,50 100,60 90,60 80,50" />
                <polygon points="80,50 90,60 70,70 60,80" />
                <polygon points="60,80 70,90 50,100 40,110" />
                <polygon points="40,110 30,100 10,90 0,80" />
                <polygon points="0,80 10,90 -10,100 -20,110" />
                <polygon points="-20,110 -30,100 -50,90 -60,80" />
                <polygon points="-60,80 -70,90 -90,100 -100,110" />
                <polygon points="-100,110 -100,90 -80,80 -80,60" />
                <polygon points="-80,60 -90,50 -100,30 -100,10" />
                <polygon points="-100,10 -100,-10 -90,-20 -90,-40" />
                <polygon points="-90,-40 -100,-50 -100,-70 -90,-80" />
                <polygon points="-80,-80 -90,-70 -70,-70 -60,-80" />
                <polygon points="-60,-80 -70,-90 -50,-100 -40,-110" />
                <polygon points="-40,-110 -30,-100 -10,-90 0,-80" />
                <polygon points="0,-80 -10,-90 10,-100 20,-110" />
            </g>
            
            <!-- Inner Dark Hub -->
            <circle cx="0" cy="0" r="50" fill="#001475" />
            
            <!-- Technical Markings (Lines) -->
            <line x1="-10" y1="0" x2="10" y2="0" stroke="#ffffff" stroke-width="4" opacity="0.5"/>
            <line x1="0" y1="-10" x2="0" y2="10" stroke="#ffffff" stroke-width="4" opacity="0.5"/>
            
            <!-- Database Cylinder Icon (Inside Gear) -->
            <g transform="translate(-25, 25) scale(0.8)">
                <path d="M 0,0 L 0,-60 L 60,-60 L 60,0 Q 30,20 0,0 Z" fill="#001475" />
                <path d="M 0,-60 L 60,-60 Q 30,-40 0,-60 Z" fill="#0F6CB1" />
                <path d="M 0,-40 L 60,-40 Q 30,-20 0,-40 Z" fill="#0F6CB1" />
                <path d="M 0,-20 L 60,-20 Q 30,0 0,-20 Z" fill="#0F6CB1" />
            </g>

            <!-- Ring -->
            <circle cx="0" cy="0" r="65" fill="none" stroke="#ffffff" stroke-width="2" stroke-dasharray="10,5" />
        </g>
    </g>
</svg>