<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" id="SAP-Basis-Logo">
  <defs>
    <!-- Gradients for a modern tech look -->
    <linearGradient id="blueGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4facfe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00f2fe;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="darkGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#203a43;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2c5364;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="baseGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#333333;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background Circle -->
  <circle cx="250" cy="250" r="240" fill="#f4f6f8" stroke="#e1e5ea" stroke-width="2"/>

  <!-- Group: SAP Shape Representation (Modern Isosceles Triangle Style) -->
  <g id="SAP-Geometric-Core" transform="translate(0, 20)">
    
    <!-- Left Blue Triangle -->
    <!-- Coordinates adjusted to form the left side of the triangle -->
    <polygon points="120,360 250,360 250,120 120,160" fill="url(#blueGradient)" />

    <!-- Right Blue Triangle -->
    <!-- Coordinates adjusted to form the right side of the triangle -->
    <polygon points="250,360 380,360 380,160 250,120" fill="url(#blueGradient)" />

    <!-- Top Dark/Black Triangle -->
    <!-- Coordinates adjusted to form the top of the triangle -->
    <polygon points="120,160 380,160 250,80" fill="url(#darkGradient)" />
  </g>

  <!-- Group: Support Concept (Base/Foundation) -->
  <g id="Support-Base">
    <!-- The "Line" representing the connection to the ground (BASIS) -->
    <line x1="250" y1="360" x2="250" y2="400" stroke="#000000" stroke-width="4" stroke-linecap="round"/>
    
    <!-- The "Base" or Platform -->
    <rect x="160" y="410" width="180" height="12" rx="6" fill="url(#baseGradient)"/>
    
    <!-- Decorative connection node at the base -->
    <circle cx="250" cy="416" r="4" fill="#ffffff" />
  </g>

  <!-- Background Abstract Circles for depth -->
  <circle cx="250" cy="380" r="60" fill="#4facfe" opacity="0.1"/>
  <circle cx="250" cy="430" r="30" fill="#000000" opacity="0.05"/>
</svg>