<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="blueGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F3460"/>
      <stop offset="100%" style="stop-color:#1A5F7A"/>
    </linearGradient>
    <linearGradient id="lightBlueGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#53CDE6"/>
      <stop offset="100%" style="stop-color:#3498DB"/>
    </linearGradient>
  </defs>
  
  <!-- Main SAP-inspired Shape Block -->
  <g id="sap-block-1" fill="url(#blueGradient)">
    <rect x="10" y="30" width="50" height="80" rx="6" ry="6"/>
    <rect x="65" y="40" width="50" height="80" rx="6" ry="6"/>
    <rect x="120" y="50" width="50" height="80" rx="6" ry="6"/>
  </g>
  
  <!-- Support Shield Element -->
  <g id="support-shield">
    <path d="M 50 140 L 100 160 L 150 140 L 150 90 L 50 90 Z" 
          fill="none" 
          stroke="url(#lightBlueGradient)" 
          stroke-width="3"
          opacity="0.9"/>
  </g>
  
  <!-- Technical Network/Connection Lines -->
  <g id="network-connections" stroke="#53CDE6" stroke-width="2" fill="none">
    <line x1="35" y1="70" x2="90" y2="90"/>
    <line x1="90" y1="90" x2="145" y2="110"/>
    <line x1="35" y1="110" x2="90" y2="90"/>
    <line x1="90" y1="90" x2="145" y2="70"/>
  </g>
  
  <!-- Database/Server Icon -->
  <g id="server-icon">
    <rect x="75" y="105" width="50" height="25" rx="3" fill="url(#lightBlueGradient)" opacity="0.6"/>
    <circle cx="80" cy="117" r="2" fill="#FFF"/>
    <circle cx="90" cy="117" r="2" fill="#FFF"/>
    <circle cx="100" cy="117" r="2" fill="#FFF"/>
    <circle cx="110" cy="117" r="2" fill="#FFF"/>
    <circle cx="120" cy="117" r="2" fill="#FFF"/>
  </g>
  
  <!-- Gear/Settings Icon (Technical Foundation) -->
  <g id="gear-icon" transform="translate(160, 50)">
    <circle cx="0" cy="0" r="15" fill="url(#blueGradient)" opacity="0.8"/>
    <circle cx="0" cy="0" r="8" fill="none" stroke="#53CDE6" stroke-width="2"/>
    <line x1="0" y1="-15" x2="0" y2="15" stroke="#53CDE6" stroke-width="2"/>
    <line x1="-15" y1="0" x2="15" y2="0" stroke="#53CDE6" stroke-width="2"/>
    <line x1="-10.6" y1="-10.6" x2="10.6" y2="10.6" stroke="#53CDE6" stroke-width="2"/>
    <line x1="-10.6" y1="10.6" x2="10.6" y2="-10.6" stroke="#53CDE6" stroke-width="2"/>
  </g>
  
  <!-- Support Arrow/Check Element -->
  <g id="support-indicator">
    <path d="M 85 165 L 100 175 L 115 165" 
          fill="none" 
          stroke="#27AE60" 
          stroke-width="3" 
          stroke-linecap="round" 
          stroke-linejoin="round"/>
  </g>
  
  <!-- Background Accent -->
  <circle cx="100" cy="100" r="85" fill="none" stroke="url(#blueGradient)" stroke-width="1" opacity="0.1"/>
</svg>