<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <title>SAP BASIS Support Logo Concept</title>
  
  <!-- Background Circle (Represents the SAP Logo Outline without text) -->
  <circle id="sap-outline" cx="200" cy="200" r="120" 
          fill="none" stroke="#0F599B" stroke-width="12" />

  <!-- Abstract Gears / Support Mechanism (Represents BASIS/Infrastructure) -->
  <g id="basis-mechanism" transform="translate(200, 200)">
    
    <!-- Outer Gear Ring -->
    <circle r="95" fill="none" stroke="#1A2F3D" stroke-width="6" stroke-dasharray="8 8" />
    
    <!-- Central Support Structure (Hexagon) -->
    <path id="core-hex" d="M0,-60 L52,-30 L52,30 L0,60 L-52,30 L-52,-30 Z" 
          fill="#00C6B8" opacity="0.9" />
    
    <!-- Connecting Arrows (Data Flow/Support) -->
    <path d="M-40,-80 L-40,-95" stroke="#0F599B" stroke-width="4" stroke-linecap="round" marker-end="url(#arrowhead)" />
    <path d="M40,-80 L40,-95" stroke="#0F599B" stroke-width="4" stroke-linecap="round" marker-end="url(#arrowhead)" />
    <path d="M-40,80 L-40,95" stroke="#0F599B" stroke-width="4" stroke-linecap="round" marker-end="url(#arrowhead)" />
    <path d="M40,80 L40,95" stroke="#0F599B" stroke-width="4" stroke-linecap="round" marker-end="url(#arrowhead)" />
    
    <!-- Central Shield Icon (Protection/Support) -->
    <path d="M0,-15 L25,-10 L25,10 L0,20 L-25,10 L-25,-10 Z" 
          fill="#FFFFFF" opacity="0.9" />
    
    <!-- Plus Sign (Support/Help) -->
    <path d="M-8,0 L8,0 M0,-8 L0,8" stroke="#0F599B" stroke-width="4" stroke-linecap="round" />
  </g>

  <!-- Definition for Arrowheads -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0F599B" />
    </marker>
    
    <!-- Gradient for depth -->
    <linearGradient id="base-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F599B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#063E7D;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Shadow/Glow effect for modern feel -->
  <circle cx="200" cy="200" r="125" fill="none" stroke="rgba(15, 89, 155, 0.2)" stroke-width="2" />
</svg>