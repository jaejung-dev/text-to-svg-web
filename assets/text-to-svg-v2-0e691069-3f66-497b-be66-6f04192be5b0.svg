<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Define a repeating gradient for the wave pattern -->
    <linearGradient id="waveGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1e90ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4682b4;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Main concentric arc group -->
  <g id="concentric-arcs" stroke="#1e90ff" stroke-width="2" fill="none" opacity="0.9">
    <!-- Outermost arc - top left starting point -->
    <path d="M 50 40 Q 120 50 200 65 T 320 95" />
    
    <!-- Second arc -->
    <path d="M 45 55 Q 115 68 195 85 T 315 115" />
    
    <!-- Third arc -->
    <path d="M 40 70 Q 110 83 190 102 T 310 135" />
    
    <!-- Fourth arc -->
    <path d="M 35 85 Q 105 99 185 119 T 305 155" />
    
    <!-- Fifth arc -->
    <path d="M 30 100 Q 100 115 180 136 T 300 175" />
    
    <!-- Sixth arc -->
    <path d="M 25 115 Q 95 131 175 153 T 295 195" />
    
    <!-- Seventh arc -->
    <path d="M 20 130 Q 90 147 170 170 T 290 215" />
    
    <!-- Eighth arc -->
    <path d="M 15 145 Q 85 163 165 187 T 285 235" />
    
    <!-- Ninth arc -->
    <path d="M 10 160 Q 80 179 160 204 T 280 255" />
    
    <!-- Innermost arc -->
    <path d="M 5 175 Q 75 195 155 221 T 275 275" />
  </g>
</svg>