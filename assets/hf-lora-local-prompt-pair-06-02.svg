<svg viewBox="0 0 400 150" xmlns="http://www.w3.org/2000/svg">
  <!-- Definitions for gradients and filters -->
  <defs>
    <!-- Ghost gradient -->
    <linearGradient id="ghostGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:0.3" />
    </linearGradient>
    
    <!-- Glow filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Vector path pattern -->
    <pattern id="vectorPattern" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="1.5" fill="#667eea" opacity="0.6"/>
    </pattern>
  </defs>
  
  <!-- Background circle with pattern -->
  <circle cx="75" cy="75" r="60" fill="url(#vectorPattern)" opacity="0.2"/>
  
  <!-- Vector path elements (connecting lines) -->
  <g id="vectorPaths" stroke="#667eea" stroke-width="1.5" opacity="0.4" fill="none">
    <path d="M 50 75 L 80 75 L 90 50 L 110 50 L 110 100 L 90 100 L 80 75" />
    <circle cx="50" cy="75" r="3" fill="#667eea"/>
    <circle cx="80" cy="75" r="3" fill="#667eea"/>
    <circle cx="90" cy="50" r="3" fill="#667eea"/>
    <circle cx="110" cy="50" r="3" fill="#667eea"/>
    <circle cx="110" cy="100" r="3" fill="#667eea"/>
    <circle cx="90" cy="100" r="3" fill="#667eea"/>
  </g>
  
  <!-- Ghost element -->
  <g id="ghost" filter="url(#glow)">
    <path d="M 120 40 C 115 40 110 45 110 55 L 110 90 C 110 100 115 105 125 105 L 125 115 C 125 120 120 125 115 125 L 135 125 C 130 125 125 120 125 115 L 125 105 C 135 105 140 100 140 90 L 140 55 C 140 45 135 40 130 40 Z" 
          fill="url(#ghostGradient)" opacity="0.8"/>
    
    <!-- Ghost eyes -->
    <ellipse cx="120" cy="60" rx="5" ry="7" fill="#764ba2" opacity="0.8"/>
    <ellipse cx="135" cy="60" rx="5" ry="7" fill="#764ba2" opacity="0.8"/>
    
    <!-- Ghost highlights -->
    <path d="M 118 45 L 118 50 L 125 45" stroke="#ffffff" stroke-width="1" opacity="0.5"/>
    <path d="M 133 45 L 133 50 L 140 45" stroke="#ffffff" stroke-width="1" opacity="0.5"/>
  </g>
  
  <!-- Text element -->
  <g id="logoText">
    <text x="160" y="65" font-family="Arial, sans-serif" font-size="32" font-weight="bold" 
          fill="#667eea" letter-spacing="1">GHOST</text>
    <text x="160" y="95" font-family="Arial, sans-serif" font-size="28" font-weight="lighter" 
          fill="#764ba2" letter-spacing="2">VECTOR</text>
  </g>
  
  <!-- Decorative line -->
  <line x1="160" y1="105" x2="290" y2="105" stroke="#667eea" stroke-width="2" opacity="0.4"/>
</svg>