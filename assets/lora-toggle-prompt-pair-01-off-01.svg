<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradients for a modern, subtle depth -->
    <linearGradient id="blueGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0074CE" />
      <stop offset="100%" stop-color="#005fa8" />
    </linearGradient>
    <linearGradient id="greenGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8CBF26" />
      <stop offset="100%" stop-color="#6da31d" />
    </linearGradient>
    <linearGradient id="orangeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E34C23" />
      <stop offset="100%" stop-color="#c13b1a" />
    </linearGradient>
    <linearGradient id="yellowGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F4B800" />
      <stop offset="100%" stop-color="#d49f00" />
    </linearGradient>
    
    <!-- Shadow for depth -->
    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="0" dy="4" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge> 
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/> 
      </feMerge>
    </filter>
  </defs>

  <!-- Group for the entire logo -->
  <g id="SAP-BASIS-Logo" filter="url(#dropShadow)">
    
    <!-- Layer 1: The Foundation (BASIS Support) -->
    <!-- A stylized base representing server infrastructure or a pedestal -->
    <g id="support-base" opacity="0.9">
      <!-- Main body of the base -->
      <path d="M 40 120 L 160 120 L 140 160 L 60 160 Z" fill="#E0E0E0" />
      
      <!-- Decorative tech element on base (representing connection) -->
      <rect x="70" y="135" width="60" height="4" rx="2" fill="#999" />
      <rect x="80" y="145" width="40" height="2" rx="1" fill="#666" />
      
      <!-- Side supports/legs (abstract) -->
      <rect x="55" y="130" width="6" height="30" rx="2" fill="#CCC" />
      <rect x="139" y="130" width="6" height="30" rx="2" fill="#CCC" />
    </g>

    <!-- Layer 2: The SAP Shape (Identifying Element) -->
    <!-- Arranged as 4 triangles forming the diamond shape, positioned to "rest" on the base -->
    <g id="sap-shape" transform="translate(100, 90)">
      
      <!-- Top Left: Orange -->
      <path d="M -22 -22 L 0 0 L -22 22 Z" fill="url(#orangeGradient)" transform="translate(0, -18)" />
      
      <!-- Top Right: Yellow -->
      <path d="M 22 -22 L 0 0 L 22 22 Z" fill="url(#yellowGradient)" transform="translate(0, -18)" />
      
      <!-- Bottom Left: Blue -->
      <path d="M -22 -22 L 0 0 L -22 22 Z" fill="url(#blueGradient)" transform="translate(0, 18)" />
      
      <!-- Bottom Right: Green -->
      <path d="M 22 -22 L 0 0 L 22 22 Z" fill="url(#greenGradient)" transform="translate(0, 18)" />
      
      <!-- Inner Detail: Connecting lines to form the cross shape usually seen in logo -->
      <!-- Simplified for "modern logo" aesthetic, ensuring the diamond structure is clear -->
    </g>
    
    <!-- Layer 3: Overlap Fix (To make the bottom triangles look integrated) -->
    <!-- Adjusting the visual weight of the bottom triangles to merge with the base -->
    <g id="sap-basis-merge" opacity="0.95">
       <!-- A subtle highlight to show connection between logo and base -->
       <rect x="80" y="110" width="40" height="4" fill="white" opacity="0.3" rx="2" />
    </g>

  </g>
</svg>