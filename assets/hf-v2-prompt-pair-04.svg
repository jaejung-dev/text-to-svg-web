<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#16213e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f3460;stop-opacity:1" />
    </linearGradient>
    
    <radialGradient id="circleGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#e94560;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f28c28;stop-opacity:1" />
    </radialGradient>
    
    <linearGradient id="barGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00cec9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#55efc4;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Main Background -->
  <rect id="background" x="0" y="0" width="800" height="600" fill="url(#bgGradient)" />
  
  <!-- Decorative Elements Group -->
  <g id="decorativeElements">
    <!-- Large Circle -->
    <circle id="mainCircle" cx="200" cy="150" r="80" fill="url(#circleGradient)" opacity="0.8" />
    
    <!-- Smaller Circles -->
    <circle id="smallCircle1" cx="650" cy="100" r="50" fill="#e94560" opacity="0.6" />
    <circle id="smallCircle2" cx="700" cy="200" r="30" fill="#f28c28" opacity="0.7" />
    
    <!-- Triangle -->
    <polygon id="triangle" points="600,350 700,350 650,250" fill="#00cec9" opacity="0.7" />
  </g>
  
  <!-- Geometric Shapes Group -->
  <g id="geometricShapes">
    <!-- Rectangles -->
    <rect id="rect1" x="50" y="250" width="120" height="200" fill="url(#barGradient)" rx="10" />
    <rect id="rect2" x="200" y="300" width="100" height="150" fill="#e94560" rx="10" opacity="0.7" />
    <rect id="rect3" x="350" y="280" width="80" height="180" fill="#55efc4" rx="10" />
    
    <!-- Rounded Rectangle -->
    <rect id="roundedRect" x="480" y="200" width="140" height="100" rx="20" ry="20" fill="#f28c28" opacity="0.8" />
    
    <!-- Diamond Shape -->
    <polygon id="diamond" points="650,300 700,350 650,400 600,350" fill="#00cec9" opacity="0.6" />
  </g>
  
  <!-- Lines Group -->
  <g id="lines" stroke="white" stroke-width="2" opacity="0.3">
    <line x1="0" y1="100" x2="800" y2="100" />
    <line x1="0" y1="500" x2="800" y2="500" />
    <line x1="150" y1="0" x2="150" y2="600" />
    <line x1="650" y1="0" x2="650" y2="600" />
  </g>
  
  <!-- Accent Shapes -->
  <g id="accentShapes">
    <!-- Curved Path -->
    <path id="curve" d="M 50 450 Q 200 350 350 450 T 650 450" stroke="#55efc4" stroke-width="3" fill="none" />
    
    <!-- Small Circles as dots -->
    <circle id="dot1" cx="100" cy="520" r="5" fill="#e94560" />
    <circle id="dot2" cx="300" cy="500" r="5" fill="#f28c28" />
    <circle id="dot3" cx="500" cy="530" r="5" fill="#00cec9" />
    <circle id="dot4" cx="700" cy="490" r="5" fill="#e94560" />
  </g>
  
  <!-- Title/Text Area -->
  <text id="title" x="400" y="580" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="white" text-anchor="middle" opacity="0.9">
    Abstract Design
  </text>
</svg>