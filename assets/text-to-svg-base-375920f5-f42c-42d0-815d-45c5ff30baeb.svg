<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect id="background" x="0" y="0" width="200" height="200" fill="#FFFFFF"/>
  
  <!-- Hexagon Outline -->
  <g id="hexagon-shape">
    <polygon id="hexagon-outline" 
