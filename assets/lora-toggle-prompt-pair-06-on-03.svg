<svg viewBox="0 0 400 150" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradient for ghostly effect -->
    <linearGradient id="ghostGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0.3" />
    </linearGradient>
    
    <!-- Glow filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="150" fill="#0f172a"/>
  
  <!-- Vector Arrow Element -->
  <g id="icon-arrow" transform="translate(50, 75)">
    <!-- Main arrow -->
    <path d="M0,0 L40,20 L0,40" fill="none" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
    <!-- Ghostly fade effect -->
    <path d="M40,20 L60,10 L50,30" fill="none" stroke="url(#ghostGradient)" stroke-width="1.5" opacity="0.6"/>
    <!-- Accent dot -->
    <circle cx="40" cy="20" r="4" fill="#8b5cf6" opacity="0.9"/>
  </g>
  
  <!-- Additional ghostly vectors -->
  <g id="ghost-lines">
    <line x1="75" y1="65" x2="95" y2="75" stroke="url(#ghostGradient)" stroke-width="1" opacity="0.4"/>
    <line x1="75" y1="85" x2="95" y2="65" stroke="url(#ghostGradient)" stroke-width="1" opacity="0.4"/>
    <line x1="90" y1="75" x2="110" y2="85" stroke="url(#ghostGradient)" stroke-width="1" opacity="0.3"/>
  </g>
  
  <!-- Company Name -->
  <g id="logo-text" transform="translate(130, 90)">
    <!-- GhostWord -->
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="28" font-weight="600" fill="#ffffff" letter-spacing="2">
      <tspan fill="#6366f1">Ghost</tspan>
    </text>
    <!-- Vector -->
    <text x="0" y="28" font-family="Arial, sans-serif" font-size="28" font-weight="600" fill="#ffffff" letter-spacing="2">
      <tspan fill="#3b82f6">Vector</tspan>
    </text>
    <!-- Subtle underline -->
    <line x1="0" y1="50" x2="140" y2="50" stroke="url(#ghostGradient)" stroke-width="2" opacity="0.6"/>
  </g>
</svg>