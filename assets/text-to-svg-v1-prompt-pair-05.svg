<svg viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <!-- Tile definition for game map -->
  <defs>
    <!-- Gradient for deep crimson -->
    <linearGradient id="carpetGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B0000;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#C41E3A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#500000;stop-opacity:1" />
    </linearGradient>
    
    <!-- Gold gradient for accents -->
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#DAA520;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B8860B;stop-opacity:1" />
    </linearGradient>
    
    <!-- Glow effect for cyberpunk elements -->
    <filter id="neonGlow">
      <feGaussianBlur stdDeviation="1" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <!-- Base carpet layer -->
  <g id="carpet-base">
    <rect x="4" y="4" width="120" height="120" fill="url(#carpetGradient)" stroke="#2d0000" stroke-width="2"/>
  </g>
  
  <!-- Outer decorative border -->
  <g id="border-outer">
    <rect x="8" y="8" width="112" height="112" fill="none" stroke="#4a0000" stroke-width="3"/>
    <rect x="12" y="12" width="104" height="104" fill="none" stroke="#2d0000" stroke-width="2"/>
  </g>
  
  <!-- Persian-style geometric border pattern -->
  <g id="border-pattern">
    <!-- Corner elements -->
    <polygon points="16,16 20,12 24,16 20,20" fill="url(#goldGradient)"/>
    <polygon points="108,16 112,12 116,16 112,20" fill="url(#goldGradient)"/>
    <polygon points="16,108 20,112 24,108 20,104" fill="url(#goldGradient)"/>
    <polygon points="108,108 112,112 116,108 112,104" fill="url(#goldGradient)"/>
    
    <!-- Side patterns -->
    <circle cx="40" cy="16" r="3" fill="url(#goldGradient)"/>
    <circle cx="72" cy="16" r="3" fill="url(#goldGradient)"/>
    <circle cx="100" cy="16" r="3" fill="url(#goldGradient)"/>
    <circle cx="16" cy="40" r="3" fill="url(#goldGradient)"/>
    <circle cx="16" cy="72" r="3" fill="url(#goldGradient)"/>
    <circle cx="16" cy="100" r="3" fill="url(#goldGradient)"/>
    <circle cx="40" cy="112" r="3" fill="url(#goldGradient)"/>
    <circle cx="72" cy="112" r="3" fill="url(#goldGradient)"/>
    <circle cx="100" cy="112" r="3" fill="url(#goldGradient)"/>
    <circle cx="112" cy="40" r="3" fill="url(#goldGradient)"/>
    <circle cx="112" cy="72" r="3" fill="url(#goldGradient)"/>
    <circle cx="112" cy="100" r="3" fill="url(#goldGradient)"/>
  </g>
  
  <!-- Central medallion design -->
  <g id="central-medallion">
    <circle cx="64" cy="64" r="28" fill="none" stroke="#2d0000" stroke-width="2"/>
    <circle cx="64" cy="64" r="22" fill="none" stroke="url(#goldGradient)" stroke-width="2"/>
    <circle cx="64" cy="64" r="16" fill="#6b0000" stroke="url(#goldGradient)" stroke-width="1"/>
    
    <!-- Inner ornate pattern -->
    <polygon points="64,48 68,52 64,56 60,52" fill="url(#goldGradient)"/>
    <polygon points="64,80 68,76 64,72 60,76" fill="url(#goldGradient)"/>
    <polygon points="48,64 52,60 56,64 52,68" fill="url(#goldGradient)"/>
    <polygon points="80,64 76,60 72,64 76,68" fill="url(#goldGradient)"/>
  </g>
  
  <!-- Secondary decorative bands -->
  <g id="decorative-bands">
    <!-- Horizontal band -->
    <rect x="20" y="56" width="88" height="16" fill="none" stroke="#2d0000" stroke-width="1"/>
    <rect x="24" y="56" width="80" height="16" fill="none" stroke="#4a0000" stroke-width="1"/>
    
    <!-- Vertical band -->
    <rect x="56" y="20" width="16" height="88" fill="none" stroke="#2d0000" stroke-width="1"/>
    <rect x="56" y="24" width="16" height="80" fill="none" stroke="#4a0000" stroke-width="1"/>
  </g>
  
  <!-- Cyberpunk corporate accent elements -->
  <g id="cyberpunk-accent">
    <!-- Subtle neon grid lines -->
    <path d="M 32 32 L 96 96" stroke="#8B008B" stroke-width="1" opacity="0.6"/>
    <path d="M 96 32 L 32 96" stroke="#8B008B" stroke-width="1" opacity="0.6"/>
    
    <!-- Corporate symbol (stylized crown/Letter C) -->
    <path d="M 64 36 L 66 42 L 72 42 L 68 48 L 70 56 L 64 52 L 58 56 L 60 48 L 56 42 L 62 42 Z" 
          fill="none" stroke="url(#goldGradient)" stroke-width="1.5" opacity="0.8"/>
    
    <!-- Glowing accent points -->
    <circle cx="64" cy="64" r="2" fill="#FF00FF" filter="url(#neonGlow)"/>
    <circle cx="48" cy="48" r="1.5" fill="#FF0080" opacity="0.5"/>
    <circle cx="80" cy="80" r="1.5" fill="#FF0080" opacity="0.5"/>
    <circle cx="48" cy="80" r="1.5" fill="#FF0080" opacity="0.5"/>
    <circle cx="80" cy="48" r="1.5" fill="#FF0080" opacity="0.5"/>
  </g>
  
  <!-- Texture overlay for worn luxury look -->
  <g id="texture-overlay" opacity="0.15">
    <!-- Random fiber-like details -->
    <line x1="20" y1="20" x2="25" y2="25" stroke="#000000" stroke-width="0.5"/>
    <line x1="100" y1="30" x2="95" y2="35" stroke="#000000" stroke-width="0.5"/>
    <line x1="30" y1="90" x2="35" y2="85" stroke="#000000" stroke-width="0.5"/>
    <line x1="90" y1="100" x2="85" y2="95" stroke="#000000" stroke-width="0.5"/>
    <line x1="50" y1="50" x2="55" y2="48" stroke="#000000" stroke-width="0.5"/>
    <line x1="70" y1="70" x2="68" y2="75" stroke="#000000" stroke-width="0.5"/>
    
    <!-- Shadow for depth -->
    <ellipse cx="110" cy="110" rx="12" ry="12" fill="#000000" opacity="0.3"/>
  </g>
  
  <!-- Floor boundary marker (subtle drop shadow) -->
  <g id="tile-shadow">
    <ellipse cx="64" cy="118" rx="45" ry="8" fill="#000000" opacity="0.3"/>
  </g>
</svg>