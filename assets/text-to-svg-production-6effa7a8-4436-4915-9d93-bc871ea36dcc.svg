<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Define the light yellowish-green color -->
  <defs>
    <style>
      .bar-color { fill: #A8D5A9; }
      .arrow-color { fill: #A8D5A9; }
    </style>
  </defs>

  <!-- Group for bar chart -->
  <g id="bar-chart">
    <!-- First bar (shortest) -->
    <rect id="bar-1" class="bar-color" x="40" y="120" width="30" height="60" rx="3"/>
    
    <!-- Second bar (medium) -->
    <rect id="bar-2" class="bar-color" x="85" y="85" width="30" height="95" rx="3"/>
    
    <!-- Third bar (tallest) -->
    <rect id="bar-3" class="bar-color" x="130" y="45" width="30" height="135" rx="3"/>
  </g>

  <!-- Group for upward arrow -->
  <g id="trend-arrow">
    <!-- Arrow body -->
    <line id="arrow-line" class="arrow-color" x1="50" y1="140" x2="165" y2="35" stroke="#A8D5A9" stroke-width="4" stroke-linecap="round"/>
    
    <!-- Arrowhead -->
    <path id="arrowhead" class="arrow-color" d="M 165 35 L 155 40 L 160 25 Z"/>
  </g>
</svg>