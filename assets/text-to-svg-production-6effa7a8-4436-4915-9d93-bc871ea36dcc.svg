<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .chart-group { fill: #C5E1A5; }
      .arrow-group { fill: #C5E1A5; }
    </style>
  </defs>
  
  <!-- Bar chart bars -->
  <g id="bars-group" class="chart-group">
    <rect id="bar-1" x="35" y="120" width="25" height="60" rx="3" />
    <rect id="bar-2" x="75" y="90" width="25" height="90" rx="3" />
    <rect id="bar-3" x="115" y="50" width="25" height="130" rx="3" />
  </g>
  
  <!-- Upward arrow indicating growth -->
  <g id="arrow-group" class="arrow-group" transform="translate(100, 100)">
    <!-- Arrow shaft -->
    <line x1="0" y1="30" x2="30" y2="0" stroke="#C5E1A5" stroke-width="4" stroke-linecap="round" />
    <!-- Arrowhead -->
    <polygon points="30,0 24,12 36,12" fill="#C5E1A5" />
  </g>
  
  <!-- Optional axis line for visual reference -->
  <line id="axis" x1="20" y1="180" x2="180" y2="180" stroke="#C5E1A5" stroke-width="2" opacity="0.5" />
</svg>