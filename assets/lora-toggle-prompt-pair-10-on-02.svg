<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <!-- Neon Glow Filters -->
    <filter id="neonBlue" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="neonRed" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
    <!-- Gradients -->
    <linearGradient id="phoneGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="laserGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#ff0033;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff0033;stop-opacity:0" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="800" height="500" fill="#0f172a" rx="10" />
  
  <!-- Title Background -->
  <rect x="150" y="30" width="500" height="50" rx="10" fill="#1e293b" />
  <text x="400" y="62" font-family="Arial, sans-serif" font-size="20" fill="#e2e8f0" text-anchor="middle" font-weight="bold">ATMSTAK P1 APPLICATION</text>
  
  <!-- Laser Machine (Left) -->
  <g id="laser-machine" transform="translate(50, 120)">
    <!-- Base -->
    <rect x="0" y="150" width="120" height="10" fill="#475569" rx="2" />
    <rect x="10" y="130" width="100" height="30" fill="#334155" rx="4" />
    <!-- Head -->
    <rect x="25" y="80" width="70" height="50" fill="#1e293b" stroke="#94a3b8" stroke-width="2" rx="4" />
    <!-- Lens Area -->
    <circle cx="60" cy="125" r="8" fill="#0f172a" stroke="#ef4444" stroke-width="2" />
    <!-- Laser Beam -->
    <path d="M60 125 L60 200" stroke="url(#laserGradient)" stroke-width="4" stroke-linecap="round" filter="url(#neonRed)" />
    <!-- Material -->
    <rect x="20" y="200" width="80" height="10" fill="#64748b" />
    <text x="60" y="225" font-family="Arial" font-size="12" fill="#94a3b8" text-anchor="middle">POUR ATOMSTAK</text>
  </g>

  <!-- Connection Arrow 1 -->
  <g id="arrow-import">
    <line x1="180" y1="180" x2="300" y2="180" stroke="#64748b" stroke-width="3" stroke-dasharray="5,5" />
    <polygon points="300,180 285,175 285,185" fill="#64748b" />
    <text x="240" y="165" font-family="Arial" font-size="12" fill="#cbd5e1" text-anchor="middle">IMPORTER LB</text>
  </g>

  <!-- Smartphone App (Center) -->
  <g id="smartphone-app" transform="translate(350, 100)">
    <!-- Frame -->
    <rect x="0" y="0" width="160" height="300" rx="15" ry="15" fill="#0f172a" stroke="#334155" stroke-width="4" />
    <rect x="68" y="0" width="24" height="6" rx="3" fill="#334155" /> <!-- Notch -->
    
    <!-- Screen Content -->
    <rect x="10" y="10" width="140" height="280" fill="url(#phoneGradient)" rx="8" />
    
    <!-- App Header -->
    <rect x="10" y="10" width="140" height="40" fill="#1e293b" rx="8" />
    <text x="80" y="35" font-family="Arial" font-size="14" fill="#3b82f6" text-anchor="middle" font-weight="bold">LIGHTBURN</text>

    <!-- UI Element: File Preview -->
    <rect x="10" y="60" width="140" height="80" fill="#1e293b" rx="4" stroke="#475569" stroke-width="1" />
    <rect x="20" y="70" width="120" height="60" fill="#334155" opacity="0.5" />
    <text x="80" y="105" font-family="Arial" font-size="10" fill="#94a3b8" text-anchor="middle">Prévisualisation</text>

    <!-- UI Element: Button Import -->
    <rect x="10" y="160" width="140" height="30" rx="4" fill="#3b82f6" filter="url(#neonBlue)" />
    <text x="80" y="180" font-family="Arial" font-size="12" fill="#ffffff" text-anchor="middle">IMPORTER</text>

    <!-- UI Element: Button Export -->
    <rect x="10" y="210" width="140" height="30" rx="4" fill="#10b981" />
    <text x="80" y="230" font-family="Arial" font-size="12" fill="#ffffff" text-anchor="middle">EXPORTER SVG</text>
    
    <!-- Connection Line out -->
    <line x1="80" y1="240" x2="80" y2="260" stroke="#10b981" stroke-width="2" />
  </g>

  <!-- Connection Arrow 2 -->
  <g id="arrow-export">
    <line x1="510" y1="180" x2="630" y2="180" stroke="#10b981" stroke-width="3" stroke-dasharray="5,5" />
    <polygon points="630,180 615,175 615,185" fill="#10b981" />
    <text x="570" y="165" font-family="Arial" font-size="12" fill="#d1fae5" text-anchor="middle">EXPORTER SVG</text>
  </g>

  <!-- Output File Icon (Right) -->
  <g id="output-file" transform="translate(650, 120)">
    <!-- File Shape -->
    <path d="M20 0 L80 0 L90 10 L90 80 L80 90 L20 90 L10 80 L10 10 Z" fill="#ffffff" stroke="#3b82f6" stroke-width="2" filter="url(#neonBlue)" />
    <!-- Inner Paper -->
    <path d="M20 0 L80 0 L80 75 L20 75 Z" fill="#f8fafc" opacity="0.5" />
    <!-- SVG Text Indicator -->
    <text x="45" y="55" font-family="Courier New" font-size="14" fill="#ef4444" font-weight="bold" text-anchor="middle">SVG</text>
    <text x="55" y="115" font-family="Arial" font-size="12" fill="#94a3b8" text-anchor="middle">Format Vectoriel</text>
  </g>

  <!-- Decorative Grid Lines -->
  <g id="grid" opacity="0.1">
    <line x1="0" y1="500" x2="800" y2="500" stroke="#ffffff" stroke-width="1" />
    <line x1="0" y1="490" x2="800" y2="490" stroke="#ffffff" stroke-width="1" />
    <line x1="0" y1="480" x2="800" y2="480" stroke="#ffffff" stroke-width="1" />
  </g>

</svg>