<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="200" height="200" fill="#ffffff"/>
  
  <!-- Main SAP Parallelogram Shape Group -->
  <g id="sap-base-shapes" fill-opacity="0.85">
    <!-- Blue parallelogram -->
    <path id="sap-blue" d="M 35 80 L 75 65 L 75 95 L 35 110 Z" fill="#0F4D85"/>
    
    <!-- Orange parallelogram -->
    <path id="sap-orange" d="M 75 65 L 115 50 L 115 80 L 75 95 Z" fill="#F47920"/>
    
    <!-- Green parallelogram -->
    <path id="sap-green" d="M 115 50 L 155 35 L 155 65 L 115 80 Z" fill="#1B802C"/>
    
    <!-- Yellow parallelogram -->
    <path id="sap-yellow" d="M 155 35 L 195 20 L 195 50 L 155 65 Z" fill="#FFCC00"/>
  </g>
  
  <!-- Technical Infrastructure Elements -->
  <g id="infrastructure-elements">
    <!-- Server rack icon -->
    <g id="server-rack" transform="translate(60, 130)">
      <rect x="0" y="0" width="40" height="50" rx="2" fill="#333333" stroke="#666666" stroke-width="2"/>
      <rect x="5" y="5" width="30" height="8" rx="1" fill="#444444"/>
      <rect x="5" y="20" width="30" height="8" rx="1" fill="#444444"/>
      <rect x="5" y="35" width="30" height="8" rx="1" fill="#444444"/>
      <circle cx="10" cy="7" r="1.5" fill="#00FF00"/>
      <circle cx="10" cy="22" r="1.5" fill="#00FF00"/>
      <circle cx="10" cy="37" r="1.5" fill="#00FF00"/>
    </g>
    
    <!-- Database cylinder icon -->
    <g id="database-icon" transform="translate(110, 125)">
      <ellipse cx="25" cy="15" rx="18" ry="10" fill="#1B802C" stroke="#0F4D85" stroke-width="2"/>
      <path d="M 7 15 L 7 45" stroke="#1B802C" stroke-width="3" fill="none"/>
      <path d="M 43 15 L 43 45" stroke="#1B802C" stroke-width="3" fill="none"/>
      <ellipse cx="25" cy="45" rx="18" ry="10" fill="#1B802C" stroke="#0F4D85" stroke-width="2"/>
    </g>
    
    <!-- Connection/Network lines -->
    <g id="network-connections" stroke="#0F4D85" stroke-width="2" fill="none" stroke-linecap="round">
      <line x1="60" y1="110" x2="75" y2="130" opacity="0.6"/>
      <line x1="100" y1="110" x2="110" y2="125" opacity="0.6"/>
      <line x1="130" y1="110" x2="110" y2="125" opacity="0.6"/>
    </g>
    
    <!-- Shield/Protection icon for support concept -->
    <path id="shield-icon" d="M 90 145 L 90 135 L 110 135 L 110 145 C 110 155 100 165 90 165 Z" fill="#0F4D85" stroke="#333333" stroke-width="1"/>
    <path id="shield-cross" d="M 98 142 L 102 142 L 102 158 L 98 158 Z" fill="#FFCC00"/>
  </g>
  
  <!-- Support Text Element (optional, subtle) -->
  <text id="basis-label" x="105" y="175" font-family="Arial, sans-serif" font-size="10" fill="#0F4D85" text-anchor="middle" letter-spacing="2">BASIS</text>
  
  <!-- Accent glow effect -->
  <defs>
    <radialGradient id="glow-effect" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0F4D85" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#0F4D85" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <ellipse cx="100" cy="100" rx="80" ry="60" fill="url(#glow-effect)" opacity="0.4"/>
</svg>