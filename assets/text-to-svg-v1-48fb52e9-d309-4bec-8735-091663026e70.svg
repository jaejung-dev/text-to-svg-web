<svg width="400" height="500" viewBox="0 0 400 500" xmlns="http://www.w3.org/2000/svg">
  <!-- Background/Canvas -->
  <rect width="400" height="500" fill="#f5f5f5"/>
  
  <!-- Main Cream Card -->
  <g id="cream-card">
    <rect x="50" y="50" width="300" height="400" fill="#fdf5e6" rx="5"/>
  </g>
  
  <!-- Muted Red Scalloped Border -->
  <g id="red-scalloped-border" opacity="0.9">
    <!-- Top scallops -->
    <path d="M 55 90 A 20 20 0 0 1 95 90" stroke="#c96c6c" stroke-width="2" fill="none"/>
    <path d="M 95 90 A 20 20 0 0 1 135 90" stroke="#c96c6c" stroke-width="2" fill="none"/>
    <path d="M 135 90 A 20 20 0 0 1 175 90" stroke="#c96c6c" stroke-width="2" fill="none"/>
    <path d="M 175 90 A 20 20 0 0 1 215 90" stroke="#c96c6c" stroke-width="2" fill="none"/>
    <path d="M 215 90 A 20 20 0 0 1 255 90" stroke="#c96c6c" stroke-width="2" fill="none"/>
    <path d="M 255 90 A 20 20 0 0 1 295 90" stroke="#c96c6c" stroke-width="2" fill="none"/>
    
    <!-- Bottom scallops -->
    <path d="M 55 440 A 20 20 0 0 0 95 440" stroke="#c96c6c" stroke-width="2" fill="none"/>
    <path d="M 95 440 A 20 20 0 0 0 135 440" stroke="#c96c6c" stroke-width="2" fill="none"/>
    <path d="M 135 440 A 20 20 0 0 0 175 440" stroke="#c96c6c" stroke-width="2" fill="none"/>
    <path d="M 175 440 A 20 20 0 0 0 215 440" stroke="#c96c6c" stroke-width="2" fill="none"/>
    <path d="M 215 440 A 20 20 0 0 0 255 440" stroke="#c96c6c" stroke-width="2" fill="none"/>
    <path d="M 255 440 A 20 20 0 0 0 295 440" stroke="#c96c6c" stroke-width="2" fill="none"/>
    
    <!-- Left scallops -->
    <path d="M 90 55 A 20 20 0 0 1 90 95" stroke="#c96c6c" stroke-width="2" fill="none"/>
    <path d="M 90 95 A 20 20 0 0 1 90 135" stroke="#c96c6c" stroke-width="2" fill="none"/>
    <path d="M 90 135 A 20 20 0 0 1 90 175" stroke="#c96c6c" stroke-width="2" fill="none"/>
    <path d="M 90 175 A 20 20 0 0 1 90 215" stroke="#c96c6c" stroke-width="2" fill="none"/>
    <path d="M 90 215 A 20 20 0 0 1 90 255" stroke="#c96c6c" stroke-width="2" fill="none"/>
    <path d="M 90 255 A 20 20 0 0 1 90 295" stroke="#c96c6c" stroke-width="2" fill="none"/>
    
    <!-- Right scallops -->
    <path d="M 305 55 A 20 20 0 0 0 305 95" stroke="#c96c6c" stroke-width="2" fill="none"/>
    <path d="M 305 95 A 20 20 0 0 0 305 135" stroke="#c96c6c" stroke-width="2" fill="none"/>
    <path d="M 305 135 A 20 20 0 0 0 305 175" stroke="#c96c6c" stroke-width="2" fill="none"/>
    <path d="M 305 175 A 20 20 0 0 0 305 215" stroke="#c96c6c" stroke-width="2" fill="none"/>
    <path d="M 305 215 A 20 20 0 0 0 305 255" stroke="#c96c6c" stroke-width="2" fill="none"/>
    <path d="M 305 255 A 20 20 0 0 0 305 295" stroke="#c96c6c" stroke-width="2" fill="none"/>
  </g>
  
  <!-- Bright Yellow Scalloped Element (Bottom Right) -->
  <g id="yellow-scalloped" opacity="0.95">
    <!-- Top scallops of yellow element -->
    <path d="M 260 410 A 15 15 0 0 1 285 410" stroke="#ffd93d" stroke-width="3" fill="none"/>
    <path d="M 285 410 A 15 15 0 0 1 310 410" stroke="#ffd93d" stroke-width="3" fill="none"/>
    <path d="M 310 410 A 15 15 0 0 1 335 410" stroke="#ffd93d" stroke-width="3" fill="none"/>
    
    <!-- Bottom scallops of yellow element -->
    <path d="M 260 455 A 15 15 0 0 0 285 455" stroke="#ffd93d" stroke-width="3" fill="none"/>
    <path d="M 285 455 A 15 15 0 0 0 310 455" stroke="#ffd93d" stroke-width="3" fill="none"/>
    <path d="M 310 455 A 15 15 0 0 0 335 455" stroke="#ffd93d" stroke-width="3" fill="none"/>
    
    <!-- Left scallops of yellow element -->
    <path d="M 285 410 A 15 15 0 0 1 285 435" stroke="#ffd93d" stroke-width="3" fill="none"/>
    <path d="M 285 435 A 15 15 0 0 1 285 460" stroke="#ffd93d" stroke-width="3" fill="none"/>
    
    <!-- Right scallops of yellow element -->
    <path d="M 335 410 A 15 15 0 0 0 335 435" stroke="#ffd93d" stroke-width="3" fill="none"/>
    <path d="M 335 435 A 15 15 0 0 0 335 460" stroke="#ffd93d" stroke-width="3" fill="none"/>
  </g>
  
  <!-- Small Purple Line -->
  <g id="purple-line">
    <line x1="295" y1="430" x2="310" y2="450" stroke="#8b5cf6" stroke-width="2" opacity="0.8"/>
  </g>
  
  <!-- Faint Purple-Grey Crease Lines (Top Right) -->
  <g id="crease-lines" opacity="0.3">
    <line x1="280" y1="60" x2="310" y2="90" stroke="#7a7a8a" stroke-width="1"/>
    <line x1="300" y1="75" x2="330" y2="105" stroke="#7a7a8a" stroke-width="1"/>
  </g>
</svg>