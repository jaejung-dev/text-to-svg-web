<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="sky" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#fce8c4"/>
      <stop offset="1" stop-color="#9ec8e0"/>
    </linearGradient>
    <linearGradient id="sea" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#4a8db3"/>
      <stop offset="1" stop-color="#1f4d6b"/>
    </linearGradient>
    <linearGradient id="mainsail" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#dde6ec"/>
    </linearGradient>
    <linearGradient id="jib" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#f4f7fa"/>
      <stop offset="1" stop-color="#cfd9e0"/>
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect width="400" height="200" fill="url(#sky)"/>
  <!-- Sun -->
  <circle cx="310" cy="90" r="28" fill="#fff3d6" opacity="0.85"/>

  <!-- Sea -->
  <rect y="200" width="400" height="100" fill="url(#sea)"/>

  <!-- Sun reflection -->
  <ellipse cx="310" cy="210" rx="40" ry="3" fill="#fff3d6" opacity="0.5"/>

  <!-- Sailboat -->
  <g>
    <!-- Mast -->
    <line x1="180" y1="200" x2="180" y2="70" stroke="#3b2a1d" stroke-width="2"/>
    <!-- Jib (front sail) -->
    <path d="M180,72 L180,195 L130,195 Z" fill="url(#jib)" stroke="#b8c2c9" stroke-width="1"/>
    <!-- Main sail -->
    <path d="M183,72 Q235,130 225,195 L183,195 Z" fill="url(#mainsail)" stroke="#b8c2c9" stroke-width="1"/>
    <!-- Boom -->
    <line x1="180" y1="195" x2="228" y2="195" stroke="#3b2a1d" stroke-width="2"/>
    <!-- Hull -->
    <path d="M115,200 Q180,235 250,200 L235,215 Q180,225 130,215 Z" fill="#2a1d12"/>
    <path d="M120,200 Q180,228 245,200 Z" fill="#5a3a22"/>
    <line x1="125" y1="205" x2="240" y2="205" stroke="#c9a266" stroke-width="1"/>
  </g>

  <!-- Water ripples -->
  <g stroke="#ffffff" stroke-opacity="0.4" fill="none" stroke-linecap="round">
    <path d="M40,235 q10,-3 20,0 t20,0" stroke-width="1"/>
    <path d="M260,235 q10,-3 20,0 t20,0" stroke-width="1"/>
    <path d="M90,260 q12,-3 24,0 t24,0" stroke-width="1"/>
    <path d="M230,265 q12,-3 24,0 t24,0" stroke-width="1"/>
    <path d="M150,280 q14,-3 28,0 t28,0" stroke-width="1"/>
  </g>
</svg>