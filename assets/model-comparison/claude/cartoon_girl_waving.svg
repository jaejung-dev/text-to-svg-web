<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#fde7f3"/>
      <stop offset="100%" stop-color="#f8c7df"/>
    </radialGradient>
  </defs>
  <rect width="200" height="200" fill="url(#bg)"/>
  
  <!-- Sun -->
  <circle cx="165" cy="35" r="14" fill="#ffd966"/>
  
  <!-- Body -->
  <path d="M70,150 Q70,115 100,115 Q130,115 130,150 L130,180 L70,180 Z" fill="#ff6f91"/>
  
  <!-- Neck -->
  <rect x="92" y="100" width="16" height="20" fill="#f8d2b3"/>
  
  <!-- Static arm -->
  <path d="M75,125 Q60,150 70,175" stroke="#f8d2b3" stroke-width="10" stroke-linecap="round" fill="none"/>
  
  <!-- Waving arm group -->
  <g transform-origin="125 125">
    <animateTransform attributeName="transform" type="rotate" 
      values="-15;15;-15" dur="1s" repeatCount="indefinite"/>
    <path d="M125,125 L150,90" stroke="#f8d2b3" stroke-width="10" stroke-linecap="round" fill="none"/>
    <circle cx="152" cy="85" r="9" fill="#f8d2b3"/>
  </g>
  
  <!-- Head -->
  <circle cx="100" cy="75" r="32" fill="#f8d2b3"/>
  
  <!-- Hair back -->
  <path d="M68,75 Q65,40 100,38 Q135,40 132,75 Q132,90 128,95 L128,60 Q100,50 72,60 L72,95 Q68,90 68,75Z" fill="#5b3a29"/>
  
  <!-- Hair bangs -->
  <path d="M72,60 Q85,45 100,50 Q115,45 128,60 Q120,65 105,62 Q90,68 72,65 Z" fill="#5b3a29"/>
  
  <!-- Pigtails -->
  <ellipse cx="65" cy="80" rx="8" ry="14" fill="#5b3a29"/>
  <ellipse cx="135" cy="80" rx="8" ry="14" fill="#5b3a29"/>
  
  <!-- Eyes -->
  <g>
    <ellipse cx="88" cy="78" rx="3.5" ry="4.5" fill="#2b1810"/>
    <ellipse cx="112" cy="78" rx="3.5" ry="4.5" fill="#2b1810"/>
    <circle cx="89" cy="76.5" r="1.2" fill="#fff"/>
    <circle cx="113" cy="76.5" r="1.2" fill="#fff"/>
    <animate attributeName="opacity" values="1;1;0;1;1" dur="3s" repeatCount="indefinite"/>
  </g>
  
  <!-- Cheeks -->
  <circle cx="80" cy="87" r="3.5" fill="#ff9eb5" opacity="0.7"/>
  <circle cx="120" cy="87" r="3.5" fill="#ff9eb5" opacity="0.7"/>
  
  <!-- Smile -->
  <path d="M93,92 Q100,98 107,92" stroke="#2b1810" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  
  <!-- Legs -->
  <rect x="85" y="178" width="10" height="18" fill="#f8d2b3"/>
  <rect x="105" y="178" width="10" height="18" fill="#f8d2b3"/>
  <ellipse cx="90" cy="197" rx="8" ry="3" fill="#5b3a29"/>
  <ellipse cx="110" cy="197" rx="8" ry="3" fill="#5b3a29"/>
</svg>