<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
<rect width="400" height="300" fill="#87ceeb"/>
<rect y="240" width="400" height="60" fill="#90a955"/>

<!-- Bike -->
<circle cx="110" cy="230" r="40" fill="none" stroke="#222" stroke-width="4"/>
<circle cx="290" cy="230" r="40" fill="none" stroke="#222" stroke-width="4"/>
<circle cx="110" cy="230" r="4" fill="#222"/>
<circle cx="290" cy="230" r="4" fill="#222"/>
<line x1="110" y1="230" x2="200" y2="230" stroke="#d62828" stroke-width="4"/>
<line x1="200" y1="230" x2="290" y2="230" stroke="#d62828" stroke-width="4"/>
<line x1="200" y1="230" x2="230" y2="160" stroke="#d62828" stroke-width="4"/>
<line x1="290" y1="230" x2="230" y2="160" stroke="#d62828" stroke-width="4"/>
<line x1="110" y1="230" x2="170" y2="170" stroke="#d62828" stroke-width="4"/>
<line x1="170" y1="170" x2="200" y2="230" stroke="#d62828" stroke-width="4"/>
<line x1="160" y1="165" x2="185" y2="165" stroke="#222" stroke-width="4"/>

<!-- Pelican body -->
<ellipse cx="225" cy="140" rx="55" ry="40" fill="#ffffff" stroke="#333" stroke-width="2"/>
<!-- Tail -->
<polygon points="275,135 305,125 295,150" fill="#ffffff" stroke="#333" stroke-width="2"/>
<!-- Wing -->
<path d="M210 130 Q230 170 260 150 Q245 175 215 165 Z" fill="#e8e8e8" stroke="#333" stroke-width="2"/>

<!-- Head -->
<circle cx="180" cy="95" r="28" fill="#ffffff" stroke="#333" stroke-width="2"/>
<!-- Eye -->
<circle cx="170" cy="88" r="3" fill="#222"/>
<!-- Beak upper -->
<path d="M158 98 Q120 100 130 115 Q160 112 175 108 Z" fill="#ffb703" stroke="#333" stroke-width="2"/>
<!-- Beak pouch lower -->
<path d="M158 108 Q135 130 170 122 Q175 118 175 110 Z" fill="#fb8500" stroke="#333" stroke-width="2"/>

<!-- Legs to pedals -->
<line x1="215" y1="175" x2="200" y2="220" stroke="#ffb703" stroke-width="4"/>
<line x1="200" y1="220" x2="210" y2="232" stroke="#ffb703" stroke-width="4"/>
<line x1="230" y1="175" x2="195" y2="232" stroke="#ffb703" stroke-width="4"/>

<!-- Sun -->
<circle cx="360" cy="50" r="22" fill="#fcbf49"/>
</svg>