<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="100%" height="100%">
  <defs>
    <linearGradient id="leafGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF5722" />
      <stop offset="100%" stop-color="#E64A19" />
    </linearGradient>
    <linearGradient id="leafGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF9800" />
      <stop offset="100%" stop-color="#F57C00" />
    </linearGradient>
    <linearGradient id="leafGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFC107" />
      <stop offset="100%" stop-color="#FFA000" />
    </linearGradient>
    <linearGradient id="leafGrad4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D84315" />
      <stop offset="100%" stop-color="#BF360C" />
    </linearGradient>
    <linearGradient id="leafGrad5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EF6C00" />
      <stop offset="100%" stop-color="#E65100" />
    </linearGradient>
    <linearGradient id="leafGrad6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFB300" />
      <stop offset="100%" stop-color="#FF8F00" />
    </linearGradient>

    <g id="leaf1">
      <path d="M0,0 C20,-30 50,-20 60,0 C70,20 40,40 20,50 C0,60 -20,40 -30,20 C-40,0 -20,-20 0,0 Z" fill="url(#leafGrad1)" />
      <path d="M0,0 L20,50" stroke="#BF360C" stroke-width="2" fill="none" />
      <path d="M10,25 L25,15" stroke="#BF360C" stroke-width="1.5" fill="none" />
      <path d="M5,35 L-10,25" stroke="#BF360C" stroke-width="1.5" fill="none" />
    </g>

    <g id="leaf2">
      <path d="M0,0 C15,-40 60,-30 70,10 C80,50 30,70 10,80 C-10,90 -40,60 -50,20 C-60,-20 -20,-30 0,0 Z" fill="url(#leafGrad2)" />
      <path d="M0,0 L10,80" stroke="#E65100" stroke-width="2.5" fill="none" />
      <path d="M5,40 L35,20" stroke="#E65100" stroke-width="2" fill="none" />
      <path d="M2,60 L-25,40" stroke="#E65100" stroke-width="2" fill="none" />
    </g>

    <g id="leaf3">
      <path d="M0,0 C30,-20 70,0 80,30 C90,60 50,80 20,90 C-10,100 -50,70 -60,30 C-70,-10 -30,-30 0,0 Z" fill="url(#leafGrad3)" />
      <path d="M0,0 L20,90" stroke="#FF8F00" stroke-width="3" fill="none" />
      <path d="M10,45 L45,25" stroke="#FF8F00" stroke-width="2" fill="none" />
      <path d="M5,70 L-30,50" stroke="#FF8F00" stroke-width="2" fill="none" />
    </g>

    <g id="leaf4">
      <path d="M0,0 C10,-25 40,-15 50,5 C60,25 20,45 0,55 C-20,65 -40,35 -50,15 C-60,-5 -20,-20 0,0 Z" fill="url(#leafGrad4)" />
      <path d="M0,0 L0,55" stroke="#822208" stroke-width="2" fill="none" />
      <path d="M0,25 L20,10" stroke="#822208" stroke-width="1.5" fill="none" />
      <path d="M0,40 L-20,25" stroke="#822208" stroke-width="1.5" fill="none" />
    </g>

    <g id="leaf5">
      <path d="M0,0 C25,-35 65,-25 75,15 C85,55 35,75 15,85 C-5,95 -45,65 -55,25 C-65,-15 -25,-25 0,0 Z" fill="url(#leafGrad5)" />
      <path d="M0,0 L15,85" stroke="#B33D00" stroke-width="2.5" fill="none" />
      <path d="M8,40 L40,20" stroke="#B33D00" stroke-width="2" fill="none" />
      <path d="M4,65 L-30,45" stroke="#B33D00" stroke-width="2" fill="none" />
    </g>

    <g id="leaf6">
      <path d="M0,0 C35,-25 80,-5 90,35 C100,75 55,95 25,105 C-5,115 -60,85 -70,45 C-80,5 -35,-35 0,0 Z" fill="url(#leafGrad6)" />
      <path d="M0,0 L25,105" stroke="#CC7200" stroke-width="3" fill="none" />
      <path d="M12,50 L55,30" stroke="#CC7200" stroke-width="2" fill="none" />
      <path d="M6,80 L-40,60" stroke="#CC7200" stroke-width="2" fill="none" />
    </g>
  </defs>

  <!-- Background Layer (Smallest, Farthest) -->
  <g opacity="0.4">
    <use href="#leaf1" x="150" y="100" transform="rotate(45 150 100) scale(0.5)" />
    <use href="#leaf2" x="650" y="200" transform="rotate(-30 650 200) scale(0.6)" />
    <use href="#leaf3" x="300" y="350" transform="rotate(120 300 350) scale(0.4)" />
    <use href="#leaf4" x="700" y="500" transform="rotate(-75 700 500) scale(0.5)" />
    <use href="#leaf5" x="100" y="650" transform="rotate(15 100 650) scale(0.6)" />
    <use href="#leaf6" x="500" y="750" transform="rotate(-110 500 750) scale(0.4)" />
    <use href="#leaf1" x="400" y="50" transform="rotate(80 400 50) scale(0.5)" />
    <use href="#leaf2" x="50" y="400" transform="rotate(-45 50 400) scale(0.6)" />
    <use href="#leaf3" x="750" y="100" transform="rotate(160 750 100) scale(0.4)" />
    <use href="#leaf4" x="200" y="700" transform="rotate(-20 200 700) scale(0.5)" />
  </g>

  <!-- Middle Layer -->
  <g opacity="0.7">
    <use href="#leaf4" x="250" y="150" transform="rotate(-15 250 150) scale(0.8)" />
    <use href="#leaf5" x="550" y="300" transform="rotate(60 550 300) scale(0.9)" />
    <use href="#leaf6" x="150" y="450" transform="rotate(-135 150 450) scale(0.7)" />
    <use href="#leaf1" x="600" y="600" transform="rotate(25 600 600) scale(0.8)" />
    <use href="#leaf2" x="350" y="700" transform="rotate(-80 350 700) scale(0.9)" />
    <use href="#leaf3" x="700" y="50" transform="rotate(105 700 50) scale(0.7)" />
    <use href="#leaf4" x="50" y="250" transform="rotate(-50 50 250) scale(0.8)" />
    <use href="#leaf5" x="450" y="100" transform="rotate(40 450 100) scale(0.9)" />
    <use href="#leaf6" x="750" y="400" transform="rotate(-165 750 400) scale(0.7)" />
    <use href="#leaf1" x="250" y="550" transform="rotate(70 250 550) scale(0.8)" />
  </g>

  <!-- Foreground Layer (Largest, Closest) -->
  <g opacity="1">
    <use href="#leaf2" x="100" y="100" transform="rotate(30 100 100) scale(1.2)" />
    <use href="#leaf3" x="700" y="250" transform="rotate(-60 700 250) scale(1.3)" />
    <use href="#leaf1" x="400" y="400" transform="rotate(145 400 400) scale(1.1)" />
    <use href="#leaf5" x="200" y="600" transform="rotate(-10 200 600) scale(1.4)" />
    <use href="#leaf6" x="650" y="700" transform="rotate(85 650 700) scale(1.2)" />
    <use href="#leaf4" x="300" y="50" transform="rotate(-120 300 50) scale(1.1)" />
    <use href="#leaf2" x="500" y="200" transform="rotate(55 500 200) scale(1.3)" />
    <use href="#leaf3" x="50" y="500" transform="rotate(-35 50 500) scale(1.2)" />
    <use href="#leaf1" x="550" y="500" transform="rotate(170 550 500) scale(1.4)" />
    <use href="#leaf5" x="400" y="750" transform="rotate(-95 400 750) scale(1.1)" />
  </g>
</svg>