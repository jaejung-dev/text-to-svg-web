<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="shieldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2c3e50" />
      <stop offset="100%" stop-color="#34495e" />
    </linearGradient>
    <linearGradient id="handGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f1c40f" />
      <stop offset="100%" stop-color="#f39c12" />
    </linearGradient>
    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-opacity="0.3" />
    </filter>
  </defs>

  <!-- Background Shield -->
  <path d="M100 20 L160 40 L160 100 C160 140 120 170 100 180 C80 170 40 140 40 100 L40 40 Z" fill="url(#shieldGradient)" filter="url(#dropShadow)" />

  <!-- Inner Shield Detail -->
  <path d="M100 30 L150 48 L150 100 C150 135 115 160 100 168 C85 160 50 135 50 100 L50 48 Z" fill="none" stroke="#ecf0f1" stroke-width="2" opacity="0.5" />

  <!-- Helping Hand (Left) -->
  <path d="M60 110 C60 110 70 90 85 90 C100 90 105 105 105 105 C105 105 95 120 80 120 C65 120 60 110 60 110 Z" fill="url(#handGradient)" />
  <path d="M65 105 C65 105 75 85 90 85 C105 85 110 100 110 100 C110 100 100 115 85 115 C70 115 65 105 65 105 Z" fill="url(#handGradient)" opacity="0.8" />

  <!-- Helping Hand (Right) -->
  <path d="M140 110 C140 110 130 90 115 90 C100 90 95 105 95 105 C95 105 105 120 120 120 C135 120 140 110 140 110 Z" fill="url(#handGradient)" />
  <path d="M135 105 C135 105 125 85 110 85 C95 85 90 100 90 100 C90 100 100 115 115 115 C130 115 135 105 135 105 Z" fill="url(#handGradient)" opacity="0.8" />

  <!-- Bond/Document Symbol -->
  <rect x="85" y="55" width="30" height="40" rx="3" fill="#ecf0f1" />
  <line x1="90" y1="65" x2="110" y2="65" stroke="#7f8c8d" stroke-width="2" stroke-linecap="round" />
  <line x1="90" y1="75" x2="110" y2="75" stroke="#7f8c8d" stroke-width="2" stroke-linecap="round" />
  <line x1="90" y1="85" x2="100" y2="85" stroke="#7f8c8d" stroke-width="2" stroke-linecap="round" />

  <!-- Checkmark (Surety/Guarantee) -->
  <path d="M95 105 L105 115 L125 90" fill="none" stroke="#2ecc71" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />

  <!-- Connecting Nodes (Platform/Network) -->
  <circle cx="100" cy="140" r="4" fill="#ecf0f1" />
  <circle cx="80" cy="130" r="3" fill="#ecf0f1" />
  <circle cx="120" cy="130" r="3" fill="#ecf0f1" />
  <line x1="100" y1="140" x2="80" y2="130" stroke="#ecf0f1" stroke-width="1.5" opacity="0.7" />
  <line x1="100" y1="140" x2="120" y2="130" stroke="#ecf0f1" stroke-width="1.5" opacity="0.7" />
</svg>