<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a1a" />
      <stop offset="100%" stop-color="#000000" />
    </linearGradient>
    <linearGradient id="scorpion-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffcc00" />
      <stop offset="100%" stop-color="#ff9900" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="500" height="500" fill="url(#bg-gradient)" />

  <!-- Scorpion Body -->
  <g transform="translate(250, 220) scale(1.2)" filter="url(#glow)">
    <!-- Tail -->
    <path d="M 0 -80 C 20 -100, 40 -80, 30 -50 C 20 -20, 0 -10, 0 0 C -20 -10, -40 -20, -30 -50 C -20 -80, 0 -100, 0 -80 Z" fill="url(#scorpion-gradient)" />
    <!-- Stinger -->
    <path d="M 0 -80 L 10 -100 L 0 -90 L -10 -100 Z" fill="#ff0000" />
    <!-- Body Segments -->
    <path d="M -15 0 C -25 20, -15 40, 0 50 C 15 40, 25 20, 15 0 Z" fill="url(#scorpion-gradient)" />
    <path d="M -20 20 C -30 40, -20 60, 0 70 C 20 60, 30 40, 20 20 Z" fill="url(#scorpion-gradient)" />
    <path d="M -25 40 C -35 60, -25 80, 0 90 C 25 80, 35 60, 25 40 Z" fill="url(#scorpion-gradient)" />
    <!-- Legs Left -->
    <path d="M -15 10 Q -40 0, -50 20" fill="none" stroke="url(#scorpion-gradient)" stroke-width="4" stroke-linecap="round" />
    <path d="M -20 30 Q -50 20, -60 40" fill="none" stroke="url(#scorpion-gradient)" stroke-width="4" stroke-linecap="round" />
    <path d="M -25 50 Q -60 40, -70 60" fill="none" stroke="url(#scorpion-gradient)" stroke-width="4" stroke-linecap="round" />
    <path d="M -20 70 Q -50 80, -60 100" fill="none" stroke="url(#scorpion-gradient)" stroke-width="4" stroke-linecap="round" />
    <!-- Legs Right -->
    <path d="M 15 10 Q 40 0, 50 20" fill="none" stroke="url(#scorpion-gradient)" stroke-width="4" stroke-linecap="round" />
    <path d="M 20 30 Q 50 20, 60 40" fill="none" stroke="url(#scorpion-gradient)" stroke-width="4" stroke-linecap="round" />
    <path d="M 25 50 Q 60 40, 70 60" fill="none" stroke="url(#scorpion-gradient)" stroke-width="4" stroke-linecap="round" />
    <path d="M 20 70 Q 50 80, 60 100" fill="none" stroke="url(#scorpion-gradient)" stroke-width="4" stroke-linecap="round" />
    <!-- Claws Left -->
    <path d="M -10 -10 Q -40 -30, -50 -10 C -60 10, -40 30, -30 20 C -20 10, -30 -10, -10 -10 Z" fill="url(#scorpion-gradient)" />
    <path d="M -50 -10 Q -70 -20, -60 0 C -50 20, -30 10, -40 -10 Z" fill="url(#scorpion-gradient)" />
    <!-- Claws Right -->
    <path d="M 10 -10 Q 40 -30, 50 -10 C 60 10, 40 30, 30 20 C 20 10, 30 -10, 10 -10 Z" fill="url(#scorpion-gradient)" />
    <path d="M 50 -10 Q 70 -20, 60 0 C 50 20, 30 10, 40 -10 Z" fill="url(#scorpion-gradient)" />
  </g>

  <!-- Truck Silhouette -->
  <g transform="translate(250, 250) scale(0.8)" opacity="0.8">
    <path d="M -100 0 L 100 0 L 120 40 L 120 80 L -120 80 L -120 40 Z" fill="#333333" />
    <rect x="-90" y="10" width="40" height="30" fill="#1a1a1a" />
    <rect x="50" y="10" width="40" height="30" fill="#1a1a1a" />
    <circle cx="-80" cy="80" r="15" fill="#000000" />
    <circle cx="-40" cy="80" r="15" fill="#000000" />
    <circle cx="40" cy="80" r="15" fill="#000000" />
    <circle cx="80" cy="80" r="15" fill="#000000" />
  </g>

  <!-- Text -->
  <text x="250" y="400" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="2">BLACK SCORPION</text>
  <text x="250" y="440" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#ffcc00" text-anchor="middle" letter-spacing="4">LOGISTICS</text>

  <!-- Decorative Lines -->
  <line x1="50" y1="460" x2="450" y2="460" stroke="#ffcc00" stroke-width="2" />
  <line x1="100" y1="470" x2="400" y2="470" stroke="#ffcc00" stroke-width="1" opacity="0.5" />
</svg>