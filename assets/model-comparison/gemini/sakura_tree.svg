<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <linearGradient id="trunkGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#5c4033" />
      <stop offset="50%" stop-color="#8b5a2b" />
      <stop offset="100%" stop-color="#5c4033" />
    </linearGradient>
    <radialGradient id="petalGradient" cx="50%" cy="50%" r="50%" fx="30%" fy="30%">
      <stop offset="0%" stop-color="#fff0f5" />
      <stop offset="70%" stop-color="#ffb6c1" />
      <stop offset="100%" stop-color="#ff69b4" />
    </radialGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <circle cx="50" cy="50" r="48" fill="#f0f8ff" stroke="#e6e6fa" stroke-width="2" />

  <!-- Trunk and Branches -->
  <path d="M 45 90 Q 48 70 50 60 Q 52 70 55 90 Z" fill="url(#trunkGradient)" />
  <path d="M 50 60 Q 40 50 35 40" fill="none" stroke="url(#trunkGradient)" stroke-width="3" stroke-linecap="round" />
  <path d="M 50 60 Q 60 50 65 40" fill="none" stroke="url(#trunkGradient)" stroke-width="3" stroke-linecap="round" />
  <path d="M 45 55 Q 35 45 30 35" fill="none" stroke="url(#trunkGradient)" stroke-width="2" stroke-linecap="round" />
  <path d="M 55 55 Q 65 45 70 35" fill="none" stroke="url(#trunkGradient)" stroke-width="2" stroke-linecap="round" />
  <path d="M 50 60 Q 50 45 50 30" fill="none" stroke="url(#trunkGradient)" stroke-width="3" stroke-linecap="round" />

  <!-- Cherry Blossoms (Petals) -->
  <g filter="url(#glow)">
    <!-- Center Cluster -->
    <circle cx="50" cy="30" r="8" fill="url(#petalGradient)" opacity="0.9" />
    <circle cx="45" cy="25" r="7" fill="url(#petalGradient)" opacity="0.8" />
    <circle cx="55" cy="25" r="7" fill="url(#petalGradient)" opacity="0.8" />
    <circle cx="45" cy="35" r="7" fill="url(#petalGradient)" opacity="0.8" />
    <circle cx="55" cy="35" r="7" fill="url(#petalGradient)" opacity="0.8" />

    <!-- Left Cluster -->
    <circle cx="35" cy="40" r="6" fill="url(#petalGradient)" opacity="0.9" />
    <circle cx="30" cy="35" r="5" fill="url(#petalGradient)" opacity="0.8" />
    <circle cx="40" cy="35" r="5" fill="url(#petalGradient)" opacity="0.8" />
    <circle cx="30" cy="45" r="5" fill="url(#petalGradient)" opacity="0.8" />

    <!-- Right Cluster -->
    <circle cx="65" cy="40" r="6" fill="url(#petalGradient)" opacity="0.9" />
    <circle cx="60" cy="35" r="5" fill="url(#petalGradient)" opacity="0.8" />
    <circle cx="70" cy="35" r="5" fill="url(#petalGradient)" opacity="0.8" />
    <circle cx="70" cy="45" r="5" fill="url(#petalGradient)" opacity="0.8" />

    <!-- Top Left Cluster -->
    <circle cx="30" cy="25" r="5" fill="url(#petalGradient)" opacity="0.9" />
    <circle cx="25" cy="20" r="4" fill="url(#petalGradient)" opacity="0.8" />
    <circle cx="35" cy="20" r="4" fill="url(#petalGradient)" opacity="0.8" />

    <!-- Top Right Cluster -->
    <circle cx="70" cy="25" r="5" fill="url(#petalGradient)" opacity="0.9" />
    <circle cx="65" cy="20" r="4" fill="url(#petalGradient)" opacity="0.8" />
    <circle cx="75" cy="20" r="4" fill="url(#petalGradient)" opacity="0.8" />

    <!-- Scattered Petals -->
    <circle cx="40" cy="20" r="3" fill="url(#petalGradient)" opacity="0.7" />
    <circle cx="60" cy="20" r="3" fill="url(#petalGradient)" opacity="0.7" />
    <circle cx="50" cy="15" r="4" fill="url(#petalGradient)" opacity="0.8" />
    <circle cx="25" cy="35" r="3" fill="url(#petalGradient)" opacity="0.7" />
    <circle cx="75" cy="35" r="3" fill="url(#petalGradient)" opacity="0.7" />
    <circle cx="40" cy="45" r="4" fill="url(#petalGradient)" opacity="0.8" />
    <circle cx="60" cy="45" r="4" fill="url(#petalGradient)" opacity="0.8" />
  </g>

  <!-- Falling Petals -->
  <path d="M 30 60 Q 32 62 30 65 Q 28 62 30 60 Z" fill="url(#petalGradient)" opacity="0.8" transform="rotate(15 30 60)" />
  <path d="M 70 55 Q 72 57 70 60 Q 68 57 70 55 Z" fill="url(#petalGradient)" opacity="0.7" transform="rotate(-20 70 55)" />
  <path d="M 40 75 Q 42 77 40 80 Q 38 77 40 75 Z" fill="url(#petalGradient)" opacity="0.6" transform="rotate(45 40 75)" />
  <path d="M 65 80 Q 67 82 65 85 Q 63 82 65 80 Z" fill="url(#petalGradient)" opacity="0.8" transform="rotate(-10 65 80)" />
  <path d="M 20 45 Q 22 47 20 50 Q 18 47 20 45 Z" fill="url(#petalGradient)" opacity="0.5" transform="rotate(30 20 45)" />
  <path d="M 80 50 Q 82 52 80 55 Q 78 52 80 50 Z" fill="url(#petalGradient)" opacity="0.6" transform="rotate(-40 80 50)" />

  <!-- Ground -->
  <ellipse cx="50" cy="90" rx="25" ry="4" fill="#e6e6fa" opacity="0.8" />
  <path d="M 35 90 Q 37 92 35 94 Q 33 92 35 90 Z" fill="url(#petalGradient)" opacity="0.9" transform="rotate(60 35 90)" />
  <path d="M 60 91 Q 62 93 60 95 Q 58 93 60 91 Z" fill="url(#petalGradient)" opacity="0.8" transform="rotate(-30 60 91)" />
  <path d="M 45 92 Q 47 94 45 96 Q 43 94 45 92 Z" fill="url(#petalGradient)" opacity="0.7" transform="rotate(10 45 92)" />

</svg>