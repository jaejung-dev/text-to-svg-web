<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e" />
      <stop offset="100%" stop-color="#16213e" />
    </linearGradient>
    <linearGradient id="horse-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e94560" />
      <stop offset="100%" stop-color="#0f3460" />
    </linearGradient>
    <linearGradient id="mane-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f9a826" />
      <stop offset="100%" stop-color="#e94560" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="5" dy="5" stdDeviation="5" flood-color="#000" flood-opacity="0.5" />
    </filter>
  </defs>

  <rect width="500" height="500" fill="url(#bg-gradient)" />

  <g transform="translate(250, 250) scale(1.2)" filter="url(#shadow)">
    <!-- Horse Head -->
    <path d="M-50,-100 C-30,-120 0,-130 30,-110 C50,-90 60,-60 50,-30 C40,0 20,30 0,50 C-20,70 -50,80 -80,60 C-100,40 -110,10 -100,-20 C-90,-50 -70,-80 -50,-100 Z" fill="url(#horse-gradient)" />

    <!-- Horse Mane -->
    <path d="M-50,-100 C-60,-120 -80,-130 -100,-110 C-120,-90 -130,-60 -120,-30 C-110,0 -90,30 -70,50 C-50,70 -20,80 10,60 C30,40 40,10 30,-20 C20,-50 0,-80 -20,-100 Z" fill="url(#mane-gradient)" filter="url(#glow)" />

    <!-- Horse Eye -->
    <circle cx="-20" cy="-50" r="10" fill="#fff" />
    <circle cx="-20" cy="-50" r="5" fill="#000" />

    <!-- Horse Ear -->
    <path d="M-50,-100 L-30,-130 L-10,-100 Z" fill="url(#horse-gradient)" />

    <!-- Horse Nostril -->
    <circle cx="30" cy="-20" r="5" fill="#000" />

    <!-- Horse Mouth -->
    <path d="M40,-10 C30,0 20,10 10,0" fill="none" stroke="#000" stroke-width="3" />

    <!-- Decorative Elements -->
    <path d="M-80,60 C-60,80 -30,90 0,70 C20,50 30,20 20,-10" fill="none" stroke="url(#mane-gradient)" stroke-width="5" filter="url(#glow)" />
    <path d="M-100,-20 C-120,0 -130,30 -110,50 C-90,70 -60,80 -30,60" fill="none" stroke="url(#horse-gradient)" stroke-width="5" filter="url(#glow)" />
  </g>

  <!-- Text -->
  <text x="250" y="450" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#fff" text-anchor="middle" filter="url(#shadow)">ELEGANT HORSE</text>
  <text x="250" y="480" font-family="Arial, sans-serif" font-size="18" fill="#f9a826" text-anchor="middle" filter="url(#shadow)">PREMIUM LOGO</text>
</svg>