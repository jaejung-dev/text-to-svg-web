<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <defs>
    <linearGradient id="potGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B4513" />
      <stop offset="100%" stop-color="#A0522D" />
    </linearGradient>
    <linearGradient id="leafGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#32CD32" />
      <stop offset="100%" stop-color="#228B22" />
    </linearGradient>
    <linearGradient id="stemGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2E8B57" />
      <stop offset="100%" stop-color="#006400" />
    </linearGradient>
  </defs>

  <!-- Pot -->
  <path d="M 60 150 L 140 150 L 130 190 L 70 190 Z" fill="url(#potGradient)" />
  <rect x="55" y="140" width="90" height="10" fill="#A0522D" rx="2" ry="2" />

  <!-- Stem -->
  <path d="M 100 140 Q 100 140 100 140" fill="none" stroke="url(#stemGradient)" stroke-width="4" stroke-linecap="round">
    <animate attributeName="d" values="M 100 140 Q 100 140 100 140; M 100 140 Q 90 100 100 60" dur="3s" fill="freeze" />
  </path>

  <!-- Leaves -->
  <g>
    <!-- Leaf 1 (Left) -->
    <path d="M 100 140 Q 100 140 100 140" fill="url(#leafGradient)">
      <animate attributeName="d" values="M 100 140 Q 100 140 100 140; M 95 110 Q 60 100 70 80 Q 80 90 95 110" dur="3s" fill="freeze" />
    </path>
    <!-- Leaf 2 (Right) -->
    <path d="M 100 140 Q 100 140 100 140" fill="url(#leafGradient)">
      <animate attributeName="d" values="M 100 140 Q 100 140 100 140; M 105 90 Q 140 80 130 60 Q 120 70 105 90" dur="3s" fill="freeze" />
    </path>
    <!-- Leaf 3 (Top Left) -->
    <path d="M 100 140 Q 100 140 100 140" fill="url(#leafGradient)">
      <animate attributeName="d" values="M 100 140 Q 100 140 100 140; M 98 70 Q 70 50 80 30 Q 90 40 98 70" dur="3s" fill="freeze" />
    </path>
    <!-- Leaf 4 (Top Right) -->
    <path d="M 100 140 Q 100 140 100 140" fill="url(#leafGradient)">
      <animate attributeName="d" values="M 100 140 Q 100 140 100 140; M 102 65 Q 130 45 120 25 Q 110 35 102 65" dur="3s" fill="freeze" />
    </path>
  </g>

  <!-- Flower -->
  <g opacity="0">
    <animate attributeName="opacity" values="0; 1" dur="1s" begin="3s" fill="freeze" />
    <circle cx="100" cy="60" r="8" fill="#FFD700" />
    <path d="M 100 52 Q 110 40 100 30 Q 90 40 100 52" fill="#FF69B4" />
    <path d="M 108 60 Q 120 50 130 60 Q 120 70 108 60" fill="#FF69B4" />
    <path d="M 100 68 Q 110 80 100 90 Q 90 80 100 68" fill="#FF69B4" />
    <path d="M 92 60 Q 80 50 70 60 Q 80 70 92 60" fill="#FF69B4" />
  </g>
</svg>