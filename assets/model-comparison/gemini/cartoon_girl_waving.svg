<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <defs>
    <style>
      .skin { fill: #fcd5ce; }
      .hair { fill: #8b5a2b; }
      .shirt { fill: #ffb6c1; }
      .pants { fill: #87ceeb; }
      .shoes { fill: #a9a9a9; }
      .eye { fill: #000; }
      .mouth { fill: #ff69b4; }
      .blush { fill: #ffc0cb; opacity: 0.6; }
      
      @keyframes wave {
        0%, 100% { transform: rotate(0deg); }
        25% { transform: rotate(20deg); }
        75% { transform: rotate(-20deg); }
      }
      
      .arm-wave {
        transform-origin: 130px 100px;
        animation: wave 1s ease-in-out infinite;
      }
    </style>
  </defs>

  <!-- Body -->
  <rect class="shirt" x="80" y="100" width="40" height="50" rx="10" />
  <rect class="pants" x="85" y="150" width="12" height="30" rx="5" />
  <rect class="pants" x="103" y="150" width="12" height="30" rx="5" />
  
  <!-- Shoes -->
  <ellipse class="shoes" cx="91" cy="180" rx="8" ry="5" />
  <ellipse class="shoes" cx="109" cy="180" rx="8" ry="5" />

  <!-- Left Arm -->
  <rect class="skin" x="65" y="105" width="10" height="35" rx="5" transform="rotate(15 70 105)" />
  <circle class="skin" cx="55" cy="140" r="6" />

  <!-- Right Arm (Waving) -->
  <g class="arm-wave">
    <rect class="skin" x="125" y="105" width="10" height="35" rx="5" transform="rotate(-135 130 105)" />
    <circle class="skin" cx="155" cy="75" r="6" />
  </g>

  <!-- Head -->
  <circle class="skin" cx="100" cy="70" r="25" />
  
  <!-- Hair -->
  <path class="hair" d="M 75 70 C 75 40, 125 40, 125 70 C 130 90, 120 100, 115 95 C 110 90, 115 70, 100 70 C 85 70, 90 90, 85 95 C 80 100, 70 90, 75 70 Z" />
  <path class="hair" d="M 75 70 Q 100 45 125 70 Q 100 55 75 70 Z" />

  <!-- Face -->
  <circle class="eye" cx="90" cy="65" r="3" />
  <circle class="eye" cx="110" cy="65" r="3" />
  <path class="mouth" d="M 95 75 Q 100 80 105 75" fill="none" stroke="#ff69b4" stroke-width="2" stroke-linecap="round" />
  
  <!-- Blush -->
  <circle class="blush" cx="85" cy="72" r="4" />
  <circle class="blush" cx="115" cy="72" r="4" />
</svg>