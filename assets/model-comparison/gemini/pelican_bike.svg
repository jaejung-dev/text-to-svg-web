<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <defs>
    <linearGradient id="skyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#87CEEB" />
      <stop offset="100%" stop-color="#E0F6FF" />
    </linearGradient>
    <linearGradient id="waterGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4682B4" />
      <stop offset="100%" stop-color="#1E90FF" />
    </linearGradient>
    <linearGradient id="sandGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F4A460" />
      <stop offset="100%" stop-color="#D2B48C" />
    </linearGradient>
    <radialGradient id="sunGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFD700" />
      <stop offset="100%" stop-color="#FFA500" />
    </radialGradient>
    <linearGradient id="bikeFrameGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF4500" />
      <stop offset="100%" stop-color="#8B0000" />
    </linearGradient>
    <linearGradient id="tireGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#333" />
      <stop offset="100%" stop-color="#111" />
    </linearGradient>
    <linearGradient id="pelicanBodyGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF" />
      <stop offset="100%" stop-color="#E0E0E0" />
    </linearGradient>
    <linearGradient id="beakGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFA500" />
      <stop offset="100%" stop-color="#FF8C00" />
    </linearGradient>
    <linearGradient id="pouchGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFDAB9" />
      <stop offset="100%" stop-color="#FFA07A" />
    </linearGradient>
    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="5" dy="5" stdDeviation="5" flood-opacity="0.3" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#skyGradient)" />
  <circle cx="700" cy="100" r="60" fill="url(#sunGradient)" filter="url(#dropShadow)" />
  
  <!-- Clouds -->
  <path d="M 100 150 Q 120 120 150 150 Q 180 120 200 150 Q 220 180 180 180 L 120 180 Q 80 180 100 150 Z" fill="#FFF" opacity="0.8" />
  <path d="M 500 100 Q 520 70 550 100 Q 580 70 600 100 Q 620 130 580 130 L 520 130 Q 480 130 500 100 Z" fill="#FFF" opacity="0.6" />
  <path d="M 300 200 Q 320 170 350 200 Q 380 170 400 200 Q 420 230 380 230 L 320 230 Q 280 230 300 200 Z" fill="#FFF" opacity="0.7" />

  <!-- Water -->
  <rect x="0" y="350" width="800" height="150" fill="url(#waterGradient)" />
  <path d="M 0 350 Q 100 340 200 350 T 400 350 T 600 350 T 800 350 L 800 360 L 0 360 Z" fill="#87CEEB" opacity="0.5" />
  <path d="M 0 370 Q 150 360 300 370 T 600 370 T 800 370 L 800 380 L 0 380 Z" fill="#87CEEB" opacity="0.3" />

  <!-- Sand -->
  <path d="M 0 450 Q 200 430 400 450 T 800 450 L 800 600 L 0 600 Z" fill="url(#sandGradient)" />
  
  <!-- Palm Trees -->
  <g transform="translate(50, 350) scale(0.6)">
    <path d="M 50 200 Q 60 100 50 0 Q 40 100 30 200 Z" fill="#8B4513" />
    <path d="M 50 0 Q 100 -50 150 0 Q 100 20 50 0 Z" fill="#228B22" />
    <path d="M 50 0 Q 0 -50 -50 0 Q 0 20 50 0 Z" fill="#228B22" />
    <path d="M 50 0 Q 80 -80 100 -120 Q 60 -60 50 0 Z" fill="#228B22" />
    <path d="M 50 0 Q 20 -80 0 -120 Q 40 -60 50 0 Z" fill="#228B22" />
  </g>
  <g transform="translate(700, 380) scale(0.8)">
    <path d="M 50 200 Q 60 100 50 0 Q 40 100 30 200 Z" fill="#8B4513" />
    <path d="M 50 0 Q 100 -50 150 0 Q 100 20 50 0 Z" fill="#228B22" />
    <path d="M 50 0 Q 0 -50 -50 0 Q 0 20 50 0 Z" fill="#228B22" />
    <path d="M 50 0 Q 80 -80 100 -120 Q 60 -60 50 0 Z" fill="#228B22" />
    <path d="M 50 0 Q 20 -80 0 -120 Q 40 -60 50 0 Z" fill="#228B22" />
  </g>

  <!-- Bike -->
  <g transform="translate(250, 300)" filter="url(#dropShadow)">
    <!-- Wheels -->
    <circle cx="50" cy="150" r="40" fill="none" stroke="url(#tireGradient)" stroke-width="8" />
    <circle cx="50" cy="150" r="36" fill="none" stroke="#CCC" stroke-width="2" />
    <circle cx="50" cy="150" r="5" fill="#333" />
    <g stroke="#999" stroke-width="1">
      <line x1="50" y1="150" x2="50" y2="114" />
      <line x1="50" y1="150" x2="50" y2="186" />
      <line x1="50" y1="150" x2="14" y2="150" />
      <line x1="50" y1="150" x2="86" y2="150" />
      <line x1="50" y1="150" x2="25" y2="125" />
      <line x1="50" y1="150" x2="75" y2="175" />
      <line x1="50" y1="150" x2="75" y2="125" />
      <line x1="50" y1="150" x2="25" y2="175" />
    </g>

    <circle cx="250" cy="150" r="40" fill="none" stroke="url(#tireGradient)" stroke-width="8" />
    <circle cx="250" cy="150" r="36" fill="none" stroke="#CCC" stroke-width="2" />
    <circle cx="250" cy="150" r="5" fill="#333" />
    <g stroke="#999" stroke-width="1">
      <line x1="250" y1="150" x2="250" y2="114" />
      <line x1="250" y1="150" x2="250" y2="186" />
      <line x1="250" y1="150" x2="214" y2="150" />
      <line x1="250" y1="150" x2="286" y2="150" />
      <line x1="250" y1="150" x2="225" y2="125" />
      <line x1="250" y1="150" x2="275" y2="175" />
      <line x1="250" y1="150" x2="275" y2="125" />
      <line x1="250" y1="150" x2="225" y2="175" />
    </g>

    <!-- Frame -->
    <path d="M 50 150 L 120 150 L 180 80 L 250 150" fill="none" stroke="url(#bikeFrameGradient)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" />
    <path d="M 120 150 L 100 60 L 180 80" fill="none" stroke="url(#bikeFrameGradient)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" />
    <path d="M 100 60 L 150 60" fill="none" stroke="url(#bikeFrameGradient)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" />
    
    <!-- Chain and Pedals -->
    <circle cx="120" cy="150" r="15" fill="none" stroke="#555" stroke-width="3" />
    <path d="M 50 150 L 120 135 L 120 165 Z" fill="none" stroke="#777" stroke-width="2" />
    <line x1="120" y1="150" x2="130" y2="170" stroke="#333" stroke-width="4" stroke-linecap="round" />
    <rect x="125" y="170" width="15" height="5" fill="#111" rx="2" />
    <line x1="120" y1="150" x2="110" y2="130" stroke="#333" stroke-width="4" stroke-linecap="round" />
    <rect x="100" y="125" width="15" height="5" fill="#111" rx="2" />

    <!-- Seat -->
    <path d="M 85 55 L 115 55 L 125 65 L 75 65 Z" fill="#111" />
    <line x1="100" y1="60" x2="100" y2="80" stroke="#CCC" stroke-width="4" />

    <!-- Handlebars -->
    <path d="M 180 80 L 170 40 L 190 30 L 210 40" fill="none" stroke="#CCC" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" />
    <circle cx="170" cy="40" r="4" fill="#111" />
    <circle cx="210" cy="40" r="4" fill="#111" />
    
    <!-- Basket -->
    <path d="M 200 50 L 230 50 L 220 80 L 190 80 Z" fill="#D2B48C" stroke="#8B4513" stroke-width="2" />
    <line x1="205" y1="50" x2="195" y2="80" stroke="#8B4513" stroke-width="1" />
    <line x1="215" y1="50" x2="205" y2="80" stroke="#8B4513" stroke-width="1" />
    <line x1="225" y1="50" x2="215" y2="80" stroke="#8B4513" stroke-width="1" />
    <line x1="195" y1="60" x2="225" y2="60" stroke="#8B4513" stroke-width="1" />
    <line x1="192" y1="70" x2="222" y2="70" stroke="#8B4513" stroke-width="1" />
    
    <!-- Fish in Basket -->
    <path d="M 205 45 Q 215 35 225 45 Q 215 55 205 45 Z" fill="#ADD8E6" stroke="#4682B4" stroke-width="1" />
    <path d="M 225 45 L 230 40 L 230 50 Z" fill="#ADD8E6" stroke="#4682B4" stroke-width="1" />
    <circle cx="210" cy="43" r="1" fill="#000" />
  </g>

  <!-- Pelican -->
  <g transform="translate(280, 180)" filter="url(#dropShadow)">
    <!-- Body -->
    <path d="M 70 120 C 40 120 20 150 30 180 C 40 210 80 220 110 200 C 140 180 130 130 100 120 Z" fill="url(#pelicanBodyGradient)" />
    
    <!-- Tail -->
    <path d="M 30 180 L 0 200 L 20 160 Z" fill="#E0E0E0" />
    <path d="M 25 175 L -5 190 L 15 155 Z" fill="#CCC" />

    <!-- Wing -->
    <path d="M 60 140 C 80 130 110 140 120 170 C 130 200 90 210 70 190 C 50 170 40 150 60 140 Z" fill="#FFF" stroke="#E0E0E0" stroke-width="2" />
    <path d="M 70 150 C 90 140 110 150 115 170 C 120 190 90 200 75 185 C 60 170 55 160 70 150 Z" fill="#F5F5F5" />
    
    <!-- Neck -->
    <path d="M 90 130 C 100 100 110 70 130 50 C 140 40 150 50 140 70 C 130 90 120 110 110 130 Z" fill="url(#pelicanBodyGradient)" />

    <!-- Head -->
    <circle cx="135" cy="45" r="15" fill="url(#pelicanBodyGradient)" />
    
    <!-- Eye -->
    <circle cx="140" cy="40" r="3" fill="#000" />
    <circle cx="141" cy="39" r="1" fill="#FFF" />
    <path d="M 135 35 Q 140 33 145 35" fill="none" stroke="#333" stroke-width="1" />

    <!-- Beak Top -->
    <path d="M 145 40 L 220 50 L 145 50 Z" fill="url(#beakGradient)" />
    <path d="M 210 48 L 220 50 L 215 52 Z" fill="#FF8C00" />

    <!-- Beak Pouch -->
    <path d="M 140 50 C 160 80 200 80 220 50 Z" fill="url(#pouchGradient)" opacity="0.9" />
    <path d="M 145 50 C 165 75 195 75 215 50 Z" fill="#FFA07A" opacity="0.5" />

    <!-- Legs -->
    <path d="M 70 210 L 60 250 L 50 250" fill="none" stroke="#FFA500" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
    <path d="M 90 205 L 100 240 L 110 240" fill="none" stroke="#FFA500" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
    
    <!-- Feet (Webbed) -->
    <path d="M 50 250 L 40 260 L 55 260 L 60 250 Z" fill="#FFA500" />
    <path d="M 110 240 L 100 250 L 115 250 L 120 240 Z" fill="#FFA500" />

    <!-- Hat (Optional fun detail) -->
    <path d="M 125 35 L 145 35 L 140 20 L 130 20 Z" fill="#FF4500" />
    <rect x="120" y="35" width="30" height="3" fill="#FF4500" rx="1" />
    <circle cx="135" cy="18" r="3" fill="#FFD700" />
  </g>

  <!-- Motion Lines -->
  <g stroke="#FFF" stroke-width="2" stroke-linecap="round" opacity="0.6">
    <line x1="200" y1="400" x2="150" y2="400" />
    <line x1="220" y1="420" x2="170" y2="420" />
    <line x1="180" y1="440" x2="130" y2="440" />
    <line x1="450" y1="400" x2="400" y2="400" />
    <line x1="470" y1="420" x2="420" y2="420" />
  </g>

  <!-- Seagulls in background -->
  <g stroke="#555" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M 600 150 Q 610 140 620 150 Q 630 140 640 150" />
    <path d="M 650 120 Q 660 110 670 120 Q 680 110 690 120" />
    <path d="M 150 200 Q 160 190 170 200 Q 180 190 190 200" />
  </g>

</svg>