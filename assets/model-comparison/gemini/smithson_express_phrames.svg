<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <defs>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e" />
      <stop offset="100%" stop-color="#16213e" />
    </linearGradient>
    
    <linearGradient id="gold-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f9d423" />
      <stop offset="50%" stop-color="#ff4e50" />
      <stop offset="100%" stop-color="#f9d423" />
    </linearGradient>

    <linearGradient id="silver-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e0e0e0" />
      <stop offset="50%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#e0e0e0" />
    </linearGradient>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <filter id="drop-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.5" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bg-gradient)" />

  <!-- Central Emblem Group -->
  <g transform="translate(400, 250)" filter="url(#drop-shadow)">
    
    <!-- Outer Frame -->
    <path d="M -150 -150 L 150 -150 L 150 150 L -150 150 Z" 
          fill="none" 
          stroke="url(#gold-gradient)" 
          stroke-width="8" 
          stroke-linejoin="round" />
          
    <path d="M -160 -160 L 160 -160 L 160 160 L -160 160 Z" 
          fill="none" 
          stroke="url(#silver-gradient)" 
          stroke-width="2" 
          stroke-linejoin="round" 
          opacity="0.5" />

    <!-- Inner Frame (Camera Viewfinder Style) -->
    <path d="M -120 -120 L -80 -120 M 80 -120 L 120 -120 L 120 -80 M 120 80 L 120 120 L 80 120 M -80 120 L -120 120 L -120 80 M -120 -80 L -120 -120" 
          fill="none" 
          stroke="url(#silver-gradient)" 
          stroke-width="6" 
          stroke-linecap="round" 
          stroke-linejoin="round" />

    <!-- Abstract 'S' and 'E' Monogram -->
    <g transform="scale(1.2)">
      <!-- The 'S' -->
      <path d="M 30 -40 C 10 -60 -30 -60 -50 -40 C -70 -20 -70 10 -40 30 C -10 50 10 70 -10 90 C -30 110 -70 110 -90 90" 
            fill="none" 
            stroke="url(#gold-gradient)" 
            stroke-width="12" 
            stroke-linecap="round" 
            filter="url(#glow)" />
            
      <!-- The 'E' (Integrated into the 'S') -->
      <path d="M -40 30 L 40 30 M -10 90 L 70 90 M -50 -40 L 30 -40" 
            fill="none" 
            stroke="url(#silver-gradient)" 
            stroke-width="12" 
            stroke-linecap="round" 
            opacity="0.9" />
            
      <!-- The 'P' (Subtle integration) -->
      <path d="M -50 -40 L -50 30 C -50 30 -20 30 -20 -5 C -20 -40 -50 -40 -50 -40 Z" 
            fill="none" 
            stroke="url(#gold-gradient)" 
            stroke-width="6" 
            opacity="0.7" />
    </g>

    <!-- Express Motion Lines -->
    <g stroke="url(#silver-gradient)" stroke-width="4" stroke-linecap="round" opacity="0.6">
      <line x1="-180" y1="-20" x2="-140" y2="-20" />
      <line x1="-200" y1="0" x2="-150" y2="0" />
      <line x1="-190" y1="20" x2="-140" y2="20" />
      
      <line x1="140" y1="-20" x2="180" y2="-20" />
      <line x1="150" y1="0" x2="200" y2="0" />
      <line x1="140" y1="20" x2="190" y2="20" />
    </g>

    <!-- Corner Accents -->
    <circle cx="-150" cy="-150" r="6" fill="url(#gold-gradient)" />
    <circle cx="150" cy="-150" r="6" fill="url(#gold-gradient)" />
    <circle cx="150" cy="150" r="6" fill="url(#gold-gradient)" />
    <circle cx="-150" cy="150" r="6" fill="url(#gold-gradient)" />
  </g>

  <!-- Typography -->
  <g text-anchor="middle" filter="url(#drop-shadow)">
    <!-- Main Brand Name -->
    <text x="400" y="470" 
          font-family="'Montserrat', 'Helvetica Neue', sans-serif" 
          font-size="48" 
          font-weight="800" 
          letter-spacing="8" 
          fill="url(#silver-gradient)">
      SMITHSON
    </text>
    
    <!-- Secondary Brand Name -->
    <text x="400" y="520" 
          font-family="'Montserrat', 'Helvetica Neue', sans-serif" 
          font-size="32" 
          font-weight="600" 
          letter-spacing="12" 
          fill="url(#gold-gradient)">
      EXPRESS
    </text>
    
    <!-- Tertiary Brand Name -->
    <text x="400" y="560" 
          font-family="'Montserrat', 'Helvetica Neue', sans-serif" 
          font-size="20" 
          font-weight="400" 
          letter-spacing="16" 
          fill="#a0a0a0">
      PHRAMES
    </text>
  </g>

  <!-- Decorative Lines for Typography -->
  <g stroke="url(#gold-gradient)" stroke-width="2" opacity="0.5">
    <line x1="150" y1="455" x2="220" y2="455" />
    <line x1="580" y1="455" x2="650" y2="455" />
    
    <line x1="200" y1="510" x2="250" y2="510" />
    <line x1="550" y1="510" x2="600" y2="510" />
  </g>
</svg>