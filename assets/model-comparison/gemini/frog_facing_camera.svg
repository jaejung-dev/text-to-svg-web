<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="bodyGradient" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#8BC34A" />
      <stop offset="100%" stop-color="#4CAF50" />
    </radialGradient>
    <radialGradient id="eyeGradient" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#E0E0E0" />
    </radialGradient>
    <radialGradient id="pupilGradient" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#000000" />
      <stop offset="100%" stop-color="#333333" />
    </radialGradient>
    <radialGradient id="bellyGradient" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#FFF59D" />
      <stop offset="100%" stop-color="#FFEB3B" />
    </radialGradient>
    <radialGradient id="cheekGradient" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#FFCDD2" />
      <stop offset="100%" stop-color="#EF9A9A" />
    </radialGradient>
    <radialGradient id="legGradient" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#8BC34A" />
      <stop offset="100%" stop-color="#4CAF50" />
    </radialGradient>
    <radialGradient id="footGradient" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#8BC34A" />
      <stop offset="100%" stop-color="#4CAF50" />
    </radialGradient>
    <radialGradient id="toeGradient" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#8BC34A" />
      <stop offset="100%" stop-color="#4CAF50" />
    </radialGradient>
  </defs>

  <!-- Body -->
  <ellipse cx="50" cy="60" rx="35" ry="30" fill="url(#bodyGradient)" />

  <!-- Belly -->
  <ellipse cx="50" cy="65" rx="25" ry="20" fill="url(#bellyGradient)" />

  <!-- Head -->
  <ellipse cx="50" cy="35" rx="30" ry="25" fill="url(#bodyGradient)" />

  <!-- Eyes -->
  <circle cx="35" cy="25" r="12" fill="url(#eyeGradient)" />
  <circle cx="65" cy="25" r="12" fill="url(#eyeGradient)" />

  <!-- Pupils -->
  <circle cx="35" cy="25" r="6" fill="url(#pupilGradient)" />
  <circle cx="65" cy="25" r="6" fill="url(#pupilGradient)" />

  <!-- Eye Highlights -->
  <circle cx="33" cy="23" r="2" fill="#FFFFFF" />
  <circle cx="63" cy="23" r="2" fill="#FFFFFF" />

  <!-- Cheeks -->
  <circle cx="25" cy="40" r="5" fill="url(#cheekGradient)" />
  <circle cx="75" cy="40" r="5" fill="url(#cheekGradient)" />

  <!-- Mouth -->
  <path d="M 40 45 Q 50 55 60 45" fill="none" stroke="#000000" stroke-width="2" />

  <!-- Front Legs -->
  <ellipse cx="30" cy="75" rx="8" ry="15" fill="url(#legGradient)" transform="rotate(-20 30 75)" />
  <ellipse cx="70" cy="75" rx="8" ry="15" fill="url(#legGradient)" transform="rotate(20 70 75)" />

  <!-- Front Feet -->
  <ellipse cx="25" cy="85" rx="10" ry="5" fill="url(#footGradient)" transform="rotate(-10 25 85)" />
  <ellipse cx="75" cy="85" rx="10" ry="5" fill="url(#footGradient)" transform="rotate(10 75 85)" />

  <!-- Front Toes -->
  <circle cx="18" cy="85" r="3" fill="url(#toeGradient)" />
  <circle cx="25" cy="88" r="3" fill="url(#toeGradient)" />
  <circle cx="32" cy="85" r="3" fill="url(#toeGradient)" />

  <circle cx="68" cy="85" r="3" fill="url(#toeGradient)" />
  <circle cx="75" cy="88" r="3" fill="url(#toeGradient)" />
  <circle cx="82" cy="85" r="3" fill="url(#toeGradient)" />

  <!-- Back Legs -->
  <ellipse cx="15" cy="65" rx="12" ry="20" fill="url(#legGradient)" transform="rotate(-30 15 65)" />
  <ellipse cx="85" cy="65" rx="12" ry="20" fill="url(#legGradient)" transform="rotate(30 85 65)" />

  <!-- Back Feet -->
  <ellipse cx="10" cy="80" rx="12" ry="6" fill="url(#footGradient)" transform="rotate(-20 10 80)" />
  <ellipse cx="90" cy="80" rx="12" ry="6" fill="url(#footGradient)" transform="rotate(20 90 80)" />

  <!-- Back Toes -->
  <circle cx="2" cy="78" r="3" fill="url(#toeGradient)" />
  <circle cx="8" cy="83" r="3" fill="url(#toeGradient)" />
  <circle cx="16" cy="80" r="3" fill="url(#toeGradient)" />

  <circle cx="84" cy="80" r="3" fill="url(#toeGradient)" />
  <circle cx="92" cy="83" r="3" fill="url(#toeGradient)" />
  <circle cx="98" cy="78" r="3" fill="url(#toeGradient)" />

  <!-- Spots -->
  <circle cx="40" cy="60" r="3" fill="#388E3C" />
  <circle cx="60" cy="65" r="4" fill="#388E3C" />
  <circle cx="50" cy="75" r="2" fill="#388E3C" />
  <circle cx="30" cy="50" r="2" fill="#388E3C" />
  <circle cx="70" cy="55" r="3" fill="#388E3C" />

</svg>