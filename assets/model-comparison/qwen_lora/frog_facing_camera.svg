<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradient for body -->
    <linearGradient id="bodyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#66bb6a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#388e3c;stop-opacity:1" />
    </linearGradient>
    
    <!-- Gradient for eyes -->
    <radialGradient id="eyeGradient" cx="50%" cy="50%" r="50%">
      <stop offset="70%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4caf50;stop-opacity:1" />
    </radialGradient>
  </defs>
  
  <!-- Back legs -->
  <g id="back-legs">
    <ellipse cx="45" cy="160" rx="25" ry="15" fill="#388e3c" transform="rotate(-30 45 160)"/>
    <ellipse cx="155" cy="160" rx="25" ry="15" fill="#388e3c" transform="rotate(30 155 160)"/>
    <path d="M25 165 Q30 175 40 172" stroke="#388e3c" stroke-width="4" fill="none"/>
    <path d="M175 165 Q170 175 160 172" stroke="#388e3c" stroke-width="4" fill="none"/>
  </g>
  
  <!-- Body -->
  <g id="body">
    <ellipse cx="100" cy="110" rx="60" ry="50" fill="url(#bodyGradient)" stroke="#2e7d32" stroke-width="3"/>
    <!-- Belly area -->
    <ellipse cx="100" cy="115" rx="35" ry="25" fill="#81c784" opacity="0.6"/>
    <!-- Spots pattern -->
    <circle cx="70" cy="95" r="6" fill="#2e7d32" opacity="0.4"/>
    <circle cx="130" cy="95" r="5" fill="#2e7d32" opacity="0.4"/>
    <circle cx="65" cy="130" r="4" fill="#2e7d32" opacity="0.4"/>
    <circle cx="135" cy="130" r="5" fill="#2e7d32" opacity="0.4"/>
  </g>
  
  <!-- Front legs -->
  <g id="front-legs">
    <ellipse cx="55" cy="145" rx="18" ry="10" fill="#388e3c" transform="rotate(15 55 145)"/>
    <ellipse cx="145" cy="145" rx="18" ry="10" fill="#388e3c" transform="rotate(-15 145 145)"/>
  </g>
  
  <!-- Head/Belly highlight overlay -->
  <g id="face">
    <!-- Upper head area -->
    <path d="M70 85 Q100 65 130 85" fill="none" stroke="#2e7d32" stroke-width="2" opacity="0.3"/>
  </g>
  
  <!-- Left eye -->
  <g id="left-eye">
    <circle cx="70" cy="85" r="22" fill="#4caf50" stroke="#2e7d32" stroke-width="3"/>
    <circle cx="72" cy="82" r="14" fill="url(#eyeGradient)"/>
    <circle cx="74" cy="80" r="6" fill="#3e2723"/>
    <circle cx="76" cy="78" r="2" fill="#ffffff" opacity="0.8"/>
  </g>
  
  <!-- Right eye -->
  <g id="right-eye">
    <circle cx="130" cy="85" r="22" fill="#4caf50" stroke="#2e7d32" stroke-width="3"/>
    <circle cx="128" cy="82" r="14" fill="url(#eyeGradient)"/>
    <circle cx="126" cy="80" r="6" fill="#3e2723"/>
    <circle cx="124" cy="78" r="2" fill="#ffffff" opacity="0.8"/>
  </g>
  
  <!-- Eyebrows/Skin folds above eyes -->
  <path d="M45 75 Q70 60 95 75" stroke="#2e7d32" stroke-width="3" fill="none" opacity="0.6"/>
  <path d="M105 75 Q130 60 155 75" stroke="#2e7d32" stroke-width="3" fill="none" opacity="0.6"/>
  
  <!-- Mouth - gentle smile -->
  <path id="mouth" d="M85 115 Q100 125 115 115" stroke="#1b5e20" stroke-width="3" fill="none" stroke-linecap="round"/>
  
  <!-- Cheeks blushing -->
  <ellipse cx="55" cy="105" rx="8" ry="6" fill="#ffccbc" opacity="0.4"/>
  <ellipse cx="145" cy="105" rx="8" ry="6" fill="#ffccbc" opacity="0.4"/>
</svg>