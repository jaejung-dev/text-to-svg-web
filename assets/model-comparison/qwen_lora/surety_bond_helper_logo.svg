<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <!-- Define styles -->
  <defs>
    <linearGradient id="shieldGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="connectGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background Circle -->
  <g id="background">
    <circle cx="200" cy="200" r="180" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  </g>
  
  <!-- Shield Icon - representing security/surety -->
  <g id="shield-icon" transform="translate(110, 100)">
    <path d="M90 30 L90 70 Q90 100 50 130 Q10 100 10 70 L10 30 Q50 60 90 30 Z" 
          fill="url(#shieldGradient)" opacity="0.9"/>
    <path d="M50 50 L50 110 M20 80 L80 80" stroke="white" stroke-width="3" stroke-linecap="round"/>
  </g>
  
  <!-- Connection Nodes - representing platform/network -->
  <g id="connection-nodes" transform="translate(150, 120)">
    <circle cx="0" cy="0" r="12" fill="#10b981"/>
    <circle cx="50" cy="25" r="10" fill="#10b981"/>
    <circle cx="25" cy="55" r="10" fill="#10b981"/>
    <circle cx="-20" cy="35" r="10" fill="#10b981"/>
    
    <!-- Connecting Lines -->
    <line x1="0" y1="0" x2="50" y2="25" stroke="url(#connectGradient)" stroke-width="3" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="25" y2="55" stroke="url(#connectGradient)" stroke-width="3" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="-20" y2="35" stroke="url(#connectGradient)" stroke-width="3" stroke-linecap="round"/>
    <line x1="50" y1="25" x2="25" y2="55" stroke="url(#connectGradient)" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
    <line x1="-20" y1="35" x2="25" y2="55" stroke="url(#connectGradient)" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  </g>
  
  <!-- Handshake/Helper Icon -->
  <g id="helper-handshake" transform="translate(135, 180)">
    <path d="M25 15 C30 15 35 20 35 25 C35 30 30 35 25 35" 
          fill="none" stroke="#f59e0b" stroke-width="4" stroke-linecap="round"/>
    <path d="M25 35 C25 40 20 45 15 45 C10 45 5 40 5 35" 
          fill="none" stroke="#f59e0b" stroke-width="4" stroke-linecap="round"/>
    <path d="M5 35 L45 35" stroke="#f59e0b" stroke-width="4" stroke-linecap="round"/>
  </g>
  
  <!-- Platform Base Line -->
  <g id="platform-base">
    <rect x="100" y="240" width="200" height="4" rx="2" fill="#6366f1" opacity="0.3"/>
    <circle cx="100" cy="240" r="4" fill="#6366f1"/>
    <circle cx="200" cy="240" r="4" fill="#6366f1"/>
    <circle cx="300" cy="240" r="4" fill="#6366f1"/>
  </g>
  
  <!-- Text/Brand Elements -->
  <g id="brand-text">
    <text x="200" y="295" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1e293b">BOND</text>
    <text x="200" y="315" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#2563eb">CONNECT</text>
  </g>
  
  <!-- Decorative Arc -->
  <path d="M80 120 Q200 50 320 120" fill="none" stroke="#94a3b8" stroke-width="2" stroke-dasharray="5,5" opacity="0.5"/>
</svg>