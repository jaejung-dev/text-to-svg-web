<svg viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradient for metallic effect -->
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="50%" stop-color="#B8860B"/>
      <stop offset="100%" stop-color="#FFD700"/>
    </linearGradient>
    
    <!-- Elegant outline glow -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="250" cy="250" r="240" fill="url(#goldGradient)" opacity="0.15"/>
  <circle cx="250" cy="250" r="235" fill="none" stroke="#8B4513" stroke-width="3"/>
  <circle cx="250" cy="250" r="225" fill="none" stroke="#DAA520" stroke-width="2"/>
  
  <!-- Main Horse Emblem Group -->
  <g id="HorseLogo" transform="translate(250, 250)">
    
    <!-- Ornamental Base/Crest -->
    <path id="CrestBase" d="M -80 90 Q -80 150 0 150 Q 80 150 80 90 L -80 90 Z" 
          fill="url(#goldGradient)" stroke="#8B4513" stroke-width="2"/>
    
    <!-- Horse Body Profile -->
    <g id="HorseProfile" filter="url(#glow)">
      <!-- Neck & Head Outline -->
      <path id="HorseOutline" d="
        M -50 60
        C -60 50, -70 30, -65 10
        C -60 0, -45 -15, -30 -25
        C -20 -30, 0 -35, 25 -40
        C 35 -42, 45 -40, 50 -35
        C 55 -30, 58 -20, 55 -10
        C 52 5, 45 15, 35 25
        C 25 35, 15 45, 5 55
        C -5 60, -30 65, -50 60
        Z" 
        fill="url(#goldGradient)" stroke="#654321" stroke-width="2"/>
      
      <!-- Mane Details -->
      <path id="Mane" d="
        M -60 20
        Q -70 10, -65 -5
        Q -55 -15, -50 -25
        L -50 -15
        L -58 5
        L -55 25
        L -60 30" 
        fill="none" stroke="#654321" stroke-width="2"/>
      
      <!-- Face Features -->
      <ellipse id="Eye" cx="35" cy="-15" rx="5" ry="3" fill="#3E2723"/>
      <line id="Nostril" x1="48" y1="-25" x2="52" y2="-22" stroke="#3E2723" stroke-width="1.5"/>
      <path id="Mouth" d="M 45 -15 Q 48 -12, 50 -10" fill="none" stroke="#3E2723" stroke-width="1.5"/>
      
      <!-- Ears -->
      <path id="Ear" d="
        M -25 -30 L -20 -45 L -15 -35 Z
        M -10 -32 L -5 -48 L 0 -38 Z" 
        fill="url(#goldGradient)" stroke="#654321" stroke-width="1"/>
    </g>
    
    <!-- Decorative Crown Element -->
    <path id="CrownDetail" d="
      M -25 -55
      Q -30 -65, -25 -70
      Q -20 -60, -15 -70
      Q -10 -65, -5 -75
      L 0 -60
      L 5 -75
      Q 10 -65, 15 -70
      Q 20 -60, 25 -70
      Q 30 -65, 25 -55
      Z" 
      fill="url(#goldGradient)" stroke="#8B4513" stroke-width="1.5"/>
    
    <!-- Center Jewel -->
    <circle id="Jewel" cx="0" cy="-65" r="6" fill="#DC143C" stroke="#FFD700" stroke-width="1"/>
    
    <!-- Decorative Side Elements -->
    <path id="SideOrnament" d="
      M -70 40 Q -80 30, -75 10
      M 70 40 Q 80 30, 75 10" 
      fill="none" stroke="#DAA520" stroke-width="2" stroke-linecap="round"/>
  </g>
  
  <!-- Bottom Decorative Ribbon -->
  <path id="BottomRibbon" d="
    M 50 380
    L 450 380
    Q 450 400, 430 410
    L 400 390
    L 370 410
    L 340 390
    L 310 410
    L 280 390
    L 250 410
    L 220 390
    L 190 410
    L 160 390
    L 130 410
    L 100 390
    L 70 410
    Q 50 400, 50 380"
    fill="#8B4513" stroke="#FFD700" stroke-width="2"/>
  
  <!-- Text Label -->
  <text x="250" y="440" text-anchor="middle" font-family="Georgia, serif" font-size="18" fill="#8B4513" font-weight="bold" letter-spacing="2">
    NOBLE
  </text>
</svg>