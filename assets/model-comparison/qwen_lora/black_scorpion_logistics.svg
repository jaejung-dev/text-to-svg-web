<svg viewBox="0 0 400 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Define styles -->
  <defs>
    <style>
      .scorpion-body { fill: #0a0a0a; }
      .scorpion-tail { fill: #1a1a1a; stroke: #0a0a0a; stroke-width: 2; }
      .road-line { stroke: #333333; stroke-width: 3; }
      .truck-accent { fill: #c92a2a; }
      .logo-text-primary { font-family: Arial, sans-serif; font-size: 24px; font-weight: bold; fill: #0a0a0a; }
      .logo-text-secondary { font-family: Arial, sans-serif; font-size: 14px; font-weight: normal; fill: #666666; }
    </style>
    
    <!-- Gradient for depth -->
    <linearGradient id="bodyGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0a0a;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Main Logo Container Group -->
  <g id="logo-container">
    
    <!-- Icon Section - Left side -->
    <g id="scorpion-icon">
      <!-- Stylized Scorpion Body -->
      <ellipse class="scorpion-body" cx="80" cy="70" rx="25" ry="18"/>
      <ellipse class="scorpion-body" cx="65" cy="60" rx="15" ry="12"/>
      
      <!-- Pincers/Claws -->
      <path class="scorpion-tail" d="M 50 55 L 40 40 L 45 50 Z" fill="#1a1a1a"/>
      <path class="scorpion-tail" d="M 50 55 L 40 70 L 45 60 Z" fill="#1a1a1a"/>
      
      <!-- Segmented Tail with Sting -->
      <path class="scorpion-tail" d="M 100 70 Q 115 60 110 50 L 120 45 Q 125 50 120 60 Q 115 70 100 75" fill="none" stroke="#0a0a0a" stroke-width="4" stroke-linecap="round"/>
      <circle class="scorpion-body" cx="110" cy="50" r="5"/>
      
      <!-- Legs (simplified) -->
      <line x1="75" y1="85" x2="70" y2="95" stroke="#0a0a0a" stroke-width="2.5"/>
      <line x1="85" y1="85" x2="90" y2="95" stroke="#0a0a0a" stroke-width="2.5"/>
    </g>
    
    <!-- Road Transport Element -->
    <g id="transport-element">
      <!-- Abstract road line beneath scorpion -->
      <path class="road-line" d="M 30 98 Q 60 95 90 98 T 150 95" stroke-dasharray="8,4"/>
      
      <!-- Quick motion lines for speed perception -->
      <line x1="150" y1="95" x2="170" y2="95" stroke="#333333" stroke-width="2"/>
      <line x1="155" y1="90" x2="175" y2="90" stroke="#333333" stroke-width="2"/>
    </g>
    
    <!-- Text Section -->
    <g id="logo-text">
      <!-- Primary Company Name -->
      <text class="logo-text-primary" x="180" y="70">
        Black Scorpion
      </text>
      <!-- Secondary Tagline -->
      <text class="logo-text-secondary" x="180" y="92">
        LOGISTICS
      </text>
      
      <!-- Divider Line -->
      <line x1="180" y1="102" x2="350" y2="102" stroke="#c92a2a" stroke-width="1.5"/>
    </g>
    
    <!-- Accent Detail - Vehicle hint on right -->
    <g id="accent-truck">
      <!-- Simplified truck front silhouette -->
      <rect x="170" y="115" width="15" height="8" fill="#333333" rx="1"/>
      <path class="truck-accent" d="M 175 115 L 178 112 L 181 115" fill="#c92a2a"/>
      <!-- Wheel hints -->
      <circle cx="172" cy="127" r="2" fill="#666666"/>
      <circle cx="178" cy="127" r="2" fill="#666666"/>
      <circle cx="184" cy="127" r="2" fill="#666666"/>
    </g>
  </g>
</svg>