<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Sky Gradient -->
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#dbeafe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#eff6ff;stop-opacity:1" />
    </linearGradient>
    
    <!-- Water Gradient -->
    <linearGradient id="waterGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a5f3fc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#bae6fd;stop-opacity:1" />
    </linearGradient>

    <!-- Reflection Gradient -->
    <linearGradient id="shadowGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:black;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:black;stop-opacity:0.05" />
    </linearGradient>
  </defs>

  <!-- Group: Background Sky -->
  <g id="sky">
    <rect x="0" y="0" width="800" height="300" fill="url(#skyGrad)" />
  </g>

  <!-- Group: Water Surface -->
  <g id="water">
    <!-- Base Water Body -->
    <rect x="0" y="300" width="800" height="200" fill="url(#waterGrad)" />
    <!-- Calm Water Line Detail -->
    <path d="M0 300 Q200 305 400 300 T800 300" fill="none" stroke="#7dd3fc" stroke-width="2" opacity="0.5" />
    <path d="M0 300 Q150 310 300 305 T800 300" fill="none" stroke="#bfdbfe" stroke-width="1" opacity="0.3" />
  </g>

  <!-- Group: Sailboat Assembly -->
  <g id="sailboat" transform="translate(400, 305)">
    <!-- Shadow Reflection -->
    <ellipse cx="-40" cy="40" rx="60" ry="5" fill="url(#shadowGrad)" opacity="0.6" transform="rotate(-10 -40 40)" />

    <!-- Hull -->
    <g id="hull-group">
      <path id="hull-main" d="M-50 0 L50 0 L40 35 C20 45 0 48 -10 45 L-40 35 Z" fill="#ffffff" stroke="#374151" stroke-width="2" />
      <!-- Deck detail -->
      <path id="hull-deck-line" d="M-50 0 Q0 -5 50 0" fill="none" stroke="#374151" stroke-width="1" />
    </g>

    <!-- Mast -->
    <rect id="mast" x="-2" y="-120" width="4" height="130" fill="#57534e" />
    <rect id="mast-top" x="-2" y="-125" width="4" height="5" fill="#57534e" />

    <!-- Rigging Lines -->
    <g id="rigging" fill="none" stroke="#d1d5db" stroke-width="1">
      <!-- Forestay (front) -->
      <line x1="-40" y1="0" x2="-2" y2="-110" />
      <!-- Shrouds (side support) -->
      <line x1="15" y1="0" x2="-2" y2="-80" />
      <line x1="-15" y1="0" x2="-2" y2="-80" />
    </g>

    <!-- Jib Sail (Front) -->
    <path id="jib-sail" d="M-40 0 L-2 -110 L0 0 Z" fill="#f8fafc" stroke="#94a3b8" stroke-width="1" />

    <!-- Main Sail (Back) -->
    <path id="main-sail" d="M-2 -110 L0 0 L40 -30 L40 35 L-2 -110 Z" fill="#f8fafc" stroke="#94a3b8" stroke-width="1" />
    <!-- Sail Seam Detail -->
    <path id="main-sail-seam" d="M-2 -110 L38 35" fill="none" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4,4" />
  </g>
</svg>