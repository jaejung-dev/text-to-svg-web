<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="300" fill="#f0f8ff"/>
  
  <!-- Ground line -->
  <line x1="0" y1="260" x2="400" y2="260" stroke="#90EE90" stroke-width="4"/>
  
  <!-- Bike Group -->
  <g id="bicycle" transform="translate(100, 80)">
    <!-- Back Wheel -->
    <circle cx="50" cy="150" r="35" fill="none" stroke="#444" stroke-width="6"/>
    <circle cx="50" cy="150" r="25" fill="none" stroke="#ccc" stroke-width="3"/>
    
    <!-- Front Wheel -->
    <circle cx="250" cy="150" r="35" fill="none" stroke="#444" stroke-width="6"/>
    <circle cx="250" cy="150" r="25" fill="none" stroke="#ccc" stroke-width="3"/>
    
    <!-- Bike Frame -->
    <path d="M 50,150 L 130,150 L 170,80 L 250,150" fill="none" stroke="#e74c3c" stroke-width="6" stroke-linejoin="round"/>
    <line x1="50" y1="150" x2="130" y2="150" stroke="#e74c3c" stroke-width="6"/>
    <line x1="130" y1="150" x2="170" y2="80" stroke="#e74c3c" stroke-width="6"/>
    <line x1="170" y1="80" x2="250" y2="150" stroke="#e74c3c" stroke-width="6"/>
    
    <!-- Seat -->
    <ellipse cx="120" cy="70" rx="20" ry="8" fill="#333"/>
    
    <!-- Handlebars -->
    <path d="M 220,80 Q 235,60 250,70" fill="none" stroke="#444" stroke-width="5" stroke-linecap="round"/>
    
    <!-- Pedals -->
    <circle cx="130" cy="150" r="8" fill="#666"/>
    <circle cx="200" cy="150" r="8" fill="#666"/>
    
    <!-- Chain -->
    <path d="M 50,150 L 130,150" fill="none" stroke="#888" stroke-width="3"/>
  </g>
  
  <!-- Baby Group -->
  <g id="baby" transform="translate(130, 20)">
    <!-- Hair -->
    <path d="M -25,-10 Q -25,-40 0,-40 Q 25,-40 25,-10" fill="#ffcc99" stroke-dasharray="5,3"/>
    <ellipse cx="0" cy="-15" rx="28" ry="25" fill="#ffe0bd"/>
    
    <!-- Head -->
    <circle cx="0" cy="0" r="25" fill="#ffe0bd"/>
    
    <!-- Face -->
    <ellipse cx="-8" cy="3" rx="4" ry="3" fill="#ffb6c1"/>
    <ellipse cx="8" cy="3" rx="4" ry="3" fill="#ffb6c1"/>
    <circle cx="0" cy="8" r="3" fill="#ff6b6b"/>
    
    <!-- Eyes -->
    <circle cx="-8" cy="-2" r="3" fill="#333"/>
    <circle cx="8" cy="-2" r="3" fill="#333"/>
    <circle cx="-7" cy="-3" r="1" fill="white"/>
    <circle cx="9" cy="-3" r="1" fill="white"/>
    
    <!-- Body/Torso -->
    <ellipse cx="0" cy="35" rx="20" ry="28" fill="#4facfe"/>
    
    <!-- Arms -->
    <path d="M -20,25 Q -30,40 -25,50" fill="none" stroke="#ffe0bd" stroke-width="8" stroke-linecap="round"/>
    <path d="M 20,25 Q 30,40 25,50" fill="none" stroke="#ffe0bd" stroke-width="8" stroke-linecap="round"/>
    
    <!-- Hands on Handlebars -->
    <circle cx="-25" cy="45" r="6" fill="#ffe0bd"/>
    <circle cx="25" cy="45" r="6" fill="#ffe0bd"/>
    
    <!-- Legs -->
    <path d="M -10,55 Q -15,70 -10,85" fill="none" stroke="#ffe0bd" stroke-width="8" stroke-linecap="round"/>
    <path d="M 10,55 Q 15,70 10,85" fill="none" stroke="#ffe0bd" stroke-width="8" stroke-linecap="round"/>
    
    <!-- Feet on Pedals -->
    <ellipse cx="-10" cy="85" rx="8" ry="5" fill="#ffcc99"/>
    <ellipse cx="10" cy="85" rx="8" ry="5" fill="#ffcc99"/>
    
    <!-- Helmet (optional accessory) -->
    <path d="M -25,-10 Q -25,-30 0,-35 Q 25,-30 25,-10" fill="#ff6b6b" stroke-dasharray="3,2"/>
  </g>
</svg>