<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600" aria-label="A cute baby riding a bicycle">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#eaf7ff"/>
      <stop offset="1" stop-color="#ffffff"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="800" height="600" fill="url(#bg)"/>
  <ellipse cx="400" cy="520" rx="300" ry="28" fill="#dff0d8"/>

  <!-- Bicycle -->
  <g stroke="#4b5563" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#softShadow)">
    <circle cx="250" cy="430" r="90" stroke="#374151" fill="#ffffff"/>
    <circle cx="550" cy="430" r="90" stroke="#374151" fill="#ffffff"/>
    <circle cx="250" cy="430" r="12" fill="#6b7280" stroke="none"/>
    <circle cx="550" cy="430" r="12" fill="#6b7280" stroke="none"/>

    <!-- spokes -->
    <g stroke="#cbd5e1" stroke-width="3">
      <line x1="250" y1="340" x2="250" y2="520"/>
      <line x1="160" y1="430" x2="340" y2="430"/>
      <line x1="186" y1="366" x2="314" y2="494"/>
      <line x1="314" y1="366" x2="186" y2="494"/>

      <line x1="550" y1="340" x2="550" y2="520"/>
      <line x1="460" y1="430" x2="640" y2="430"/>
      <line x1="486" y1="366" x2="614" y2="494"/>
      <line x1="614" y1="366" x2="486" y2="494"/>
    </g>

    <!-- frame -->
    <g stroke="#ef4444">
      <line x1="250" y1="430" x2="390" y2="360"/>
      <line x1="390" y1="360" x2="470" y2="430"/>
      <line x1="250" y1="430" x2="470" y2="430"/>
      <line x1="390" y1="360" x2="360" y2="430"/>
      <line x1="470" y1="430" x2="550" y2="430"/>
      <line x1="370" y1="350" x2="350" y2="310"/>
      <line x1="470" y1="430" x2="500" y2="340"/>
      <line x1="500" y1="340" x2="545" y2="340"/>
    </g>

    <!-- handlebar -->
    <g stroke="#3b82f6">
      <line x1="500" y1="340" x2="520" y2="300"/>
      <line x1="500" y1="340" x2="540" y2="315"/>
    </g>

    <!-- seat -->
    <g stroke="#111827">
      <line x1="350" y1="310" x2="385" y2="310"/>
      <line x1="360" y1="430" x2="360" y2="320"/>
    </g>

    <!-- crank and pedals -->
    <circle cx="360" cy="430" r="18" stroke="#374151" fill="#f3f4f6"/>
    <line x1="360" y1="430" x2="330" y2="455"/>
    <line x1="360" y1="430" x2="390" y2="405"/>
    <line x1="318" y1="460" x2="342" y2="460"/>
    <line x1="388" y1="398" x2="412" y2="398"/>
  </g>

  <!-- Baby -->
  <g filter="url(#softShadow)">
    <!-- body -->
    <ellipse cx="390" cy="275" rx="55" ry="62" fill="#8dd3c7"/>
    <ellipse cx="390" cy="285" rx="38" ry="44" fill="#b7efe6"/>

    <!-- diaper/shorts -->
    <path d="M352 315 Q390 340 428 315 L420 360 Q390 375 360 360 Z" fill="#fbbf24"/>

    <!-- head -->
    <circle cx="405" cy="170" r="68" fill="#ffd7b3"/>
    <path d="M355 155 Q370 105 430 102 Q475 106 486 145 Q455 128 425 132 Q386 136 355 155 Z" fill="#7c4a2d"/>
    <path d="M390 112 Q400 95 420 112" fill="none" stroke="#7c4a2d" stroke-width="8" stroke-linecap="round"/>

    <!-- ears -->
    <circle cx="344" cy="179" r="12" fill="#ffd7b3"/>
    <circle cx="466" cy="179" r="12" fill="#ffd7b3"/>

    <!-- face -->
    <circle cx="383" cy="176" r="6" fill="#1f2937"/>
    <circle cx="430" cy="176" r="6" fill="#1f2937"/>
    <circle cx="381" cy="174" r="2" fill="#ffffff"/>
    <circle cx="428" cy="174" r="2" fill="#ffffff"/>
    <path d="M402 182 Q406 190 398 194" fill="none" stroke="#e8a07b" stroke-width="3" stroke-linecap="round"/>
    <path d="M386 204 Q405 218 425 204" fill="none" stroke="#d96b6b" stroke-width="5" stroke-linecap="round"/>
    <circle cx="362" cy="196" r="8" fill="#ffb3b3" opacity="0.6"/>
    <circle cx="448" cy="196" r="8" fill="#ffb3b3" opacity="0.6"/>

    <!-- left arm to handlebar -->
    <path d="M434 250 Q485 255 525 303" fill="none" stroke="#ffd7b3" stroke-width="20" stroke-linecap="round"/>
    <circle cx="526" cy="304" r="10" fill="#ffd7b3"/>

    <!-- right arm -->
    <path d="M350 252 Q330 285 340 330" fill="none" stroke="#ffd7b3" stroke-width="20" stroke-linecap="round"/>
    <circle cx="340" cy="332" r="10" fill="#ffd7b3"/>

    <!-- legs -->
    <path d="M374 355 Q345 395 333 452" fill="none" stroke="#ffd7b3" stroke-width="22" stroke-linecap="round"/>
    <path d="M414 355 Q402 385 395 403" fill="none" stroke="#ffd7b3" stroke-width="22" stroke-linecap="round"/>
    <circle cx="330" cy="458" r="11" fill="#ffd7b3"/>
    <circle cx="398" cy="405" r="11" fill="#ffd7b3"/>

    <!-- feet/shoes -->
    <ellipse cx="322" cy="464" rx="16" ry="9" fill="#60a5fa"/>
    <ellipse cx="406" cy="404" rx="16" ry="9" fill="#60a5fa"/>
  </g>

  <!-- tiny decorative hearts -->
  <g fill="#fda4af" opacity="0.8">
    <path d="M145 120 C145 108 160 104 166 116 C172 104 187 108 187 120 C187 138 166 149 166 149 C166 149 145 138 145 120 Z"/>
    <path d="M620 110 C620 100 632 96 637 106 C642 96 654 100 654 110 C654 125 637 134 637 134 C637 134 620 125 620 110 Z"/>
  </g>
</svg>