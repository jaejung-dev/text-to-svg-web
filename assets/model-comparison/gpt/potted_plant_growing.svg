<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400" role="img" aria-label="Animation of a potted plant growing">
  <rect width="400" height="400" fill="#f7f3ea"/>
  <ellipse cx="200" cy="350" rx="85" ry="14" fill="#d8d0c2" opacity="0.6"/>

  <g transform="translate(200 0)">
    <g>
      <path d="M-55 300 L55 300 L42 360 L-42 360 Z" fill="#c7773f" stroke="#9a552c" stroke-width="3"/>
      <ellipse cx="0" cy="300" rx="55" ry="10" fill="#d98a52" stroke="#9a552c" stroke-width="3"/>
      <ellipse cx="0" cy="302" rx="43" ry="8" fill="#5f3b24"/>
    </g>

    <g id="plant">
      <path d="M0 300 C0 270 -2 245 4 220 C8 195 5 170 0 145" fill="none" stroke="#3f8f4a" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" pathLength="100" stroke-dasharray="100" stroke-dashoffset="100">
        <animate attributeName="stroke-dashoffset" from="100" to="0" dur="4s" repeatCount="indefinite"/>
      </path>

      <g transform="translate(0 0)">
        <g>
          <path d="M3 255 C20 242 35 238 50 244 C35 258 22 263 6 261 Z" fill="#69b96f" stroke="#3f8f4a" stroke-width="2" opacity="0">
            <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.18;0.24;1" dur="4s" repeatCount="indefinite"/>
            <animateTransform attributeName="transform" type="scale" values="0 0;0 0;1 1;1 1" keyTimes="0;0.18;0.24;1" dur="4s" repeatCount="indefinite" additive="sum"/>
            <animateTransform attributeName="transform" type="translate" values="0 0;0 0;2 -2;2 -2" keyTimes="0;0.18;0.24;1" dur="4s" repeatCount="indefinite" additive="sum"/>
          </path>
          <path d="M-3 240 C-20 228 -35 224 -50 230 C-36 245 -22 250 -6 247 Z" fill="#7acb7d" stroke="#3f8f4a" stroke-width="2" opacity="0">
            <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.28;0.34;1" dur="4s" repeatCount="indefinite"/>
            <animateTransform attributeName="transform" type="scale" values="0 0;0 0;1 1;1 1" keyTimes="0;0.28;0.34;1" dur="4s" repeatCount="indefinite" additive="sum"/>
            <animateTransform attributeName="transform" type="translate" values="0 0;0 0;-2 -2;-2 -2" keyTimes="0;0.28;0.34;1" dur="4s" repeatCount="indefinite" additive="sum"/>
          </path>
          <path d="M6 205 C24 192 40 189 56 196 C40 211 26 217 9 214 Z" fill="#7acb7d" stroke="#3f8f4a" stroke-width="2" opacity="0">
            <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.42;0.48;1" dur="4s" repeatCount="indefinite"/>
            <animateTransform attributeName="transform" type="scale" values="0 0;0 0;1 1;1 1" keyTimes="0;0.42;0.48;1" dur="4s" repeatCount="indefinite" additive="sum"/>
            <animateTransform attributeName="transform" type="translate" values="0 0;0 0;2 -2;2 -2" keyTimes="0;0.42;0.48;1" dur="4s" repeatCount="indefinite" additive="sum"/>
          </path>
          <path d="M-4 185 C-22 172 -39 168 -56 175 C-41 190 -26 196 -8 193 Z" fill="#69b96f" stroke="#3f8f4a" stroke-width="2" opacity="0">
            <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.55;0.61;1" dur="4s" repeatCount="indefinite"/>
            <animateTransform attributeName="transform" type="scale" values="0 0;0 0;1 1;1 1" keyTimes="0;0.55;0.61;1" dur="4s" repeatCount="indefinite" additive="sum"/>
            <animateTransform attributeName="transform" type="translate" values="0 0;0 0;-2 -2;-2 -2" keyTimes="0;0.55;0.61;1" dur="4s" repeatCount="indefinite" additive="sum"/>
          </path>
        </g>

        <g transform="translate(0 145)" opacity="0">
          <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.72;0.8;1" dur="4s" repeatCount="indefinite"/>
          <animateTransform attributeName="transform" type="translate" values="0 145;0 145;0 132;0 132" keyTimes="0;0.72;0.8;1" dur="4s" repeatCount="indefinite"/>
          <circle cx="0" cy="0" r="12" fill="#f2c94c" stroke="#d6a82a" stroke-width="2"/>
          <circle cx="0" cy="0" r="4" fill="#8b5a2b"/>
          <g fill="#ffd95e" stroke="#d6a82a" stroke-width="1.5">
            <ellipse cx="0" cy="-18" rx="7" ry="14"/>
            <ellipse cx="17" cy="-6" rx="7" ry="14" transform="rotate(55 17 -6)"/>
            <ellipse cx="17" cy="10" rx="7" ry="14" transform="rotate(95 17 10)"/>
            <ellipse cx="0" cy="18" rx="7" ry="14"/>
            <ellipse cx="-17" cy="10" rx="7" ry="14" transform="rotate(85 -17 10)"/>
            <ellipse cx="-17" cy="-6" rx="7" ry="14" transform="rotate(-55 -17 -6)"/>
          </g>
        </g>
      </g>

      <animateTransform attributeName="transform" type="rotate" values="0 0 300;2 0 300;0 0 300;-2 0 300;0 0 300" dur="3s" repeatCount="indefinite"/>
    </g>
  </g>
</svg>