<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#dff4ff"/>
      <stop offset="1" stop-color="#fdf6ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>

  <rect width="400" height="400" fill="url(#bg)"/>
  <ellipse cx="200" cy="342" rx="78" ry="18" fill="#c7d7e5" opacity="0.5"/>

  <g filter="url(#shadow)">
    <!-- Hair back -->
    <path d="M145 122
             C135 88, 160 58, 200 56
             C240 58, 265 88, 255 122
             L255 190
             C255 212, 235 232, 200 232
             C165 232, 145 212, 145 190 Z"
          fill="#5b3a2e"/>

    <!-- Neck -->
    <rect x="184" y="192" width="32" height="34" rx="12" fill="#f2c4a0"/>

    <!-- Head -->
    <circle cx="200" cy="146" r="58" fill="#f7c9a7"/>

    <!-- Hair front -->
    <path d="M146 132
             C148 87, 174 66, 200 66
             C230 66, 257 88, 256 129
             C244 110, 228 98, 204 97
             C184 96, 164 107, 146 132 Z"
          fill="#6a4334"/>
    <path d="M159 103
             C176 81, 211 76, 233 95
             C221 97, 211 101, 201 110
             C188 100, 173 98, 159 103 Z"
          fill="#7b5140"/>
    <path d="M143 136
             C149 155, 154 173, 153 193
             C155 216, 170 233, 180 244
             C154 238, 131 211, 132 180
             C131 161, 135 145, 143 136 Z"
          fill="#5b3a2e"/>
    <path d="M257 136
             C251 155, 246 173, 247 193
             C245 216, 230 233, 220 244
             C246 238, 269 211, 268 180
             C269 161, 265 145, 257 136 Z"
          fill="#5b3a2e"/>

    <!-- Ears -->
    <circle cx="144" cy="151" r="10" fill="#f7c9a7"/>
    <circle cx="256" cy="151" r="10" fill="#f7c9a7"/>

    <!-- Face -->
    <ellipse cx="179" cy="145" rx="6" ry="8" fill="#2f2f3a"/>
    <ellipse cx="221" cy="145" rx="6" ry="8" fill="#2f2f3a"/>
    <circle cx="177" cy="142" r="2" fill="#fff"/>
    <circle cx="219" cy="142" r="2" fill="#fff"/>
    <path d="M170 128 Q179 123 188 128" fill="none" stroke="#5b3a2e" stroke-width="3" stroke-linecap="round"/>
    <path d="M212 128 Q221 123 230 128" fill="none" stroke="#5b3a2e" stroke-width="3" stroke-linecap="round"/>
    <path d="M199 148 Q194 161 200 165" fill="none" stroke="#d89c7c" stroke-width="3" stroke-linecap="round"/>
    <path d="M180 174 Q200 187 220 174" fill="none" stroke="#c75b6a" stroke-width="4" stroke-linecap="round"/>
    <ellipse cx="165" cy="164" rx="9" ry="6" fill="#f0a3a7" opacity="0.45"/>
    <ellipse cx="235" cy="164" rx="9" ry="6" fill="#f0a3a7" opacity="0.45"/>

    <!-- Body -->
    <path d="M130 315
             C136 252, 157 220, 200 220
             C243 220, 264 252, 270 315 Z"
          fill="#5a8dee"/>
    <path d="M160 225 Q200 255 240 225 L252 315 L148 315 Z" fill="#6ea2ff"/>
    <path d="M178 220 L200 239 L222 220" fill="none" stroke="#ffffff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Left arm -->
    <g>
      <path d="M148 235 C128 248, 119 275, 118 302" fill="none" stroke="#f7c9a7" stroke-width="20" stroke-linecap="round"/>
      <circle cx="117" cy="312" r="12" fill="#f7c9a7"/>
    </g>

    <!-- Right arm waving -->
    <g transform="translate(252 234)">
      <animateTransform attributeName="transform"
                        type="rotate"
                        values="-8 0 0; 18 0 0; -8 0 0"
                        dur="1.2s"
                        repeatCount="indefinite"/>
      <path d="M0 0 C22 -8, 41 -30, 52 -62" fill="none" stroke="#f7c9a7" stroke-width="20" stroke-linecap="round"/>
      <g transform="translate(52 -62)">
        <circle cx="0" cy="0" r="13" fill="#f7c9a7"/>
        <rect x="-3" y="-22" width="6" height="18" rx="3" fill="#f7c9a7" transform="rotate(-28)"/>
        <rect x="2" y="-22" width="6" height="18" rx="3" fill="#f7c9a7" transform="rotate(-8)"/>
        <rect x="7" y="-20" width="6" height="18" rx="3" fill="#f7c9a7" transform="rotate(10)"/>
        <rect x="11" y="-16" width="6" height="16" rx="3" fill="#f7c9a7" transform="rotate(24)"/>
        <rect x="-12" y="-8" width="14" height="6" rx="3" fill="#f0bb97" transform="rotate(-35)"/>
      </g>
    </g>

    <!-- Skirt -->
    <path d="M150 315 L250 315 L270 345 L130 345 Z" fill="#ff7fa0"/>

    <!-- Legs -->
    <path d="M178 345 L172 376" fill="none" stroke="#f7c9a7" stroke-width="14" stroke-linecap="round"/>
    <path d="M222 345 L228 376" fill="none" stroke="#f7c9a7" stroke-width="14" stroke-linecap="round"/>

    <!-- Shoes -->
    <path d="M160 377 Q174 370 186 377 L186 383 L160 383 Z" fill="#5b3a2e"/>
    <path d="M214 377 Q226 370 240 377 L240 383 L214 383 Z" fill="#5b3a2e"/>
  </g>
</svg>