<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e94560;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f3460;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="800" height="600" fill="url(#bgGradient)" />
  
  <!-- Main circle element -->
  <g id="circle-shape" transform="translate(400, 300)">
    <circle cx="0" cy="0" r="120" fill="url(#accentGradient)" opacity="0.9" />
    <circle cx="0" cy="0" r="100" fill="none" stroke="#e94560" stroke-width="4" opacity="0.7" />
    <circle cx="0" cy="0" r="60" fill="#0f3460" opacity="0.5" />
  </g>
  
  <!-- Triangle shapes -->
  <g id="triangle-group">
    <polygon points="200,150 280,150 240,220" fill="#e94560" opacity="0.8" />
    <polygon points="600,150 680,150 640,220" fill="#4ecca3" opacity="0.8" />
    <polygon points="200,450 280,450 240,380" fill="#4ecca3" opacity="0.8" />
    <polygon points="600,450 680,450 640,380" fill="#e94560" opacity="0.8" />
  </g>
  
  <!-- Line elements -->
  <g id="lines">
    <line x1="100" y1="300" x2="200" y2="300" stroke="#e94560" stroke-width="3" opacity="0.6" />
    <line x1="600" y1="300" x2="700" y2="300" stroke="#4ecca3" stroke-width="3" opacity="0.6" />
    <line x1="400" y1="100" x2="400" y2="200" stroke="#e94560" stroke-width="3" opacity="0.6" />
    <line x1="400" y1="400" x2="400" y2="500" stroke="#4ecca3" stroke-width="3" opacity="0.6" />
  </g>
  
  <!-- Square shapes -->
  <g id="square-group">
    <rect x="150" y="250" width="40" height="40" fill="#4ecca3" opacity="0.7" transform="rotate(45 170 270)" />
    <rect x="610" y="250" width="40" height="40" fill="#e94560" opacity="0.7" transform="rotate(45 630 270)" />
    <rect x="150" y="310" width="40" height="40" fill="#4ecca3" opacity="0.7" transform="rotate(15 170 330)" />
    <rect x="610" y="310" width="40" height="40" fill="#e94560" opacity="0.7" transform="rotate(15 630 330)" />
  </g>
  
  <!-- Wave lines -->
  <g id="waves">
    <path d="M 100 550 Q 200 520 300 550 T 500 550 T 700 550" stroke="#e94560" fill="none" stroke-width="2" opacity="0.5" />
    <path d="M 100 520 Q 200 490 300 520 T 500 520 T 700 520" stroke="#4ecca3" fill="none" stroke-width="2" opacity="0.5" />
  </g>
  
  <!-- Decorative dots -->
  <g id="dots">
    <circle cx="100" cy="100" r="5" fill="#e94560" opacity="0.8" />
    <circle cx="700" cy="100" r="5" fill="#4ecca3" opacity="0.8" />
    <circle cx="100" cy="500" r="5" fill="#4ecca3" opacity="0.8" />
    <circle cx="700" cy="500" r="5" fill="#e94560" opacity="0.8" />
    <circle cx="400" cy="50" r="4" fill="#e94560" opacity="0.6" />
    <circle cx="400" cy="550" r="4" fill="#4ecca3" opacity="0.6" />
  </g>
  
  <!-- Center decorative pattern -->
  <g id="center-pattern">
    <circle cx="400" cy="300" r="140" fill="none" stroke="#e94560" stroke-width="2" opacity="0.3" stroke-dasharray="10,5" />
    <circle cx="400" cy="300" r="160" fill="none" stroke="#4ecca3" stroke-width="2" opacity="0.3" stroke-dasharray="8,8" />
  </g>
</svg>