<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Sky -->
  <defs>
    <linearGradient id="skyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#87CEEB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E0F6FF;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="buildingGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E8A87C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D4A574;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="machineGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F0F8FF;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Sky Background -->
  <rect x="0" y="0" width="800" height="500" fill="url(#skyGradient)" />
  
  <!-- Ground/Sidewalk -->
  <rect x="0" y="380" width="800" height="120" fill="#C8B8A6" />
  
  <!-- Road -->
  <rect x="0" y="360" width="800" height="25" fill="#5A5A5A" />
  <line x1="400" y1="360" x2="400" y2="380" stroke="#FFFFFF" stroke-width="2" stroke-dasharray="10,10" />
  
  <!-- University Building (Background) -->
  <g id="university">
    <rect x="50" y="150" width="180" height="220" fill="#D4A574" stroke="#8B4513" stroke-width="2" />
    <rect x="60" y="180" width="50" height="60" fill="#87CEEB" />
    <rect x="120" y="180" width="50" height="60" fill="#87CEEB" />
    <rect x="60" y="260" width="50" height="60" fill="#87CEEB" />
    <rect x="120" Y="260" width="50" height="60" fill="#87CEEB" />
    <polygon points="50,150 140,100 230,150" fill="#8B4513" />
    <text x="100" y="130" font-family="Arial" font-size="12" fill="#FFFFFF" text-anchor="middle" font-weight="bold">UNIVERSITÀ</text>
  </g>
  
  <!-- Laundry Building -->
  <g id="laundry_building" transform="translate(400, 200)">
    <!-- Main Structure -->
    <rect x="0" y="0" width="280" height="200" fill="url(#buildingGradient)" stroke="#8B4513" stroke-width="2" />
    <rect x="10" y="10" width="260" height="180" fill="#F5E6D3" stroke="#D4A574" stroke-width="1" />
    
    <!-- Roof -->
    <polygon points="0,0 140,-30 280,0" fill="#A0522D" />
    
    <!-- Entrance Door -->
    <rect x="110" y="120" width="60" height="80" fill="#8B4513" stroke="#654321" stroke-width="2" />
    <circle cx="155" cy="160" r="3" fill="#FFD700" />
    
    <!-- Large Window -->
    <rect x="20" y="40" width="80" height="60" fill="#87CEEB" stroke="#8B4513" stroke-width="2" />
    <line x1="60" y1="40" x2="60" y2="100" stroke="#8B4513" stroke-width="2" />
    <line x1="20" y1="70" x2="100" y2="70" stroke="#8B4513" stroke-width="2" />
    
    <!-- Sign Board -->
    <rect x="40" y="-35" width="200" height="35" fill="#D4A574" stroke="#654321" stroke-width="2" />
    <text x="140" y="-10" font-family="Arial" font-size="16" fill="#FFFFFF" text-anchor="middle" font-weight="bold">LAUNDRY</text>
    <text x="140" y="5" font-family="Arial" font-size="10" fill="#FFFFFF" text-anchor="middle">SELF-SERVICE</text>
    
    <!-- Payment Sign -->
    <rect x="200" y="140" width="40" height="30" fill="#32CD32" stroke="#006400" stroke-width="1" />
    <text x="220" y="160" font-family="Arial" font-size="8" fill="#FFFFFF" text-anchor="middle">💳</text>
  </g>
  
  <!-- Washing Machines (Inside visible through window) -->
  <g id="washing_machines">
    <g transform="translate(380, 180)">
      <rect x="10" y="30" width="45" height="60" fill="url(#machineGradient)" stroke="#708090" stroke-width="1" />
      <circle cx="32.5" cy="45" r="15" fill="#87CEEB" opacity="0.6" />
      <rect x="20" y="60" width="25" height="15" fill="#FFD700" opacity="0.7" />
      <text x="32.5" y="75" font-family="Arial" font-size="8" text-anchor="middle">🔄</text>
    </g>
    
    <g transform="translate(440, 180)">
      <rect x="10" y="30" width="45" height="60" fill="url(#machineGradient)" stroke="#708090" stroke-width="1" />
      <circle cx="32.5" cy="45" r="15" fill="#87CEEB" opacity="0.6" />
      <rect x="20" y="60" width="25" height="15" fill="#FFD700" opacity="0.7" />
      <text x="32.5" y="75" font-family="Arial" font-size="8" text-anchor="middle">🔄</text>
    </g>
    
    <g transform="translate(500, 180)">
      <rect x="10" y="30" width="45" height="60" fill="url(#machineGradient)" stroke="#708090" stroke-width="1" />
      <circle cx="32.5" cy="45" r="15" fill="#87CEEB" opacity="0.6" />
      <rect x="20" y="60" width="25" height="15" fill="#FFD700" opacity="0.7" />
      <text x="32.5" y="75" font-family="Arial" font-size="8" text-anchor="middle">🔄</text>
    </g>
  </g>
  
  <!-- Drying Machines (Next to washing) -->
  <g id="drying_machines">
    <g transform="translate(380, 260)">
      <rect x="10" y="30" width="45" height="60" fill="url(#machineGradient)" stroke="#708090" stroke-width="1" />
      <circle cx="32.5" cy="45" r="15" fill="#FFA500" opacity="0.6" />
      <rect x="20" y="60" width="25" height="15" fill="#FFD700" opacity="0.7" />
      <text x="32.5" y="75" font-family="Arial" font-size="8" text-anchor="middle">🔥</text>
    </g>
    
    <g transform="translate(440, 260)">
      <rect x="10" y="30" width="45" height="60" fill="url(#machineGradient)" stroke="#708090" stroke-width="1" />
      <circle cx="32.5" cy="45" r="15" fill="#FFA500" opacity="0.6" />
      <rect x="20" y="60" width="25" height="15" fill="#FFD700" opacity="0.7" />
      <text x="32.5" y="75" font-family="Arial" font-size="8" text-anchor="middle">🔥</text>
    </g>
  </g>
  
  <!-- People (Students, Workers, Residents) -->
  <g id="people">
    <!-- Student with backpack -->
    <g transform="translate(280, 390)">
      <circle cx="25" cy="25" r="12" fill="#FFB6C1" />
      <rect x="13" y="37" width="24" height="35" fill="#4169E1" rx="2" />
      <rect x="20" y="42" width="10" height="8" fill="#FFD700" />
      <rect x="15" y="37" width="8" height="30" fill="#8B4513" rx="2" />
      <rect x="27" y="37" width="8" height="30" fill="#8B4513" rx="2" />
      <path d="M15,37 Q10,30 20,28" stroke="#FFB6C1" stroke-width="2" fill="none" />
    </g>
    
    <!-- Worker -->
    <g transform="translate(320, 390)">
      <circle cx="25" cy="25" r="12" fill="#FFDAB9" />
      <rect x="13" y="37" width="24" height="35" fill="#2F4F4F" rx="2" />
      <rect x="18" y="40" width="14" height="8" fill="#FFD700" />
      <rect x="15" y="37" width="8" height="30" fill="#696969" rx="2" />
      <rect x="27" y="37" width="8" height="30" fill="#696969" rx="2" />
      <rect x="10" y="45" width="30" height="20" fill="#4169E1" />
    </g>
    
    <!-- Resident with mobile phone -->
    <g transform="translate(360, 390)">
      <circle cx="25" cy="25" r="12" fill="#FFE4B5" />
      <rect x="13" y="37" width="24" height="35" fill="#8B0000" rx="2" />
      <rect x="18" y="40" width="14" height="8" fill="#FFD700" />
      <rect x="15" y="37" width="8" height="30" fill="#8B4513" rx="2" />
      <rect x="27" y="37" width="8" height="30" fill="#8B4513" rx="2" />
      <rect x="32" y="25" width="8" height="12" fill="#4169E1" stroke="#000" stroke-width="1" />
    </g>
    
    <!-- Person paying -->
    <g transform="translate(480, 390)">
      <circle cx="25" cy="25" r="12" fill="#FFB6C1" />
      <rect x="13" y="37" width="24" height="35" fill="#9932CC" rx="2" />
      <rect x="18" y="40" width="14" height="8" fill="#FFD700" />
      <rect x="15" y="37" width="8" height="30" fill="#8B4513" rx="2" />
      <rect x="27" y="37" width="8" height="30" fill="#8B4513" rx="2" />
      <rect x="35" y="30" width="10" height="8" fill="#32CD32" stroke="#006400" stroke-width="1" />
      <text x="40" y="25" font-family="Arial" font-size="10">💰</text>
    </g>
  </g>
  
  <!-- Payment Method Signs -->
  <g id="payment_signs">
    <!-- Cash Icon -->
    <g transform="translate(520, 250)">
      <rect x="0" y="0" width="40" height="40" fill="#32CD32" stroke="#006400" stroke-width="2" rx="5" />
      <text x="20" y="25" font-family="Arial" font-size="16" text-anchor="middle">💵</text>
    </g>
    
    <!-- Mobile Money Icon -->
    <g transform="translate(570, 250)">
      <rect x="0" y="0" width="40" height="40" fill="#1E90FF" stroke="#0000CD" stroke-width="2" rx="5" />
      <text x="20" y="25" font-family="Arial" font-size="16" text-anchor="middle">📱</text>
    </g>
    
    <!-- Credit Card Icon -->
    <g transform="translate(620, 250)">
      <rect x="0" y="0" width="40" height="40" fill="#FF6347" stroke="#8B0000" stroke-width="2" rx="5" />
      <text x="20" y="25" font-family="Arial" font-size="16" text-anchor="middle">💳</text>
    </g>
  </g>
  
  <!-- Information Panel -->
  <g id="info_panel">
    <rect x="100" y="400" width="200" height="80" fill="#F5DEB3" stroke="#8B4513" stroke-width="2" rx="5" />
    <text x="200" y="425" font-family="Arial" font-size="14" text-anchor="middle" font-weight="bold" fill="#8B4513">SERVIZI</text>
    <text x="200" y="445" font-family="Arial" font-size="11" text-anchor="middle" fill="#000">✓ Lavaggio Automatico</text>
    <text x="200" y="460" font-family="Arial" font-size="11" text-anchor="middle" fill="#000">✓ Asciugatura</text>
    <text x="200" y="475" font-family="Arial" font-size="11" text-anchor="middle" fill="#000">✓ Pagamento Moderno</text>
  </g>
  
  <!-- Decorative Trees -->
  <g id="trees">
    <circle cx="30" cy="350" r="30" fill="#228B22" />
    <rect x="40" y="350" width="15" height="40" fill="#8B4513" />
    
    <circle cx="740" cy="350" r="30" fill="#228B22" />
    <rect x="745" y="350" width="15" height="40" fill="#8B4513" />
  </g>
  
  <!-- Solar Panel (Modern Touch) -->
  <g id="solar_panel" transform="translate(460, 160)">
    <rect x="0" y="-15" width="60" height="35" fill="#4169E1" stroke="#000" stroke-width="1" />
    <line x1="0" y1="-5" x2="60" y2="-5" stroke="#FFFFFF" stroke-width="1" />
    <line x1="0" y1="5" x2="60" y2="5" stroke="#FFFFFF" stroke-width="1" />
    <line x1="0" y1="15" x2="60" y2="15" stroke="#FFFFFF" stroke-width="1" />
  </g>
  
  <!-- Water Drop Icon (Laundry Symbol) -->
  <text x="700" y="150" font-family="Arial" font-size="20" text-anchor="middle">💧</text>
  
  <!-- Cost Savings Indicator -->
  <g id="cost_indicator">
    <rect x="680" y="380" width="80" height="40" fill="#90EE90" stroke="#006400" stroke-width="1" rx="3" />
    <text x="720" y="405" font-family="Arial" font-size="10" text-anchor="middle" fill="#006400" font-weight="bold">⚡ Risparmio</text>
  </g>
</svg>