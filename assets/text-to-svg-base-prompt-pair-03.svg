<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Sky Background -->
  <defs>
    <linearGradient id="skyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#87CEEB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B0E0E6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="mountainGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6B7F93;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2C3E50;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="eagleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3a3a3a;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Sky -->
  <rect id="sky" x="0" y="0" width="800" height="600" fill="url(#skyGradient)" />
  
  <!-- Sun -->
  <circle id="sun" cx="700" cy="100" r="40" fill="#FFD700" opacity="0.9" />
  
  <!-- Distant Mountains -->
  <g id="distant-mountains">
    <path d="M0,500 L150,350 L300,500 Z" fill="url(#mountainGradient)" opacity="0.7" />
    <path d="M250,500 L400,380 L550,500 Z" fill="url(#mountainGradient)" opacity="0.7" />
    <path d="M500,500 L650,400 L800,500 Z" fill="url(#mountainGradient)" opacity="0.7" />
  </g>
  
  <!-- Middle Mountains -->
  <g id="middle-mountains">
    <path d="M0,520 L200,400 L400,520 Z" fill="url(#mountainGradient)" />
    <path d="M350,520 L500,420 L650,520 Z" fill="url(#mountainGradient)" />
    <path d="M600,520 L750,450 L800,520 Z" fill="url(#mountainGradient)" />
  </g>
  
  <!-- Foreground Mountains -->
  <g id="foreground-mountains">
    <path d="M0,550 L250,480 L450,550 Z" fill="#2C3E50" />
    <path d="M400,550 L600,500 L800,550 Z" fill="#1a252f" />
  </g>
  
  <!-- Clouds -->
  <g id="clouds" opacity="0.8">
    <ellipse cx="100" cy="120" rx="60" ry="25" fill="#FFFFFF" />
    <ellipse cx="150" cy="115" rx="50" ry="20" fill="#FFFFFF" />
    <ellipse cx="300" cy="180" rx="80" ry="30" fill="#FFFFFF" />
    <ellipse cx="380" cy="175" rx="70" ry="25" fill="#FFFFFF" />
  </g>
  
  <!-- Eagle -->
  <g id="eagle" transform="translate(600, 150) rotate(-15)">
    <!-- Left Wing -->
    <path d="M0,0 Q-100,-40 -140,-30 L-160,-45 L-120,-35 L-80,-55 L-50,-70" 
          fill="url(#eagleGradient)" stroke="#000000" stroke-width="2" />
    <!-- Right Wing -->
    <path d="M0,0 Q100,-40 140,-30 L160,-45 L120,-35 L80,-55 L50,-70" 
          fill="url(#eagleGradient)" stroke="#000000" stroke-width="2" />
    <!-- Body -->
    <ellipse cx="0" cy="0" rx="20" ry="35" fill="url(#eagleGradient)" stroke="#000000" stroke-width="2" />
    <!-- Head -->
    <circle cx="0" cy="-30" r="15" fill="url(#eagleGradient)" stroke="#000000" stroke-width="2" />
    <!-- Beak -->
    <path d="M0,-35 L10,-42 L0,-48 Z" fill="#FFD700" stroke="#000000" stroke-width="1" />
    <!-- Tail -->
    <path d="M0,35 L-15,50 L0,45 L15,50 Z" fill="url(#eagleGradient)" stroke="#000000" stroke-width="2" />
  </g>
  
  <!-- Ground/Base -->
  <rect id="ground" x="0" y="580" width="800" height="20" fill="#2D4C1E" />
</svg>