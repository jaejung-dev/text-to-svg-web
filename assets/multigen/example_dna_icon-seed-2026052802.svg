<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <!-- Gradient for the DNA strands -->
    <linearGradient id="dnaGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90d9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2c5aa0;stop-opacity:1" />
    </linearGradient>
    
    <!-- Gradient for connection points -->
    <radialGradient id="dotGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#6bb9f0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4a90d9;stop-opacity:1" />
    </radialGradient>
  </defs>
  
  <!-- Left DNA strand curve -->
  <g id="dna-left-strand">
    <path d="M 35,10 C 35,10 25,30 25,50 C 25,70 35,90 35,90" 
          stroke="url(#dnaGradient)" 
          stroke-width="3" 
          fill="none" 
          stroke-linecap="round"/>
    <circle cx="25" cy="30" r="4" fill="url(#dotGradient)"/>
    <circle cx="25" cy="50" r="4" fill="url(#dotGradient)"/>
    <circle cx="25" cy="70" r="4" fill="url(#dotGradient)"/>
  </g>
  
  <!-- Right DNA strand curve -->
  <g id="dna-right-strand">
    <path d="M 65,10 C 65,10 75,30 75,50 C 75,70 65,90 65,90" 
          stroke="url(#dnaGradient)" 
          stroke-width="3" 
          fill="none" 
          stroke-linecap="round"/>
    <circle cx="75" cy="30" r="4" fill="url(#dotGradient)"/>
    <circle cx="75" cy="50" r="4" fill="url(#dotGradient)"/>
    <circle cx="75" cy="70" r="4" fill="url(#dotGradient)"/>
  </g>
  
  <!-- Horizontal connection bars (base pairs) -->
  <g id="dna-base-pairs">
    <line x1="25" y1="30" x2="75" y2="30" 
          stroke="#6bb9f0" 
          stroke-width="2.5" 
          stroke-linecap="round"/>
    <line x1="25" y1="50" x2="75" y2="50" 
          stroke="#6bb9f0" 
          stroke-width="2.5" 
          stroke-linecap="round"/>
    <line x1="25" y1="70" x2="75" y2="70" 
          stroke="#6bb9f0" 
          stroke-width="2.5" 
          stroke-linecap="round"/>
  </g>
  
  <!-- Center decorative line for depth -->
  <line x1="50" y1="10" x2="50" y2="90" 
        stroke="rgba(107, 185, 240, 0.2)" 
        stroke-width="1" 
        stroke-linecap="round"/>
</svg>