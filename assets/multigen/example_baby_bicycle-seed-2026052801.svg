<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Ground/shadow -->
  <ellipse cx="200" cy="255" rx="140" ry="15" fill="#d4d4d4" opacity="0.5"/>
  
  <!-- Bicycle group -->
  <g id="bicycle" transform="translate(0, 10)">
    <!-- Back wheel -->
    <circle cx="100" cy="210" r="40" stroke="#333" stroke-width="6" fill="none"/>
    <circle cx="100" cy="210" r="35" stroke="#999" stroke-width="2" fill="none"/>
    
    <!-- Front wheel -->
    <circle cx="300" cy="210" r="40" stroke="#333" stroke-width="6" fill="none"/>
    <circle cx="300" cy="210" r="35" stroke="#999" stroke-width="2" fill="none"/>
    
    <!-- Frame -->
    <path d="M100 210 L200 130 L300 210" stroke="#e74c3c" stroke-width="8" fill="none"/>
    <line x1="200" y1="130" x2="200" y2="210" stroke="#e74c3c" stroke-width="8"/>
    <line x1="100" y1="210" x2="200" y2="210" stroke="#e74c3c" stroke-width="8"/>
    <line x1="200" y1="210" x2="300" y2="210" stroke="#e74c3c" stroke-width="8"/>
    
    <!-- Handlebars -->
    <path d="M300 210 L300 150 L320 130" stroke="#555" stroke-width="6" fill="none"/>
    <circle cx="320" cy="130" r="8" fill="#555"/>
    
    <!-- Seat post and saddle -->
    <line x1="200" y1="210" x2="200" y2="130" stroke="#555" stroke-width="6"/>
    <ellipse cx="200" cy="130" rx="25" ry="6" fill="#8b5a2b"/>
    
    <!-- Pedals -->
    <circle cx="200" cy="210" r="12" fill="#888"/>
    <rect x="195" y="200" width="10" height="25" fill="#444" rx="3"/>
    <rect x="205" y="225" width="10" height="25" fill="#444" rx="3"/>
  </g>
  
  <!-- Baby group -->
  <g id="baby">
    <!-- Body -->
    <ellipse cx="200" cy="95" rx="25" ry="35" fill="#f1d0cc"/>
    
    <!-- Head -->
    <circle cx="200" cy="55" r="30" fill="#f1d0cc"/>
    
    <!-- Face features -->
    <circle cx="190" cy="50" r="3" fill="#333"/>
    <circle cx="210" cy="50" r="3" fill="#333"/>
    <path d="M195 62 Q200 67 205 62" stroke="#d68b78" stroke-width="2" fill="none"/>
    
    <!-- Hair -->
    <path d="M175 45 Q180 30 200 30 Q220 30 225 45" stroke="#ffd700" stroke-width="6" fill="none"/>
    <circle cx="185" cy="40" r="8" fill="#ffd700"/>
    <circle cx="215" cy="40" r="8" fill="#ffd700"/>
    
    <!-- Arms holding handlebars -->
    <path d="M210 95 L260 80 L280 70" stroke="#f1d0cc" stroke-width="12" fill="none"/>
    
    <!-- Legs on pedals -->
    <path d="M200 130 L190 180 L185 210" stroke="#f1d0cc" stroke-width="12" fill="none"/>
    <path d="M200 130 L210 180 L215 210" stroke="#f1d0cc" stroke-width="12" fill="none"/>
    
    <!-- Shoes -->
    <ellipse cx="185" cy="210" rx="10" ry="6" fill="#e74c3c"/>
    <ellipse cx="215" cy="210" rx="10" ry="6" fill="#e74c3c"/>
    
    <!-- Blush -->
    <ellipse cx="185" cy="60" rx="5" ry="3" fill="#ffb6b6" opacity="0.6"/>
    <ellipse cx="215" cy="60" rx="5" ry="3" fill="#ffb6b6" opacity="0.6"/>
    
    <!-- Helmet -->
    <path d="M175 40 Q200 25 225 40 L230 35 Q200 15 170 35 Z" fill="#e74c3c"/>
    <circle cx="200" cy="25" r="5" fill="#f39c12"/>
    <line x1="200" y1="40" x2="170" y2="35" stroke="#fff" stroke-width="2"/>
    <line x1="200" y1="40" x2="230" y2="35" stroke="#fff" stroke-width="2"/>
  </g>
</svg>