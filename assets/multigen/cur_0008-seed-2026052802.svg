<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Frog Group -->
  <g id="frog">
    <!-- Main Body -->
    <ellipse id="body" cx="100" cy="110" rx="55" ry="60" fill="#4CAF50" stroke="#2E7D32" stroke-width="3" filter="url(#shadow)"/>
    
    <!-- Belly/Pale Area -->
    <ellipse id="belly" cx="100" cy="125" rx="35" ry="40" fill="#A5D6A7"/>
    
    <!-- Left Eye -->
    <g id="left-eye">
      <circle id="left-eye-base" cx="75" cy="85" r="18" fill="#4CAF50" stroke="#2E7D32" stroke-width="3"/>
      <circle id="left-eye-white" cx="75" cy="85" r="12" fill="white"/>
      <circle id="left-eye-pupil" cx="75" cy="85" r="6" fill="#1B5E20"/>
      <circle id="left-eye-gloss" cx="78" cy="82" r="2" fill="white" opacity="0.8"/>
    </g>
    
    <!-- Right Eye -->
    <g id="right-eye">
      <circle id="right-eye-base" cx="125" cy="85" r="18" fill="#4CAF50" stroke="#2E7D32" stroke-width="3"/>
      <circle id="right-eye-white" cx="125" cy="85" r="12" fill="white"/>
      <circle id="right-eye-pupil" cx="125" cy="85" r="6" fill="#1B5E20"/>
      <circle id="right-eye-gloss" cx="128" cy="82" r="2" fill="white" opacity="0.8"/>
    </g>
    
    <!-- Eyelids -->
    <path id="eyelids" d="M 60 85 Q 75 95 90 85 M 110 85 Q 125 95 140 85" 
          fill="none" stroke="#2E7D32" stroke-width="3" stroke-linecap="round"/>
    
    <!-- Mouth -->
    <path id="mouth" d="M 85 135 Q 100 145 115 135" 
          fill="none" stroke="#1B5E20" stroke-width="2.5" stroke-linecap="round"/>
    
    <!-- Cheeks/Nostrils -->
    <circle id="nostril-left" cx="92" cy="100" r="2" fill="#1B5E20"/>
    <circle id="nostril-right" cx="108" cy="100" r="2" fill="#1B5E20"/>
    
    <!-- Left Leg -->
    <ellipse id="left-leg" cx="50" cy="145" rx="18" ry="20" fill="#4CAF50" stroke="#2E7D32" stroke-width="3"/>
    <ellipse id="left-foot" cx="35" cy="158" rx="12" ry="8" fill="#66BB6A"/>
    
    <!-- Right Leg -->
    <ellipse id="right-leg" cx="150" cy="145" rx="18" ry="20" fill="#4CAF50" stroke="#2E7D32" stroke-width="3"/>
    <ellipse id="right-foot" cx="165" cy="158" rx="12" ry="8" fill="#66BB6A"/>
    
    <!-- Spots/Discrimination -->
    <ellipse id="spot-1" cx="80" cy="100" rx="4" ry="3" fill="#8BC34A" opacity="0.6"/>
    <ellipse id="spot-2" cx="120" cy="105" rx="4" ry="3" fill="#8BC34A" opacity="0.6"/>
    <ellipse id="spot-3" cx="95" cy="115" rx="3" ry="2" fill="#8BC34A" opacity="0.6"/>
  </g>
  
  <!-- Pond/Base Shadow -->
  <ellipse id="shadow" cx="100" cy="165" rx="50" ry="8" fill="#000000" opacity="0.15"/>
</svg>