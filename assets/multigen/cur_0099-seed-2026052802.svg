<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Definition of styles -->
  <defs>
    <style type="text/css">
      <![CDATA[
        .shell-base {
          fill: none;
          stroke: #FFFFFF;
          stroke-width: 2.5;
          stroke-linecap: round;
          stroke-linejoin: round;
          vector-effect: non-scaling-stroke;
        }
        .shading-lines {
          stroke: rgba(255, 255, 255, 0.4);
          stroke-width: 1;
          fill: none;
        }
      ]]>
    </style>
  </defs>

  <!-- Background: Soft Denim Texture (represented as solid color for scalability, simulating denim hue) -->
  <rect x="0" y="0" width="800" height="400" fill="#4A6A8A" />

  <!-- Container for all artwork to maintain alignment -->
  <g id="CoastalLineArt" transform="translate(0, 20)">

    <!-- 1. SCALLOP SHELL (Left) -->
    <g id="ScallopShell" transform="translate(180, 220)">
      <!-- Main Outline -->
      <path class="shell-base" d="M -80 60 Q -40 90 0 80 T 80 60 V -10 Q 40 -30 0 -5 T -80 -10 Z" />
      <!-- Ribbing Detail -->
      <path class="shell-base shading-lines" d="M -60 60 Q -25 75 0 68 T 60 60 M -40 60 Q -15 72 0 65 T 40 60 M -20 60 Q -5 68 0 62 T 20 60" />
      <!-- Top Hinge Area -->
      <path class="shell-base shading-lines" d="M -70 -15 Q 0 -35 70 -15" opacity="0.6"/>
    </g>

    <!-- 2. STARFISH (Center Left) -->
    <g id="Starfish" transform="translate(330, 200)">
      <!-- Left Arm -->
      <path class="shell-base" d="M -20 0 L -60 -20 L -20 0 L -60 20 Z" />
      <!-- Bottom-Left Arm -->
      <path class="shell-base" d="M -5 -10 L -25 -45 L 5 -10 L -10 -45 Z" />
      <!-- Center Body -->
      <circle cx="0" cy="-10" r="18" class="shell-base" />
      <!-- Bottom-Right Arm -->
      <path class="shell-base" d="M 5 -10 L 25 -45 L -5 -10 L 10 -45 Z" />
      <!-- Right Arm -->
      <path class="shell-base" d="M 20 0 L 60 -20 L 20 0 L 60 20 Z" />
      <!-- Inner Texture Lines -->
      <line x1="-5" y1="-10" x2="-15" y2="-35" stroke="rgba(255,255,255,0.3)" stroke-width="1" />
      <line x1="5" y1="-10" x2="15" y2="-35" stroke="rgba(255,255,255,0.3)" stroke-width="1" />
    </g>

    <!-- 3. SPIRAL CONCH (Center Right) -->
    <g id="SpiralConch" transform="translate(470, 220)">
      <!-- Main Spiral Body -->
      <path class="shell-base" 
            d="M 0 0 
               c -5 -5, -10 -10, -10 -20 
               c 0 -20, 20 -25, 35 -15
               c 10 8, 15 20, 10 35
               c -5 15 -20 20 -30 10" />
      <!-- The Flared Opening -->
      <path class="shell-base" 
            d="M 25 10 
               l 15 -5 
               l 5 -15 
               l 0 -20 
               l -10 -15
               c -5 -5, -10 -10, -10 -20" />
      <!-- Slight inner contour for depth -->
      <path class="shell-base shading-lines" 
            d="M 0 0 c -5 -5, -10 -10, -10 -20" />
    </g>

    <!-- 4. WHELK SHELL (Right) -->
    <g id="WhelkShell" transform="translate(620, 210)">
      <!-- Overall Shape -->
      <path class="shell-base" 
            d="M -10 -60 
               c -20 0, -30 30, -30 50 
               c 0 40, 30 60, 60 60 
               c 30 0, 50 -20, 50 -50 
               c 0 -15 -10 -30 -25 -40
               l -5 -15
               z" />
      <!-- Spire Details -->
      <path class="shell-base" d="M -10 -60 L 10 -30 L -5 -45 Z" />
      <path class="shell-base" d="M -5 -45 L 15 -15 L 0 -30 Z" />
      <!-- Aperture (Opening) -->
      <path class="shell-base" d="M 40 -20 Q 60 -20 65 0 Q 70 20 45 25 Q 30 28 35 0 Q 38 -15 40 -20" />
      <!-- Ridge on Spire -->
      <path class="shell-base shading-lines" d="M -10 -60 Q 0 -65 10 -60" opacity="0.5" />
    </g>

  </g>
</svg>