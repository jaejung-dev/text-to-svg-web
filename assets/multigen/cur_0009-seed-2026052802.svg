<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Pink gradient for flowers -->
    <linearGradient id="petalGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffb6c1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffc0cb;stop-opacity:1" />
    </linearGradient>
    
    <!-- Soft shadow filter -->
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.1"/>
    </filter>
  </defs>
  
  <!-- Tree trunk group -->
  <g id="trunk" fill="#8b7355">
    <!-- Main trunk -->
    <path d="M95 200 L95 140 Q95 130 100 130 Q105 130 105 140 L105 200 Z" />
    <!-- Branches -->
    <path d="M95 140 Q85 130 70 115 L65 105 M95 140 Q115 130 130 115 L135 105 M95 145 Q90 125 80 100 M95 145 Q110 125 120 100" 
          stroke="#8b7355" stroke-width="3" fill="none" opacity="0.8"/>
  </g>
  
  <!-- Flower clusters group -->
  <g id="flowerClusters" filter="url(#softShadow)">
    <!-- Center cluster -->
    <ellipse cx="100" cy="95" rx="25" ry="20" fill="url(#petalGradient)" opacity="0.9"/>
    
    <!-- Left cluster -->
    <ellipse cx="70" cy="100" rx="18" ry="15" fill="url(#petalGradient)" opacity="0.85"/>
    
    <!-- Right cluster -->
    <ellipse cx="130" cy="100" rx="18" ry="15" fill="url(#petalGradient)" opacity="0.85"/>
    
    <!-- Top small cluster -->
    <ellipse cx="100" cy="80" rx="12" ry="10" fill="url(#petalGradient)" opacity="0.8"/>
  </g>
  
  <!-- Individual petals -->
  <g id="petals" fill="url(#petalGradient)">
    <!-- Falling petals -->
    <ellipse cx="50" cy="70" rx="4" ry="6" transform="rotate(-30 50 70)" opacity="0.6"/>
    <ellipse cx="150" cy="60" rx="4" ry="6" transform="rotate(20 150 60)" opacity="0.6"/>
    <ellipse cx="80" cy="130" rx="3" ry="5" transform="rotate(10 80 130)" opacity="0.5"/>
    <ellipse cx="120" cy="140" rx="3" ry="5" transform="rotate(-15 120 140)" opacity="0.5"/>
    <ellipse cx="60" cy="90" rx="3" ry="4" transform="rotate(45 60 90)" opacity="0.5"/>
    <ellipse cx="140" cy="95" rx="3" ry="4" transform="rotate(-25 140 95)" opacity="0.5"/>
    
    <!-- Small decorative petals on branches -->
    <circle cx="70" cy="105" r="2" opacity="0.7"/>
    <circle cx="130" cy="105" r="2" opacity="0.7"/>
    <circle cx="85" cy="115" r="2" opacity="0.7"/>
    <circle cx="115" cy="115" r="2" opacity="0.7"/>
  </g>
</svg>