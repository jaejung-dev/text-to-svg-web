<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="horseGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3a3a3a;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Horse Head Profile -->
  <g id="horse-logo">
    <!-- Main Body/Silhouette -->
    <path id="horse-head" 
          d="M 85 60 
             C 85 60 75 55 70 52 
             C 65 49 62 45 58 43
             C 55 41 50 42 48 45
             C 46 48 47 52 50 55
             L 58 65
             C 62 68 66 72 68 78
             C 70 84 72 90 74 95
             C 76 100 78 105 82 108
             C 86 111 92 110 95 105
             C 98 100 100 95 102 90
             C 104 85 105 80 106 75
             C 107 70 108 65 108 60
             C 108 55 107 50 105 45
             C 103 40 100 36 95 34
             C 90 32 85 33 85 60 Z"
          fill="url(#horseGradient)" />
    
    <!-- Mane Detail -->
    <path id="mane"
          d="M 85 60 
             Q 90 70 92 80
             Q 94 90 96 100"
          stroke="#1a1a1a"
          stroke-width="2"
          fill="none"
          stroke-linecap="round"/>
    
    <!-- Eye Detail -->
    <ellipse id="eye"
             cx="92"
             cy="58"
             rx="4"
             ry="3"
             fill="#ffffff"
             opacity="0.9"/>
    
    <!-- Nostril/Muzzle Detail -->
    <ellipse id="nostril"
             cx="96"
             cy="68"
             rx="2"
             ry="1.5"
             fill="#1a1a1a"
             opacity="0.6"/>
  </g>
  
  <!-- Subtle Shadow/Base Effect -->
  <ellipse id="shadow"
           cx="100"
           cy="118"
           rx="40"
           ry="8"
           fill="#1a1a1a"
           opacity="0.15"/>
</svg>