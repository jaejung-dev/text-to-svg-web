<svg viewBox="0 0 400 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Green gradient for stem -->
    <linearGradient id="stemGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4ade80;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16a34a;stop-opacity:1" />
    </linearGradient>
    
    <!-- Leaf gradient -->
    <linearGradient id="leafGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#15803d;stop-opacity:1" />
    </linearGradient>
    
    <!-- Pot gradient -->
    <linearGradient id="potGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#92400e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#78350f;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Shadow under pot -->
  <ellipse cx="200" cy="440" rx="120" ry="15" fill="#000000" opacity="0.2"/>
  
  <!-- POTTED BASE GROUP -->
  <g id="pottable">
    <!-- Main pot body -->
    <path d="M 140 440 L 140 280 Q 140 260 200 260 Q 260 260 260 280 L 260 440 Z" 
          fill="url(#potGradient)" stroke="#5c2b0a" stroke-width="2"/>
    
    <!-- Pot rim -->
    <ellipse cx="200" cy="280" rx="70" ry="12" fill="#a16207"/>
    <ellipse cx="200" cy="280" rx="65" ry="8" fill="#ea580c"/>
    
    <!-- Soil level -->
    <ellipse cx="200" cy="285" rx="60" ry="10" fill="#5d4037"/>
  </g>
  
  <!-- PLANT GROWTH GROUP - Will animate upward -->
  <g id="plant-group">
    <!-- GROWING STEM -->
    <line id="stem" x1="200" y1="285" x2="200" y2="285" 
          stroke="url(#stemGradient)" stroke-width="6" stroke-linecap="round"
          class="grow-stem"/>
    
    <!-- STITCH ANIMATION - Stem grows from 0 to 180 pixels -->
    <animate attributeName="y2" values="285;285;465" 
             dur="4s" 
             begin="0s;2s"
             repeatCount="indefinite"
             calcMode="spline"
             keyTimes="0;0.5;1"
             keySplines="0.4 0 0.2 1;0.4 0 1 1"/>
    
    <!-- LEFT LEAF -->
    <ellipse id="leaf-left" cx="170" cy="330" rx="15" ry="35" 
             fill="url(#leafGradient)" transform="rotate(-35 170 330)" 
             class="grow-leaf"/>
    
    <animateTransform attributeName="transform" type="scale" 
                      values="0 0; 1 1"
                      begin="1.5s;2s"
                      dur="0.5s"
                      repeatCount="indefinite"/>
    
    <animate attributeName="cy" values="285;330" 
             dur="4s" 
             begin="0.5s;2s"
             repeatCount="indefinite"/>
    
    <!-- RIGHT LEAF -->
    <ellipse id="leaf-right" cx="230" cy="370" rx="15" ry="35" 
             fill="url(#leafGradient)" transform="rotate(35 230 370)" 
             class="grow-leaf"/>
    
    <animateTransform attributeName="transform" type="scale" 
                      values="0 0; 1 1"
                      begin="2.2s;2s"
                      dur="0.5s"
                      repeatCount="indefinite"/>
    
    <animate attributeName="cy" values="285;370" 
             dur="4s" 
             begin="1s;2s"
             repeatCount="indefinite"/>
    
    <!-- TOP BUD/FLOWER -->
    <circle id="flower" cx="200" cy="285" r="0" 
            fill="#ef4444" 
            class="grow-flower"/>
    
    <animateTransform attributeName="transform" type="scale" 
                      values="0 0; 1 1"
                      begin="2.5s;2s"
                      dur="0.3s"
                      repeatCount="indefinite"/>
    
    <!-- PETALS -->
    <g id="petals">
      <ellipse cx="200" cy="265" rx="8" ry="12" fill="#fca5a5" 
               class="grow-petal"/>
      <animateTransform attributeName="transform" type="scale" 
                        values="0 0; 1 1"
                        begin="3s;2s"
                        dur="0.4s"
                        repeatCount="indefinite"/>
        
      <ellipse cx="200" cy="305" rx="8" ry="12" fill="#fca5a5" 
               class="grow-petal"/>
      <animateTransform attributeName="transform" type="scale" 
                        values="0 0; 1 1"
                        begin="3s;2s"
                        dur="0.4s"
                        repeatCount="indefinite"/>
        
      <ellipse cx="185" cy="285" rx="12" ry="8" fill="#fca5a5" 
               class="grow-petal"/>
      <animateTransform attributeName="transform" type="scale" 
                        values="0 0; 1 1"
                        begin="3s;2s"
                        dur="0.4s"
                        repeatCount="indefinite"/>
        
      <ellipse cx="215" cy="285" rx="12" ry="8" fill="#fca5a5" 
               class="grow-petal"/>
      <animateTransform attributeName="transform" type="scale" 
                        values="0 0; 1 1"
                        begin="3s;2s"
                        dur="0.4s"
                        repeatCount="indefinite"/>
    </g>
    
    <!-- ADDITIONAL SMALLER LEAF (Higher up) -->
    <ellipse id="leaf-upper" cx="165" cy="400" rx="12" ry="30" 
             fill="url(#leafGradient)" transform="rotate(-40 165 400)" 
             display="none"
             class="grow-leaf"/>
    
    <set attributeName="display" to="inline" begin="3s;2s"/>
    <animateTransform attributeName="transform" type="scale" 
                      values="0 0; 1 1"
                      begin="3.5s;2s"
                      dur="0.4s"
                      repeatCount="indefinite"/>
    
    <animate attributeName="cy" values="285;400" 
             dur="4s" 
             begin="1.5s;2s"
             repeatCount="indefinite"/>
  </g>
  
  <!-- SUNSHINE ARROWS (background decoration) -->
  <g id="sunshine" opacity="0.3">
    <line x1="50" y1="50" x2="120" y2="120" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
    <line x1="350" y1="50" x2="280" y2="120" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
    <line x1="100" y1="30" x2="150" y2="80" stroke="#fbbf24" stroke-width="2" stroke-linecap="round"/>
    <line x1="300" y1="30" x2="250" y2="80" stroke="#fbbf24" stroke-width="2" stroke-linecap="round"/>
  </g>
</svg>