<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradient for DNA strands -->
    <linearGradient id="dnaGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A90E2"/>
      <stop offset="100%" style="stop-color:#2E5C8A"/>
    </linearGradient>
    
    <!-- Glow effect for base pairs -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="100" cy="100" r="90" fill="#F5F7FA" stroke="#E1E8ED" stroke-width="2"/>
  
  <!-- Left DNA strand -->
  <path d="M 60 20 Q 60 50 80 70 Q 100 90 80 130 Q 60 150 60 180" 
        fill="none" stroke="url(#dnaGradient)" stroke-width="4" stroke-linecap="round"/>
  
  <!-- Right DNA strand -->
  <path d="M 140 20 Q 140 50 120 70 Q 100 90 120 130 Q 140 150 140 180" 
        fill="none" stroke="url(#dnaGradient)" stroke-width="4" stroke-linecap="round"/>
  
  <!-- Base pairs (rungs) - top half -->
  <line x1="60" y1="35" x2="140" y2="35" stroke="#4A90E2" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
  <line x1="65" y1="60" x2="135" y2="60" stroke="#4A90E2" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
  <line x1="80" y1="85" x2="120" y2="85" stroke="#4A90E2" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
  <line x1="95" y1="100" x2="105" y2="100" stroke="#4A90E2" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
  
  <!-- Base pairs (rungs) - bottom half -->
  <line x1="80" y1="115" x2="120" y2="115" stroke="#4A90E2" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
  <line x1="65" y1="140" x2="135" y2="140" stroke="#4A90E2" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
  <line x1="60" y1="165" x2="140" y2="165" stroke="#4A90E2" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
  
  <!-- Center highlight point -->
  <circle cx="100" cy="100" r="3" fill="#FFFFFF" opacity="0.6"/>
</svg>