<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Frog body group -->
  <g id="frog-body">
    <!-- Main body oval -->
    <ellipse cx="100" cy="130" rx="55" ry="45" fill="#8BC34A" stroke="#689F38" stroke-width="3"/>
    
    <!-- Belly area (lighter) -->
    <ellipse cx="100" cy="135" rx="40" ry="30" fill="#C5E1A5" opacity="0.7"/>
  </g>
  
  <!-- Head group -->
  <g id="frog-head">
    <!-- Head base -->
    <circle cx="100" cy="80" r="45" fill="#7CB342" stroke="#558B2F" stroke-width="3"/>
  </g>
  
  <!-- Eyes group -->
  <g id="frog-eyes">
    <!-- Left eye white -->
    <ellipse cx="80" cy="70" rx="18" ry="20" fill="#FFFFFF" stroke="#33691E" stroke-width="2"/>
    <!-- Right eye white -->
    <ellipse cx="120" cy="70" rx="18" ry="20" fill="#FFFFFF" stroke="#33691E" stroke-width="2"/>
    
    <!-- Left pupil -->
    <ellipse cx="80" cy="72" rx="10" ry="14" fill="#212121" stroke="#000000" stroke-width="1"/>
    <!-- Right pupil -->
    <ellipse cx="120" cy="72" rx="10" ry="14" fill="#212121" stroke="#000000" stroke-width="1"/>
    
    <!-- Eye highlights -->
    <circle cx="76" cy="66" r="4" fill="#FFFFFF" opacity="0.9"/>
    <circle cx="116" cy="66" r="4" fill="#FFFFFF" opacity="0.9"/>
  </g>
  
  <!-- Nostrils -->
  <g id="frog-nostrils">
    <ellipse cx="90" cy="85" rx="3" ry="2" fill="#4CAF50" stroke="#33691E" stroke-width="1"/>
    <ellipse cx="110" cy="85" rx="3" ry="2" fill="#4CAF50" stroke="#33691E" stroke-width="1"/>
  </g>
  
  <!-- Mouth -->
  <g id="frog-mouth">
    <path d="M 90 100 Q 100 110 110 100" fill="none" stroke="#33691E" stroke-width="2" stroke-linecap="round"/>
  </g>
  
  <!-- Forehead details -->
  <g id="forehead-details">
    <path d="M 85 60 Q 100 65 115 60" fill="none" stroke="#558B2F" stroke-width="2" opacity="0.6"/>
  </g>
  
  <!-- Front legs -->
  <g id="frog-front-legs">
    <!-- Left leg -->
    <ellipse cx="55" cy="155" rx="15" ry="20" fill="#689F38" stroke="#33691E" stroke-width="2"/>
    <!-- Right leg -->
    <ellipse cx="145" cy="155" rx="15" ry="20" fill="#689F38" stroke="#33691E" stroke-width="2"/>
  </g>
  
  <!-- Back legs - slightly visible behind body -->
  <g id="frog-back-legs">
    <!-- Left back leg -->
    <ellipse cx="45" cy="165" rx="12" ry="25" fill="#8BC34A" stroke="#558B2F" stroke-width="2"/>
    <!-- Right back leg -->
    <ellipse cx="155" cy="165" rx="12" ry="25" fill="#8BC34A" stroke="#558B2F" stroke-width="2"/>
  </g>
  
  <!-- Texture/spots on skin -->
  <g id="frog-texture">
    <ellipse cx="70" cy="85" rx="5" ry="3" fill="#558B2F" opacity="0.5"/>
    <ellipse cx="130" cy="85" rx="5" ry="3" fill="#558B2F" opacity="0.5"/>
    <ellipse cx="65" cy="120" rx="4" ry="2" fill="#558B2F" opacity="0.4"/>
    <ellipse cx="135" cy="120" rx="4" ry="2" fill="#558B2F" opacity="0.4"/>
  </g>
  
  <!-- Shadow beneath frog -->
  <ellipse cx="100" cy="175" rx="50" ry="10" fill="#000000" opacity="0.2"/>
</svg>