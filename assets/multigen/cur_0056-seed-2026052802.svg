<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Background circle -->
  <circle id="background" cx="50" cy="50" r="48" fill="#FFD93D" stroke="#E6B800" stroke-width="3"/>
  
  <!-- Face base -->
  <circle id="face-base" cx="50" cy="50" r="40" fill="#FFF8DC"/>
  
  <!-- Eyes group -->
  <g id="eyes">
    <!-- Left eye -->
    <ellipse id="left-eye" cx="35" cy="45" rx="5" ry="6" fill="#333"/>
    
    <!-- Right eye -->
    <ellipse id="right-eye" cx="65" cy="45" rx="5" ry="6" fill="#333"/>
  </g>
  
  <!-- Smile mouth -->
  <path id="smile" d="M 35 60 Q 50 75 65 60" fill="none" stroke="#333" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Cheeks for friendliness -->
  <g id="cheeks">
    <ellipse id="left-cheek" cx="28" cy="60" rx="4" ry="3" fill="#FFB6C1" opacity="0.5"/>
    <ellipse id="right-cheek" cx="72" cy="60" rx="4" ry="3" fill="#FFB6C1" opacity="0.5"/>
  </g>
</svg>