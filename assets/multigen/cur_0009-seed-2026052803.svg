<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Pink gradient for blossoms -->
    <linearGradient id="petalGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFB7C5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFA5BD;stop-opacity:1" />
    </linearGradient>
    
    <!-- Darker accent gradient -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E89AC7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D67AA7;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Tree Trunk Base -->
  <g id="tree-trunk">
    <ellipse cx="100" cy="180" rx="25" ry="8" fill="#8B6F47"/>
    <path d="M100 180 L95 150 L105 150 Z" fill="#6D5234"/>
    <rect x="97" y="130" width="6" height="50" fill="#7A5C3B"/>
  </g>
  
  <!-- Main Branches -->
  <g id="branches" stroke="#6D5234" stroke-width="4" stroke-linecap="round" fill="none">
    <path d="M100 150 Q80 130 70 100 T50 70"/>
    <path d="M100 150 Q120 130 130 100 T150 70"/>
    <path d="M100 140 Q90 110 80 85 T60 60"/>
    <path d="M100 140 Q110 110 120 85 T140 60"/>
  </g>
  
  <!-- Secondary Smaller Branches -->
  <g id="small-branches" stroke="#7A5C3B" stroke-width="2" stroke-linecap="round" fill="none">
    <path d="M70 100 Q65 90 60 80"/>
    <path d="M130 100 Q135 90 140 80"/>
    <path d="M50 70 Q48 65 45 60"/>
    <path d="M150 70 Q152 65 155 60"/>
    <path d="M80 85 Q78 80 75 75"/>
    <path d="M120 85 Q122 80 125 75"/>
  </g>
  
  <!-- Cherry Blossom Petals Cluster -->
  <g id="blossoms">
    <!-- Large cluster at top left -->
    <circle cx="60" cy="70" r="8" fill="url(#petalGrad)"/>
    <circle cx="55" cy="75" r="6" fill="url(#petalGrad)"/>
    <circle cx="65" cy="78" r="5" fill="url(#petalGrad)"/>
    <circle cx="58" cy="68" r="7" fill="url(#accentGrad)"/>
    <circle cx="62" cy="72" r="4" fill="url(#petalGrad)"/>
    
    <!-- Large cluster at top right -->
    <circle cx="140" cy="70" r="8" fill="url(#petalGrad)"/>
    <circle cx="145" cy="75" r="6" fill="url(#petalGrad)"/>
    <circle cx="135" cy="78" r="5" fill="url(#petalGrad)"/>
    <circle cx="142" cy="68" r="7" fill="url(#accentGrad)"/>
    <circle cx="138" cy="72" r="4" fill="url(#petalGrad)"/>
    
    <!-- Left middle cluster -->
    <circle cx="45" cy="90" r="7" fill="url(#petalGrad)"/>
    <circle cx="50" cy="95" r="5" fill="url(#petalGrad)"/>
    <circle cx="42" cy="93" r="4" fill="url(#petalGrad)"/>
    <circle cx="48" cy="88" r="6" fill="url(#accentGrad)"/>
    
    <!-- Right middle cluster -->
    <circle cx="155" cy="90" r="7" fill="url(#petalGrad)"/>
    <circle cx="150" cy="95" r="5" fill="url(#petalGrad)"/>
    <circle cx="158" cy="93" r="4" fill="url(#petalGrad)"/>
    <circle cx="152" cy="88" r="6" fill="url(#accentGrad)"/>
    
    <!-- Upper clusters -->
    <circle cx="60" cy="55" r="6" fill="url(#petalGrad)"/>
    <circle cx="70" cy="50" r="5" fill="url(#petalGrad)"/>
    <circle cx="130" cy="50" r="5" fill="url(#petalGrad)"/>
    <circle cx="140" cy="55" r="6" fill="url(#petalGrad)"/>
    
    <!-- Falling petal accents -->
    <ellipse cx="30" cy="100" rx="3" ry="2" fill="#FFC0CB" opacity="0.8" transform="rotate(-15 30 100)"/>
    <ellipse cx="170" cy="110" rx="3" ry="2" fill="#FFC0CB" opacity="0.8" transform="rotate(15 170 110)"/>
    <ellipse cx="85" cy="120" rx="2" ry="1.5" fill="#FFC0CB" opacity="0.7"/>
    <ellipse cx="115" cy="125" rx="2" ry="1.5" fill="#FFC0CB" opacity="0.7"/>
  </g>
</svg>