<svg viewBox="0 0 400 500" xmlns="http://www.w3.org/2000/svg">
  <!-- Define styles -->
  <defs>
    <linearGradient id="potGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8B7355"/>
      <stop offset="50%" style="stop-color:#A68B6C"/>
      <stop offset="100%" style="stop-color:#8B7355"/>
    </linearGradient>
    <radialGradient id="soilGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#5D4037"/>
      <stop offset="100%" style="stop-color:#3E2723"/>
    </radialGradient>
    <linearGradient id="stemGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#81C784"/>
      <stop offset="100%" style="stop-color:#4CAF50"/>
    </linearGradient>
    <linearGradient id="leafGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#66BB6A"/>
      <stop offset="100%" style="stop-color:#388E3C"/>
    </linearGradient>
  </defs>
  
  <!-- Shadows -->
  <ellipse cx="200" cy="480" rx="120" ry="15" fill="#000000" opacity="0.2"/>
  
  <!-- Pot Group -->
  <g id="pottable" transform-origin="200 400">
    <!-- Pot Body -->
    <path d="M140 400 Q140 460 200 480 Q260 460 260 400 Z" 
          fill="url(#potGradient)" stroke="#6D4C41" stroke-width="2"/>
    
    <!-- Pot Rim -->
    <ellipse cx="200" cy="400" rx="65" ry="18" fill="#8D6E63" stroke="#5D4037" stroke-width="2"/>
    <ellipse cx="200" cy="400" rx="55" ry="12" fill="#5D4037"/>
    
    <!-- Decorative Line on Pot -->
    <ellipse cx="200" cy="430" rx="50" ry="8" fill="none" stroke="#D7CCC8" stroke-width="2"/>
  </g>
  
  <!-- Soil -->
  <ellipse cx="200" cy="400" rx="55" ry="12" fill="url(#soilGradient)">
    <animate attributeName="opacity" values="0.9;0.8;0.9" dur="2s" repeatCount="indefinite"/>
  </ellipse>
  
  <!-- Stem Group (starts hidden and grows) -->
  <g id="plantGrowth" transform-origin="200 400">
    <!-- Stem -->
    <path id="stem" 
          d="M200 400 Q200 350 200 300 T200 200" 
          fill="none" 
          stroke="url(#stemGradient)" 
          stroke-width="8"
          stroke-linecap="round"
          opacity="0">
      <animate attributeName="d" 
               values="M200 400; M200 400 Q200 350 200 300; M200 400 Q200 350 200 300 T200 200" 
               keyTimes="0;0.5;1" 
               dur="4s"
               calcMode="spline"
               keySplines="0.42 0 0.58 1; 0.42 0 0.58 1" 
               repeatCount="0"/>
      <animate attributeName="stroke-width" values="4;8;8" dur="4s" repeatCount="0"/>
    </path>
    
    <!-- Left Leaf 1 -->
    <ellipse id="leaf1L" cx="190" cy="320" rx="30" ry="12" fill="url(#leafGradient)" opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="2s" dur="0.5s"/>
      <animateTransform attributeName="transform" type="rotate" values="0 190 320; -5 190 320" dur="3s" repeatCount="indefinite"/>
    </ellipse>
    
    <!-- Right Leaf 1 -->
    <ellipse id="leaf1R" cx="210" cy="315" rx="30" ry="12" fill="url(#leafGradient)" opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="2s" dur="0.5s"/>
      <animateTransform attributeName="transform" type="rotate" values="0 210 315; 5 210 315" dur="3s" repeatCount="indefinite"/>
    </ellipse>
    
    <!-- Left Leaf 2 -->
    <ellipse id="leaf2L" cx="185" cy="260" rx="35" ry="14" fill="url(#leafGradient)" opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="3s" dur="0.5s"/>
      <animateTransform attributeName="transform" type="rotate" values="0 185 260; -8 185 260" dur="4s" repeatCount="indefinite"/>
    </ellipse>
    
    <!-- Right Leaf 2 -->
    <ellipse id="leaf2R" cx="215" cy="255" rx="35" ry="14" fill="url(#leafGradient)" opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="3s" dur="0.5s"/>
      <animateTransform attributeName="transform" type="rotate" values="0 215 255; 8 215 255" dur="4s" repeatCount="indefinite"/>
    </ellipse>
    
    <!-- Top Bud -->
    <circle id="bud" cx="200" cy="180" r="8" fill="#FFAB91" opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="3.5s" dur="0.5s"/>
      <animate attributeName="r" values="5;8;8" dur="3s" repeatCount="indefinite"/>
    </circle>
    
    <!-- Petals Animation -->
    <g id="bloom" opacity="0">
      <ellipse cx="200" cy="160" rx="10" ry="15" fill="#FF7043">
        <animate attributeName="opacity" from="0" to="1" begin="3.5s" dur="0.5s" fill="freeze"/>
        <animate attributeName="ry" values="12;15;12" dur="2s" repeatCount="indefinite"/>
      </ellipse>
      <ellipse cx="215" cy="175" rx="10" ry="15" fill="#FF5722" transform="rotate(45 200 175)">
        <animate attributeName="opacity" from="0" to="1" begin="3.5s" dur="0.5s" fill="freeze"/>
      </ellipse>
      <ellipse cx="185" cy="175" rx="10" ry="15" fill="#FF5722" transform="rotate(-45 200 175)">
        <animate attributeName="opacity" from="0" to="1" begin="3.5s" dur="0.5s" fill="freeze"/>
      </ellipse>
    </g>
  </g>
  
  <!-- Growth Progress Indicator -->
  <g id="progressIndicator" transform="translate(50, 100)">
    <line x1="0" y1="0" x2="0" y2="200" stroke="#BDBDBD" stroke-width="3"/>
    <rect x="-5" y="-5" width="10" height="10" fill="#81C784">
      <animate attributeName="y" 
               from="200" to="-5" 
               begin="0s" dur="4s" 
               calcMode="spline" 
               keySplines="0.42 0 0.58 1; 0.42 0 0.58 1"
               fill="freeze"/>
    </rect>
    <!-- Labels -->
    <text x="15" y="5" font-family="Arial" font-size="12" fill="#666">Stage 1</text>
    <text x="15" y="100" font-family="Arial" font-size="12" fill="#666">Stage 2</text>
    <text x="15" y="195" font-family="Arial" font-size="12" fill="#666">Full Bloom</text>
  </g>
  
  <!-- Time Elapsed Text -->
  <text x="280" y="30" font-family="Arial" font-size="14" fill="#795548">Plant Growth Stage:</text>
  <text x="280" y="50" font-family="Arial" font-size="18" font-weight="bold" fill="#4CAF50" id="stageText">Germinating...</text>
  <animate on="begin" attributeName="fill" values="#4CAF50;#8BC34A;#FF9800" begin="0s;1s;3s" dur="4s" fill="freeze"/>
  
</svg>