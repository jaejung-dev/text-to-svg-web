<svg width="400" height="500" viewBox="0 0 400 500" xmlns="http://www.w3.org/2000/svg">
  <!-- Define gradients and styles -->
  <defs>
    <filter id="faint-texture" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>
  
  <!-- Cream colored rectangular card/base -->
  <rect id="card-base" x="40" y="40" width="320" height="420" fill="#F5E6D3" rx="8"/>
  
  <!-- Muted red scalloped border around the card -->
  <g id="red-scalloped-border">
    <path d="M40 80 L40 420 C40 425 45 425 45 420 L360 420 C360 425 365 425 365 420 L365 80 C365 75 360 75 360 80 L40 80" 
          fill="none" stroke="#B87A7A" stroke-width="4" stroke-linecap="round"/>
    
    <!-- Top edge scallops -->
    <circle cx="70" cy="78" r="5" fill="#B87A7A"/>
    <circle cx="120" cy="78" r="5" fill="#B87A7A"/>
    <circle cx="170" cy="78" r="5" fill="#B87A7A"/>
    <circle cx="220" cy="78" r="5" fill="#B87A7A"/>
    <circle cx="270" cy="78" r="5" fill="#B87A7A"/>
    <circle cx="320" cy="78" r="5" fill="#B87A7A"/>
    
    <!-- Left edge scallops -->
    <circle cx="38" cy="140" r="5" fill="#B87A7A"/>
    <circle cx="38" cy="200" r="5" fill="#B87A7A"/>
    <circle cx="38" cy="260" r="5" fill="#B87A7A"/>
    <circle cx="38" cy="320" r="5" fill="#B87A7A"/>
    
    <!-- Right edge scallops -->
    <circle cx="363" cy="140" r="5" fill="#B87A7A"/>
    <circle cx="363" cy="200" r="5" fill="#B87A7A"/>
    <circle cx="363" cy="260" r="5" fill="#B87A7A"/>
    <circle cx="363" cy="320" r="5" fill="#B87A7A"/>
    
    <!-- Bottom edge scallops -->
    <circle cx="100" cy="422" r="5" fill="#B87A7A"/>
    <circle cx="170" cy="422" r="5" fill="#B87A7A"/>
    <circle cx="240" cy="422" r="5" fill="#B87A7A"/>
    <circle cx="310" cy="422" r="5" fill="#B87A7A"/>
  </g>
  
  <!-- Bright yellow scalloped element overlapping at bottom right -->
  <g id="yellow-scalloped-overlap">
    <path d="M290 320 L290 420 C290 425 295 425 295 420 L365 420 C365 425 370 425 370 420 L370 350 Z" 
          fill="#FFE658" opacity="0.95"/>
    
    <!-- Yellow scallops -->
    <circle cx="315" cy="422" r="5" fill="#FFE658"/>
    <circle cx="345" cy="422" r="5" fill="#FFE658"/>
    <circle cx="315" cy="350" r="5" fill="#FFE658"/>
    <circle cx="345" cy="350" r="5" fill="#FFE658"/>
  </g>
  
  <!-- Small purple line near yellow element -->
  <line id="purple-accent-line" x1="285" y1="380" x2="305" y2="395" 
        stroke="#8B7BAF" stroke-width="2" opacity="0.8"/>
  
  <!-- Subtle crease texture lines on top right of cream surface -->
  <g id="surface-texture-lines" filter="url(#faint-texture)">
    <line x1="240" y1="70" x2="280" y2="90" stroke="#6B5D7C" stroke-width="1.5" opacity="0.15"/>
    <line x1="250" y1="65" x2="290" y2="85" stroke="#6B5D7C" stroke-width="1.5" opacity="0.12"/>
  </g>
</svg>