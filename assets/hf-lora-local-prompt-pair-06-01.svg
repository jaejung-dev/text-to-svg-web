<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 120" width="500" height="120">
  <!-- Definitions for Gradients and Filters -->
  <defs>
    <!-- Gradient for the Ghostly fade effect -->
    <linearGradient id="ghostGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00AEEF;stop-opacity:1" />
      <stop offset="80%" style="stop-color:#00AEEF;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#00AEEF;stop-opacity:0" />
    </linearGradient>

    <!-- Subtle Glow Filter for the Vector part -->
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur" />
      <feMerge>
        <feMergeNode in="coloredBlur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Logo Icon Group -->
  <g id="logo-icon" transform="translate(20, 45)">
    <!-- Geometric Triangle Shape -->
    <polygon points="0,60 100,0 100,100" fill="url(#ghostGradient)" stroke="#00AEEF" stroke-width="2" />
    <!-- Inner Detail Point for Tech Feel -->
    <circle cx="40" cy="30" r="3" fill="#FFFFFF" opacity="0.8" />
    <line x1="40" y1="30" x2="60" y2="50" stroke="#FFFFFF" stroke-width="1" opacity="0.6" />
  </g>

  <!-- Logo Text Group -->
  <g id="logo-text" transform="translate(120, 90)">
    <!-- "Ghost" Text: Ethereal, lighter weight -->
    <text x="0" y="0" font-family="Arial, Helvetica, sans-serif" font-size="42" font-weight="300" fill="#CCCCCC" font-style="italic">
      Ghost
    </text>
    <!-- "Vector" Text: Solid, bold, tech accent -->
    <text x="60" y="0" font-family="Arial, Helvetica, sans-serif" font-size="42" font-weight="700" fill="#00AEEF" filter="url(#softGlow)">
      Vector
    </text>
  </g>
</svg>