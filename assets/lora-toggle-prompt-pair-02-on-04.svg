<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <!-- Background circle -->
  <circle cx="64" cy="64" r="60" fill="#E8F4FD" stroke="#3B82F6" stroke-width="3"/>
  
  <!-- Shield/Protection element -->
  <path d="M64 28 C40 28 24 42 24 60 C24 80 36 98 56 108 L64 112 L72 108 C92 98 104 80 104 60 C104 42 88 28 64 28 Z" fill="#3B82F6" opacity="0.3"/>
  
  <!-- Main shield -->
  <path d="M64 32 C44 32 30 45 30 62 C30 80 41 95 58 104 L64 107 L70 104 C87 95 98 80 98 62 C98 45 84 32 64 32 Z" fill="#2563EB" stroke="#1E40AF" stroke-width="2"/>
  
  <!-- Lock symbol -->
  <g id="lock">
    <!-- Lock body -->
    <rect x="56" y="72" width="16" height="18" rx="2" fill="#F59E0B" stroke="#D97706" stroke-width="2"/>
    <!-- Lock shackle -->
    <path d="M60 72 C60 64 66 60 64 56 C64 60 70 64 70 72" fill="none" stroke="#F59E0B" stroke-width="3"/>
    <!-- Keyhole -->
    <circle cx="64" cy="81" r="3" fill="#1E293B"/>
    <rect x="63" y="84" width="2" height="4" fill="#1E293B"/>
  </g>
  
  <!-- Document/File icon behind shield -->
  <g id="document" opacity="0.6">
    <rect x="38" y="40" width="52" height="48" rx="4" fill="#FFFFFF" stroke="#3B82F6" stroke-width="2"/>
    <path d="M46 48 L82 48 L82 80 L46 80 Z" fill="#DBEAFE"/>
    <line x1="50" y1="55" x2="78" y2="55" stroke="#3B82F6" stroke-width="2"/>
    <line x1="50" y1="62" x2="78" y2="62" stroke="#3B82F6" stroke-width="2"/>
    <line x1="50" y1="69" x2="70" y2="69" stroke="#3B82F6" stroke-width="2"/>
  </g>
  
  <!-- Arrows indicating transfer -->
  <g id="transfer" opacity="0.7">
    <path d="M112 64 L104 64" stroke="#2563EB" stroke-width="2" marker-end="url(#arrowhead)"/>
    <path d="M16 64 L24 64" stroke="#2563EB" stroke-width="2" marker-end="url(#arrowhead)"/>
  </g>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrowhead" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <polygon points="0 0, 6 3, 0 6" fill="#2563EB"/>
    </marker>
  </defs>
  
  <!-- DLP text label (small) -->
  <text x="64" y="118" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#1E40AF" text-anchor="middle">DLP</text>
</svg>