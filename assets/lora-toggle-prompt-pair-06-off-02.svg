<svg viewBox="0 0 600 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradient for the fading ghost effect -->
    <linearGradient id="fadeGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFFFFF;stop-opacity:0" />
    </linearGradient>
    
    <!-- Simple glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- BACKGROUND GROUP (Optional - transparent by default, added a subtle dark rect for contrast in preview) -->
  <rect width="100%" height="100%" fill="#f0f0f0" />

  <!-- LOGO ICON GROUP -->
  <g id="icon" transform="translate(50, 50)">
    
    <!-- The "Ghost" Trail (Dissolving part) -->
    <!-- Using a dashed stroke with transparency -->
    <path d="M 100 30 L 220 30 L 230 10" fill="none" stroke="#FFFFFF" stroke-width="4" stroke-dasharray="10 10" stroke-opacity="0.3" stroke-linecap="round"/>
    <path d="M 100 100 L 220 100 L 230 90" fill="none" stroke="#FFFFFF" stroke-width="4" stroke-dasharray="10 10" stroke-opacity="0.3" stroke-linecap="round"/>
    <path d="M 100 65 L 220 65 L 230 65" fill="none" stroke="#FFFFFF" stroke-width="3" stroke-dasharray="8 8" stroke-opacity="0.3" stroke-linecap="round"/>
    
    <!-- The Solid Vector Structure -->
    <!-- Main thick body -->
    <path d="M 0 25 L 100 25 L 110 0 L 120 65 L 110 130 L 100 105 L 0 105 Z" fill="#1a1a1a" stroke="#FFFFFF" stroke-width="2" stroke-linejoin="round" />
    
    <!-- The Solid Leading Edge -->
    <path d="M 120 65 L 130 15 L 140 65 Z" fill="#FFFFFF" stroke="#FFFFFF" stroke-width="2" />

    <!-- The Ghosting Nodes (Dots trailing off) -->
    <circle cx="150" cy="15" r="3" fill="#FFFFFF" fill-opacity="0.2" />
    <circle cx="165" cy="15" r="2" fill="#FFFFFF" fill-opacity="0.1" />
    <circle cx="150" cy="115" r="3" fill="#FFFFFF" fill-opacity="0.2" />
    <circle cx="165" cy="115" r="2" fill="#FFFFFF" fill-opacity="0.1" />
  </g>

  <!-- LOGO TEXT GROUP -->
  <g id="text" transform="translate(200, 120)">
    <!-- "Ghost" text - slightly lighter weight and transparent -->
    <text x="0" y="0" font-family="Arial, Helvetica, sans-serif" font-size="40" font-weight="300" fill="#FFFFFF" letter-spacing="2">GHOST</text>
    
    <!-- "Vector" text - bold, solid -->
    <text x="100" y="0" font-family="Arial, Helvetica, sans-serif" font-size="40" font-weight="800" fill="#FFFFFF" letter-spacing="1">VECTOR</text>
  </g>
</svg>