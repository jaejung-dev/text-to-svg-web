<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Checkerboard pattern for frame -->
    <pattern id="checkerboardPattern" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <rect width="20" height="20" fill="#E8DCC4"/>
      <rect width="10" height="10" x="0" y="0" fill="#000000"/>
      <rect width="10" height="10" x="10" y="10" fill="#000000"/>
    </pattern>
  </defs>
  
  <!-- Main frame container -->
  <g id="frame-container">
    
    <!-- Checkerboard border frame -->
    <g id="checkerboard-frame">
      <!-- Outer border with checkerboard pattern -->
      <rect x="0" y="0" width="400" height="50" fill="url(#checkerboardPattern)"/>
      <rect x="0" y="350" width="400" height="50" fill="url(#checkerboardPattern)"/>
      <rect x="0" y="50" width="50" height="300" fill="url(#checkerboardPattern)"/>
      <rect x="350" y="50" width="50" height="300" fill="url(#checkerboardPattern)"/>
      
      <!-- Inner corner details -->
      <rect x="0" y="0" width="50" height="50" fill="url(#checkerboardPattern)"/>
      <rect x="350" y="0" width="50" height="50" fill="url(#checkerboardPattern)"/>
      <rect x="0" y="350" width="50" height="50" fill="url(#checkerboardPattern)"/>
      <rect x="350" y="350" width="50" height="50" fill="url(#checkerboardPattern)"/>
    </g>
    
    <!-- Central transparent display area -->
    <g id="central-content-area">
      <rect x="50" y="50" width="300" height="300" fill="none" stroke="#000000" stroke-width="2" stroke-opacity="0.3"/>
    </g>
    
    <!-- Vibrant light yellow diamond in bottom left corner -->
    <g id="yellow-diamond">
      <polygon points="70,380 30,320 90,260 150,320" fill="#FFD700" stroke="#FFC107" stroke-width="2" opacity="0.9"/>
      <!-- Diamond inner highlight -->
      <polygon points="90,320 70,340 90,360 110,340" fill="#FFEB3B" opacity="0.4"/>
    </g>
    
    <!-- Decorative border line -->
    <g id="border-accent">
      <rect x="3" y="3" width="394" height="394" fill="none" stroke="#8B7355" stroke-width="1" stroke-opacity="0.5"/>
    </g>
  </g>
</svg>