<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <!-- Base Floor Gradient (Dark Tile) -->
    <radialGradient id="floorGradient" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#1a1515" />
      <stop offset="100%" stop-color="#0a0505" />
    </radialGradient>
    
    <!-- Rug Base Gradient (Crimson) -->
    <radialGradient id="rugBaseGradient" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#7d0a0a" />
      <stop offset="100%" stop-color="#380000" />
    </radialGradient>

    <!-- Gold Accent Gradient -->
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffecd1" />
      <stop offset="50%" stop-color="#d4af37" />
      <stop offset="100%" stop-color="#8a6e2e" />
    </linearGradient>

    <!-- Pattern: Geometric Borders -->
    <pattern id="borderPattern" patternUnits="userSpaceOnUse" width="4" height="4">
      <rect width="4" height="4" fill="#2b0000" />
      <circle cx="2" cy="2" r="1" fill="#d4af37" opacity="0.8"/>
    </pattern>

    <!-- Overlay: Subtle Lighting/Vignette -->
    <radialGradient id="vignette" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="60%" stop-color="#000000" stop-opacity="0" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0.6" />
    </radialGradient>
  </defs>

  <!-- 1. The Floor (Base) -->
  <rect x="0" y="0" width="64" height="64" fill="url(#floorGradient)" />
  
  <!-- 2. The Main Rug -->
  <rect x="2" y="2" width="60" height="60" rx="1" fill="url(#rugBaseGradient)" stroke="#0f0000" stroke-width="0.5" />
  
  <!-- 3. Ornate Border -->
  <g id="border-elements">
    <!-- Thick Gold Outline -->
    <rect x="3" y="3" width="58" height="58" fill="none" stroke="url(#goldGradient)" stroke-width="2" opacity="0.8" />
    <rect x="4" y="4" width="56" height="56" fill="none" stroke="#2b0000" stroke-width="1" />
    
    <!-- Corner Accents (Quarter Circle Medallions) -->
    <g transform="translate(3, 3)">
      <path d="M0,56 Q19,56 19,37" fill="none" stroke="url(#goldGradient)" stroke-width="0.5" opacity="0.6" />
      <circle cx="0" cy="56" r="8" fill="none" stroke="#4a0000" stroke-width="1" />
    </g>
    <g transform="translate(61, 3)">
      <path d="M0,56 Q-19,56 -19,37" fill="none" stroke="url(#goldGradient)" stroke-width="0.5" opacity="0.6" />
      <circle cx="0" cy="56" r="8" fill="none" stroke="#4a0000" stroke-width="1" />
    </g>
    <g transform="translate(3, 61)">
      <path d="M0,56 Q19,56 19,37" fill="none" stroke="url(#goldGradient)" stroke-width="0.5" opacity="0.6" />
      <circle cx="0" cy="56" r="8" fill="none" stroke="#4a0000" stroke-width="1" />
    </g>
    <g transform="translate(61, 61)">
      <path d="M0,56 Q-19,56 -19,37" fill="none" stroke="url(#goldGradient)" stroke-width="0.5" opacity="0.6" />
      <circle cx="0" cy="56" r="8" fill="none" stroke="#4a0000" stroke-width="1" />
    </g>
  </g>

  <!-- 4. Central Medallion (The "Executive" Focus) -->
  <g id="central-medallion" transform="translate(32, 32)">
    <!-- Main Star Shape -->
    <polygon points="0,0 -10,-5 -12,-15 0,-22 12,-15 10,-5 0,0 10,5 12,15 0,22 -12,15 -10,5" 
             fill="#4a0000" stroke="url(#goldGradient)" stroke-width="1" />
    
    <!-- Inner Geometric Layer -->
    <polygon points="0,0 -4,-2 -5,-8 0,-12 5,-8 4,-2 0,0 4,2 5,8 0,12 -5,8 -4,2" 
             fill="#660000" />
             
    <!-- Center Dot (Crown Jewel) -->
    <circle r="3" fill="url(#goldGradient)" filter="url(#glow)"/>
    <circle r="1" fill="#fff" opacity="0.8" />
    
    <!-- Connecting Lines (The "Noir" Web) -->
    <path d="M-25,0 L25,0 M0,-25 L0,25" stroke="#2b0000" stroke-width="0.5" />
  </g>

  <!-- 5. Interior Field Pattern (Subtle Persian Influence) -->
  <g id="field-pattern" opacity="0.3">
    <path d="M32,15 L34,25 L30,25 Z" fill="#d4af37" />
    <path d="M32,49 L30,39 L34,39 Z" fill="#d4af37" />
    <path d="M15,32 L25,30 L25,34 Z" fill="#d4af37" />
    <path d="M49,32 L39,34 L39,30 Z" fill="#d4af37" />
  </g>

  <!-- 6. Lighting Overlay (Cyberpunk Atmospheric) -->
  <rect x="0" y="0" width="64" height="64" fill="url(#vignette)" pointer-events="none" />
  
  <!-- Holographic Sheen Reflection (Diagonal) -->
  <path d="M0,64 L20,44 L24,48 L0,64 Z" fill="white" opacity="0.05" style="mix-blend-mode: overlay;" />
  <path d="M0,64 L15,49 L18,52 L0,64 Z" fill="white" opacity="0.05" style="mix-blend-mode: overlay;" />

</svg>