<svg viewBox="0 0 200 250" xmlns="http://www.w3.org/2000/svg">
  <!-- Definitions for reusable styles -->
  <defs>
    <style>
      .ham-outline { fill: #FFFFFF; stroke: #000000; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; }
      .ham-texture { fill: none; stroke: #000000; stroke-width: 2; }
      .ham-detail { fill: #FFFFFF; stroke: #000000; stroke-width: 3; }
    </style>
  </defs>

  <!-- Main Ham Body and Top Outline -->
  <g id="ham-structure">
    <!-- Tapered Body Shape -->
    <path class="ham-outline" d="M 100 230 L 70 130 L 40 90 C 40 50, 160 50, 160 90 L 130 130 Z" />
    
    <!-- Top Cross-Section Ellipse -->
    <ellipse class="ham-outline" cx="100" cy="90" rx="60" ry="25" />
  </g>

  <!-- Scoring/Netting Pattern (Grid) -->
  <g id="ham-grid" class="ham-texture">
    <!-- Diagonal Lines Left -->
    <path d="M 60 140 L 90 200" />
    <path d="M 55 120 L 85 180" />
    <path d="M 50 100 L 80 160" />
    
    <!-- Diagonal Lines Right -->
    <path d="M 140 140 L 110 200" />
    <path d="M 145 120 L 115 180" />
    <path d="M 150 100 L 120 160" />
    
    <!-- Crossing Diagonals for Diamond Effect -->
    <path d="M 80 140 L 110 200" />
    <path d="M 75 120 L 105 180" />
    <path d="M 70 100 L 100 160" />
  </g>

  <!-- Cross-Section Internal Details -->
  <g id="ham-cross-section" class="ham-detail">
    <!-- Small Central Circle (Bone) -->
    <circle cx="100" cy="90" r="12" />
    
    <!-- Larger Irregular Shape 1 (Meat Texture Left) -->
    <path d="M 90 80 Q 75 85 80 95 Q 70 100 85 105 Q 95 100 95 85 Z" />
    
    <!-- Larger Irregular Shape 2 (Meat Texture Right) -->
    <path d="M 110 80 Q 125 85 120 95 Q 130 100 115 105 Q 105 100 105 85 Z" />
  </g>
</svg>