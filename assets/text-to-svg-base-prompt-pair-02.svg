<svg viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Circle -->
  <g id="background">
    <circle cx="64" cy="64" r="58" fill="#1e3a5f"/>
    <circle cx="64" cy="64" r="52" fill="#2563eb" opacity="0.15"/>
  </g>

  <!-- Shield/Security Icon -->
  <g id="shield" transform="translate(64, 64)">
    <path d="M0 -24 C -14 -24 -24 -14 -24 0 C -24 18 -8 28 0 32 C 8 28 24 18 24 0 C 24 -14 14 -24 0 -24 Z" 
          fill="#10b981" stroke="#059669" stroke-width="2"/>
  </g>

  <!-- File Document Icon -->
  <g id="file" transform="translate(64, 64)">
    <path d="M -18 -20 L 10 -20 L 14 -16 L 14 20 L -18 20 Z" 
          fill="white" opacity="0.9"/>
    <path d="M -10 -20 L -10 -16 L 14 -16 L 14 -10" 
          fill="none" stroke="white" stroke-width="1.5"/>
    <line x1="-8" y1="-4" x2="8" y2="-4" stroke="white" stroke-width="1.5"/>
    <line x1="-8" y1="0" x2="8" y2="0" stroke="white" stroke-width="1.5"/>
    <line x1="-8" y1="4" x2="8" y2="4" stroke="white" stroke-width="1.5"/>
  </g>

  <!-- Transfer Arrows (SFTP indicator) -->
  <g id="arrows" transform="translate(64, 64)">
    <!-- Arrow pointing up/right -->
    <path d="M 16 -8 L 24 -16 M 24 -16 L 24 -4 M 24 -16 L 16 -16" 
          fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Arrow pointing down/left -->
    <path d="M -16 8 L -24 16 M -24 16 L -24 4 M -24 16 L -16 16" 
          fill="none" stroke="#60a5fa" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Lock Icon Overlay (DLP Security) -->
  <g id="lock" transform="translate(64, 64)">
    <rect x="-8" y="-12" width="16" height="14" rx="2" fill="#10b981" stroke="#059669" stroke-width="1"/>
    <path d="M -6 -12 L -6 -18 C -6 -22 -2 -22 -2 -18 L -2 -12 Z" 
          fill="none" stroke="#059669" stroke-width="2"/>
    <circle cx="0" cy="-4" r="2" fill="#059669"/>
  </g>
</svg>