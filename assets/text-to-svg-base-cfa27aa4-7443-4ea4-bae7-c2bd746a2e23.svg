<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Checkerboard pattern definition -->
    <pattern id="checkerboard" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <rect x="0" y="0" width="20" height="20" fill="#000000"/>
      <rect x="20" y="0" width="20" height="20" fill="#F5E6D3"/>
      <rect x="0" y="20" width="20" height="20" fill="#F5E6D3"/>
      <rect x="20" y="20" width="20" height="20" fill="#000000"/>
    </pattern>
    
    <!-- Diamond gradient -->
    <linearGradient id="yellowGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFACD;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFD700;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Frame background with checkerboard pattern -->
  <g id="frame-background">
    <rect x="0" y="0" width="600" height="400" fill="#F5E6D3"/>
    <rect x="0" y="0" width="600" height="80" fill="url(#checkerboard)"/>
    <rect x="0" y="320" width="600" height="80" fill="url(#checkerboard)"/>
    <rect x="0" y="80" width="80" height="240" fill="url(#checkerboard)"/>
    <rect x="520" y="80" width="80" height="240" fill="url(#checkerboard)"/>
  </g>
  
  <!-- Central transparent area for content -->
  <g id="content-area">
    <rect x="80" y="80" width="440" height="240" fill="transparent"/>
  </g>
  
  <!-- Light yellow diamond in bottom left corner -->
  <g id="diamond-decoration">
    <polygon points="80,280 120,320 80,360 40,320" fill="url(#yellowGradient)" stroke="#DAA520" stroke-width="2"/>
    <polygon points="120,320 160,280 200,320 160,360" fill="url(#yellowGradient)" stroke="#DAA520" stroke-width="2"/>
    <polygon points="40,320 80,280 120,320 80,360" fill="url(#yellowGradient)" stroke="#DAA520" stroke-width="2"/>
  </g>
  
  <!-- Frame border outline -->
  <g id="frame-border">
    <rect x="40" y="40" width="520" height="320" fill="none" stroke="#DAA520" stroke-width="3"/>
  </g>
</svg>