<svg viewBox="0 0 200 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Background (transparent by default, no fill) -->
  
  <!-- Main Ham Body -->
  <g id="ham-body">
    <path d="M40,50 Q60,30 100,35 Q140,40 160,70 Q180,100 175,180 Q170,260 140,280 Q100,290 60,270 Q30,250 25,180 Q20,100 40,50 Z" 
          fill="white" 
          stroke="black" 
          stroke-width="3" 
          stroke-linecap="round" 
          stroke-linejoin="round"/>
    
    <!-- Bone Connection Line -->
    <line x1="100" y1="35" x2="100" y2="60" 
          stroke="black" 
          stroke-width="2" 
          stroke-linecap="round"/>
  </g>
  
  <!-- Diamond Grid Pattern (Scoring) -->
  <g id="ham-grid-pattern">
    <!-- Top section diamonds -->
    <line x1="50" y1="80" x2="70" y2="70" stroke="black" stroke-width="1.5"/>
    <line x1="50" y1="80" x2="30" y2="90" stroke="black" stroke-width="1.5"/>
    <line x1="70" y1="70" x2="90" y2="80" stroke="black" stroke-width="1.5"/>
    <line x1="90" y1="80" x2="70" y2="90" stroke="black" stroke-width="1.5"/>
    
    <line x1="70" y1="90" x2="90" y2="80" stroke="black" stroke-width="1.5"/>
    <line x1="70" y1="90" x2="50" y2="100" stroke="black" stroke-width="1.5"/>
    <line x1="90" y1="80" x2="110" y2="90" stroke="black" stroke-width="1.5"/>
    <line x1="110" y1="90" x2="90" y2="100" stroke="black" stroke-width="1.5"/>
    
    <!-- Middle section diamonds -->
    <line x1="50" y1="100" x2="70" y2="110" stroke="black" stroke-width="1.5"/>
    <line x1="70" y1="110" x2="90" y2="100" stroke="black" stroke-width="1.5"/>
    <line x1="70" y1="110" x2="50" y2="120" stroke="black" stroke-width="1.5"/>
    <line x1="90" y1="100" x2="110" y2="110" stroke="black" stroke-width="1.5"/>
    <line x1="110" y1="110" x2="90" y2="120" stroke="black" stroke-width="1.5"/>
    
    <!-- Lower section diamonds -->
    <line x1="50" y1="120" x2="70" y2="130" stroke="black" stroke-width="1.5"/>
    <line x1="70" y1="130" x2="90" y2="120" stroke="black" stroke-width="1.5"/>
    <line x1="70" y1="130" x2="50" y2="140" stroke="black" stroke-width="1.5"/>
    <line x1="90" y1="120" x2="110" y2="130" stroke="black" stroke-width="1.5"/>
    <line x1="110" y1="130" x2="90" y2="140" stroke="black" stroke-width="1.5"/>
    
    <!-- Bottom section diamonds -->
    <line x1="50" y1="140" x2="70" y2="150" stroke="black" stroke-width="1.5"/>
    <line x1="70" y1="150" x2="90" y2="140" stroke="black" stroke-width="1.5"/>
    <line x1="70" y1="150" x2="50" y2="160" stroke="black" stroke-width="1.5"/>
    <line x1="90" y1="140" x2="110" y2="150" stroke="black" stroke-width="1.5"/>
    <line x1="110" y1="150" x2="90" y2="160" stroke="black" stroke-width="1.5"/>
  </g>
  
  <!-- Circular End Cross-Section -->
  <g id="ham-cross-section">
    <!-- Outer circle (end of ham) -->
    <circle cx="140" cy="200" r="35" 
            fill="white" 
            stroke="black" 
            stroke-width="2.5"/>
    
    <!-- Central bone circle -->
    <circle cx="140" cy="200" r="8" 
            fill="white" 
            stroke="black" 
            stroke-width="2"/>
    
    <!-- First meat texture irregular shape -->
    <path d="M140,165 Q165,165 160,190 Q155,215 140,215 Q125,215 120,190 Q115,165 140,165 Z" 
          fill="white" 
          stroke="black" 
          stroke-width="1.5" 
          stroke-linecap="round"/>
    
    <!-- Second meat texture irregular shape -->
    <path d="M140,175 Q155,180 152,195 Q148,210 140,210 Q132,210 128,195 Q125,180 140,175 Z" 
          fill="white" 
          stroke="black" 
          stroke-width="1.5" 
          stroke-linecap="round"/>
  </g>
  
  <!-- Netting Lines on Body -->
  <g id="ham-netting">
    <line x1="60" y1="100" x2="65" y2="130" stroke="black" stroke-width="1"/>
    <line x1="80" y1="95" x2="85" y2="125" stroke="black" stroke-width="1"/>
    <line x1="100" y1="90" x2="105" y2="120" stroke="black" stroke-width="1"/>
    <line x1="120" y1="100" x2="125" y2="130" stroke="black" stroke-width="1"/>
    <line x1="65" y1="135" x2="70" y2="165" stroke="black" stroke-width="1"/>
    <line x1="85" y1="130" x2="90" y2="160" stroke="black" stroke-width="1"/>
    <line x1="105" y1="125" x2="110" y2="155" stroke="black" stroke-width="1"/>
    <line x1="125" y1="135" x2="130" y2="165" stroke="black" stroke-width="1"/>
  </g>
</svg>