<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Ham Body -->
  <g id="ham-body" fill="white" stroke="black" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <!-- Main curved shape of ham -->
    <path d="M 60 40 C 40 40 30 60 30 80 C 30 140 50 180 70 180 L 130 180 C 150 180 170 140 170 80 C 170 60 160 40 140 40 Z" />
  </g>

  <!-- Diamond Grid Pattern on Ham Body -->
  <g id="ham-pattern" fill="none" stroke="black" stroke-width="2">
    <!-- Top section diamonds -->
    <path d="M 50 55 L 60 45 L 70 55 L 60 65 Z" />
    <path d="M 70 55 L 80 45 L 90 55 L 80 65 Z" />
    <path d="M 90 55 L 100 45 L 110 55 L 100 65 Z" />
    <path d="M 110 55 L 120 45 L 130 55 L 120 65 Z" />
    
    <!-- Middle section diamonds -->
    <path d="M 45 75 L 55 65 L 65 75 L 55 85 Z" />
    <path d="M 65 75 L 75 65 L 85 75 L 75 85 Z" />
    <path d="M 85 75 L 95 65 L 105 75 L 95 85 Z" />
    <path d="M 105 75 L 115 65 L 125 75 L 115 85 Z" />
    <path d="M 125 75 L 135 65 L 145 75 L 135 85 Z" />
    
    <!-- Bottom section diamonds -->
    <path d="M 50 95 L 60 85 L 70 95 L 60 105 Z" />
    <path d="M 70 95 L 80 85 L 90 95 L 80 105 Z" />
    <path d="M 90 95 L 100 85 L 110 95 L 100 105 Z" />
    <path d="M 110 95 L 120 85 L 130 95 L 120 105 Z" />
    <path d="M 130 95 L 140 85 L 150 95 L 140 105 Z" />
  </g>

  <!-- Circular End Section -->
  <g id="ham-end">
    <!-- Outer circle outline -->
    <circle id="end-circle" cx="160" cy="110" r="30" fill="white" stroke="black" stroke-width="3" />
    
    <!-- Bone (small central circle) -->
    <circle id="bone" cx="160" cy="110" r="6" fill="white" stroke="black" stroke-width="2" />
    
    <!-- Meat texture irregular shapes -->
    <path id="meat-texture-1" d="M 150 95 Q 155 95 160 100 Q 165 95 170 95 Q 170 100 165 105 Q 170 115 160 120 Q 150 115 150 105 Z" fill="white" stroke="black" stroke-width="2" />
    <path id="meat-texture-2" d="M 140 110 Q 145 105 155 105 Q 155 115 145 115 Z" fill="white" stroke="black" stroke-width="2" />
  </g>

  <!-- Rim around the circular end -->
  <circle id="end-rim" cx="160" cy="110" r="30" fill="none" stroke="black" stroke-width="3" />

  <!-- Decorative line at base -->
  <path id="base-line" d="M 70 180 Q 100 190 130 180" fill="none" stroke="black" stroke-width="2" stroke-linecap="round" />
</svg>