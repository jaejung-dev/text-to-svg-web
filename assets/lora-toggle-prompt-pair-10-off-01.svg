<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Laser Beam Gradient -->
    <linearGradient id="laserBeamGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0" />
      <stop offset="50%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00d4ff;stop-opacity:0" />
    </linearGradient>
    
    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="400" fill="#1a1a1a" rx="10" ry="10" />
  
  <!-- Header / Title -->
  <g id="header">
    <rect y="0" width="600" height="50" fill="#252525" />
    <text x="300" y="32" font-family="Arial, sans-serif" font-weight="bold" font-size="20" fill="#ffffff" text-anchor="middle">
      ATOMSTAK P1
    </text>
    <circle cx="580" cy="25" r="8" fill="#4caf50" />
    <text x="592" y="30" font-family="Arial, sans-serif" font-size="12" fill="#ffffff">ONLINE</text>
  </g>

  <!-- Main App Interface Card -->
  <g id="app-interface" transform="translate(50, 80)">
    <!-- Card Background -->
    <rect width="500" height="180" fill="#2d2d2d" rx="8" stroke="#444" />
    
    <!-- Title: Conversion Tool -->
    <text x="250" y="30" font-family="Arial, sans-serif" font-size="14" fill="#888" text-anchor="middle" letter-spacing="2">CONVERTISSEUR DE FICHIERS</text>

    <!-- Step 1: Import Lightburn -->
    <g transform="translate(40, 50)">
      <rect width="140" height="100" fill="#333" rx="5" stroke="#555" stroke-dasharray="4,2"/>
      <text x="70" y="40" font-family="Arial, sans-serif" font-weight="bold" font-size="16" fill="#fff" text-anchor="middle">.LBRN</text>
      <text x="70" y="65" font-family="Arial, sans-serif" font-size="10" fill="#aaa" text-anchor="middle">LIGHTBURN</text>
      <path d="M30 80 h80 v10 h-80 z" fill="#555" />
      <text x="70" y="90" font-family="Arial, sans-serif" font-size="10" fill="#fff" text-anchor="middle">IMPORTER</text>
    </g>

    <!-- Step 2: The Process (Laser Beam) -->
    <g id="laser-processing" transform="translate(200, 110)">
      <!-- Glow effect -->
      <ellipse cx="50" cy="0" rx="100" ry="10" fill="url(#laserBeamGradient)" />
      <!-- Beam Line -->
      <line x1="20" y1="0" x2="80" y2="0" stroke="white" stroke-width="3" opacity="0.5" />
      <line x1="20" y1="0" x2="80" y2="0" stroke="#00d4ff" stroke-width="2" />
      <!-- Laser Head Icon -->
      <path d="M35 -10 L65 -10 L60 10 L40 10 Z" fill="#00d4ff" />
    </g>

    <!-- Step 3: Export SVG -->
    <g transform="translate(320, 50)">
      <rect width="140" height="100" fill="#222" rx="5" stroke="#00d4ff" />
      <text x="70" y="40" font-family="Arial, sans-serif" font-weight="bold" font-size="16" fill="#00d4ff" text-anchor="middle">&lt;/&gt;</text>
      <text x="70" y="65" font-family="Arial, sans-serif" font-size="10" fill="#aaa" text-anchor="middle">SVG VECTORIEL</text>
      <path d="M30 80 h80 v10 h-80 z" fill="#00d4ff" />
      <text x="70" y="90" font-family="Arial, sans-serif" font-size="10" fill="#000" text-anchor="middle">EXPORTER</text>
    </g>
  </g>

  <!-- Machine Bed Representation (Bottom) -->
  <g id="machine-bed" transform="translate(50, 290)">
    <!-- Grid -->
    <defs>
      <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
        <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#333" stroke-width="1"/>
      </pattern>
    </defs>
    <rect width="500" height="50" fill="url(#grid)" />
    
    <!-- Laser Gantry -->
    <rect x="0" y="-10" width="500" height="10" fill="#444" />
    <rect x="200" y="-50" width="100" height="40" fill="#555" /> <!-- Laser Head -->
    <rect x="230" y="-50" width="40" height="20" fill="#00d4ff" opacity="0.3" /> <!-- Laser Window -->
  </g>

</svg>