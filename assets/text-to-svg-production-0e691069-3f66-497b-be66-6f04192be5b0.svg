<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Background: Transparent (default) -->
  
  <!-- Group for the concentric arcs -->
  <g id="concentric-arcs" stroke="#2E86C1" stroke-width="4" fill="none" stroke-linecap="round">
    <!-- Arc 1: Outermost -->
    <path id="arc-1" d="M 50 50 Q 200 250 350 100" />
    
    <!-- Arc 2 -->
    <path id="arc-2" d="M 70 70 Q 200 240 330 115" />
    
    <!-- Arc 3 -->
    <path id="arc-3" d="M 90 90 Q 200 230 310 130" />
    
    <!-- Arc 4 -->
    <path id="arc-4" d="M 110 110 Q 200 220 290 145" />
    
    <!-- Arc 5: Innermost -->
    <path id="arc-5" d="M 130 130 Q 200 210 270 160" />
  </g>
</svg>