<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Define styles -->
  <defs>
    <style>
      .arc { stroke: #4A90E2; stroke-width: 3; fill: none; stroke-linecap: round; }
    </style>
  </defs>
  
  <!-- Background (transparent) -->
  <rect width="400" height="400" fill="transparent"/>
  
  <!-- Concentric Arc Group -->
  <g id="concentric-arcs" transform="translate(200, 200)">
    <!-- Arc 1 (innermost) -->
    <path class="arc" id="arc-1" d="M -80,-120 A 100,100 0 0,1 120,-80" transform="rotate(-30)"/>
    
    <!-- Arc 2 -->
    <path class="arc" id="arc-2" d="M -80,-120 A 130,130 0 0,1 150,-110" transform="rotate(-30)"/>
    
    <!-- Arc 3 -->
    <path class="arc" id="arc-3" d="M -80,-120 A 160,160 0 0,1 180,-140" transform="rotate(-30)"/>
    
    <!-- Arc 4 -->
    <path class="arc" id="arc-4" d="M -80,-120 A 190,190 0 0,1 210,-170" transform="rotate(-30)"/>
    
    <!-- Arc 5 (outermost) -->
    <path class="arc" id="arc-5" d="M -80,-120 A 220,220 0 0,1 240,-200" transform="rotate(-30)"/>
  </g>
  
  <!-- Decorative accent points (optional visual enhancement) -->
  <g id="accent-points" transform="translate(200, 200)" fill="#4A90E2">
    <circle cx="-50" cy="-70" r="2"/>
    <circle cx="50" cy="-60" r="2"/>
    <circle cx="100" cy="-90" r="2"/>
  </g>
</svg>