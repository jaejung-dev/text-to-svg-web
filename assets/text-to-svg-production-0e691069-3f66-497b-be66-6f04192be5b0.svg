<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Define styles for consistent blue arcs -->
  <defs>
    <style>
      .arc {
        stroke: #2563eb;
        stroke-width: 3;
        fill: none;
        stroke-linecap: round;
      }
    </style>
  </defs>
  
  <!-- Concentric fingerprint-like arcs -->
  <g id="fingerprint-arcs">
    <!-- Innermost arc -->
    <path class="arc" d="M 120,280 C 180,300 260,290 320,240 C 340,220 350,190 345,160" />
    
    <!-- Second arc -->
    <path class="arc" d="M 100,260 C 160,280 240,270 300,220 C 320,200 330,170 325,140" />
    
    <!-- Third arc -->
    <path class="arc" d="M 80,240 C 140,260 220,250 280,200 C 300,180 310,150 305,120" />
    
    <!-- Fourth arc -->
    <path class="arc" d="M 70,220 C 130,240 210,230 270,180 C 290,160 300,130 295,100" />
    
    <!-- Fifth arc -->
    <path class="arc" d="M 60,200 C 120,220 200,210 260,160 C 280,140 290,110 285,80" />
    
    <!-- Outermost arc -->
    <path class="arc" d="M 50,180 C 110,200 190,190 250,140 C 270,120 280,90 275,60" />
  </g>
</svg>