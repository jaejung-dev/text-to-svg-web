<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Define the checkerboard pattern -->
  <defs>
    <pattern id="checkerboard" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <rect x="0" y="0" width="40" height="40" fill="white"/>
      <rect x="0" y="0" width="20" height="20" fill="#000000"/>
      <rect x="20" y="20" width="20" height="20" fill="#000000"/>
    </pattern>
    
    <!-- Light beige color -->
    <linearGradient id="beigeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F5E6CA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E8D5B7;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect x="0" y="0" width="600" height="400" fill="#F5F5F5"/>
  
  <!-- Main frame group -->
  <g id="frame">
    <!-- Checkered border frame -->
    <rect x="50" y="50" width="500" height="300" fill="url(#checkerboard)" stroke="#000000" stroke-width="2"/>
    
    <!-- Inner beige border -->
    <rect x="65" y="65" width="470" height="270" fill="url(#beigeGradient)" stroke="#000000" stroke-width="1"/>
  </g>
  
  <!-- Diamond graphic in bottom left -->
  <g id="diamond" transform="translate(60, 290)">
    <polygon points="0,50 25,0 50,50 25,100" fill="#FFD700" stroke="#FFA500" stroke-width="2" opacity="0.95"/>
  </g>
  
  <!-- Transparent central content area -->
  <rect x="75" y="75" width="450" height="250" fill="none" stroke="none"/>
  
  <!-- Content placeholder text -->
  <text x="300" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#999" opacity="0.5">
    Content Display Area
  </text>
</svg>