<svg width="500" height="400" viewBox="0 0 500 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Definitions for the checkerboard pattern -->
  <defs>
    <pattern id="checkerboardPattern" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <!-- Light beige square -->
      <rect x="0" y="0" width="20" height="20" fill="#F5E6C8" />
      <!-- Black square -->
      <rect x="20" y="0" width="20" height="20" fill="#111111" />
      <!-- Black square -->
      <rect x="0" y="20" width="20" height="20" fill="#111111" />
      <!-- Light beige square -->
      <rect x="20" y="20" width="20" height="20" fill="#F5E6C8" />
    </pattern>
  </defs>

  <!-- Background (Transparent by default, but adding a subtle placeholder for visualization) -->
  <rect x="0" y="0" width="500" height="400" fill="none" />

  <!-- Main Frame Group -->
  <g id="frame">
    <!-- Outer Frame Border (Checkerboard Pattern) -->
    <!-- Frame dimensions: Top/Bottom 60px, Left/Right 60px -->
    <!-- Top Bar -->
    <rect x="40" y="20" width="420" height="60" fill="url(#checkerboardPattern)" />
    <!-- Bottom Bar -->
    <rect x="40" y="320" width="420" height="60" fill="url(#checkerboardPattern)" />
    <!-- Left Bar -->
    <rect x="20" y="80" width="60" height="240" fill="url(#checkerboardPattern)" />
    <!-- Right Bar -->
    <rect x="420" y="80" width="60" height="240" fill="url(#checkerboardPattern)" />

    <!-- Inner Content Area (Transparent) -->
    <rect x="80" y="80" width="340" height="240" fill="none" stroke="#111111" stroke-width="2" stroke-dasharray="5,5" />
    <!-- Label indicating transparency/content area -->
    <text x="250" y="200" font-family="Arial, sans-serif" font-size="16" text-anchor="middle" fill="#888" opacity="0.5">Content Area</text>
  </g>

  <!-- Vibrant Light Yellow Diamond Graphic -->
  <!-- Placed in bottom left corner, overlapping the frame -->
  <g id="diamondGraphic" transform="translate(100, 300)">
    <!-- Diamond shape (rotated square) -->
    <polygon points="0,0 40,40 0,80 -40,40" fill="#FFD700" stroke="#DAA520" stroke-width="2" />
    <!-- Internal detail to make it a "graphic" -->
    <polygon points="0,20 20,40 0,60 -20,40" fill="#FFFACD" opacity="0.8" />
    <polygon points="0,25 15,40 0,55 -15,40" fill="#FFD700" />
  </g>
</svg>