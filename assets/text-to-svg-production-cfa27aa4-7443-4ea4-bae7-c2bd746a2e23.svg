<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Checkerboard pattern -->
    <pattern id="checkerboard" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <rect x="0" y="0" width="20" height="20" fill="#1a1a1a"/>
      <rect x="20" y="0" width="20" height="20" fill="#f5e6d3"/>
      <rect x="0" y="20" width="20" height="20" fill="#f5e6d3"/>
      <rect x="20" y="20" width="20" height="20" fill="#1a1a1a"/>
    </pattern>
    
    <!-- Diamond gradient -->
    <linearGradient id="diamondGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff9c4;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#ffeb3b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fdd835;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Frame background -->
  <g id="frame-background">
    <!-- Outer frame border -->
    <rect x="40" y="40" width="520" height="320" fill="url(#checkerboard)"/>
    <!-- Inner border for depth -->
    <rect x="50" y="50" width="500" height="300" fill="none" stroke="#1a1a1a" stroke-width="3"/>
  </g>
  
  <!-- Transparent content area -->
  <g id="content-area">
    <rect x="80" y="80" width="440" height="240" fill="transparent"/>
    <!-- Content placeholder text -->
    <text x="300" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" fill="#999" opacity="0.5">
      Content Area
    </text>
  </g>
  
  <!-- Yellow diamond in bottom left -->
  <g id="decorative-diamond" transform="translate(60, 300)">
    <polygon points="0,-40 35,0 0,40 -35,0" fill="url(#diamondGradient)" opacity="0.9"/>
    <polygon points="0,-38 33,0 0,38 -33,0" fill="none" stroke="#fbc02d" stroke-width="1"/>
  </g>
  
  <!-- Frame corner accents -->
  <g id="corner-accent" transform="translate(40, 40)">
    <path d="M0,20 L20,20 L20,0" fill="none" stroke="#1a1a1a" stroke-width="2"/>
  </g>
  <g id="corner-accent" transform="translate(560, 40)">
    <path d="M0,20 L-20,20 L-20,0" fill="none" stroke="#1a1a1a" stroke-width="2"/>
  </g>
  <g id="corner-accent" transform="translate(40, 360)">
    <path d="M0,-20 L20,-20 L20,0" fill="none" stroke="#1a1a1a" stroke-width="2"/>
  </g>
  <g id="corner-accent" transform="translate(560, 360)">
    <path d="M0,-20 L-20,-20 L-20,0" fill="none" stroke="#1a1a1a" stroke-width="2"/>
  </g>
</svg>