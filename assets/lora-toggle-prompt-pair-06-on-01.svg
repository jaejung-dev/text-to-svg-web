<svg width="250" height="80" viewBox="0 0 250 80" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">GhostVector Logo</title>
  <desc id="desc">A logo combining geometric vector shapes with a fading ghost effect.</desc>
  
  <defs>
    <linearGradient id="ghostGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f2ff" stop-opacity="0" />
      <stop offset="100%" stop-color="#00f2ff" stop-opacity="1" />
    </linearGradient>
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a0eaff" />
      <stop offset="100%" stop-color="#004e92" />
    </linearGradient>
  </defs>

  <g id="logo" transform="translate(0,0)">
    <!-- Icon Group: Geometric Triangle with Ghost Trail -->
    <g id="icon-graphics" transform="translate(40, 40)">
      <!-- Ghost Trail Layer 1 (Furthest Back) -->
      <polygon points="-30,0 -50,-25 -50,25" fill="url(#ghostGradient)" opacity="0.2" />
      
      <!-- Ghost Trail Layer 2 (Middle) -->
      <polygon points="-15,0 -35,-15 -35,15" fill="url(#ghostGradient)" opacity="0.4" />
      
      <!-- Core Vector Element (Solid) -->
      <polygon points="0,0 -20,-10 -20,10" fill="#00f2ff" />
      <line x1="0" y1="0" x2="10" y2="5" stroke="#00f2ff" stroke-width="2" />
      <line x1="0" y1="0" x2="10" y2="-5" stroke="#00f2ff" stroke-width="2" />
    </g>

    <!-- Text Group -->
    <g id="logo-text" transform="translate(100, 50)">
      <!-- "Ghost" - Lighter, stylized -->
      <text id="text-ghost" font-family="Arial, Helvetica, sans-serif" font-weight="300" font-size="32" fill="url(#textGradient)" letter-spacing="1">
        Ghost
      </text>
      <!-- "Vector" - Bolder, solid -->
      <text id="text-vector" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="32" fill="#0077ff" letter-spacing="0.5">
        Vector
      </text>
    </g>
  </g>
</svg>