<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradients for a modern, polished look -->
    <linearGradient id="gradLeft" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0078D7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2B88D8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradRight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E32636;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ED6B26;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradCenter" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFB900;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFDE3E;stop-opacity:1" />
    </linearGradient>
    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="4" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge> 
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/> 
      </feMerge>
    </filter>
  </defs>

  <!-- Background placeholder for clarity -->
  <rect width="512" height="512" fill="#ffffff" />

  <!-- Main Group: The Icon Structure -->
  <g id="basis-logo" filter="url(#dropShadow)">
    
    <!-- Base Group: The three iconic shapes arranged as a foundation -->
    <g id="icon-shapes">
      <!-- Left Shape (Represents Infrastructure/Left Side) -->
      <path id="shape-left" 
            d="M 140 140 L 100 400 L 230 380 L 340 180 L 140 140 Z" 
            fill="url(#gradLeft)" />
            
      <!-- Right Shape (Represents Application/Right Side) -->
      <path id="shape-right" 
            d="M 380 140 L 180 180 L 290 380 L 420 400 L 380 140 Z" 
            fill="url(#gradRight)" />
            
      <!-- Center Shape (Represents the Basis Core/Kernel) -->
      <path id="shape-center" 
            d="M 230 180 L 100 400 L 280 430 L 350 380 L 420 180 L 340 180 L 290 380 L 280 430 L 230 180 Z" 
            fill="url(#gradCenter)" />
    </g>

    <!-- Basis Specific Details: "Support" & "Engineering" Elements -->
    <g id="basis-details">
      <!-- The "Basis" Core: A gear/cog overlaying the center -->
      <g transform="translate(256, 320) scale(0.4)">
        <path d="M 45 0 L 55 0 L 60 10 L 70 10 L 75 20 L 85 20 L 90 30 L 100 35 L 100 50 L 90 55 L 85 65 L 85 75 L 75 80 L 70 90 L 60 90 L 55 100 L 45 100 L 40 90 L 30 90 L 25 80 L 15 75 L 10 65 L 0 60 L 0 45 L 10 40 L 15 30 L 15 20 L 25 15 L 30 5 L 40 0 Z" 
              fill="none" stroke="#FFFFFF" stroke-width="6" stroke-linejoin="round" />
        <circle cx="50" cy="50" r="15" fill="#FFFFFF" />
      </g>
      
      <!-- Connectivity Line: Represents system integration -->
      <path d="M 160 350 Q 256 250 360 350" 
            fill="none" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" opacity="0.8" />

      <!-- Active Indicator: Represents "System Support" / Online Status -->
      <circle cx="256" cy="320" r="8" fill="#00FF88" />
    </g>
    
    <!-- Text: Implicitly requested to remove letters, but "Support" might be visualized via icons. -->
    <!-- Adding subtle foundation blocks at bottom -->
    <path d="M 80 450 H 440 V 480 H 80 Z" fill="#e0e0e0" opacity="0.5" />
  </g>
</svg>