<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- Define SAP Color Palette -->
  <defs>
    <linearGradient id="sapBlueGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0099CC;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#006699;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="sapGreenGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7CB342;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5D8A2E;stop-opacity:1" />
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background Circle -->
  <circle cx="200" cy="200" r="180" fill="#F5F5F5"/>
  
  <!-- Main Shield/Foundation Element (SAP Support Concept) -->
  <g id="foundation-shield" filter="url(#softShadow)">
    <!-- Main shield body - representing protection & support -->
    <path d="M 200 60 L 290 100 L 290 220 C 290 280 240 340 200 340 C 160 340 110 280 110 220 L 110 100 Z" 
          fill="url(#sapBlueGradient)" opacity="0.95"/>
    
    <!-- Inner geometric layers - representing technical foundation -->
    <path d="M 200 90 L 260 115 L 260 195 C 260 240 225 285 200 285 C 175 285 140 240 140 195 L 140 115 Z" 
          fill="url(#sapGreenGradient)" opacity="0.85"/>
    
    <!-- Center support pillar -->
    <rect x="185" y="130" width="30" height="125" rx="3" fill="#FFFFFF" opacity="0.9"/>
    
    <!-- Horizontal connection layers - representing integration -->
    <path d="M 145 150 L 255 150" stroke="#0099CC" stroke-width="8" stroke-linecap="round" opacity="0.9"/>
    <path d="M 150 180 L 250 180" stroke="#7CB342" stroke-width="6" stroke-linecap="round"/>
    <path d="M 155 210 L 245 210" stroke="#0099CC" stroke-width="6" stroke-linecap="round" opacity="0.9"/>
    
    <!-- Top SAP-style rounded shape (without letters) -->
    <ellipse cx="200" cy="85" rx="55" ry="25" fill="#FFFFFF" opacity="0.7"/>
    
    <!-- Connection dots at top - representing system connectivity -->
    <circle cx="165" cy="65" r="6" fill="#0099CC"/>
    <circle cx="200" cy="55" r="6" fill="#0099CC"/>
    <circle cx="235" cy="65" r="6" fill="#0099CC"/>
    
    <!-- Outer glow effect for modern look -->
    <circle cx="200" cy="200" r="175" stroke="#0099CC" stroke-width="2" fill="none" opacity="0.3"/>
  </g>
  
  <!-- Decorative support elements -->
  <g id="support-indicators">
    <!-- Corner accents -->
    <path d="M 120 120 L 130 130" stroke="#7CB342" stroke-width="3" stroke-linecap="round"/>
    <path d="M 280 120 L 270 130" stroke="#7CB342" stroke-width="3" stroke-linecap="round"/>
    <path d="M 120 280 L 130 270" stroke="#7CB342" stroke-width="3" stroke-linecap="round"/>
    <path d="M 280 280 L 270 270" stroke="#7CB342" stroke-width="3" stroke-linecap="round"/>
    
    <!-- Support lines radiating from center -->
    <line x1="200" y1="200" x2="200" y2="80" stroke="#0099CC" stroke-width="2" opacity="0.6"/>
    <line x1="200" y1="200" x2="320" y2="200" stroke="#0099CC" stroke-width="2" opacity="0.6"/>
    <line x1="200" y1="200" x2="200" y2="320" stroke="#0099CC" stroke-width="2" opacity="0.6"/>
    <line x1="200" y1="200" x2="80" y2="200" stroke="#0099CC" stroke-width="2" opacity="0.6"/>
  </g>
  
  <!-- Gear-like support mechanism at bottom -->
  <g id="technical-mechanism">
    <circle cx="200" cy="310" r="12" fill="#0099CC" opacity="0.9"/>
    <circle cx="200" cy="310" r="18" stroke="#7CB342" stroke-width="3" fill="none"/>
  </g>
</svg>