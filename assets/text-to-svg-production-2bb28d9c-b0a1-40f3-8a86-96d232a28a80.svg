<svg viewBox="0 0 400 500" xmlns="http://www.w3.org/2000/svg">
  <!-- Background (transparent - no fill needed) -->
  
  <!-- Character Group -->
  <g id="character">
    <!-- Skin -->
    <g id="skin">
      <!-- Face -->
      <ellipse cx="200" cy="120" rx="45" ry="55" fill="#FFD9B3"/>
      
      <!-- Hair -->
      <path d="M 150 100 Q 150 60 200 60 Q 250 60 250 100 Q 250 80 200 80 Q 150 80 150 100" fill="#333333"/>
      
      <!-- Closed Eyes -->
      <path d="M 175 125 Q 185 120 195 125" stroke="#333333" stroke-width="2" fill="none"/>
      <path d="M 205 125 Q 215 120 225 125" stroke="#333333" stroke-width="2" fill="none"/>
      
      <!-- Smile -->
      <path d="M 185 150 Q 200 165 215 150" stroke="#333333" stroke-width="2" fill="none"/>
      
      <!-- Cheeks (cheerful) -->
      <ellipse cx="170" cy="140" rx="12" ry="8" fill="#FFB6C1" opacity="0.4"/>
      <ellipse cx="230" cy="140" rx="12" ry="8" fill="#FFB6C1" opacity="0.4"/>
    </g>
    
    <!-- Body -->
    <g id="body">
      <!-- Orange Sweater -->
      <ellipse cx="200" cy="190" rx="70" ry="80" fill="#FF8C42"/>
      
      <!-- Teal Blazer -->
      <path d="M 140 170 L 140 280 Q 200 310 260 280 L 260 170 L 220 160 L 180 160 Z" fill="#2B99A6"/>
      
      <!-- Blazer Lapels -->
      <path d="M 180 160 L 180 240 L 200 250 L 220 240 L 220 160" fill="#2B99A6" opacity="0.8"/>
    </g>
    
    <!-- Arms -->
    <g id="arms">
      <!-- Left Arm (holding bag strap) -->
      <path d="M 135 180 Q 120 220 130 280" stroke="#FFD9B3" stroke-width="28" fill="none"/>
      <path d="M 135 180 Q 120 220 130 280" stroke="#333333" stroke-width="5" fill="none"/>
      
      <!-- Right Arm (peace sign) -->
      <path d="M 265 180 Q 285 210 285 260" stroke="#FFD9B3" stroke-width="28" fill="none"/>
      <path d="M 265 180 Q 285 210 285 260" stroke="#333333" stroke-width="5" fill="none"/>
      
      <!-- Peace Hand -->
      <g id="peace-hand">
        <ellipse cx="285" cy="270" rx="15" ry="18" fill="#FFD9B3"/>
        <path d="M 280 255 L 280 240 L 285 240 L 290 255" stroke="#333333" stroke-width="3" fill="none"/>
        <path d="M 290 255 L 300 245 L 305 250 L 295 260" stroke="#333333" stroke-width="3" fill="none"/>
      </g>
    </g>
    
    <!-- Bag Strap -->
    <g id="bag-strap">
      <path d="M 130 165 Q 145 180 155 165" stroke="#333333" stroke-width="8" fill="none"/>
      <circle cx="145" cy="170" r="6" fill="#333333"/>
    </g>
    
    <!-- Legs/Pants -->
    <g id="legs">
      <!-- Black Pants -->
      <path d="M 170 260 L 170 380 L 155 400 L 155 380" stroke="#1A1A1A" stroke-width="25" fill="none"/>
      <path d="M 230 260 L 230 380 L 245 400 L 245 380" stroke="#1A1A1A" stroke-width="25" fill="none"/>
      
      <!-- Cream Shoes -->
      <path d="M 150 395 L 175 400 L 175 415 L 150 410 Z" fill="#FFFDD0"/>
      <path d="M 225 395 L 250 400 L 250 415 L 225 410 Z" fill="#FFFDD0"/>
    </g>
  </g>
</svg>