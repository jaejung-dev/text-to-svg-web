<svg viewBox="0 0 400 500" xmlns="http://www.w3.org/2000/svg">
  <!-- Background (transparent by default, no fill) -->
  
  <!-- Group: Character -->
  <g id="character">
    <!-- Group: Head -->
    <g id="head">
      <!-- Face -->
      <circle id="face" cx="200" cy="120" r="45" fill="#FFE0BD"/>
      
      <!-- Closed Eyes (Happy Smile Lines) -->
      <path id="left-eye" d="M180 115 Q190 110 200 115" stroke="#333333" stroke-width="3" fill="none" stroke-linecap="round"/>
      <path id="right-eye" d="M200 115 Q210 110 220 115" stroke="#333333" stroke-width="3" fill="none" stroke-linecap="round"/>
      
      <!-- Smile -->
      <path id="mouth" d="M185 135 Q200 150 215 135" stroke="#333333" stroke-width="3" fill="none" stroke-linecap="round"/>
    </g>
    
    <!-- Group: Hair -->
    <g id="hair">
      <path id="hair-shape" d="M155 95 Q155 65 200 65 Q245 65 245 95 Q245 85 220 80 Q200 75 180 80 Q155 85 155 95" fill="#2C2418"/>
    </g>
    
    <!-- Group: Body -->
    <g id="body">
      <!-- Bag Strap -->
      <path id="bag-strap" d="M240 130 Q255 160 260 180" stroke="#1A1A1A" stroke-width="4" fill="none"/>
      
      <!-- Blazer -->
      <path id="blazer" d="M140 140 L140 280 Q200 295 260 280 L260 140 Q200 155 140 140 Z" fill="#008B8B"/>
      
      <!-- Sweater -->
      <path id="sweater" d="M165 150 L165 265 Q200 275 235 265 L235 150 Q200 165 165 150 Z" fill="#FF8C42"/>
      
      <!-- Pants -->
      <path id="pants" d="M155 280 L155 400 L175 400 L175 310 Q200 315 225 310 L225 400 L245 400 L245 280 Q200 270 155 280 Z" fill="#1A1A1A"/>
      
      <!-- Shoes -->
      <ellipse id="left-shoe" cx="165" cy="410" rx="25" ry="12" fill="#F5E6C8"/>
      <ellipse id="right-shoe" cx="235" cy="410" rx="25" ry="12" fill="#F5E6C8"/>
    </g>
    
    <!-- Group: Arms and Hands -->
    <g id="arms">
      <!-- Left Arm (Down) -->
      <ellipse id="left-arm" cx="125" cy="200" rx="18" ry="55" fill="#008B8B" transform="rotate(-15 125 200)"/>
      
      <!-- Right Arm (Raised for Peace Sign) -->
      <ellipse id="right-arm" cx="275" cy="160" rx="18" ry="55" fill="#008B8B" transform="rotate(-25 275 160)"/>
      
      <!-- Hand -->
      <circle id="right-hand" cx="300" cy="110" r="22" fill="#FFE0BD"/>
      
      <!-- Peace Sign Fingers -->
      <ellipse id="index-finger" cx="290" cy="100" rx="6" ry="18" fill="#FFE0BD" transform="rotate(-10 290 100)"/>
      <ellipse id="middle-finger" cx="310" cy="100" rx="6" ry="18" fill="#FFE0BD" transform="rotate(10 310 100)"/>
    </g>
  </g>
</svg>