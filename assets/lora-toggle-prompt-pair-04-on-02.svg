<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Define gradients for reuse -->
  <defs>
    <linearGradient id="gradient-primary" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradient-secondary" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f093fb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5576c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradient-accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4facfe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00f2fe;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="3" dy="3" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
    <pattern id="pattern-dots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.5" fill="#ffffff" opacity="0.2"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="#1a1a2e"/>

  <!-- Decorative Circles Background -->
  <g id="decorative-circles" opacity="0.3">
    <circle cx="100" cy="100" r="80" fill="url(#gradient-primary)"/>
    <circle cx="700" cy="150" r="60" fill="url(#gradient-secondary)"/>
    <circle cx="400" cy="500" r="100" fill="url(#gradient-accent)"/>
    <circle cx="750" cy="450" r="40" fill="url(#gradient-primary)"/>
    <circle cx="50" cy="450" r="50" fill="url(#gradient-secondary)"/>
  </g>

  <!-- Main Geometric Design Group -->
  <g id="main-design" transform="translate(100, 100)">
    <!-- Rectangle Frame -->
    <rect x="0" y="0" width="600" height="400" rx="20" fill="#16213e" stroke="url(#gradient-primary)" stroke-width="3" filter="url(#shadow)"/>
    
    <!-- Inner Shapes -->
    <g id="inner-pattern">
      <!-- Top Row Circles -->
      <circle cx="80" cy="80" r="40" fill="url(#gradient-primary)"/>
      <circle cx="300" cy="80" r="40" fill="url(#gradient-secondary)"/>
      <circle cx="520" cy="80" r="40" fill="url(#gradient-accent)"/>
      
      <!-- Middle Row Rectangles -->
      <rect x="50" y="180" width="100" height="60" rx="8" fill="url(#gradient-secondary)" filter="url(#shadow)"/>
      <rect x="250" y="180" width="100" height="60" rx="8" fill="url(#gradient-primary)" filter="url(#shadow)"/>
      <rect x="450" y="180" width="100" height="60" rx="8" fill="url(#gradient-accent)" filter="url(#shadow)"/>
      
      <!-- Bottom Row Triangles -->
      <polygon points="100,300 150,240 200,300" fill="url(#gradient-primary)"/>
      <polygon points="300,300 350,240 400,300" fill="url(#gradient-secondary)"/>
      <polygon points="500,300 550,240 600,300" fill="url(#gradient-accent)"/>
    </g>
    
    <!-- Decorative Lines -->
    <line x1="0" y1="350" x2="600" y2="350" stroke="#ffffff" stroke-width="1" opacity="0.2"/>
    <line x1="0" y1="355" x2="600" y2="355" stroke="#ffffff" stroke-width="1" opacity="0.2"/>
  </g>

  <!-- Floating Elements -->
  <g id="floating-elements" opacity="0.8">
    <circle cx="50" cy="200" r="15" fill="url(#gradient-primary)"/>
    <circle cx="750" cy="400" r="20" fill="url(#gradient-secondary)"/>
    <circle cx="750" cy="100" r="12" fill="url(#gradient-accent)"/>
    <circle cx="50" cy="500" r="18" fill="url(#gradient-primary)"/>
  </g>

  <!-- Pattern Overlay -->
  <rect width="800" height="600" fill="url(#pattern-dots)" opacity="0.5"/>

  <!-- Title Text -->
  <text x="400" y="550" font-family="Arial, sans-serif" font-size="24" fill="#ffffff" text-anchor="middle" opacity="0.8">
    Creative Design
  </text>
</svg>