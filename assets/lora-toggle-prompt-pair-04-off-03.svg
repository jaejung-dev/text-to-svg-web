<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Define gradients -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7b2cbf;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="circleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b6b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffd93d;stop-opacity:1" />
    </linearGradient>
    
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect id="background" x="0" y="0" width="400" height="400" fill="url(#bgGradient)" />
  
  <!-- Geometric shapes group -->
  <g id="geometricShapes" opacity="0.9">
    <!-- Large circle -->
    <circle id="circle1" cx="200" cy="200" r="80" fill="url(#circleGradient)" filter="url(#glow)" opacity="0.8" />
    
    <!-- Triangle -->
    <path id="triangle" d="M 200 80 L 280 220 L 120 220 Z" fill="url(#accentGradient)" opacity="0.7" />
    
    <!-- Square -->
    <rect id="square" x="50" y="50" width="100" height="100" fill="none" stroke="url(#accentGradient)" stroke-width="3" transform="rotate(45 100 100)" opacity="0.6" />
    
    <!-- Rectangle -->
    <rect id="rectangle" x="250" y="250" width="120" height="50" rx="10" fill="url(#accentGradient)" opacity="0.5" />
    
    <!-- Small circles -->
    <circle id="dot1" cx="80" cy="150" r="15" fill="url(#accentGradient)" opacity="0.8" />
    <circle id="dot2" cx="320" cy="120" r="12" fill="url(#circleGradient)" opacity="0.8" />
    <circle id="dot3" cx="350" cy="300" r="18" fill="url(#accentGradient)" opacity="0.8" />
    <circle id="dot4" cx="60" cy="340" r="10" fill="url(#circleGradient)" opacity="0.8" />
  </g>
  
  <!-- Decorative lines -->
  <g id="decorativeLines" opacity="0.4">
    <line id="line1" x1="0" y1="200" x2="400" y2="200" stroke="url(#accentGradient)" stroke-width="1" />
    <line id="line2" x1="200" y1="0" x2="200" y2="400" stroke="url(#accentGradient)" stroke-width="1" />
    <line id="line3" x1="50" y1="50" x2="350" y2="350" stroke="url(#circleGradient)" stroke-width="1" stroke-dasharray="5,5" />
    <line id="line4" x1="350" y1="50" x2="50" y2="350" stroke="url(#circleGradient)" stroke-width="1" stroke-dasharray="5,5" />
  </g>
  
  <!-- Accent elements -->
  <g id="accentElements" opacity="0.9">
    <polygon id="star1" points="200,100 215,140 255,140 225,165 240,200 200,175 160,200 175,165 145,140 185,140" fill="url(#circleGradient)" />
    <path id="wave" d="M 0 300 Q 100 250 200 300 T 400 300" fill="none" stroke="url(#accentGradient)" stroke-width="2" opacity="0.6" />
  </g>
</svg>