<svg width="300" height="300" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Background - Transparent by default -->
  
  <!-- Body/Sweater Group -->
  <g id="body" fill="#ffffff">
    <!-- White sweater body -->
    <ellipse cx="150" cy="230" rx="70" ry="60" fill="#ffffff"/>
    
    <!-- High collar -->
    <path d="M110 140 Q150 160 190 140 L185 210 L115 210 Z" fill="#ffffff"/>
    
    <!-- Black stripe details around neck -->
    <path d="M110 140 Q150 160 190 140" stroke="#000000" stroke-width="4" fill="none"/>
  </g>
  
  <!-- Head Group -->
  <g id="head">
    <!-- Face - light brown skin -->
    <ellipse cx="150" cy="100" rx="50" ry="55" fill="#d4a574"/>
    
    <!-- Short teal-blue hair -->
    <path d="M100 90 Q150 40 200 90 Q200 70 180 60 Q150 35 120 60 Q100 70 100 90 Z" fill="#29b6f6"/>
    
    <!-- Left eye -->
    <ellipse cx="130" cy="95" rx="6" ry="8" fill="#333333"/>
    
    <!-- Right eye -->
    <ellipse cx="170" cy="95" rx="6" ry="8" fill="#333333"/>
    
    <!-- Eyebrows -->
    <path d="M120 85 Q130 82 140 85" stroke="#8d6e63" stroke-width="3" fill="none"/>
    <path d="M160 85 Q170 82 180 85" stroke="#8d6e63" stroke-width="3" fill="none"/>
    
    <!-- Mouth (open) -->
    <path d="M135 120 Q150 135 165 120" stroke="#000000" stroke-width="2" fill="none"/>
    
    <!-- White teeth inside mouth -->
    <path d="M140 120 Q150 128 160 120" fill="#ffffff"/>
    <line x1="145" y1="120" x2="145" y2="125" stroke="#e0e0e0" stroke-width="1"/>
    <line x1="155" y1="120" x2="155" y2="125" stroke="#e0e0e0" stroke-width="1"/>
  </g>
  
  <!-- Arms and Hand -->
  <g id="arms">
    <!-- Left arm/hand -->
    <path d="M80 200 L100 180 L110 170 L95 165 Z" fill="#d4a574"/>
    
    <!-- Right arm/hand holding toothbrush -->
    <path d="M220 200 L200 180 L190 170 L205 165 Z" fill="#d4a574"/>
  </g>
  
  <!-- Toothbrush -->
  <g id="toothbrush" transform="rotate(-30 165 170)">
    <!-- Handle -->
    <rect x="160" y="170" width="8" height="50" rx="2" fill="#000000"/>
    
    <!-- Brush head -->
    <rect x="158" y="165" width="12" height="8" rx="2" fill="#000000"/>
    
    <!-- Bristles -->
    <path d="M158 165 L170 165 L170 162 L158 162 Z" fill="#ffffff"/>
  </g>
</svg>