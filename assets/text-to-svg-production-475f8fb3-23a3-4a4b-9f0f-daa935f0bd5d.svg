<svg width="300" height="300" viewBox="0 0 300 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Group (Transparent) -->
  <g id="background" />

  <!-- Head Group -->
  <g id="head">
    <!-- Face Skin -->
    <path d="M100,80 C100,50 120,40 150,40 C180,40 200,50 200,80 C200,110 190,140 150,160 C110,140 100,110 100,80 Z" fill="#D4A574" />
    
    <!-- Mouth (Open) -->
    <path d="M130,130 Q150,145 170,130 Q150,155 130,130 Z" fill="#F8F8F8" stroke="#E0E0E0" stroke-width="1"/>
    
    <!-- Teeth (White) -->
    <path d="M135,132 Q150,145 165,132 Q150,148 135,132 Z" fill="#FFFFFF" />
    <!-- Upper teeth detail -->
    <path d="M136,133 L136,139 L150,148 L164,139 L164,133" fill="none" stroke="#E0E0E0" stroke-width="0.5"/>
    <!-- Lower teeth detail -->
    <path d="M137,139 Q150,148 163,139" fill="none" stroke="#E0E0E0" stroke-width="0.5"/>

    <!-- Eyes (Simple dots) -->
    <circle cx="135" cy="100" r="6" fill="#333333" />
    <circle cx="165" cy="100" r="6" fill="#333333" />
    
    <!-- Eyebrows -->
    <path d="M128,90 Q135,85 142,90" stroke="#8B694C" stroke-width="2" fill="none" />
    <path d="M158,90 Q165,85 172,90" stroke="#8B694C" stroke-width="2" fill="none" />

    <!-- Nose (Minimalist dot) -->
    <circle cx="150" cy="115" r="2" fill="#B58B6E" />
    
    <!-- Cheeks -->
    <circle cx="125" cy="120" r="6" fill="#E8B4A6" fill-opacity="0.6" />
    <circle cx="175" cy="120" r="6" fill="#E8B4A6" fill-opacity="0.6" />
  </g>

  <!-- Hair Group -->
  <g id="hair">
    <!-- Short Teal-Blue Hair -->
    <path d="M95,80 C95,40 120,30 150,30 C180,30 205,40 205,80 C205,60 195,50 150,50 C105,50 95,60 95,80 Z" fill="#008080" />
    <!-- Hair bangs detail -->
    <path d="M100,80 C100,60 110,55 120,55 C125,55 125,65 125,65" stroke="#006666" stroke-width="2" fill="none"/>
    <path d="M130,55 C135,50 145,50 150,55" stroke="#006666" stroke-width="2" fill="none"/>
    <path d="M160,65 C165,65 170,55 175,55 C185,55 195,60 195,80" stroke="#006666" stroke-width="2" fill="none"/>
  </g>

  <!-- Body Group -->
  <g id="body">
    <!-- Sweater Body -->
    <path d="M100,160 L100,300 L200,300 L200,160 C150,150 100,160 100,160 Z" fill="#FFFFFF" />
    
    <!-- High Collar -->
    <path d="M110,160 L110,200 L150,210 L190,200 L190,160 C150,180 110,160 110,160 Z" fill="#FFFFFF" />
    
    <!-- Black Stripe on Neck -->
    <path d="M110,200 L150,210 L190,200" stroke="#000000" stroke-width="4" stroke-linecap="round" />
    <path d="M110,200 L150,210 L190,200" stroke="#FFFFFF" stroke-width="1" stroke-linecap="round" /> <!-- Highlight -->
  </g>

  <!-- Hand & Toothbrush Group -->
  <g id="brushing-action">
    <!-- Arm -->
    <path d="M200,180 L230,190 L240,180 L230,170 Z" fill="#D4A574" />
    <path d="M200,180 L220,185 L240,190" fill="none" stroke="#D4A574" stroke-width="20" stroke-linecap="round"/>
    
    <!-- Hand holding brush -->
    <path d="M230,185 L240,185 C245,185 250,185 250,190 C250,195 245,195 240,195 L230,195" fill="#D4A574" />

    <!-- Toothbrush Handle (Black) -->
    <rect x="245" y="165" width="12" height="40" rx="4" fill="#000000" transform="rotate(-30 251 185)" />
    
    <!-- Toothbrush Head (White/Bristles) -->
    <rect x="242" y="155" width="18" height="12" rx="6" fill="#E0E0E0" transform="rotate(-30 251 161)" />
    <path d="M242,155 L260,155 L260,167 L242,167 Z" fill="#FFFFFF" transform="rotate(-30 251 161)" />
  </g>
</svg>