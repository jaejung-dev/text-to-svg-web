<svg width="500" height="300" viewBox="0 0 500 300" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="GhostVector Logo">
  <defs>
    <!-- Gradient for the Ghostly Body -->
    <linearGradient id="ghostGradient" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.8" />
    </linearGradient>

    <!-- Gradient for the Vector Path -->
    <linearGradient id="vectorGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4facfe;stop-opacity:0" />
      <stop offset="50%" style="stop-color:#00f2fe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00f2fe;stop-opacity:1" />
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="500" height="300" fill="#111827" />

  <!-- Main Icon Group -->
  <g transform="translate(80, 100)">
    
    <!-- 1. The Ghost Concept: A soft, ethereal curve fading away -->
    <path d="M10,100 C10,45 80,45 100,45 C120,45 150,60 150,100" 
          fill="none" 
          stroke="url(#ghostGradient)" 
          stroke-width="12" 
          stroke-linecap="round" 
          filter="url(#glow)"
          opacity="0.6"/>

    <!-- 2. The Vector Concept: Sharp lines, nodes, and a geometric shape -->
    <!-- The Backbone -->
    <path d="M150,100 C150,140 100,140 80,120 C60,100 80,60 100,50" 
          fill="none" 
          stroke="#00f2fe" 
          stroke-width="2" 
          stroke-linecap="round" />

    <!-- Vector Nodes (Points) -->
    <circle cx="150" cy="100" r="4" fill="#00f2fe" />
    <circle cx="100" cy="50" r="2" fill="#00f2fe" />
    <circle cx="60" cy="100" r="2" fill="#00f2fe" />

    <!-- Geometric End Cap (Triangle) -->
    <path d="M150,100 L170,90 L170,110 Z" fill="#00f2fe" />
    
    <!-- Connecting Geometry -->
    <path d="M0,120 L20,100 L40,120" fill="none" stroke="#4facfe" stroke-width="2" opacity="0.8"/>
    <circle cx="10" cy="120" r="3" fill="#4facfe" />
    <circle cx="40" cy="120" r="3" fill="#4facfe" />
  </g>

  <!-- Text Group -->
  <g transform="translate(260, 160)">
    <!-- Ghost Text -->
    <text x="0" y="0" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="32" font-weight="bold" fill="#ffffff" letter-spacing="-1">
      Ghost
    </text>
    <!-- Vector Text -->
    <text x="0" y="28" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="32" font-weight="normal" fill="#00f2fe" letter-spacing="1">
      Vector
    </text>
  </g>
</svg>