<svg viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2c3e50;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4a69bd;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e74c3c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f39c12;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="500" height="500" fill="url(#bgGradient)" />
  
  <!-- Central Circle Ring -->
  <g id="central-rings" opacity="0.9">
    <circle cx="250" cy="250" r="180" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="2" />
    <circle cx="250" cy="250" r="140" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="2" />
    <circle cx="250" cy="250" r="100" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="2" />
    <circle cx="250" cy="250" r="60" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="2" />
  </g>
  
  <!-- Decorative Triangles -->
  <g id="triangles" transform="rotate(-45 250 250)">
    <polygon points="250,100 280,180 220,180" fill="url(#accentGradient)" opacity="0.8" />
    <polygon points="250,110 275,175 225,175" fill="url(#accentGradient)" opacity="0.6" />
  </g>
  
  <g id="triangles-2" transform="rotate(45 250 250)">
    <polygon points="250,100 280,180 220,180" fill="url(#accentGradient)" opacity="0.8" />
    <polygon points="250,110 275,175 225,175" fill="url(#accentGradient)" opacity="0.6" />
  </g>
  
  <!-- Squares on Sides -->
  <g id="side-squares">
    <rect x="80" y="225" width="30" height="30" fill="#fff" opacity="0.3" />
    <rect x="390" y="225" width="30" height="30" fill="#fff" opacity="0.3" />
    <rect x="225" y="80" width="30" height="30" fill="#fff" opacity="0.3" />
    <rect x="225" y="390" width="30" height="30" fill="#fff" opacity="0.3" />
  </g>
  
  <!-- Central Design Element -->
  <g id="center-piece">
    <circle cx="250" cy="250" r="40" fill="url(#accentGradient)" opacity="0.9" />
    <circle cx="250" cy="250" r="25" fill="#fff" opacity="0.9" />
    <circle cx="250" cy="250" r="12" fill="url(#accentGradient)" />
  </g>
  
  <!-- Connecting Lines -->
  <g id="connections" stroke="rgba(255,255,255,0.2)" stroke-width="2">
    <line x1="250" y1="190" x2="250" y2="160" />
    <line x1="250" y1="310" x2="250" y2="340" />
    <line x1="190" y1="250" x2="160" y2="250" />
    <line x1="310" y1="250" x2="340" y2="250" />
  </g>
  
  <!-- Outer Decorative Elements -->
  <g id="outer-decoration" stroke="rgba(255,255,255,0.15)" stroke-width="3">
    <path d="M 50,250 Q 100,200 150,250 T 250,250" fill="none" />
    <path d="M 450,250 Q 400,200 350,250 T 250,250" fill="none" />
    <path d="M 250,50 Q 200,100 250,150 T 250,250" fill="none" />
    <path d="M 250,450 Q 200,400 250,350 T 250,250" fill="none" />
  </g>
  
  <!-- Corner Accents -->
  <g id="corner-accent" stroke="#f39c12" stroke-width="4" fill="none">
    <path d="M 10,10 L 40,10 L 40,40" />
    <path d="M 460,10 L 430,10 L 430,40" />
    <path d="M 10,460 L 40,460 L 40,430" />
    <path d="M 460,460 L 430,460 L 430,430" />
  </g>
</svg>