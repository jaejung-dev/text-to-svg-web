<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e94560;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff6b6b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffd700;stop-opacity:0.7" />
    </linearGradient>
  </defs>
  
  <rect width="800" height="600" fill="url(#bgGradient)" />
  
  <!-- Decorative Circles Background -->
  <g id="background-circles" opacity="0.1">
    <circle cx="100" cy="100" r="80" fill="url(#goldGradient)" />
    <circle cx="700" cy="150" r="60" fill="url(#goldGradient)" />
    <circle cx="400" cy="500" r="100" fill="url(#goldGradient)" />
    <circle cx="650" cy="500" r="70" fill="url(#goldGradient)" />
    <circle cx="150" cy="450" r="50" fill="url(#goldGradient)" />
  </g>
  
  <!-- Main Geometric Shapes -->
  <g id="primary-shapes">
    <!-- Large Triangle -->
    <polygon points="400,100 550,350 250,350" fill="url(#accentGradient)" opacity="0.85" />
    
    <!-- Circle -->
    <circle cx="400" cy="250" r="60" fill="#ffd700" />
    
    <!-- Rectangles -->
    <rect x="200" y="400" width="120" height="40" fill="#ffd700" opacity="0.9" rx="5" />
    <rect x="480" y="400" width="120" height="40" fill="#ffd700" opacity="0.9" rx="5" />
  </g>
  
  <!-- Accent Elements -->
  <g id="accent-elements" stroke="#ffd700" stroke-width="2" fill="none">
    <circle cx="100" cy="500" r="30" />
    <circle cx="700" cy="500" r="30" />
    <circle cx="400" cy="520" r="25" />
  </g>
  
  <!-- Small Triangles -->
  <g id="decorative-triangles">
    <polygon points="120,500 140,470 100,470" fill="#e94560" />
    <polygon points="680,500 700,470 660,470" fill="#e94560" />
    <polygon points="380,530 400,500 420,530" fill="#ffd700" />
  </g>
  
  <!-- Connecting Lines -->
  <g id="connection-lines" stroke="rgba(255,215,0,0.3)" stroke-width="1">
    <line x1="100" y1="500" x2="400" y2="520" />
    <line x1="700" y1="500" x2="400" y2="520" />
    <line x1="150" y1="450" x2="400" y2="250" />
    <line x1="650" y1="500" x2="400" y2="250" />
  </g>
  
  <!-- Floating Shapes -->
  <g id="floating-shapes" opacity="0.6">
    <circle cx="80" cy="250" r="15" fill="#e94560" />
    <circle cx="720" cy="250" r="15" fill="#ffd700" />
    <circle cx="400" cy="80" r="20" fill="#e94560" />
    <rect x="50" y="50" width="40" height="40" fill="#ffd700" opacity="0.5" rx="8" />
    <rect x="710" y="450" width="50" height="30" fill="#e94560" opacity="0.5" rx="6" />
  </g>
  
  <!-- Central Badge -->
  <g id="central-badge">
    <circle cx="400" cy="250" r="70" fill="none" stroke="#ffd700" stroke-width="3" />
    <circle cx="400" cy="250" r="55" fill="none" stroke="#e94560" stroke-width="2" stroke-dasharray="8,4" />
  </g>
  
  <!-- Corner Decorations -->
  <g id="corner-decorations" stroke="#e94560" stroke-width="2">
    <path d="M20,20 L80,20 M80,20 L80,80" fill="none" />
    <path d="M720,20 L780,20 L780,80" fill="none" />
    <path d="M20,580 L80,580 L80,520" fill="none" />
    <path d="M720,580 L780,580 L780,520" fill="none" />
  </g>
</svg>