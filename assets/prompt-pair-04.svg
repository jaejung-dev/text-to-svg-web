<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradient for the main background -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2c3e50;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4ca1af;stop-opacity:1" />
    </linearGradient>

    <!-- Gradient for the glowing circle -->
    <radialGradient id="glowGradient" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" style="stop-color:#ffeaa7;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#fdcb6e;stop-opacity:0.5" />
      <stop offset="100%" style="stop-color:#ffeaa7;stop-opacity:0" />
    </radialGradient>

    <!-- Filter for soft shadows -->
    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" />
      <feOffset dx="2" dy="2" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Pattern for texture -->
    <pattern id="dotPattern" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="2" fill="rgba(255,255,255,0.1)" />
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#bgGradient)" />
  
  <!-- Subtle Texture Overlay -->
  <rect width="800" height="600" fill="url(#dotPattern)" opacity="0.6" />

  <!-- Group: Floating Shapes Background -->
  <g id="background-shapes" opacity="0.3">
    <!-- Large Circle Back -->
    <circle cx="200" cy="300" r="150" fill="#e17055" />
    <!-- Triangle Back -->
    <path d="M 600 500 L 750 150 L 900 500 Z" fill="#00b894" transform="scale(0.8) translate(50, 50)" />
    <!-- Square Back -->
    <rect x="550" y="50" width="100" height="100" rx="20" fill="#6c5ce7" transform="rotate(45 600 100)" />
  </g>

  <!-- Group: Central Composition -->
  <g id="central-design" filter="url(#dropShadow)">
    <!-- The Glowing Core -->
    <circle cx="400" cy="300" r="120" fill="url(#glowGradient)" />
    <circle cx="400" cy="300" r="100" fill="none" stroke="#fff" stroke-width="2" opacity="0.8" />
    
    <!-- Geometric Rings -->
    <circle cx="400" cy="300" r="140" fill="none" stroke="#fff" stroke-width="1" stroke-dasharray="10,5" opacity="0.6" />
    
    <!-- Orbiting Elements -->
    <g id="orbitals">
      <circle cx="400" cy="160" r="25" fill="#fd79a8" />
      <circle cx="540" cy="300" r="25" fill="#00cec9" />
      <circle cx="400" cy="440" r="25" fill="#e17055" />
      <circle cx="260" cy="300" r="25" fill="#6c5ce7" />
      
      <!-- Connecting Lines -->
      <line x1="400" y1="185" x2="400" y2="220" stroke="#fff" stroke-width="2" />
      <line x1="425" y1="300" x2="460" y2="300" stroke="#fff" stroke-width="2" />
      <line x1="400" y1="415" x2="400" y2="380" stroke="#fff" stroke-width="2" />
      <line x1="375" y1="300" x2="340" y2="300" stroke="#fff" stroke-width="2" />
    </g>

    <!-- Floating Triangle Overlay -->
    <path d="M 340 250 L 460 250 L 400 350 Z" fill="none" stroke="#fff" stroke-width="3" stroke-opacity="0.5" />
  </g>

  <!-- Text Element -->
  <text x="400" y="550" font-family="Arial, sans-serif" font-size="24" fill="rgba(255,255,255,0.7)" text-anchor="middle" letter-spacing="4">
    MODERN DESIGN
  </text>
</svg>