<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="600" fill="#f5f5f5"/>
  
  <!-- Main Design Group -->
  <g id="geometric-design">
    <!-- Large Circle Background -->
    <g id="circle-background">
      <circle cx="400" cy="300" r="250" fill="#667eea" opacity="0.2"/>
      <circle cx="400" cy="300" r="200" fill="#764ba2" opacity="0.25"/>
    </g>
    
    <!-- Central Shapes Group -->
    <g id="central-shapes">
      <!-- Main Diamond -->
      <polygon points="400,150 550,300 400,450 250,300" 
               fill="#667eea" opacity="0.8"/>
      
      <!-- Inner Circle -->
      <circle cx="400" cy="300" r="80" fill="#764ba2" opacity="0.9"/>
      
      <!-- Small Circles Array -->
      <g id="decorative-circles">
        <circle cx="400" cy="200" r="15" fill="#ff6b6b"/>
        <circle cx="470" cy="250" r="12" fill="#feca57"/>
        <circle cx="470" cy="350" r="12" fill="#ff6b6b"/>
        <circle cx="400" cy="400" r="15" fill="#feca57"/>
        <circle cx="330" cy="350" r="12" fill="#ff6b6b"/>
        <circle cx="330" cy="250" r="12" fill="#feca57"/>
      </g>
    </g>
    
    <!-- Side Triangles -->
    <g id="side-triangles">
      <polygon points="100,150 200,300 100,450" fill="#48dbfb" opacity="0.6"/>
      <polygon points="700,150 600,300 700,450" fill="#ff9f43" opacity="0.6"/>
    </g>
    
    <!-- Small Accents -->
    <g id="accents">
      <circle cx="50" cy="50" r="20" fill="#ff6b6b" opacity="0.5"/>
      <circle cx="750" cy="50" r="20" fill="#feca57" opacity="0.5"/>
      <circle cx="50" cy="550" r="20" fill="#48dbfb" opacity="0.5"/>
      <circle cx="750" cy="550" r="20" fill="#ff9f43" opacity="0.5"/>
    </g>
    
    <!-- Connecting Lines -->
    <g id="connecting-lines" stroke="#764ba2" stroke-width="2" stroke-dasharray="5,5" opacity="0.4">
      <line x1="400" y1="150" x2="400" y2="450"/>
      <line x1="250" y1="300" x2="550" y2="300"/>
    </g>
  </g>
  
  <!-- Bottom Banner -->
  <g id="bottom-banner">
    <rect x="150" y="520" width="500" height="60" rx="30" fill="#667eea"/>
    <text x="400" y="558" font-family="Arial, sans-serif" font-size="24" fill="white" text-anchor="middle" font-weight="bold">GEOMETRIC DESIGN</text>
  </g>
</svg>