<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Sky Background -->
  <defs>
    <linearGradient id="skyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#87CEEB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E0F6FF;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect id="sky" x="0" y="0" width="800" height="600" fill="url(#skyGradient)"/>
  
  <!-- Sun/Moon -->
  <circle id="sun" cx="700" cy="100" r="40" fill="#FFD700" opacity="0.9"/>
  
  <!-- Clouds -->
  <g id="clouds" opacity="0.8">
    <ellipse cx="150" cy="120" rx="60" ry="25" fill="white"/>
    <ellipse cx="210" cy="115" rx="50" ry="20" fill="white"/>
    <ellipse cx="550" cy="80" rx="70" ry="30" fill="white"/>
    <ellipse cx="630" cy="75" rx="55" ry="25" fill="white"/>
  </g>
  
  <!-- Background Mountains -->
  <g id="mountains-back">
    <polygon points="0,500 150,300 300,480 450,280 600,450 800,320 800,600 0,600" 
             fill="#8B7355" opacity="0.8"/>
    <polygon points="100,550 250,380 400,520 550,360 700,480 800,420" 
             fill="#6B5345" opacity="0.9"/>
  </g>
  
  <!-- Midground Mountains -->
  <g id="mountains-middle">
    <polygon points="0,600 200,400 400,520 600,380 800,500 800,600" 
             fill="#A08060" opacity="0.85"/>
    <polygon points="150,580 350,420 550,540 750,440" 
             fill="#806040" opacity="0.9"/>
  </g>
  
  <!-- Foreground Mountains -->
  <g id="mountains-front">
    <polygon points="0,600 250,350 500,520 750,320 800,580 800,600" 
             fill="#605030" opacity="0.9"/>
    <polygon points="100,580 300,400 500,530 700,360 800,570" 
             fill="#504020" opacity="0.95"/>
  </g>
  
  <!-- Snow Caps -->
  <g id="snow-caps">
    <polygon points="250,350 280,320 310,355" fill="#FFFFFF"/>
    <polygon points="500,520 530,490 560,525" fill="#FFFFFF"/>
    <polygon points="700,320 730,290 760,330" fill="#FFFFFF"/>
    <polygon points="400,480 425,455 450,485" fill="#FFFFFF"/>
  </g>
  
  <!-- Trees -->
  <g id="trees">
    <polygon points="50,600 60,570 70,600" fill="#2D4020"/>
    <polygon points="80,600 90,565 100,600" fill="#2D4020"/>
    <polygon points="700,600 710,575 720,600" fill="#2D4020"/>
    <polygon points="730,600 740,570 750,600" fill="#2D4020"/>
    <polygon points="100,600 110,580 120,600" fill="#1E2D15"/>
    <polygon points="760,600 770,585 780,600" fill="#1E2D15"/>
  </g>
  
  <!-- Eagle -->
  <g id="eagle" transform="translate(400, 150) rotate(-5)">
    <g id="eagle-body">
      <!-- Body -->
      <ellipse cx="0" cy="0" rx="30" ry="18" fill="#8B4513"/>
      <ellipse cx="10" cy="-10" rx="12" ry="15" fill="#654321"/>
      
      <!-- Head -->
      <circle cx="25" cy="-20" r="14" fill="#FFFFFF"/>
      <circle cx="28" cy="-22" r="3" fill="#000000"/>
      
      <!-- Beak -->
      <path d="M35,-20 L42,-18 L35,-12" fill="#FF8C00"/>
      
      <!-- Wings - Left -->
      <path d="M-25,-5 Q-70,-60 -100,-40 Q-50,-20 -25,-5" 
            fill="#8B4513" stroke="#654321" stroke-width="2"/>
      
      <!-- Wings - Right -->
      <path d="M25,-5 Q70,-60 100,-40 Q50,-20 25,-5" 
            fill="#8B4513" stroke="#654321" stroke-width="2"/>
      
      <!-- Tail -->
      <path d="M-25,5 L-40,15 L-25,20" fill="#654321"/>
    </g>
  </g>
  
  <!-- Ground/Foreground -->
  <ellipse id="foreground-ground" cx="400" cy="600" rx="400" ry="50" fill="#556B2F" opacity="0.9"/>
  
  <!-- Highlights on mountains -->
  <g id="highlights">
    <polygon points="280,330 290,315 300,335" fill="#FFFFFF" opacity="0.4"/>
    <polygon points="530,495 540,480 550,500" fill="#FFFFFF" opacity="0.4"/>
    <polygon points="730,295 740,280 750,300" fill="#FFFFFF" opacity="0.4"/>
  </g>
</svg>