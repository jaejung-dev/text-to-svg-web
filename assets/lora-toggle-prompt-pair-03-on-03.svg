<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Sky Background -->
  <defs>
    <linearGradient id="skyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a4d6e"/>
      <stop offset="50%" style="stop-color:#4a90c7"/>
      <stop offset="100%" style="stop-color:#87ceeb"/>
    </linearGradient>
    
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Sky -->
  <rect id="sky" x="0" y="0" width="800" height="600" fill="url(#skyGradient)"/>
  
  <!-- Sun -->
  <circle id="sun" cx="700" cy="100" r="50" fill="#ffd700" opacity="0.9"/>
  <circle id="sun-glow" cx="700" cy="100" r="70" fill="#ffd700" opacity="0.3"/>
  
  <!-- Foreground Mountains (Darker) -->
  <g id="mountains-back">
    <path id="mountain1" d="M 0,450 L 200,250 L 400,450 Z" fill="#2d4a3e"/>
    <path id="mountain2" d="M 150,450 L 350,200 L 550,450 Z" fill="#3d5c4e"/>
    <path id="mountain3" d="M 400,450 L 600,280 L 800,450 Z" fill="#2d4a3e"/>
  </g>
  
  <!-- Background Mountains (Lighter, further) -->
  <g id="mountains-far">
    <path id="mountain4" d="M -100,450 L 150,300 L 400,450 Z" fill="#4a6b5a"/>
    <path id="mountain5" d="M 250,450 L 500,280 L 750,450 Z" fill="#5a7b6a"/>
    <path id="mountain6" d="M 550,450 L 750,320 L 1000,450 Z" fill="#4a6b5a"/>
  </g>
  
  <!-- Eagle -->
  <g id="eagle" transform="translate(400, 150)">
    <!-- Wings -->
    <path id="wings-left" d="M -80,10 Q -120,-40 -150,-60 L -60,-40 Z" fill="#8b4513"/>
    <path id="wings-right" d="M 80,10 Q 120,-40 150,-60 L 60,-40 Z" fill="#8b4513"/>
    
    <!-- Wing highlights -->
    <path id="wings-left-highlight" d="M -120,-20 Q -100,-30 -90,-25 L -110,-10 Z" fill="#a0522d" opacity="0.6"/>
    <path id="wings-right-highlight" d="M 120,-20 Q 100,-30 90,-25 L 110,-10 Z" fill="#a0522d" opacity="0.6"/>
    
    <!-- Body -->
    <ellipse id="body" cx="0" cy="10" rx="35" ry="20" fill="#5c3a21"/>
    
    <!-- Head -->
    <ellipse id="head" cx="-30" cy="5" rx="20" ry="18" fill="#5c3a21"/>
    <circle id="eye" cx="-35" cy="2" r="4" fill="#fff"/>
    <circle id="pupil" cx="-35" cy="2" r="2" fill="#000"/>
    <path id="beak" d="M -48,5 Q -55,8 -50,12 Q -45,10 -48,5" fill="#ffd700"/>
    
    <!-- Tail -->
    <path id="tail" d="M 30,10 Q 50,20 60,10 L 30,15 Z" fill="#5c3a21"/>
  </g>
  
  <!-- Foreground Trees -->
  <g id="foreground-trees">
    <ellipse id="tree-ground" cx="100" cy="600" rx="120" ry="40" fill="#2d5a27"/>
    <ellipse id="tree-ground-2" cx="700" cy="600" rx="150" ry="50" fill="#3d6a37"/>
    
    <!-- Pine trees -->
    <path id="pine1" d="M 50,600 L 70,450 L 90,600 Z" fill="#1a4d2e"/>
    <path id="pine2" d="M 100,600 L 120,470 L 140,600 Z" fill="#2a5d3e"/>
    <path id="pine3" d="M 650,600 L 670,450 L 690,600 Z" fill="#1a4d2e"/>
    <path id="pine4" d="M 700,600 L 720,480 L 740,600 Z" fill="#2a5d3e"/>
  </g>
  
  <!-- Clouds -->
  <g id="clouds">
    <ellipse cx="200" cy="120" rx="60" ry="25" fill="#fff" opacity="0.8"/>
    <ellipse cx="240" cy="110" rx="45" ry="20" fill="#fff" opacity="0.8"/>
    
    <ellipse cx="600" cy="180" rx="50" ry="20" fill="#fff" opacity="0.6"/>
    <ellipse cx="640" cy="175" rx="35" ry="15" fill="#fff" opacity="0.6"/>
  </g>
</svg>