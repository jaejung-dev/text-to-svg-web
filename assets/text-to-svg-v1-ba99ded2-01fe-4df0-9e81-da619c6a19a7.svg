<svg viewBox="0 0 500 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect id="background" width="500" height="400" fill="#9B7EBD"/>
  
  <!-- Pink Squiggles -->
  <g id="pink-squiggles">
    <path id="squiggle-1" d="M 80,60 Q 100,40 120,60 T 160,60" stroke="#FFB6C1" stroke-width="4" fill="none" stroke-linecap="round"/>
    <path id="squiggle-2" d="M 380,80 Q 400,60 420,80 T 460,80" stroke="#FFB6C1" stroke-width="4" fill="none" stroke-linecap="round"/>
    <path id="squiggle-3" d="M 250,320 Q 270,300 290,320 T 330,320" stroke="#FFB6C1" stroke-width="4" fill="none" stroke-linecap="round"/>
  </g>
  
  <!-- Green Blobs -->
  <g id="green-blobs">
    <ellipse id="blob-1" cx="120" cy="180" rx="45" ry="40" fill="#90EE90" opacity="0.8"/>
    <ellipse id="blob-2" cx="380" cy="280" rx="38" ry="35" fill="#90EE90" opacity="0.8"/>
    <ellipse id="blob-3" cx="320" cy="120" rx="42" ry="38" fill="#90EE90" opacity="0.8"/>
  </g>
  
  <!-- Peach Flower -->
  <g id="peach-flower" transform="translate(250, 100)">
    <circle id="flower-center" cx="0" cy="0" r="12" fill="#FFE5B4"/>
    <ellipse id="petal-1" cx="0" cy="-25" rx="12" ry="20" fill="#FFDAB9"/>
    <ellipse id="petal-2" cx="20" cy="-10" rx="12" ry="20" fill="#FFDAB9" transform="rotate(72)"/>
    <ellipse id="petal-3" cx="24" cy="10" rx="12" ry="20" fill="#FFDAB9" transform="rotate(144)"/>
    <ellipse id="petal-4" cx="15" cy="22" rx="12" ry="20" fill="#FFDAB9" transform="rotate(216)"/>
    <ellipse id="petal-5" cx="-10" cy="24" rx="12" ry="20" fill="#FFDAB9" transform="rotate(288)"/>
  </g>
  
  <!-- Pink Triangle -->
  <polygon id="pink-triangle" points="200,300 230,250 260,300" fill="#FF69B4" opacity="0.9"/>
  
  <!-- Light Orange Spirals -->
  <g id="orange-spirals">
    <path id="spiral-1" d="M 60,280 Q 70,270 65,265 T 75,260 T 70,255 T 80,250" stroke="#FFA07A" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path id="spiral-2" d="M 440,50 Q 450,60 445,65 T 435,60 T 430,65 T 420,70" stroke="#FFA07A" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path id="spiral-3" d="M 340,340 Q 355,330 350,325 T 365,320 T 360,315 T 375,310" stroke="#FFA07A" stroke-width="3" fill="none" stroke-linecap="round"/>
  </g>
  
  <!-- Small Dashes -->
  <g id="small-dashes">
    <line id="dash-1" x1="50" y1="100" x2="50" y2="110" stroke="#FFB6C1" stroke-width="3"/>
    <line id="dash-2" x1="350" y1="150" x2="360" y2="150" stroke="#FFB6C1" stroke-width="3"/>
    <line id="dash-3" x1="150" y1="220" x2="150" y2="230" stroke="#90EE90" stroke-width="3"/>
    <line id="dash-4" x1="280" y1="180" x2="290" y2="180" stroke="#FFE5B4" stroke-width="3"/>
    <line id="dash-5" x1="420" y1="200" x2="420" y2="210" stroke="#FFA07A" stroke-width="3"/>
    <line id="dash-6" x1="90" y1="140" x2="100" y2="140" stroke="#FFB6C1" stroke-width="3"/>
    <line id="dash-7" x1="300" y1="280" x2="300" y2="290" stroke="#90EE90" stroke-width="3"/>
    <line id="dash-8" x1="450" y1="130" x2="450" y2="140" stroke="#FFE5B4" stroke-width="3"/>
    <line id="dash-9" x1="200" y1="60" x2="210" y2="60" stroke="#FFA07A" stroke-width="3"/>
    <line id="dash-10" x1="120" y1="320" x2="120" y2="330" stroke="#FFB6C1" stroke-width="3"/>
    <line id="dash-11" x1="380" y1="350" x2="390" y2="350" stroke="#90EE90" stroke-width="3"/>
    <line id="dash-12" x1="40" y1="300" x2="40" y2="310" stroke="#FFE5B4" stroke-width="3"/>
  </g>
</svg>