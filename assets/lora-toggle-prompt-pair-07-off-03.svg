<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="machineGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e0e0e0;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c0c0c0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="waterGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4facfe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00f2fe;stop-opacity:1" />
    </linearGradient>
    <style>
      .title-text { font-family: Arial, sans-serif; font-weight: bold; fill: #333; }
      .label-text { font-family: Arial, sans-serif; font-size: 14px; fill: #555; }
      .accent-text { font-family: Arial, sans-serif; font-weight: bold; font-size: 16px; fill: #0056b3; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="#f4f7f6" />
  
  <!-- Burkina Faso Flag Strip (Top) -->
  <g id="flag-strip">
    <rect x="0" y="0" width="400" height="20" fill="#009e60" />
    <rect x="400" y="0" width="400" height="20" fill="#ef3340" />
    <rect x="0" y="20" width="800" height="5" fill="#fcd116" />
  </g>

  <!-- Header -->
  <g id="header">
    <text x="400" y="60" text-anchor="middle" class="title-text" font-size="28">Lavanderia Self-Service</text>
    <text x="400" y="90" text-anchor="middle" class="label-text" font-size="18" fill="#666">Progetto Burkina Faso</text>
  </g>

  <!-- Central Illustration: Laundry Machine -->
  <g id="laundry-machine" transform="translate(350, 280)">
    <!-- Machine Body -->
    <rect x="-60" y="-100" width="120" height="200" rx="10" fill="url(#machineGradient)" stroke="#999" stroke-width="2" />
    <!-- Washing Door -->
    <circle cx="0" cy="-20" r="45" fill="#2c3e50" stroke="#fff" stroke-width="4" />
    <circle cx="0" cy="-20" r="35" fill="none" stroke="#4facfe" stroke-width="2" />
    <!-- Water Effect -->
    <path d="M-30 -40 Q0 -60 30 -40" fill="none" stroke="url(#waterGradient)" stroke-width="3" opacity="0.6" />
    <!-- Control Panel -->
    <rect x="-40" y="40" width="80" height="30" rx="5" fill="#333" />
    <circle cx="-20" cy="55" r="5" fill="#28a745" />
    <circle cx="0" cy="55" r="5" fill="#ffc107" />
    <circle cx="20" cy="55" r="5" fill="#dc3545" />
    <!-- Payment Slots -->
    <rect x="-45" y="80" width="10" height="15" fill="#555" />
    <rect x="35" y="80" width="10" height="15" fill="#555" />
  </g>

  <!-- Location: City & University -->
  <g id="location" transform="translate(700, 150)">
    <rect x="0" y="0" width="100" height="80" fill="#fff" stroke="#ddd" rx="5" />
    <!-- Building -->
    <path d="M10 70 L10 40 L30 20 L50 40 L70 20 L90 40 L90 70" fill="#3498db" />
    <!-- University Book -->
    <rect x="55" y="25" width="15" height="20" fill="#e74c3c" />
    <text x="50" y="95" text-anchor="middle" class="label-text">Centro &amp; Università</text>
  </g>

  <!-- Target Audience -->
  <g id="target-audience" transform="translate(100, 150)">
    <rect x="0" y="0" width="150" height="80" fill="#fff" stroke="#ddd" rx="5" />
    <!-- Student -->
    <circle cx="30" cy="25" r="15" fill="#f39c12" />
    <path d="M15 25 L15 35 L45 35 L45 25" fill="#f39c12" />
    <!-- Worker -->
    <rect x="75" y="15" width="15" height="15" fill="#2980b9" />
    <path d="M75 30 L90 30 L90 40 L75 40" fill="#2980b9" />
    <text x="75" y="95" class="label-text" font-size="12">Studenti, Lavoratori</text>
  </g>

  <!-- Payment Methods -->
  <g id="payment-methods" transform="translate(700, 350)">
    <rect x="0" y="0" width="100" height="80" fill="#fff" stroke="#ddd" rx="5" />
    <!-- Cash -->
    <rect x="10" y="10" width="25" height="20" fill="#27ae60" rx="2" />
    <circle cx="22" cy="20" r="5" fill="#fff" />
    <!-- Mobile Money -->
    <rect x="60" y="5" width="20" height="30" rx="2" fill="#8e44ad" />
    <circle cx="70" cy="15" r="3" fill="#fff" />
    <text x="50" y="95" text-anchor="middle" class="label-text">Contanti &amp; Mobile</text>
  </g>

  <!-- Efficiency / Benefits -->
  <g id="efficiency" transform="translate(350, 450)">
    <rect x="0" y="0" width="100" height="60" fill="#e8f6f3" stroke="#27ae60" rx="5" />
    <!-- Arrow Up -->
    <path d="M30 30 L30 10 L40 10 L40 25 L50 15" fill="none" stroke="#27ae60" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
    <!-- Text -->
    <text x="50" y="40" text-anchor="middle" class="label-text">Riduzione Costi</text>
    <text x="50" y="55" text-anchor="middle" class="label-text">Staff Minimo</text>
  </g>

  <!-- Legend / Footer -->
  <g id="footer" transform="translate(0, 560)">
    <line x1="0" y1="0" x2="800" y2="0" stroke="#ddd" stroke-width="1" />
    <text x="400" y="25" text-anchor="middle" class="label-text" font-size="12">Soluzione Urbana Sostenibile per il Burkina Faso</text>
  </g>
</svg>