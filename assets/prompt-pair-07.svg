<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="600" fill="#f5f5f5"/>
  
  <!-- Sky -->
  <rect width="800" height="250" fill="#87CEEB"/>
  
  <!-- City Buildings Background -->
  <g id="city-background">
    <rect x="50" y="100" width="80" height="150" fill="#90A4AE"/>
    <rect x="150" y="80" width="60" height="170" fill="#78909C"/>
    <rect x="230" y="120" width="70" height="130" fill="#607D8B"/>
    <rect x="500" y="90" width="90" height="160" fill="#78909C"/>
    <rect x="620" y="110" width="70" height="140" fill="#90A4AE"/>
  </g>
  
  <!-- Ground -->
  <rect x="0" y="250" width="800" height="350" fill="#CDDC39"/>
  
  <!-- Laundromat Building -->
  <g id="laundromat-building">
    <rect x="280" y="280" width="240" height="180" fill="#FFFFFF" stroke="#424242" stroke-width="2"/>
    <rect x="280" y="280" width="240" height="40" fill="#FF7043"/>
    <text x="400" y="310" text-anchor="middle" font-family="Arial" font-size="16" fill="white" font-weight="bold">Laundry Service</text>
  </g>
  
  <!-- Washing Machines -->
  <g id="washing-machines">
    <g transform="translate(320, 350)">
      <rect x="0" y="0" width="45" height="60" fill="#E3F2FD" stroke="#1976D2" stroke-width="2"/>
      <circle cx="22.5" cy="15" r="10" fill="#90CAF9"/>
      <rect x="5" y="30" width="35" height="15" fill="#B3E5FC"/>
    </g>
    <g transform="translate(380, 350)">
      <rect x="0" y="0" width="45" height="60" fill="#E3F2FD" stroke="#1976D2" stroke-width="2"/>
      <circle cx="22.5" cy="15" r="10" fill="#90CAF9"/>
      <rect x="5" y="30" width="35" height="15" fill="#B3E5FC"/>
    </g>
    <g transform="translate(440, 350)">
      <rect x="0" y="0" width="45" height="60" fill="#E3F2FD" stroke="#1976D2" stroke-width="2"/>
      <circle cx="22.5" cy="15" r="10" fill="#90CAF9"/>
      <rect x="5" y="30" width="35" height="15" fill="#B3E5FC"/>
    </g>
  </g>
  
  <!-- Dryers -->
  <g id="dryers">
    <g transform="translate(320, 440)">
      <rect x="0" y="0" width="45" height="60" fill="#FFF3E0" stroke="#F57C00" stroke-width="2"/>
      <circle cx="22.5" cy="15" r="10" fill="#FFE0B2"/>
      <rect x="5" y="30" width="35" height="15" fill="#FFE0B2"/>
    </g>
    <g transform="translate(380, 440)">
      <rect x="0" y="0" width="45" height="60" fill="#FFF3E0" stroke="#F57C00" stroke-width="2"/>
      <circle cx="22.5" cy="15" r="10" fill="#FFE0B2"/>
      <rect x="5" y="30" width="35" height="15" fill="#FFE0B2"/>
    </g>
  </g>
  
  <!-- Payment Area -->
  <g id="payment-area" transform="translate(560, 330)">
    <rect x="0" y="0" width="120" height="80" fill="#FFF8E1" stroke="#FFB74D" stroke-width="2" rx="5"/>
    <text x="60" y="20" text-anchor="middle" font-family="Arial" font-size="12" fill="#5D4037" font-weight="bold">Payment</text>
    
    <!-- Cash Icon -->
    <g transform="translate(20, 35)">
      <rect x="0" y="5" width="25" height="18" fill="#81C784" rx="2"/>
      <circle cx="12.5" cy="14" r="5" fill="#4CAF50"/>
      <text x="12.5" y="16" text-anchor="middle" font-size="8" fill="white">$</text>
    </g>
    
    <!-- Mobile Money Icon -->
    <g transform="translate(75, 35)">
      <rect x="0" y="2" width="20" height="24" fill="#42A5F5" rx="3"/>
      <rect x="8" y="8" width="4" height="8" fill="white"/>
    </g>
  </g>
  
  <!-- Target Audience Icons -->
  <g id="target-audience">
    <!-- Student -->
    <g transform="translate(120, 380)">
      <circle cx="20" cy="15" r="12" fill="#90CAF9"/>
      <rect x="5" y="30" width="30" height="20" fill="#1976D2"/>
      <text x="20" y="50" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Studenti</text>
    </g>
    
    <!-- Worker -->
    <g transform="translate(200, 380)">
      <circle cx="20" cy="15" r="12" fill="#FFCC80"/>
      <rect x="5" y="30" width="30" height="20" fill="#E65100"/>
      <text x="20" y="50" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Lavoratori</text>
    </g>
    
    <!-- Resident -->
    <g transform="translate(280, 380)">
      <circle cx="20" cy="15" r="12" fill="#A5D6A7"/>
      <rect x="5" y="30" width="30" height="20" fill="#2E7D32"/>
      <text x="20" y="50" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Residenti</text>
    </g>
  </g>
  
  <!-- Location Markers -->
  <g id="location-markers">
    <!-- University Area -->
    <g transform="translate(100, 180)">
      <circle cx="20" cy="20" r="15" fill="#FFCDD2" stroke="#D32F2F" stroke-width="2"/>
      <text x="20" y="45" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Zona Universitaria</text>
    </g>
    
    <!-- City Center -->
    <g transform="translate(700, 150)">
      <circle cx="20" cy="20" r="15" fill="#C8E6C9" stroke="#388E3C" stroke-width="2"/>
      <text x="20" y="45" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Centro Città</text>
    </g>
    
    <!-- Line connecting -->
    <line x1="100" y1="190" x2="700" y2="160" stroke="#9E9E9E" stroke-width="2" stroke-dasharray="5,5"/>
  </g>
  
  <!-- Cost Savings Badge -->
  <g id="cost-savings" transform="translate(560, 440)">
    <circle cx="40" cy="20" r="30" fill="#FFE082" stroke="#FF9800" stroke-width="3"/>
    <text x="40" y="25" text-anchor="middle" font-family="Arial" font-size="10" fill="#5D4037" font-weight="bold">-30%</text>
    <text x="85" y="25" text-anchor="middle" font-family="Arial" font-size="8" fill="#5D4037">Personale</text>
  </g>
  
  <!-- Burkina Faso Label -->
  <text x="400" y="580" text-anchor="middle" font-family="Arial" font-size="14" fill="#5D4037" font-weight="bold">BURKINA FASO - Self Service Laundry Project</text>
  
  <!-- Decorative Sun -->
  <g transform="translate(700, 50)">
    <circle cx="30" cy="30" r="20" fill="#FFEB3B"/>
    <g stroke="#FFEB3B" stroke-width="2">
      <line x1="30" y1="0" x2="30" y2="10"/>
      <line x1="30" y1="50" x2="30" y2="60"/>
      <line x1="0" y1="30" x2="10" y2="30"/>
      <line x1="50" y1="30" x2="60" y2="30"/>
    </g>
  </g>
</svg>