<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="skyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4facfe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00f2fe;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="machineGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0e0e0;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background Sky -->
  <rect width="800" height="500" fill="url(#skyGradient)" />

  <!-- Ground -->
  <rect x="0" y="350" width="800" height="150" fill="#d4a373" />

  <!-- City Skyline (Context: Center City) -->
  <g id="cityline" transform="translate(0, 250)">
    <rect x="0" y="0" width="50" height="100" fill="#8d6e63" />
    <rect x="60" y="20" width="40" height="80" fill="#795548" />
    <rect x="110" y="0" width="60" height="120" fill="#8d6e63" />
    <rect x="180" y="40" width="50" height="80" fill="#5d4037" />
    <rect x="240" y="0" width="80" height="140" fill="#8d6e63" />
    <rect x="330" y="30" width="40" height="70" fill="#795548" />
    <rect x="380" y="10" width="70" height="90" fill="#5d4037" />
    <rect x="460" y="0" width="100" height="130" fill="#8d6e63" />
    <rect x="570" y="50" width="40" height="80" fill="#795548" />
    <rect x="620" y="0" width="60" height="110" fill="#5d4037" />
    <rect x="690" y="40" width="50" height="90" fill="#8d6e63" />
    <rect x="750" y="20" width="40" height="80" fill="#795548" />
  </g>

  <!-- University Building (Context: Near University Zone) -->
  <g id="university" transform="translate(50, 280)">
    <rect x="0" y="0" width="120" height="60" fill="#c5a065" />
    <rect x="20" y="-20" width="80" height="20" fill="#c5a065" /> <!-- Roof -->
    <rect x="10" y="20" width="15" height="40" fill="#5d4037" /> <!-- Pillar -->
    <rect x="95" y="20" width="15" height="40" fill="#5d4037" /> <!-- Pillar -->
    <rect x="25" y="20" width="50" height="40" fill="#ffcc80" /> <!-- Door -->
    <rect x="10" y="10" width="20" height="20" fill="#81d4fa" /> <!-- Window -->
    <rect x="60" y="10" width="20" height="20" fill="#81d4fa" /> <!-- Window -->
    <text x="40" y="80" font-family="Arial" font-size="14" fill="#3e2723" text-anchor="middle">UNIVERSITY</text>
  </g>

  <!-- Laundry Machine Group -->
  <g id="laundry-machines" transform="translate(280, 280)">
    <!-- Washing Machine 1 -->
    <g transform="translate(0, 0)">
      <rect x="0" y="0" width="100" height="160" rx="5" fill="url(#machineGradient)" stroke="#999" stroke-width="2" />
      <circle cx="50" cy="60" r="35" fill="#e3f2fd" stroke="#2196f3" stroke-width="3" />
      <path d="M50 30 Q85 60 50 90 Q15 60 50 30" fill="#b3e5fc" stroke="#2196f3" stroke-width="2" />
      <rect x="20" y="110" width="60" height="20" fill="#fff3e0" stroke="#ff9800" stroke-width="2" rx="2" />
      <text x="50" y="125" font-family="Arial" font-size="10" fill="#f57c00" text-anchor="middle">PAGAMENTO</text>
      <rect x="35" y="140" width="30" height="10" fill="#81c784" rx="2" />
    </g>
    
    <!-- Washing Machine 2 -->
    <g transform="translate(110, 0)">
      <rect x="0" y="0" width="100" height="160" rx="5" fill="url(#machineGradient)" stroke="#999" stroke-width="2" />
      <circle cx="50" cy="60" r="35" fill="#e3f2fd" stroke="#2196f3" stroke-width="3" />
      <path d="M50 30 Q85 60 50 90 Q15 60 50 30" fill="#b3e5fc" stroke="#2196f3" stroke-width="2" />
      <rect x="20" y="110" width="60" height="20" fill="#fff3e0" stroke="#ff9800" stroke-width="2" rx="2" />
      <text x="50" y="125" font-family="Arial" font-size="10" fill="#f57c00" text-anchor="middle">PAGAMENTO</text>
      <rect x="35" y="140" width="30" height="10" fill="#81c784" rx="2" />
    </g>

    <!-- Washing Machine 3 -->
    <g transform="translate(220, 0)">
      <rect x="0" y="0" width="100" height="160" rx="5" fill="url(#machineGradient)" stroke="#999" stroke-width="2" />
      <circle cx="50" cy="60" r="35" fill="#e3f2fd" stroke="#2196f3" stroke-width="3" />
      <path d="M50 30 Q85 60 50 90 Q15 60 50 30" fill="#b3e5fc" stroke="#2196f3" stroke-width="2" />
      <rect x="20" y="110" width="60" height="20" fill="#fff3e0" stroke="#ff9800" stroke-width="2" rx="2" />
      <text x="50" y="125" font-family="Arial" font-size="10" fill="#f57c00" text-anchor="middle">PAGAMENTO</text>
      <rect x="35" y="140" width="30" height="10" fill="#81c784" rx="2" />
    </g>
  </g>

  <!-- Payment Icons (Cash & Mobile Money) -->
  <g id="payment-methods" transform="translate(350, 440)">
    <!-- Cash Icon -->
    <g transform="translate(0, 0)">
      <circle cx="25" cy="25" r="25" fill="#81c784" opacity="0.9" />
      <text x="25" y="32" font-family="Arial" font-size="16" fill="white" text-anchor="middle">$</text>
      <text x="25" y="55" font-family="Arial" font-size="10" fill="#333" text-anchor="middle">Cash</text>
    </g>
    
    <!-- Mobile Money Icon -->
    <g transform="translate(70, 0)">
      <rect x="0" y="5" width="50" height="40" rx="4" fill="#5d4037" />
      <rect x="5" y="10" width="40" height="20" rx="2" fill="#212121" />
      <text x="25" y="35" font-family="Arial" font-size="8" fill="white" text-anchor="middle">MOBILE</text>
      <text x="25" y="52" font-family="Arial" font-size="10" fill="#333" text-anchor="middle">Money</text>
    </g>
  </g>

  <!-- People Icons (Target: Students, Workers, Residents) -->
  <g id="people" transform="translate(100, 380)">
    <!-- Student -->
    <g>
      <circle cx="20" cy="20" r="10" fill="#ffcc80" />
      <path d="M10 35 Q20 25 30 35 L30 45 L10 45 Z" fill="#1976d2" />
      <text x="20" y="60" font-family="Arial" font-size="10" fill="#333" text-anchor="middle">Student</text>
    </g>
    
    <!-- Worker -->
    <g transform="translate(60, 0)">
      <circle cx="20" cy="20" r="10" fill="#ffcc80" />
      <path d="M10 35 Q20 25 30 35 L30 45 L10 45 Z" fill="#388e3c" />
      <text x="20" y="60" font-family="Arial" font-size="10" fill="#333" text-anchor="middle">Worker</text>
    </g>
    
    <!-- Resident -->
    <g transform="translate(120, 0)">
      <circle cx="20" cy="20" r="10" fill="#ffcc80" />
      <path d="M10 35 Q20 25 30 35 L30 45 L10 45 Z" fill="#fbc02d" />
      <text x="20" y="60" font-family="Arial" font-size="10" fill="#333" text-anchor="middle">Resident</text>
    </g>
  </g>

  <!-- Title and Description Text -->
  <g id="text-content" transform="translate(450, 100)">
    <text x="0" y="0" font-family="Arial Black" font-size="24" fill="#fff" text-anchor="start" opacity="0.9">
      <tspan x="0" dy="0">Laundry Self-Service</tspan>
      <tspan x="0" dy="30" font-size="18">Burkina Faso</tspan>
    </text>
    
    <rect x="0" y="60" width="350" height="120" rx="10" fill="#ffffff" opacity="0.9" stroke="#ddd" stroke-width="1"/>
    <text x="15" y="90" font-family="Arial" font-size="12" fill="#333">
      <tspan x="15" dy="0" font-weight="bold">Location:</tspan> City Center &amp; University Zone
    </text>
    <text x="15" y="110" font-family="Arial" font-size="12" fill="#333">
      <tspan x="15" dy="20" font-weight="bold">Target:</tspan> Students, Workers, Urban Residents
    </text>
    <text x="15" y="130" font-family="Arial" font-size="12" fill="#333">
      <tspan x="15" dy="20" font-weight="bold">Features:</tspan> Automated Wash/Dry, Cash &amp; Mobile Money
    </text>
    <text x="15" y="150" font-family="Arial" font-size="12" fill="#333">
      <tspan x="15" dy="20" font-weight="bold">Benefit:</tspan> Reduced Staff Costs, Modern Systems
    </text>
  </g>

  <!-- Burkina Faso Context Flag (Small) -->
  <g transform="translate(680, 450)">
    <rect x="0" y="0" width="60" height="30" rx="2" stroke="#ccc" stroke-width="1"/>
    <rect x="0" y="0" width="60" height="15" fill="#009E60" />
    <rect x="0" y="15" width="60" height="15" fill="#CF142B" />
    <text x="30" y="28" font-family="Arial" font-size="8" fill="#fff" text-anchor="middle">BF</text>
  </g>

</svg>