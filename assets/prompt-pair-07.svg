<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradients -->
    <linearGradient id="skyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#87CEEB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E0F7FA;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="buildingGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E67E22;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D35400;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="machineGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ECF0F1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#BDC3C7;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="sunGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#F1C40F;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F39C12;stop-opacity:1" />
    </radialGradient>
  </defs>

  <!-- Background -->
  <g id="background">
    <rect width="800" height="500" fill="url(#skyGradient)" />
    <circle cx="700" cy="80" r="40" fill="url(#sunGradient)" />
    <rect x="0" y="350" width="800" height="150" fill="#F5CBA7" />
  </g>

  <!-- Location Indicators (City/University) -->
  <g id="location-indicators">
    <!-- Map Pin -->
    <g transform="translate(600, 150)">
      <path d="M15 0C6.72 0 0 6.72 0 15C0 28.32 15 50 15 50C15 50 30 28.32 30 15C30 6.72 23.28 0 15 0Z" fill="#E74C3C" stroke="#C0392B" stroke-width="2"/>
      <circle cx="15" cy="15" r="5" fill="white" />
    </g>
    <!-- University Hint -->
    <g transform="translate(50, 380)">
      <rect x="0" y="0" width="60" height="40" fill="#2E86C1" rx="5" />
      <text x="30" y="25" font-family="Arial" font-size="10" fill="white" text-anchor="middle">UNI</text>
      <path d="M0 40 L30 30 L60 40" fill="#2E86C1" />
      <rect x="25" y="-5" width="10" height="10" fill="#2E86C1" />
    </g>
  </g>

  <!-- Building (Laundry) -->
  <g id="building">
    <rect x="150" y="250" width="300" height="150" fill="url(#buildingGradient)" stroke="#A04000" stroke-width="4" />
    <!-- Entrance -->
    <rect x="250" y="300" width="100" height="100" fill="#806E5F" />
    <path d="M250 300 L280 280 L280 300" fill="none" stroke="#806E5F" stroke-width="2" />
    <!-- Door -->
    <rect x="260" y="340" width="80" height="60" fill="#34495E" rx="5" />
    <!-- Window showing machines -->
    <rect x="170" y="270" width="70" height="100" fill="#7FB3D5" stroke="#34495E" stroke-width="2" />
    <rect x="350" y="270" width="70" height="100" fill="#7FB3D5" stroke="#34495E" stroke-width="2" />
    <!-- Sign -->
    <rect x="200" y="230" width="200" height="30" fill="#2980B9" rx="3" />
    <text x="300" y="250" font-family="Arial" font-size="16" fill="white" text-anchor="middle" font-weight="bold">LAUNDRY</text>
  </g>

  <!-- Machinery (Inside Window) -->
  <g id="machinery">
    <rect x="175" y="275" width="60" height="90" fill="url(#machineGradient)" stroke="#7F8C8D" stroke-width="2" />
    <circle cx="205" cy="320" r="20" fill="#3498DB" stroke="#2980B9" stroke-width="3" />
    <rect x="190" y="305" width="30" height="10" fill="#F1C40F" opacity="0.5" />
    
    <rect x="355" y="275" width="60" height="90" fill="url(#machineGradient)" stroke="#7F8C8D" stroke-width="2" />
    <circle cx="385" cy="320" r="20" fill="#3498DB" stroke="#2980B9" stroke-width="3" />
    <rect x="370" y="305" width="30" height="10" fill="#F1C40F" opacity="0.5" />
  </g>

  <!-- People (Target Audience) -->
  <g id="people">
    <!-- Student -->
    <g transform="translate(180, 380)">
      <circle cx="0" cy="0" r="15" fill="#E67E22" /> <!-- Head -->
      <rect x="-10" y="15" width="20" height="40" fill="#2980B9" rx="5" /> <!-- Body -->
      <rect x="-20" y="5" width="40" height="25" fill="#804040" /> <!-- Backpack -->
      <rect x="-15" y="35" width="5" height="20" fill="#333" /> <!-- Leg -->
      <rect x="10" y="35" width="5" height="20" fill="#333" /> <!-- Leg -->
      <text x="0" y="65" font-family="Arial" font-size="10" fill="#333" text-anchor="middle">Studente</text>
    </g>
    <!-- Worker -->
    <g transform="translate(350, 380)">
      <circle cx="0" cy="0" r="15" fill="#E67E22" /> <!-- Head -->
      <rect x="-10" y="15" width="20" height="40" fill="#34495E" rx="5" /> <!-- Body -->
      <rect x="20" y="25" width="10" height="15" fill="#795548" rx="2" /> <!-- Briefcase -->
      <rect x="-15" y="35" width="5" height="20" fill="#333" /> <!-- Leg -->
      <rect x="10" y="35" width="5" height="20" fill="#333" /> <!-- Leg -->
      <text x="0" y="65" font-family="Arial" font-size="10" fill="#333" text-anchor="middle">Lavoratore</text>
    </g>
  </g>

  <!-- Payment Methods (Modern Systems) -->
  <g id="payment-methods">
    <!-- Mobile Money -->
    <g transform="translate(500, 250)">
      <rect x="-20" y="-30" width="40" height="60" rx="4" fill="#3498DB" stroke="#2980B9" stroke-width="2" />
      <rect x="-10" y="-20" width="20" height="40" fill="#FFF" opacity="0.9" />
      <rect x="-5" y="-10" width="10" height="2" fill="#555" opacity="0.5" />
      <path d="M-20 -25 L20 -25 L20 -20 L-20 -20 Z" fill="#2ECC71" />
      <text x="0" y="75" font-family="Arial" font-size="10" fill="#333" text-anchor="middle" font-weight="bold">Mobile</text>
    </g>
    <!-- Card/Cash -->
    <g transform="translate(560, 280)">
      <rect x="-30" y="-10" width="60" height="20" rx="2" fill="#ECF0F1" stroke="#BDC3C7" stroke-width="2" />
      <rect x="-25" y="-5" width="15" height="8" fill="#E74C3C" />
      <circle cx="-5" cy="-2" r="4" fill="#F1C40F" />
      <circle cx="15" cy="-2" r="4" fill="#2ECC71" />
      <text x="0" y="55" font-family="Arial" font-size="10" fill="#333" text-anchor="middle">Pago</text>
    </g>
  </g>

  <!-- Decorative Elements (Burkina Faso context hint) -->
  <g id="decorative">
    <rect x="700" y="360" width="80" height="100" fill="#D35400" /> <!-- Local Hut -->
    <path d="M680 360 L700 320 L720 360 Z" fill="#E74C3C" /> <!-- Roof -->
  </g>
</svg>