<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Main Rug Gradient: Deep Velvet Red -->
    <radialGradient id="rugGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#660000;stop-opacity:1" />
      <stop offset="40%" style="stop-color:#4d0000;stop-opacity:1" />
      <stop offset="80%" style="stop-color:#380000;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#220000;stop-opacity:1" />
    </radialGradient>

    <!-- Gold Accents Gradient -->
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b8860b;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#ffd700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b6508;stop-opacity:1" />
    </linearGradient>

    <!-- Cyberpunk Metallic Sheen -->
    <linearGradient id="steelGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#444444;stop-opacity:0.8" />
      <stop offset="50%" style="stop-color:#666666;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#333333;stop-opacity:0.8" />
    </linearGradient>

    <!-- Soft Drop Shadow for Depth -->
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.6" />
    </filter>

    <!-- Noise Texture for Velvet -->
    <pattern id="noiseTexture" x="0" y="0" width="10" height="10" patternUnits="userSpaceOnUse">
      <rect width="10" height="10" fill="#000000" opacity="0.05"/>
      <circle cx="2" cy="2" r="0.5" fill="#000000" opacity="0.05"/>
      <circle cx="7" cy="8" r="0.5" fill="#000000" opacity="0.05"/>
    </pattern>
    
    <!-- Vignette for Noir Atmosphere -->
    <radialGradient id="vignetteGradient" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="70%" style="stop-color:#000000;stop-opacity:0" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0.7" />
    </radialGradient>
  </defs>

  <!-- Background: Polished Corporate Floor -->
  <rect x="0" y="0" width="512" height="512" fill="#1a1a1a" />
  
  <!-- Subtle Grid Lines (Cyberpunk Corporate Floor) -->
  <path d="M0 256 L512 256 M256 0 L256 512" stroke="#2a2a2a" stroke-width="2" opacity="0.3" />
  <rect x="4" y="4" width="504" height="504" fill="none" stroke="#2a2a2a" stroke-width="1" />

  <!-- Rug Base Shape -->
  <g transform="translate(16, 16)" filter="url(#softShadow)">
    <!-- Main Rug Body -->
    <path d="M32 16 C32 8, 480 8, 480 16 L480 496 C480 504, 32 504, 32 496 Z" fill="url(#rugGradient)" />
    <!-- Rug Border Frame -->
    <rect x="16" y="16" width="448" height="480" fill="none" stroke="#220000" stroke-width="2" />
    <rect x="24" y="24" width="432" height="464" fill="none" stroke="#380000" stroke-width="4" />
  </g>

  <!-- Ornate Persian Style Patterns (Gold & Dark Crimson) -->
  <g transform="translate(28, 28)" fill="none" stroke-width="1.5">
    
    <!-- Central Diamond Medallion -->
    <path d="M256 32 L424 200 L256 368 L88 200 Z" fill="none" stroke="#660000" stroke-width="2" />
    <path d="M256 56 L394 194 L256 332 L118 194 Z" fill="none" stroke="url(#goldGradient)" stroke-width="1" />
    <circle cx="256" cy="200" r="40" fill="none" stroke="url(#goldGradient)" stroke-width="2" />
    <path d="M256 180 L276 200 L256 220 L236 200 Z" fill="none" stroke="#8b0000" />

    <!-- Corner Motifs (Four Quarters) -->
    <g transform="translate(0,0)">
      <!-- Top Left -->
      <path d="M32 32 C32 20, 100 20, 100 40 C100 50, 80 50, 70 60 L32 48 Z" fill="#220000" />
      <path d="M32 32 C32 20, 100 20, 100 40 C100 50, 80 50, 70 60 L32 48 Z" fill="none" stroke="url(#goldGradient)" stroke-width="1" />
      
      <!-- Top Right -->
      <path d="M480 32 C480 20, 412 20, 412 40 C412 50, 432 50, 442 60 L480 48 Z" fill="#220000" />
      <path d="M480 32 C480 20, 412 20, 412 40 C412 50, 432 50, 442 60 L480 48 Z" fill="none" stroke="url(#goldGradient)" stroke-width="1" />

      <!-- Bottom Left -->
      <path d="M32 480 C32 492, 100 492, 100 472 C100 462, 80 462, 70 452 L32 464 Z" fill="#220000" />
      <path d="M32 480 C32 492, 100 492, 100 472 C100 462, 80 462, 70 452 L32 464 Z" fill="none" stroke="url(#goldGradient)" stroke-width="1" />

      <!-- Bottom Right -->
      <path d="M480 480 C480 492, 412 492, 412 472 C412 462, 432 462, 442 452 L480 464 Z" fill="#220000" />
      <path d="M480 480 C480 492, 412 492, 412 472 C412 462, 432 462, 442 452 L480 464 Z" fill="none" stroke="url(#goldGradient)" stroke-width="1" />
    </g>

    <!-- Border Geometric Pattern -->
    <rect x="16" y="16" width="448" height="464" rx="4" fill="none" stroke="#220000" stroke-width="20" opacity="0.5" />
    <rect x="24" y="24" width="432" height="448" rx="4" fill="none" stroke="url(#goldGradient)" stroke-width="4" opacity="0.8" />
    <rect x="32" y="32" width="416" height="432" rx="2" fill="none" stroke="#4d0000" stroke-width="2" />
  </g>

  <!-- Texture & Lighting Overlays -->
  <g transform="translate(16, 16)">
    <rect x="0" y="0" width="480" height="480" fill="url(#noiseTexture)" opacity="0.4" />
    <rect x="0" y="0" width="480" height="480" fill="url(#vignetteGradient)" />
  </g>

  <!-- Cyberpunk Corporate Noire Accent (Subtle Neon Reflection) -->
  <g opacity="0.3">
    <path d="M256 20 Q256 150, 480 480" fill="none" stroke="#00d9ff" stroke-width="1" stroke-dasharray="4 4" />
    <path d="M256 20 Q256 150, 32 480" fill="none" stroke="#00d9ff" stroke-width="1" stroke-dasharray="4 4" />
  </g>

  <!-- Power Symbol (Stylized Diamond/Crown) in Center -->
  <g transform="translate(28, 28)">
     <path d="M256 190 L268 200 L256 210 L244 200 Z" fill="#000" />
     <circle cx="256" cy="200" r="1" fill="#d4af37" />
  </g>

</svg>