<svg viewBox="0 0 400 150" xmlns="http://www.w3.org/2000/svg">
  <!-- Background/Canvas -->
  <rect width="400" height="150" fill="white"/>
  
  <!-- Logo Icon Group -->
  <g id="logo-icon" transform="translate(20, 25)">
    <!-- Ghost outline vector shape -->
    <path id="ghost-shape" 
          d="M 25 15 L 15 20 L 10 30 L 5 35 L 5 60 Q 5 75 25 75 Q 45 75 45 60 L 45 35 L 40 30 L 35 20 Z"
          fill="none" 
          stroke="#6366f1" 
          stroke-width="2"
          opacity="0.9"/>
    
    <!-- Inner ghost detail - eyes -->
    <circle cx="18" cy="42" r="3" fill="#6366f1" opacity="0.7"/>
    <circle cx="32" cy="42" r="3" fill="#6366f1" opacity="0.7"/>
    
    <!-- Vector path accent line -->
    <path d="M 25 15 L 18 25 L 25 35 L 32 25 L 25 15" 
          fill="none" 
          stroke="#818cf8" 
          stroke-width="1.5"/>
    
    <!-- Glow effect (lower opacity for subtle transparency) -->
    <path id="ghost-glow" 
          d="M 25 15 L 15 20 L 10 30 L 5 35 L 5 60 Q 5 75 25 75 Q 45 75 45 60 L 45 35 L 40 30 L 35 20 Z"
          fill="none" 
          stroke="#6366f1" 
          stroke-width="1"
          opacity="0.3"/>
  </g>
  
  <!-- Text Label Group -->
  <g id="logo-text" transform="translate(80, 75)">
    <!-- "Ghost" text -->
    <text id="word-ghost" 
          x="0" 
          y="0" 
          font-family="Arial, sans-serif" 
          font-size="24" 
          font-weight="bold"
          fill="#6366f1">Ghost</text>
    
    <!-- "Vector" text -->
    <text id="word-vector" 
          x="70" 
          y="0" 
          font-family="Arial, sans-serif" 
          font-size="24" 
          font-weight="300"
          fill="#818cf8">Vector</text>
    
    <!-- Small tagline -->
    <text id="tagline" 
          x="0" 
          y="22" 
          font-family="Arial, sans-serif" 
          font-size="10" 
          fill="#94a3b8"
          letter-spacing="3">PREMIUM SOLUTIONS</text>
  </g>
  
  <!-- Decorative Elements -->
  <g id="decorative">
    <!-- Small vector nodes -->
    <circle cx="18" cy="42" r="1.5" fill="#818cf8" opacity="0.6"/>
    <circle cx="32" cy="42" r="1.5" fill="#818cf8" opacity="0.6"/>
    
    <!-- Subtle background dots -->
    <circle cx="380" cy="20" r="2" fill="#6366f1" opacity="0.2"/>
    <circle cx="385" cy="120" r="2" fill="#6366f1" opacity="0.2"/>
  </g>
</svg>