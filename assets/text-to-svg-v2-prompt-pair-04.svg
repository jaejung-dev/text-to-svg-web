<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Definitions for gradients and filters -->
  <defs>
    <linearGradient id="gradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="gradient2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f093fb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5576c;stop-opacity:1" />
    </linearGradient>
    
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0" />
    </radialGradient>
    
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background circle -->
  <g id="background">
    <circle cx="200" cy="200" r="180" fill="url(#gradient1)"/>
  </g>

  <!-- Center circles pattern -->
  <g id="center-elements">
    <circle cx="200" cy="200" r="100" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
    <circle cx="200" cy="200" r="70" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
    <circle cx="200" cy="200" r="40" fill="#fff" opacity="0.9"/>
  </g>

  <!-- Decorative squares around center -->
  <g id="decorative-shapes">
    <rect x="120" y="120" width="60" height="60" rx="10" fill="url(#gradient2)" filter="url(#shadow)"/>
    <rect x="220" y="120" width="60" height="60" rx="10" fill="url(#gradient1)" filter="url(#shadow)"/>
    <rect x="120" y="220" width="60" height="60" rx="10" fill="url(#gradient2)" filter="url(#shadow)"/>
    <rect x="220" y="220" width="60" height="60" rx="10" fill="url(#gradient1)" filter="url(#shadow)"/>
  </g>

  <!-- Connecting lines -->
  <g id="connecting-lines" opacity="0.5">
    <line x1="150" y1="150" x2="250" y2="150" stroke="#fff" stroke-width="2"/>
    <line x1="150" y1="250" x2="250" y2="250" stroke="#fff" stroke-width="2"/>
    <line x1="150" y1="150" x2="150" y2="250" stroke="#fff" stroke-width="2"/>
    <line x1="250" y1="150" x2="250" y2="250" stroke="#fff" stroke-width="2"/>
  </g>

  <!-- Floating particles -->
  <g id="particles" opacity="0.7">
    <circle cx="80" cy="200" r="5" fill="#fff">
      <animate attributeName="cy" values="200;180;200" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="320" cy="200" r="5" fill="#fff">
      <animate attributeName="cy" values="200;220;200" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="200" cy="80" r="5" fill="#fff">
      <animate attributeName="cy" values="80;60;80" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="200" cy="320" r="5" fill="#fff">
      <animate attributeName="cy" values="320;340;320" dur="3s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Glow effect behind center -->
  <g id="glow-effect" opacity="0.4">
    <circle cx="200" cy="200" r="100" fill="url(#glow)"/>
  </g>
</svg>