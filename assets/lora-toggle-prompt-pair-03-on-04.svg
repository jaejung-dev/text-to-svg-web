<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Sky Background -->
  <defs>
    <linearGradient id="skyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3c72;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#87CEEB;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="mountainGradient1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4a5568;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d3748;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="mountainGradient2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#718096;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4a5568;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Sky Layer -->
  <g id="sky">
    <rect width="800" height="600" fill="url(#skyGradient)" />
  </g>
  
  <!-- Sun -->
  <g id="sun" opacity="0.9">
    <circle cx="700" cy="100" r="40" fill="#FDB813" opacity="0.9" />
    <circle cx="700" cy="100" r="55" fill="#FDB813" opacity="0.3" />
  </g>
  
  <!-- Clouds -->
  <g id="clouds" opacity="0.8">
    <ellipse cx="150" cy="120" rx="60" ry="25" fill="white" />
    <ellipse cx="220" cy="110" rx="70" ry="30" fill="white" />
    <ellipse cx="100" cy="140" rx="50" ry="20" fill="white" />
    
    <ellipse cx="600" cy="180" rx="50" ry="22" fill="white" />
    <ellipse cx="680" cy="170" rx="60" ry="25" fill="white" />
    <ellipse cx="530" cy="200" rx="45" ry="20" fill="white" />
  </g>
  
  <!-- Distant Mountains -->
  <g id="distant-mountains" fill="url(#mountainGradient1)">
    <polygon points="0,500 150,300 300,450 450,350 600,480 750,320 800,420 800,600 0,600" />
  </g>
  
  <!-- Middle Ground Mountains -->
  <g id="middle-mountains" fill="url(#mountainGradient2)">
    <polygon points="0,550 200,380 400,480 600,400 750,520 800,580 800,600 0,600" />
  </g>
  
  <!-- Foreground Mountain Base -->
  <g id="foreground-mountains" fill="#2d3748">
    <polygon points="0,600 180,450 320,520 480,440 620,540 750,480 800,550 800,600 0,600" />
  </g>
  
  <!-- Eagle -->
  <g id="eagle" transform="translate(600, 180) scale(1)">
    <!-- Body -->
    <ellipse cx="0" cy="0" rx="25" ry="15" fill="#3d2914" />
    
    <!-- Head -->
    <circle cx="30" cy="-20" r="12" fill="#8B4513" />
    
    <!-- Beak -->
    <path d="M 38,-25 L 48,-22 L 38,-20" fill="#F5A623" />
    
    <!-- Eye -->
    <circle cx="34" cy="-22" r="2" fill="black" />
    
    <!-- Left Wing -->
    <path d="M -20,-5 Q -80,-80 -120,-30 L -60,-15 Z" fill="#4a3728" />
    <path d="M -20,-5 Q -80,-60 -110,-20 L -60,-10 Z" fill="#6b5344" opacity="0.8" />
    
    <!-- Right Wing -->
    <path d="M 20,-5 Q 80,-80 120,-30 L 60,-15 Z" fill="#4a3728" />
    <path d="M 20,-5 Q 80,-60 110,-20 L 60,-10 Z" fill="#6b5344" opacity="0.8" />
    
    <!-- Tail -->
    <path d="M -10,10 L -25,25 L 0,20 L 25,25 L 10,10" fill="#3d2914" />
    
    <!-- Legs/Claws -->
    <line x1="0" y1="12" x2="-5" y2="20" stroke="#F5A623" stroke-width="2" />
    <line x1="0" y1="12" x2="5" y2="20" stroke="#F5A623" stroke-width="2" />
  </g>
  
  <!-- Flying Motion Lines for Eagle -->
  <g id="eagle-motion" opacity="0.4">
    <line x1="480" y1="165" x2="550" y2="190" stroke="white" stroke-width="2" />
    <line x1="490" y1="150" x2="560" y2="175" stroke="white" stroke-width="2" />
  </g>
  
  <!-- Trees on Mountain -->
  <g id="trees" fill="#2d5a27">
    <polygon points="100,580 120,520 140,580" />
    <polygon points="110,580 130,510 150,580" />
    
    <polygon points="300,570 320,500 340,570" />
    <polygon points="310,570 330,490 350,570" />
    <polygon points="320,570 340,480 360,570" />
    
    <polygon points="550,560 570,500 590,560" />
    <polygon points="560,560 580,490 600,560" />
    
    <polygon points="700,550 720,490 740,550" />
  </g>
</svg>