<svg viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <!-- Browser Window Frame -->
  <g id="browser-frame">
    <rect x="20" y="20" width="460" height="460" rx="15" ry="15" fill="#FDD835" />
    <!-- Window Controls (Three Black Dots) -->
    <circle cx="110" cy="60" r="8" fill="#333333" />
    <circle cx="130" cy="60" r="8" fill="#333333" />
    <circle cx="150" cy="60" r="8" fill="#333333" />
  </g>

  <!-- Background Scene Area -->
  <g id="scene">
    <!-- Desk -->
    <rect x="20" y="280" width="460" height="200" fill="#FBC02D" />
    
    <!-- Stack of Paper -->
    <g id="paper-stack">
      <rect x="100" y="200" width="300" height="220" fill="#FFFFFF" rx="4" />
      <rect x="110" y="210" width="280" height="210" fill="#FFFFFF" stroke="#EEEEEE" stroke-width="2" rx="4" />
      <!-- Lined Paper Texture -->
      <g id="paper-lines">
        <line x1="120" y1="230" x2="390" y2="230" stroke="#B0BEC5" stroke-width="1.5" />
        <line x1="120" y1="260" x2="390" y2="260" stroke="#B0BEC5" stroke-width="1.5" />
        <line x1="120" y1="290" x2="390" y2="290" stroke="#B0BEC5" stroke-width="1.5" />
        <line x1="120" y1="320" x2="390" y2="320" stroke="#B0BEC5" stroke-width="1.5" />
        <line x1="120" y1="350" x2="390" y2="350" stroke="#B0BEC5" stroke-width="1.5" />
      </g>
    </g>

    <!-- The Person -->
    <g id="person">
      <!-- Red Top -->
      <path d="M160 350 Q250 450 340 350 L340 320 L160 320 Z" fill="#E53935" />
      <!-- Arms -->
      <path d="M160 320 Q130 300 150 280" stroke="#FFCCBC" stroke-width="25" stroke-linecap="round" fill="none"/>
      
      <!-- Head -->
      <circle cx="250" cy="220" r="45" fill="#FFCCBC" />
      <!-- Dark Hair -->
      <path d="M190 220 C190 160 230 150 250 150 C270 150 310 160 310 220 L310 240 C310 240 290 240 250 240 C210 240 190 240 190 240 Z" fill="#37474F" />
      <path d="M190 220 C180 240 170 250 180 260" stroke="#37474F" stroke-width="15" fill="none"/>
      
      <!-- Face Details -->
      <circle cx="235" cy="215" r="3" fill="#333333" /> <!-- Eye -->
      <circle cx="265" cy="215" r="3" fill="#333333" /> <!-- Eye -->
      <path d="M235 230 Q250 240 265 230" fill="none" stroke="#333333" stroke-width="2" stroke-linecap="round" /> <!-- Smile -->
      
      <!-- Writing Hand -->
      <g id="hand-writing">
        <path d="M260 290 L280 320" stroke="#FFCCBC" stroke-width="25" stroke-linecap="round" />
        <circle cx="280" cy="320" r="8" fill="#FFCCBC" /> <!-- Knuckles -->
      </g>
    </g>

    <!-- Pencil -->
    <g id="pencil" transform="rotate(-15 290 310)">
      <line x1="275" y1="325" x2="305" y2="300" stroke="#FFD54F" stroke-width="12" stroke-linecap="round" />
      <!-- Eraser -->
      <rect x="275" y="315" width="10" height="12" fill="#F48FB1" rx="2" />
      <line x1="280" y1="315" x2="280" y2="327" stroke="#8D6E63" stroke-width="1" />
      <!-- Tip -->
      <polygon points="305,300 312,305 305,315" fill="#333333" /> <!-- Lead -->
    </g>
  </g>
</svg>