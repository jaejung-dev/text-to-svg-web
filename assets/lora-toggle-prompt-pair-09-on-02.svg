<svg viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Circle -->
  <defs>
    <radialGradient id="bgGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#f5f5f5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8e8e8;stop-opacity:1" />
    </radialGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <circle cx="150" cy="150" r="140" fill="url(#bgGradient)"/>
  
  <!-- Main SAP Trapezoid Shape (red) -->
  <g id="sap-trapezoid" filter="url(#shadow)">
    <polygon points="60,100 240,100 180,200 120,200" fill="#E74424"/>
  </g>
  
  <!-- White Line Pattern (SAP logo style) -->
  <g id="sap-lines">
    <line x1="60" y1="125" x2="180" y2="200" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round"/>
    <line x1="180" y1="125" x2="240" y2="200" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round"/>
  </g>
  
  <!-- Infrastructure Elements -->
  <g id="infrastructure" transform="translate(150, 160)">
    <!-- Server Rack -->
    <rect x="-35" y="20" width="70" height="50" rx="5" fill="#2D5F8D" opacity="0.9"/>
    <rect x="-30" y="25" width="60" height="8" rx="2" fill="#4A90E2"/>
    <rect x="-30" y="38" width="60" height="8" rx="2" fill="#4A90E2"/>
    <rect x="-30" y="51" width="60" height="8" rx="2" fill="#4A90E2"/>
    
    <!-- Connection Lines -->
    <path d="M-45,35 Q-55,25 -50,15" stroke="#2D5F8D" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M45,35 Q55,25 50,15" stroke="#2D5F8D" stroke-width="2" fill="none" stroke-linecap="round"/>
    
    <!-- Support Shield -->
    <path d="M0,-30 C-20,-30 -35,-10 -35,10 C-35,25 0,35 0,45 C0,35 35,25 35,10 C35,-10 20,-30 0,-30" fill="#2D5F8D" opacity="0.8"/>
    <circle cx="0" cy="0" r="8" fill="#4A90E2"/>
  </g>
  
  <!-- Support Badge -->
  <circle cx="150" cy="180" r="30" fill="#2D5F8D" opacity="0.95" filter="url(#shadow)"/>
  
  <!-- Shield Icon -->
  <g id="shield" transform="translate(150, 180)">
    <path d="M0,-15 C-10,-15 -15,-5 -15,5 C-15,12 0,18 0,22 C0,18 15,12 15,5 C15,-5 10,-15 0,-15" fill="#FFFFFF"/>
    <path d="M0,0 L-5,5 L0,10 L5,5 Z" fill="#2D5F8D"/>
    <path d="M-8,-3 L8,-3 L5,5 L-5,5 Z" fill="#4A90E2"/>
  </g>
  
  <!-- Technical Connection Dots -->
  <circle cx="120" cy="140" r="4" fill="#4A90E2"/>
  <circle cx="180" cy="140" r="4" fill="#4A90E2"/>
  <circle cx="150" cy="125" r="4" fill="#4A90E2"/>
  
  <!-- Status Light -->
  <circle cx="150" cy="125" r="6" fill="#4CAF50" opacity="0.9" filter="url(#shadow)">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Modern Grid Lines -->
  <g id="grid" stroke="#4A90E2" stroke-width="1" opacity="0.3">
    <line x1="40" y1="200" x2="260" y2="200"/>
    <line x1="40" y1="220" x2="260" y2="220"/>
    <line x1="150" y1="120" x2="150" y2="240"/>
    <line x1="160" y1="120" x2="160" y2="240"/>
  </g>
</svg>