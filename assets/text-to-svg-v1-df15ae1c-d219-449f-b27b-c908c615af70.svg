<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300">
  <!-- Flower Petals -->
  <g id="flower-petals">
    <!-- Petal 1 (top) -->
    <ellipse cx="100" cy="70" rx="35" ry="25" fill="#D8BFD8" stroke="#FFB6C1" stroke-width="3"/>
    <!-- Petal 2 (top-right) -->
    <ellipse cx="135" cy="75" rx="35" ry="25" fill="#D8BFD8" stroke="#FFB6C1" stroke-width="3" transform="rotate(60, 100, 85)"/>
    <!-- Petal 3 (bottom-right) -->
    <ellipse cx="135" cy="115" rx="35" ry="25" fill="#D8BFD8" stroke="#FFB6C1" stroke-width="3" transform="rotate(120, 100, 85)"/>
    <!-- Petal 4 (bottom-left) -->
    <ellipse cx="65" cy="115" rx="35" ry="25" fill="#D8BFD8" stroke="#FFB6C1" stroke-width="3" transform="rotate(240, 100, 85)"/>
    <!-- Petal 5 (top-left) -->
    <ellipse cx="65" cy="75" rx="35" ry="25" fill="#D8BFD8" stroke="#FFB6C1" stroke-width="3" transform="rotate(300, 100, 85)"/>
  </g>

  <!-- Flower Center -->
  <g id="flower-center">
    <circle cx="100" cy="90" r="22" fill="#FFFACD"/>
  </g>

  <!-- Flower Stem -->
  <g id="flower-stem">
    <path d="M100 115 Q 95 150 100 180" stroke="#4CAF50" stroke-width="6" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Left Leaf -->
  <g id="left-leaf">
    <ellipse cx="70" cy="160" rx="20" ry="12" fill="#66BB6A" transform="rotate(-30, 70, 160)"/>
  </g>

  <!-- Right Leaf -->
  <g id="right-leaf">
    <ellipse cx="130" cy="160" rx="20" ry="12" fill="#66BB6A" transform="rotate(30, 130, 160)"/>
  </g>
</svg>