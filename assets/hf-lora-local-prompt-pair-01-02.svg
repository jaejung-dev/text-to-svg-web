<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- Definitions for Gradients and Effects -->
    <defs>
        <!-- Modern Gradient for the Support Base -->
        <linearGradient id="supportGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#004c8c;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#00a0e4;stop-opacity:1" />
        </linearGradient>
        
        <!-- Shadow -->
        <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="10"/>
            <feOffset dx="0" dy="10" result="offsetblur"/>
            <feComponentTransfer>
                <feFuncA type="linear" slope="0.3"/>
            </feComponentTransfer>
            <feMerge>
                <feMergeNode/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>

        <!-- Glassmorphism Gradient for the SAP Shape Overlay -->
        <linearGradient id="sapOverlay" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.4" />
            <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.1" />
        </linearGradient>
    </defs>

    <!-- 1. Background Base (The "Foundation" Context) -->
    <g id="Background">
        <circle cx="256" cy="256" r="250" fill="#1a2b4c"/>
        <circle cx="256" cy="256" r="240" stroke="#2d4266" stroke-width="2"/>
    </g>

    <!-- 2. The "Support" Element (Gear Icon) -->
    <!-- Positioned slightly lower to represent the foundational nature of BASIS -->
    <g id="GearSupport" transform="translate(256, 280) scale(0.7)">
        <g fill="url(#supportGradient)">
            <!-- Main Gear Teeth -->
            <path d="M60,0 L70,-30 L100,-30 L110,0 L150,0 L160,-30 L190,-30 L200,0 L230,0 L240,-30 L270,-30 L280,0 L310,0 L320,-30 L350,-30 L360,0 L390,0 L400,30 L370,30 L360,60 L390,60 L400,90 L370,90 L360,120 L350,150 L320,150 L310,180 L280,180 L270,150 L240,150 L230,180 L200,180 L190,150 L150,150 L140,180 L110,180 L100,150 L70,150 L60,180 L30,180 L20,150 L0,150 L10,120 L0,90 L10,60 L0,30 L30,30 L40,0 L0,0 L10,-30 L0,-60 L30,-60 L40,-90 L10,-90 L0,-120 L30,-120 L40,-150 L70,-150 L80,-180 L110,-180 L120,-150 L150,-150 L160,-180 L190,-180 L200,-150 L230,-150 L240,-180 L270,-180 L280,-150 L310,-150 L320,-180 L350,-180 L360,-150 L390,-150 L400,-180 L430,-180 L440,-150 L470,-150 L480,-30 L510,-30 L500,0 L470,0 L460,30 L430,30 L420,0 L390,0 L380,30 L350,30 L340,0 L310,0 L300,30 L270,30 L260,0 L230,0 L220,30 L190,30 L180,0 L150,0 L140,30 L110,30 L100,0 L70,0 L60,30 L30,30 L20,0 L0,0 L10,-30 L40,-30 L50,0 L60,0 Z" fill="#005696" />
            <!-- Inner Circle -->
            <circle cx="256" cy="90" r="40" fill="#00a0e4" stroke="#ffffff" stroke-width="4"/>
        </g>
    </g>

    <!-- 3. The "SAP Shape" (Abstract Representation) -->
    <!-- Represents the SAP Application sitting on the Support -->
    <g id="SAPShape" transform="translate(256, 180)" filter="url(#dropShadow)">
        <!-- This group mimics the 4-block SAP logo structure but modernized -->
        
        <!-- Top Left Block (Blueish) -->
        <path d="M10,40 L110,40 L130,100 L30,100 Z" fill="#00A9E0"/>
        
        <!-- Top Right Block (Greenish) -->
        <path d="M110,40 L210,40 L230,100 L130,100 Z" fill="#7BB42E"/>
        
        <!-- Bottom Left Block (Redish) -->
        <path d="M30,100 L130,100 L150,160 L50,160 Z" fill="#CC104E"/>
        
        <!-- Bottom Right Block (Yellowish) -->
        <path d="M130,100 L230,100 L250,160 L150,160 Z" fill="#FFAE1F"/>
    </g>

    <!-- 4. Modern Styling: Unifying Overlay -->
    <g id="Overlay" opacity="0.3">
        <!-- A subtle geometric overlay to connect the two concepts -->
        <path d="M0,0 L512,0 L512,512 L0,512 Z" fill="url(#sapOverlay)"/>
    </g>

    <!-- 5. Highlight/Text Accent (The "Plus" sign for Support) -->
    <g id="SupportPlus" transform="translate(256, 300)">
        <rect x="-20" y="-20" width="40" height="40" rx="8" fill="#ffffff" opacity="0.9"/>
        <path d="M0,-40 V0 M0,40 V0 M-40,0 H0 M40,0 H0" stroke="#00a0e4" stroke-width="6" stroke-linecap="round"/>
    </g>
</svg>