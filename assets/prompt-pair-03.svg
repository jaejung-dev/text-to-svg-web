<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Sky Background -->
  <defs>
    <linearGradient id="skyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a476a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#4a90c4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#87ceeb;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="mountainGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2d4a3e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e332a;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect width="800" height="600" fill="url(#skyGradient)" />

  <!-- Sun -->
  <circle cx="700" cy="100" r="40" fill="#ffd93d" opacity="0.9" />
  <circle cx="700" cy="100" r="60" fill="#ffd93d" opacity="0.3" />

  <!-- Background Mountains -->
  <g id="background-mountains" fill="url(#mountainGradient)" opacity="0.8">
    <path d="M0 400 L150 280 L300 400 L400 340 L500 400 L600 320 L700 400 L800 380 L800 600 L0 600 Z" />
    <path d="M50 420 L180 320 L320 420 L420 380 L520 420 L650 350 L750 420 L800 400 L800 600 L0 600 Z" />
  </g>

  <!-- Foreground Mountains -->
  <g id="foreground-mountains" fill="#1e332a" opacity="1">
    <path d="M0 500 L120 400 L240 500 L320 450 L400 500 L500 430 L600 500 L700 450 L800 500 L800 600 L0 600 Z" />
  </g>

  <!-- Ground -->
  <rect x="0" y="580" width="800" height="20" fill="#3d5c3f" />
  <rect x="0" y="595" width="800" height="5" fill="#5a8a5d" />

  <!-- Eagle -->
  <g id="eagle" transform="translate(550, 150)">
    <path d="M0 0 L-25 -10 L-15 -2 L-20 -25 L-28 -30 L-18 -18 L-5 -20 Z" fill="#1a1a1a" />
    <path d="M0 0 L25 -10 L15 -2 L20 -25 L28 -30 L18 -18 L5 -20 Z" fill="#1a1a1a" />
    <circle cx="-8" cy="-2" r="2" fill="#000" />
    <circle cx="8" cy="-2" r="2" fill="#000" />
    <path d="M-5 -5 Q0 -8 5 -5" fill="none" stroke="#000" stroke-width="1" />
  </g>

  <!-- Eagle Shadow -->
  <ellipse cx="550" cy="520" rx="80" ry="15" fill="#000" opacity="0.15" />

  <!-- Clouds -->
  <g id="clouds" fill="#ffffff" opacity="0.8">
    <ellipse cx="100" cy="80" rx="60" ry="20" />
    <ellipse cx="140" cy="70" rx="50" ry="18" />
    <ellipse cx="600" cy="120" rx="70" ry="25" />
    <ellipse cx="660" cy="105" rx="55" ry="20" />
    <ellipse cx="280" cy="150" rx="45" ry="15" />
  </g>
</svg>