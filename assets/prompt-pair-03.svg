<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Sky Background -->
  <defs>
    <linearGradient id="skyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#87CEEB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E0F6FF;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="mountainGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6B8E23;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2E461E;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="800" height="600" fill="url(#skyGradient)"/>
  
  <!-- Sun -->
  <circle cx="720" cy="80" r="40" fill="#FFD700" opacity="0.9"/>
  
  <!-- Distant Mountains (Back Layer) -->
  <g id="distant-mountains" fill="#4A5D23">
    <path d="M 0 350 L 150 200 L 300 350 Z"/>
    <path d="M 200 340 L 380 180 L 560 340 Z"/>
    <path d="M 450 350 L 620 220 L 800 350 Z"/>
  </g>
  
  <!-- Mid-ground Mountains -->
  <g id="mid-mountains" fill="url(#mountainGradient)">
    <path d="M 0 400 L 180 280 L 360 400 Z"/>
    <path d="M 300 390 L 520 240 L 740 390 Z"/>
  </g>
  
  <!-- Foreground Mountains -->
  <g id="foreground-mountains" fill="#1E3314">
    <path d="M 0 500 L 220 380 L 440 500 Z"/>
    <path d="M 350 500 L 550 360 L 750 500 L 650 600 L 0 600 Z"/>
  </g>
  
  <!-- Trees on Mountains -->
  <g id="mountain-trees" fill="#1A2E12">
    <path d="M 100 480 L 120 430 L 140 480 Z"/>
    <path d="M 250 470 L 270 420 L 290 470 Z"/>
    <path d="M 600 480 L 620 430 L 640 480 Z"/>
    <path d="M 700 475 L 720 425 L 740 475 Z"/>
  </g>
  
  <!-- Snow Caps on Mountains -->
  <g id="snow-caps" fill="#FFFFFF">
    <path d="M 280 180 L 300 190 L 260 200 Z"/>
    <path d="M 540 220 L 560 230 L 520 240 Z"/>
    <path d="M 420 360 L 440 370 L 400 380 Z"/>
  </g>
  
  <!-- Clouds -->
  <g id="clouds" fill="#FFFFFF" opacity="0.8">
    <ellipse cx="150" cy="120" rx="60" ry="25"/>
    <ellipse cx="200" cy="125" rx="50" ry="20"/>
    <ellipse cx="500" cy="100" rx="70" ry="30"/>
    <ellipse cx="580" cy="105" rx="55" ry="22"/>
  </g>
  
  <!-- Eagle -->
  <g id="eagle" transform="translate(400, 150) scale(0.8)">
    <!-- Wings -->
    <path d="M -80 -20 Q -120 -100 -140 -50 Q -100 -80 -60 -25 Z" fill="#4B3621"/>
    <path d="M 80 -20 Q 120 -100 140 -50 Q 100 -80 60 -25 Z" fill="#4B3621"/>
    
    <!-- Body -->
    <ellipse cx="0" cy="0" rx="35" ry="25" fill="#8B4513"/>
    
    <!-- Head -->
    <ellipse cx="-30" cy="-25" rx="15" ry="18" fill="#DAA520"/>
    
    <!-- Beak -->
    <path d="M -40 -20 Q -55 -25 -45 -15 Z" fill="#FFA500"/>
    
    <!-- Tail -->
    <path d="M 25 10 Q 5 25 -10 15 Q 10 5 25 10 Z" fill="#654321"/>
    
    <!-- Wing Details -->
    <path d="M -120 -60 L -100 -50 L -80 -65 Z" fill="#8B4513" opacity="0.6"/>
    <path d="M 120 -60 L 100 -50 L 80 -65 Z" fill="#8B4513" opacity="0.6"/>
  </g>
  
  <!-- Ground/Base -->
  <ellipse cx="400" cy="600" rx="400" ry="50" fill="#3A5A40"/>
  
  <!-- Grass in Foreground -->
  <ellipse cx="400" cy="600" rx="350" ry="30" fill="#2E5A28"/>
  
</svg>