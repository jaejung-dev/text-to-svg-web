<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 150" width="400" height="150">
  <!-- Define gradient for the bell icon -->
  <defs>
    <linearGradient id="bellGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0066CC;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#003366;stop-opacity:1" />
    </linearGradient>
    
    <!-- Gradient for background elements -->
    <linearGradient id="waveGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#66B3FF;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#0066CC;stop-opacity:0.1" />
    </linearGradient>
  </defs>
  
  <!-- Background with subtle waves -->
  <g id="background">
    <path d="M 10,70 Q 30,80 50,70 T 90,70" fill="none" stroke="#E0E0E0" stroke-width="1"/>
    <path d="M 10,85 Q 30,95 50,85 T 90,85" fill="none" stroke="#E0E0E0" stroke-width="1"/>
    <path d="M 10,100 Q 30,110 50,100 T 90,100" fill="none" stroke="#E0E0E0" stroke-width="1"/>
  </g>
  
  <!-- Bell Icon Group -->
  <g id="bell-icon">
    <!-- Bell outline with modern design -->
    <path d="M 140,55 
             L 170,55 
             L 180,90 
             C 180,105 165,115 140,115 
             C 115,115 100,105 100,90 
             Z" 
          fill="url(#bellGradient)" 
          stroke="#003366" 
          stroke-width="2"/>
    
    <!-- Bell clapper (inner part for depth) -->
    <circle cx="140" cy="95" r="8" fill="#FFFFFF" opacity="0.2"/>
    
    <!-- Bell bottom curve highlight -->
    <path d="M 105,90 Q 140,110 175,90" 
          fill="none" 
          stroke="#FFFFFF" 
          stroke-width="2" 
          opacity="0.3"/>
    
    <!-- Signal waves representing communications -->
    <path d="M 185,75 Q 195,70 205,75 Q 215,80 205,85 Q 195,90 185,85" 
          fill="none" 
          stroke="#66B3FF" 
          stroke-width="2"/>
    <path d="M 185,65 Q 198,60 211,65 Q 224,70 211,75 Q 198,80 185,75" 
          fill="none" 
          stroke="#0099FF" 
          stroke-width="1.5"/>
  </g>
  
  <!-- Company Name Text -->
  <g id="company-name">
    <text x="225" y="70" 
          font-family="Arial, Helvetica, sans-serif" 
          font-size="36" 
          font-weight="700" 
          fill="#003366" 
          letter-spacing="2">
      Bell
    </text>
    
    <!-- Tagline -->
    <text x="225" y="95" 
          font-family="Arial, Helvetica, sans-serif" 
          font-size="12" 
          fill="#666666" 
          letter-spacing="3" 
          text-transform="uppercase">
      Communications
    </text>
  </g>
  
  <!-- Connection dots between icon and text -->
  <circle cx="220" cy="70" r="3" fill="#0099FF"/>
  <circle cx="220" cy="75" r="3" fill="#0066CC"/>
  <circle cx="220" cy="80" r="3" fill="#0099FF"/>
</svg>