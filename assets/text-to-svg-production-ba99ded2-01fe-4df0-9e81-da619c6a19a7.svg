<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="600" fill="#9370DB"/>
  
  <!-- Decorative Dashes Group -->
  <g id="decorative-dashes" fill="#FFB6C1" opacity="0.7">
    <rect x="50" y="50" width="20" height="4" transform="rotate(15 60 52)"/>
    <rect x="100" y="80" width="15" height="4" transform="rotate(-20 107 82)"/>
    <rect x="200" y="120" width="18" height="4" transform="rotate(30 209 122)"/>
    <rect x="300" y="60" width="12" height="4" transform="rotate(-10 306 62)"/>
    <rect x="400" y="150" width="22" height="4" transform="rotate(45 411 152)"/>
    <rect x="500" y="90" width="16" height="4" transform="rotate(-25 508 92)"/>
    <rect x="600" y="200" width="14" height="4" transform="rotate(20 607 202)"/>
    <rect x="700" y="130" width="19" height="4" transform="rotate(-15 709 132)"/>
    <rect x="150" y="250" width="17" height="4" transform="rotate(35 158 252)"/>
    <rect x="250" y="300" width="13" height="4" transform="rotate(-5 256 302)"/>
    <rect x="350" y="350" width="21" height="4" transform="rotate(40 360 352)"/>
    <rect x="450" y="280" width="15" height="4" transform="rotate(-30 457 282)"/>
    <rect x="550" y="400" width="18" height="4" transform="rotate(25 559 402)"/>
    <rect x="650" y="320" width="14" height="4" transform="rotate(-18 657 322)"/>
    <rect x="750" y="250" width="20" height="4" transform="rotate(55 760 252)"/>
    <rect x="80" y="350" width="16" height="4" transform="rotate(-12 88 352)"/>
    <rect x="180" y="420" width="19" height="4" transform="rotate(28 189 422)"/>
    <rect x="280" y="480" width="12" height="4" transform="rotate(-8 286 482)"/>
    <rect x="380" y="420" width="22" height="4" transform="rotate(50 391 422)"/>
    <rect x="480" y="500" width="17" height="4" transform="rotate(-22 488 502)"/>
    <rect x="580" y="450" width="15" height="4" transform="rotate(15 587 452)"/>
    <rect x="680" y="520" width="20" height="4" transform="rotate(-35 690 522)"/>
    <rect x="90" y="550" width="14" height="4" transform="rotate(42 97 552)"/>
    <rect x="190" y="520" width="18" height="4" transform="rotate(-10 199 522)"/>
  </g>
  
  <!-- Light Pink Squiggles Group -->
  <g id="pink-squiggles" fill="none" stroke="#FFB6C1" stroke-width="3" stroke-linecap="round" opacity="0.9">
    <path d="M 80,180 Q 100,170 120,190 T 160,180"/>
    <path d="M 200,220 Q 230,210 260,230 T 300,220"/>
    <path d="M 400,150 Q 430,140 460,160 T 500,150"/>
    <path d="M 550,280 Q 580,270 610,290 T 650,280"/>
    <path d="M 720,180 Q 750,170 780,190"/>
  </g>
  
  <!-- Green Blobs Group -->
  <g id="green-blobs" fill="#90EE90" opacity="0.85">
    <ellipse cx="150" y="320" rx="35" ry="28" transform="rotate(15 150 320)"/>
    <ellipse cx="320" y="420" rx="30" ry="32" transform="rotate(-20 320 420)"/>
    <ellipse cx="500" y="380" rx="38" ry="30" transform="rotate(25 500 380)"/>
    <ellipse cx="650" y="480" rx="28" ry="26" transform="rotate(-10 650 480)"/>
    <ellipse cx="220" y="520" rx="32" ry="34" transform="rotate(18 220 520)"/>
  </g>
  
  <!-- Peach Flower Group -->
  <g id="peach-flower" fill="#FFDAB9" opacity="0.9">
    <!-- Flower center -->
    <circle cx="450" cy="250" r="12" fill="#FFD7A0"/>
    <!-- Flower petals -->
    <ellipse cx="450" cy="220" rx="18" ry="12" transform="rotate(0 450 220)"/>
    <ellipse cx="475" cy="238" rx="18" ry="12" transform="rotate(72 450 250)"/>
    <ellipse cx="475" cy="285" rx="18" ry="12" transform="rotate(144 450 250)"/>
    <ellipse cx="425" cy="285" rx="18" ry="12" transform="rotate(216 450 250)"/>
    <ellipse cx="425" cy="238" rx="18" ry="12" transform="rotate(288 450 250)"/>
  </g>
  
  <!-- Pink Triangle Group -->
  <g id="pink-triangle" fill="#FF69B4" opacity="0.85">
    <polygon points="580,180 610,240 550,240"/>
  </g>
  
  <!-- Light Orange Spirals Group -->
  <g id="orange-spirals" fill="none" stroke="#FFD580" stroke-width="3" opacity="0.9">
    <path d="M 300,80 Q 330,80 330,110 Q 330,140 300,140 Q 270,140 270,110 Q 270,80 300,80"/>
    <path d="M 680,520 Q 710,520 710,550 Q 710,580 680,580 Q 650,580 650,550 Q 650,520 680,520"/>
    <path d="M 180,480 Q 200,480 200,500 Q 200,520 180,520 Q 160,520 160,500 Q 160,480 180,480"/>
  </g>
  
  <!-- Additional Soft Accent Shapes -->
  <g id="accent-shapes" opacity="0.6">
    <circle cx="100" cy="100" r="15" fill="#FFB6C1"/>
    <circle cx="600" cy="100" r="12" fill="#90EE90"/>
    <circle cx="700" cy="550" r="18" fill="#FFD580"/>
    <circle cx="50" cy="500" r="10" fill="#FFB6C1"/>
  </g>
</svg>