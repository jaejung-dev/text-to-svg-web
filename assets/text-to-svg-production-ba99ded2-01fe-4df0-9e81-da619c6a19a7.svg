<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="600" fill="#8B5FBF" id="purple-background"/>
  
  <!-- Green Blobs -->
  <g id="green-blobs">
    <ellipse cx="120" cy="150" rx="25" ry="20" fill="#7CB342" id="green-blob-1"/>
    <circle cx="650" cy="200" r="30" fill="#81C784" id="green-blob-2"/>
    <ellipse cx="380" cy="450" rx="28" ry="22" fill="#689F38" id="green-blob-3"/>
    <circle cx="720" cy="520" r="22" fill="#9CCC65" id="green-blob-4"/>
  </g>
  
  <!-- Light Pink Squiggles -->
  <g id="pink-squiggles">
    <path d="M 50 300 Q 80 280, 110 310 T 170 290 T 230 320" fill="none" stroke="#FFC1E3" stroke-width="4" id="squiggle-1"/>
    <path d="M 400 100 Q 440 80, 480 110 T 540 90" fill="none" stroke="#F8BBD0" stroke-width="3" id="squiggle-2"/>
    <path d="M 600 400 Q 630 380, 660 410 T 720 390" fill="none" stroke="#F48FB1" stroke-width="4" id="squiggle-3"/>
  </g>
  
  <!-- Peach-colored Flower -->
  <g id="peach-flower">
    <circle cx="350" cy="250" r="15" fill="#FFCCBC" id="flower-center"/>
    <ellipse cx="350" cy="220" rx="12" ry="8" fill="#FFAB91" id="flower-petal-1"/>
    <ellipse cx="380" cy="250" rx="12" ry="8" fill="#FFAB91" id="flower-petal-2" transform="rotate(90 380 250)"/>
    <ellipse cx="350" cy="280" rx="12" ry="8" fill="#FFAB91" id="flower-petal-3" transform="rotate(180 350 280)"/>
    <ellipse cx="320" cy="250" rx="12" ry="8" fill="#FFAB91" id="flower-petal-4" transform="rotate(270 320 250)"/>
  </g>
  
  <!-- Pink Triangle -->
  <g id="pink-triangle">
    <polygon points="500,350 530,400 470,400" fill="#F48FB1" id="pink-triangle-1"/>
    <polygon points="200,500 220,530 180,530" fill="#F8BBD0" id="pink-triangle-2"/>
    <polygon points="650,120 670,150 630,150" fill="#FFC1E3" id="pink-triangle-3"/>
  </g>
  
  <!-- Light Orange Spirals -->
  <g id="orange-spirals">
    <path d="M 280 50 Q 295 40, 310 50 Q 325 60, 310 70 Q 295 80, 280 70 Q 265 60, 280 50" fill="none" stroke="#FFD180" stroke-width="3" id="spiral-1"/>
    <path d="M 600 550 Q 620 530, 640 550 Q 660 570, 640 590 Q 620 610, 600 590 Q 580 570, 600 550" fill="none" stroke="#FFE0B2" stroke-width="3" id="spiral-2"/>
    <path d="M 150 450 Q 170 430, 190 450 Q 210 470, 190 490 Q 170 510, 150 490 Q 130 470, 150 450" fill="none" stroke="#FFCC80" stroke-width="3" id="spiral-3"/>
  </g>
  
  <!-- Small Dashes -->
  <g id="small-dashes">
    <line x1="100" y1="50" x2="105" y2="55" stroke="#E1BEE7" stroke-width="2" id="dash-1"/>
    <line x1="250" y1="350" x2="258" y2="342" stroke="#C5E1A5" stroke-width="2" id="dash-2"/>
    <line x1="550" y1="280" x2="557" y2="287" stroke="#FFE0B2" stroke-width="2" id="dash-3"/>
    <line x1="680" y1="380" x2="685" y2="375" stroke="#B39DDB" stroke-width="2" id="dash-4"/>
    <line x1="350" y1="550" x2="358" y2="545" stroke="#AED581" stroke-width="2" id="dash-5"/>
    <line x1="50" y1="420" x2="56" y2="426" stroke="#F48FB1" stroke-width="2" id="dash-6"/>
    <line x1="750" y1="100" x2="757" y2="105" stroke="#FFD180" stroke-width="2" id="dash-7"/>
    <line x1="450" y1="180" x2="456" y2="173" stroke="#9CCC65" stroke-width="2" id="dash-8"/>
    <line x1="200" y1="250" x2="207" y2="255" stroke="#F48FB1" stroke-width="2" id="dash-9"/>
    <line x1="600" y1="500" x2="605" y2="505" stroke="#FFCCBC" stroke-width="2" id="dash-10"/>
    <line x1="320" y1="420" x2="328" y2="415" stroke="#81C784" stroke-width="2" id="dash-11"/>
    <line x1="700" y1="280" x2="707" y2="285" stroke="#E1BEE7" stroke-width="2" id="dash-12"/>
  </g>
</svg>