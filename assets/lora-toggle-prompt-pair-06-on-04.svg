<svg width="400" height="150" viewBox="0 0 400 150" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradient for the 'Ghost' effect (Cyan fading to transparent) -->
    <linearGradient id="ghostGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d2ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00d2ff;stop-opacity:0" />
    </linearGradient>
    
    <!-- Glow filter for the neon effect -->
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Container -->
  <rect width="400" height="150" fill="#0b0c10" />
  
  <!-- Logo Icon Group -->
  <g id="logoIcon" transform="translate(30, 50)">
    <!-- The 'Vector' part: A solid geometric shape -->
    <path d="M0,0 L30,0 L30,100 L0,100 Z" fill="#1f2833" />
    
    <!-- The 'Ghost' part: A spectral shape overlaying the vector base -->
    <!-- This path creates a stylized 'G' that fades out -->
    <path 
      d="M5,5 L35,5 L35,95 C35,95 5,95 5,5" 
      fill="none" 
      stroke="url(#ghostGradient)" 
      stroke-width="6"
      stroke-linecap="round"
      stroke-linejoin="round"
      filter="url(#neonGlow)"
    />
    
    <!-- The 'Core': Connecting the two concepts -->
    <circle cx="18" cy="18" r="8" fill="#00d2ff" filter="url(#neonGlow)" />
  </g>

  <!-- Typography Group -->
  <g id="logoText" transform="translate(90, 90)">
    <!-- "Ghost" Text -->
    <text 
      x="0" 
      y="0" 
      font-family="Arial, sans-serif" 
      font-weight="300" 
      font-size="32" 
      fill="#00d2ff"
      letter-spacing="2"
    >
      Ghost
    </text>
    
    <!-- "Vector" Text -->
    <text 
      x="0" 
      y="28" 
      font-family="Arial, sans-serif" 
      font-weight="700" 
      font-size="32" 
      fill="#ffffff"
      letter-spacing="2"
    >
      Vector
    </text>
  </g>
</svg>