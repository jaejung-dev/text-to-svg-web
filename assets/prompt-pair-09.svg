<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <!-- Gradients for modern depth -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f3f3f3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0e0e0;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="techGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f2946;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5c85a6;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="accentGradient" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00a9e0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00d2ff;stop-opacity:1" />
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Circle -->
  <circle cx="100" cy="100" r="95" fill="url(#bgGradient)" stroke="#e0e0e0" stroke-width="1" />

  <!-- Central Abstract Support Icon (Gear + Database + Connection) -->
  <g id="central-symbol" transform="translate(100, 100)">
    <!-- Outer Gear Ring (Represents BASIS/System) -->
    <path d="M0,-60 L30,-50 L45,-25 L55,0 L45,25 L30,50 L0,60 L-30,50 L-45,25 L-55,0 L-45,-25 L-30,-50 Z" 
          fill="none" stroke="#0f2946" stroke-width="6" stroke-linejoin="round" />
    
    <!-- Inner Hexagon (Represents Core Stability/Kernel) -->
    <polygon points="0,-35 30.3,-17.5 30.3,17.5 0,35 -30.3,17.5 -30.3,-17.5" 
             fill="#f9f9f9" stroke="#0f2946" stroke-width="2" />

    <!-- Abstract Data/Network Lines (Represents Support & Connectivity) -->
    <path d="M0,-15 L0,15 M-12,0 L12,0" stroke="#00a9e0" stroke-width="3" stroke-linecap="round" />
    
    <!-- Dynamic Connection Arcs (Represents Active Monitoring) -->
    <path d="M-20,-20 Q0,10 20,-20" fill="none" stroke="url(#accentGradient)" stroke-width="3" stroke-linecap="round" filter="url(#glow)" />
    <path d="M-25,25 Q0,-5 25,25" fill="none" stroke="url(#accentGradient)" stroke-width="2" stroke-linecap="round" opacity="0.7" />

    <!-- Shield Icon (Represents Security & Support) -->
    <path d="M0,-25 L15,-10 L12,5 L0,15 L-12,5 L-15,-10 Z" 
          fill="url(#techGradient)" opacity="0.9" />
  </g>

  <!-- Subtle SAP Parallelogram Suggestion (Abstract) -->
  <!-- A stylized, abstract interpretation of the SAP shape at the bottom to ground the design without text -->
  <path d="M60,160 L140,160 L130,180 L70,180 Z" 
        fill="#f29111" opacity="0.15" transform="rotate(5, 100, 160)" />
  
  <!-- Text Label (Optional: "BASIS" stylized or just the icon) -->
  <!-- If text is needed, uncomment below. For a pure symbol logo, this is omitted. -->
  <!-- <text x="100" y="190" font-family="Arial, sans-serif" font-size="10" fill="#5c85a6" text-anchor="middle" font-weight="bold">BASIS</text> -->
</svg>