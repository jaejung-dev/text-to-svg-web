<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" id="sap-basis-logo">
  <!-- Background - subtle gradient -->
  <defs>
    <linearGradient id="baseGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F72B3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0050A0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="techGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8F4F8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B8D9E8;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Main SAP-shaped container -->
  <g id="sap-base">
    <rect x="50" y="50" width="300" height="300" rx="40" ry="40" fill="url(#baseGradient)" />
  </g>
  
  <!-- Corner accent squares (SAP signature style) -->
  <g id="corner-accent">
    <rect x="70" y="70" width="50" height="50" rx="10" ry="10" fill="#FFFFFF" fill-opacity="0.15"/>
    <rect x="280" y="70" width="50" height="50" rx="10" ry="10" fill="#FFFFFF" fill-opacity="0.15"/>
    <rect x="70" y="280" width="50" height="50" rx="10" ry="10" fill="#FFFFFF" fill-opacity="0.15"/>
    <rect x="280" y="280" width="50" height="50" rx="10" ry="10" fill="#FFFFFF" fill-opacity="0.15"/>
  </g>
  
  <!-- Central gear/cog icon representing system administration -->
  <g id="central-gear" transform="translate(200, 200)">
    <circle cx="0" cy="0" r="65" fill="#FFFFFF" fill-opacity="0.1" stroke="#FFFFFF" stroke-width="2"/>
    <circle cx="0" cy="0" r="45" fill="#FFFFFF" fill-opacity="0.2"/>
    <g id="gear-teeth">
      <circle cx="0" cy="-65" r="12" fill="#FFFFFF" fill-opacity="0.3"/>
      <circle cx="0" cy="65" r="12" fill="#FFFFFF" fill-opacity="0.3"/>
      <circle cx="-65" cy="0" r="12" fill="#FFFFFF" fill-opacity="0.3"/>
      <circle cx="65" cy="0" r="12" fill="#FFFFFF" fill-opacity="0.3"/>
      <circle cx="-45" cy="-45" r="12" fill="#FFFFFF" fill-opacity="0.3"/>
      <circle cx="45" cy="-45" r="12" fill="#FFFFFF" fill-opacity="0.3"/>
      <circle cx="-45" cy="45" r="12" fill="#FFFFFF" fill-opacity="0.3"/>
      <circle cx="45" cy="45" r="12" fill="#FFFFFF" fill-opacity="0.3"/>
    </g>
    <!-- Support shield icon inside gear -->
    <path d="M 0,-25 L 15,-30 L 15,-5 L 30,-5 L 25,15 L 0,30 L -25,15 L -30,-5 L -15,-5 L -15,-30 Z" 
          fill="#FFFFFF" fill-opacity="0.25"/>
  </g>
  
  <!-- Supporting infrastructure lines (network/connections) -->
  <g id="infrastructure-lines" stroke="#FFFFFF" stroke-opacity="0.25" stroke-width="3" fill="none">
    <line x1="100" y1="150" x2="100" y2="250"/>
    <line x1="300" y1="150" x2="300" y2="250"/>
    <line x1="150" y1="100" x2="250" y2="100"/>
    <line x1="150" y1="300" x2="250" y2="300"/>
    <circle cx="100" cy="150" r="4" fill="#FFFFFF"/>
    <circle cx="300" cy="150" r="4" fill="#FFFFFF"/>
    <circle cx="150" cy="100" r="4" fill="#FFFFFF"/>
    <circle cx="250" cy="100" r="4" fill="#FFFFFF"/>
    <circle cx="100" cy="250" r="4" fill="#FFFFFF"/>
    <circle cx="300" cy="250" r="4" fill="#FFFFFF"/>
    <circle cx="150" cy="300" r="4" fill="#FFFFFF"/>
    <circle cx="250" cy="300" r="4" fill="#FFFFFF"/>
  </g>
  
  <!-- Subtle glow effect -->
  <circle cx="200" cy="200" r="80" fill="none" stroke="#FFFFFF" stroke-width="1" stroke-opacity="0.3" stroke-dasharray="5,5"/>
  
  <!-- Highlight reflection -->
  <ellipse cx="240" cy="100" rx="60" ry="20" fill="#FFFFFF" fill-opacity="0.08" transform="rotate(-20 240 100)"/>
</svg>