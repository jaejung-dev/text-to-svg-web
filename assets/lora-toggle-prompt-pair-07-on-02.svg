<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="600" fill="#f5f7fa"/>
  
  <!-- Title Section -->
  <g id="title">
    <rect x="50" y="20" width="700" height="70" fill="#2c3e50" rx="8"/>
    <text x="400" y="55" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="24" font-weight="bold">Lavanderia Self-Service</text>
    <text x="400" y="80" text-anchor="middle" fill="#ecf0f1" font-family="Arial, sans-serif" font-size="14">Burkina Faso - Centro Città / Zona Universitaria</text>
  </g>
  
  <!-- Location Section -->
  <g id="location">
    <rect x="50" y="110" width="340" height="120" fill="#3498db" rx="8" opacity="0.15"/>
    <rect x="410" y="110" width="340" height="120" fill="#27ae60" rx="8" opacity="0.15"/>
    
    <circle cx="220" cy="150" r="25" fill="#3498db"/>
    <text x="220" y="165" text-anchor="middle" fill="white" font-family="Arial" font-size="14">🏙️</text>
    <text x="220" y="195" text-anchor="middle" fill="#2c3e50" font-family="Arial" font-size="12" font-weight="bold">Centro Città</text>
    
    <circle cx="580" cy="150" r="25" fill="#27ae60"/>
    <text x="580" y="165" text-anchor="middle" fill="white" font-family="Arial" font-size="14">🎓</text>
    <text x="580" y="195" text-anchor="middle" fill="#2c3e50" font-family="Arial" font-size="12" font-weight="bold">Zona Universitaria</text>
  </g>
  
  <!-- Target Audience Section -->
  <g id="target-audience">
    <rect x="50" y="250" width="340" height="140" fill="#e74c3c" rx="8" opacity="0.1"/>
    <text x="220" y="275" text-anchor="middle" fill="#c0392b" font-family="Arial" font-size="16" font-weight="bold">🎯 Target Principale</text>
    
    <!-- Students -->
    <g id="target-students">
      <circle cx="100" cy="315" r="20" fill="#e74c3c"/>
      <text x="100" y="320" text-anchor="middle" fill="white" font-family="Arial" font-size="14">👨‍🎓</text>
      <text x="100" y="350" text-anchor="middle" fill="#2c3e50" font-family="Arial" font-size="11">Studenti</text>
    </g>
    
    <!-- Workers -->
    <g id="target-workers">
      <circle cx="220" cy="315" r="20" fill="#e74c3c"/>
      <text x="220" y="320" text-anchor="middle" fill="white" font-family="Arial" font-size="14">👔</text>
      <text x="220" y="350" text-anchor="middle" fill="#2c3e50" font-family="Arial" font-size="11">Lavoratori</text>
    </g>
    
    <!-- Urban Residents -->
    <g id="target-residents">
      <circle cx="340" cy="315" r="20" fill="#e74c3c"/>
      <text x="340" y="320" text-anchor="middle" fill="white" font-family="Arial" font-size="14">👨‍👩‍👧</text>
      <text x="340" y="350" text-anchor="middle" fill="#2c3e50" font-family="Arial" font-size="11">Residenti</text>
    </g>
  </g>
  
  <!-- Services Section -->
  <g id="services">
    <rect x="410" y="250" width="340" height="140" fill="#9b59b6" rx="8" opacity="0.1"/>
    <text x="580" y="275" text-anchor="middle" fill="#8e44ad" font-family="Arial" font-size="16" font-weight="bold">⚙️ Servizi Offerti</text>
    
    <!-- Washing Machine -->
    <g id="service-wash">
      <rect x="450" cy="300" width="50" height="50" rx="5" fill="#3498db"/>
      <text x="475" y="330" text-anchor="middle" fill="white" font-family="Arial" font-size="12">🧺</text>
      <text x="475" y="370" text-anchor="middle" fill="#2c3e50" font-family="Arial" font-size="11">Lavaggio</text>
    </g>
    
    <!-- Drying Machine -->
    <g id="service-dry">
      <rect x="620" cy="300" width="50" height="50" rx="5" fill="#e67e22"/>
      <text x="645" y="330" text-anchor="middle" fill="white" font-family="Arial" font-size="12">🌬️</text>
      <text x="645" y="370" text-anchor="middle" fill="#2c3e50" font-family="Arial" font-size="11">Asciugatura</text>
    </g>
  </g>
  
  <!-- Payment Section -->
  <g id="payment">
    <rect x="50" y="410" width="340" height="110" fill="#f39c12" rx="8" opacity="0.15"/>
    <text x="220" y="435" text-anchor="middle" fill="#d35400" font-family="Arial" font-size="16" font-weight="bold">💳 Metodi di Pagamento</text>
    
    <g id="payment-cash">
      <circle cx="100" cy="475" r="20" fill="#f39c12"/>
      <text x="100" y="480" text-anchor="middle" fill="white" font-family="Arial" font-size="14">💵</text>
      <text x="100" y="510" text-anchor="middle" fill="#2c3e50" font-family="Arial" font-size="10">Contanti</text>
    </g>
    
    <g id="payment-mobile">
      <circle cx="220" cy="475" r="20" fill="#f39c12"/>
      <text x="220" y="480" text-anchor="middle" fill="white" font-family="Arial" font-size="14">📱</text>
      <text x="220" y="510" text-anchor="middle" fill="#2c3e50" font-family="Arial" font-size="10">Mobile Money</text>
    </g>
  </g>
  
  <!-- Benefits Section -->
  <g id="benefits">
    <rect x="410" y="410" width="340" height="110" fill="#1abc9c" rx="8" opacity="0.15"/>
    <text x="580" y="435" text-anchor="middle" fill="#16a085" font-family="Arial" font-size="16" font-weight="bold">🚀 Vantaggi</text>
    
    <g id="benefit-cost">
      <circle cx="470" cy="475" r="20" fill="#1abc9c"/>
      <text x="470" y="480" text-anchor="middle" fill="white" font-family="Arial" font-size="14">📉</text>
      <text x="470" y="510" text-anchor="middle" fill="#2c3e50" font-family="Arial" font-size="10">Costi Ridotti</text>
    </g>
    
    <g id="benefit-staff">
      <circle cx="590" cy="475" r="20" fill="#1abc9c"/>
      <text x="590" y="480" text-anchor="middle" fill="white" font-family="Arial" font-size="14">👥</text>
      <text x="590" y="510" text-anchor="middle" fill="#2c3e50" font-family="Arial" font-size="10">Poco Personale</text>
    </g>
    
    <g id="benefit-modern">
      <circle cx="710" cy="475" r="20" fill="#1abc9c"/>
      <text x="710" y="480" text-anchor="middle" fill="white" font-family="Arial" font-size="14">⚡</text>
      <text x="710" y="510" text-anchor="middle" fill="#2c3e50" font-family="Arial" font-size="10">Sistemi Moderni</text>
    </g>
  </g>
  
  <!-- Connector Lines -->
  <line x1="220" y1="240" x2="220" y2="248" stroke="#3498db" stroke-width="2"/>
  <line x1="580" y1="240" x2="580" y2="248" stroke="#27ae60" stroke-width="2"/>
  <line x1="220" y1="390" x2="410" y2="390" stroke="#2c3e50" stroke-width="2" stroke-dasharray="5,5"/>
  <line x1="580" y1="390" x2="410" y2="390" stroke="#2c3e50" stroke-width="2" stroke-dasharray="5,5"/>
  
  <!-- Footer -->
  <rect x="50" y="540" width="700" height="40" fill="#34495e" rx="5"/>
  <text x="400" y="565" text-anchor="middle" fill="#ecf0f1" font-family="Arial" font-size="12">Progetto Autonomo - Burkina Faso 2024</text>
</svg>