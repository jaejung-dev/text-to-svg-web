<svg width="800" height="500" viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <!-- Definitions -->
  <defs>
    <!-- Sky Gradient -->
    <linearGradient id="skyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0f2027;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#203a43;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2c5364;stop-opacity:1" />
    </linearGradient>
    
    <!-- Snow Gradient -->
    <linearGradient id="snowGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0e0e0;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Sky Background -->
  <rect width="800" height="500" fill="url(#skyGradient)" />

  <!-- Moon/Sun (Atmosphere) -->
  <circle cx="700" cy="80" r="40" fill="rgba(255, 255, 255, 0.1)" />

  <!-- Distant Mountains (Left) -->
  <polygon points="0,500 150,250 300,500" fill="#455a64" />
  
  <!-- Distant Mountains (Right) -->
  <polygon points="300,500 450,280 600,500" fill="#455a64" />

  <!-- Middle Ground Mountains -->
  <polygon points="-50,500 100,350 300,450 500,300 850,500" fill="#2f4f4f" />

  <!-- Snow Caps -->
  <path d="M 260,450 L 300,400 L 330,450 Z" fill="url(#snowGradient)" />
  <path d="M 460,300 L 450,280 L 440,295 Z" fill="url(#snowGradient)" />

  <!-- Foreground Mountain Range -->
  <path d="M 0,500 L 150,350 L 250,420 L 400,300 L 550,380 L 700,320 L 800,380 L 800,500 Z" fill="#1b262c" />

  <!-- The Eagle -->
  <g id="eagle" transform="translate(400, 200) rotate(-5)">
    <!-- Left Wing -->
    <path d="M -10 -10 Q -100 -80 -250 -100 Q -150 -120 -50 -80" fill="#1a1a1a" />
    <path d="M -10 -10 Q -100 -80 -250 -100 Q -120 -110 -20 -60" fill="#000000" />
    
    <!-- Body -->
    <ellipse cx="0" cy="-10" rx="20" ry="12" fill="#2e2e2e" />
    
    <!-- Head -->
    <circle cx="15" cy="-25" r="8" fill="#1a1a1a" />
    
    <!-- Beak -->
    <path d="M 20 -22 L 30 -28 L 25 -20 Z" fill="#ffd700" />
    
    <!-- Right Wing -->
    <path d="M -10 -10 Q 100 -80 250 -100 Q 150 -120 50 -80" fill="#1a1a1a" />
    <path d="M -10 -10 Q 100 -80 250 -100 Q 120 -110 20 -60" fill="#000000" />
  </g>
</svg>