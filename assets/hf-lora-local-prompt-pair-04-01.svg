<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect id="background" width="800" height="600" fill="#1a1a2e"/>

  <!-- Decorative Circles -->
  <g id="decorative-circles">
    <circle id="circle-1" cx="100" cy="100" r="80" fill="none" stroke="#e94560" stroke-width="2" opacity="0.6"/>
    <circle id="circle-2" cx="700" cy="500" r="60" fill="none" stroke="#0f3460" stroke-width="2" opacity="0.5"/>
    <circle id="circle-3" cx="400" cy="300" r="120" fill="none" stroke="#533483" stroke-width="1" opacity="0.4"/>
  </g>

  <!-- Geometric Shapes Group -->
  <g id="geometric-shapes">
    <polygon id="triangle" points="200,150 300,150 250,250" fill="#e94560" opacity="0.8"/>
    <rect id="rectangle" x="500" y="100" width="80" height="80" rx="10" fill="#0f3460" opacity="0.9"/>
    <polygon id="pentagon" points="600,300 640,360 580,360 580,440 660,440 660,360 600,360" fill="#533483" opacity="0.7"/>
  </g>

  <!-- Connecting Lines -->
  <g id="connecting-lines" stroke="rgba(255,255,255,0.3)" stroke-width="1" fill="none">
    <line id="line-1" x1="250" y1="250" x2="540" y2="140"/>
    <line id="line-2" x1="540" y1="140" x2="660" y2="400"/>
    <line id="line-3" x1="250" y1="250" x2="400" y2="300"/>
    <line id="line-4" x1="660" y1="400" x2="400" y2="300"/>
  </g>

  <!-- Abstract Waves -->
  <g id="abstract-waves">
    <path id="wave-1" d="M 0,500 Q 200,450 400,500 T 800,500" stroke="rgba(233,69,96,0.4)" stroke-width="2" fill="none"/>
    <path id="wave-2" d="M 0,550 Q 200,520 400,550 T 800,550" stroke="rgba(83,52,131,0.3)" stroke-width="2" fill="none"/>
  </g>

  <!-- Accent Points -->
  <g id="accent-points" fill="#ffd700">
    <circle id="dot-1" cx="350" cy="180" r="4"/>
    <circle id="dot-2" cx="580" cy="320" r="4"/>
    <circle id="dot-3" cx="680" cy="200" r="4"/>
    <circle id="dot-4" cx="420" cy="450" r="4"/>
  </g>

  <!-- Gradient Overlay -->
  <defs>
    <linearGradient id="gradient-overlay" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e94560;stop-opacity:0.1"/>
      <stop offset="50%" style="stop-color:#0f3460;stop-opacity:0.1"/>
      <stop offset="100%" style="stop-color:#533483;stop-opacity:0.1"/>
    </linearGradient>
  </defs>
  <rect id="gradient-overlay-rect" width="800" height="600" fill="url(#gradient-overlay)"/>

  <!-- Title Text -->
  <text id="design-title" x="400" y="80" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="rgba(255,255,255,0.8)" text-anchor="middle">ABSTRACT DESIGN</text>
  <text id="design-subtitle" x="400" y="580" font-family="Arial, sans-serif" font-size="14" fill="rgba(255,255,255,0.4)" text-anchor="middle">Geometric Art Collection</text>
</svg>