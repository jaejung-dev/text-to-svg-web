<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 800" width="400" height="800">
  <!-- Phone Frame -->
  <g id="phone-frame">
    <rect x="20" y="20" width="360" height="760" rx="25" fill="#1a1a2e" stroke="#2d2d44" stroke-width="3"/>
    <rect x="25" y="25" width="350" height="750" rx="20" fill="#16213e"/>
    <rect x="160" y="15" width="80" height="8" rx="4" fill="#0f3460"/>
  </g>

  <!-- App Header -->
  <g id="app-header" transform="translate(40, 60)">
    <text x="140" y="0" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#e94560">ATOMSTAK P1</text>
    <text x="140" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#00fff5">Laser Control App</text>
  </g>

  <!-- Import Section -->
  <g id="import-section" transform="translate(40, 120)">
    <rect x="0" y="0" width="320" height="120" rx="10" fill="#1a1a2e" stroke="#00fff5" stroke-width="2"/>
    <circle cx="40" cy="60" r="25" fill="#00fff5"/>
    <path d="M35 55 l10 10 l5 -15" fill="none" stroke="#1a1a2e" stroke-width="3"/>
    <text x="80" y="45" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ffffff">Import File</text>
    <text x="80" y="70" font-family="Arial, sans-serif" font-size="11" fill="#a0a0a0">LightBurn format supported</text>
    <text x="80" y="90" font-family="Arial, sans-serif" font-size="10" fill="#00fff5">.LBRN • .LBRN2</text>
    <rect x="240" y="85" width="75" height="35" rx="5" fill="#e94560"/>
    <text x="277" y="107" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#ffffff">Browse</text>
  </g>

  <!-- Processing Section -->
  <g id="processing-section" transform="translate(40, 260)">
    <rect x="0" y="0" width="320" height="140" rx="10" fill="#1a1a2e" stroke="#2d2d44" stroke-width="2"/>
    <text x="160" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#00fff5">PROCESSING</text>
    <rect x="40" y="45" width="240" height="6" rx="3" fill="#0f3460"/>
    <rect x="40" y="45" width="180" height="6" rx="3" fill="#e94560"/>
    <text x="160" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#ffffff">75%</text>
    <g id="laser-icon" transform="translate(160, 95)">
      <path d="M0 0 L30 30 L0 60 L-5 55 L20 30 L-5 5 L0 0" fill="#00fff5"/>
      <circle cx="30" cy="30" r="15" fill="none" stroke="#e94560" stroke-width="2"/>
      <circle cx="30" cy="30" r="8" fill="#00fff5"/>
    </g>
    <text x="160" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#a0a0a0">File conversion in progress</text>
  </g>

  <!-- Export Section -->
  <g id="export-section" transform="translate(40, 430)">
    <rect x="0" y="0" width="320" height="120" rx="10" fill="#1a1a2e" stroke="#00fff5" stroke-width="2"/>
    <circle cx="40" cy="60" r="25" fill="#00fff5"/>
    <path d="M35 55 l10 10 l5 -15" fill="none" stroke="#1a1a2e" stroke-width="3"/>
    <text x="80" y="45" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ffffff">Export Format</text>
    <text x="80" y="70" font-family="Arial, sans-serif" font-size="11" fill="#a0a0a0">Compatible with engravers</text>
    <text x="80" y="90" font-family="Arial, sans-serif" font-size="10" fill="#00fff5">.SVG • Vector optimized</text>
    <rect x="240" y="85" width="75" height="35" rx="5" fill="#00fff5"/>
    <text x="277" y="107" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#1a1a2e">Export</text>
  </g>

  <!-- Laser Preview Area -->
  <g id="laser-preview" transform="translate(40, 580)">
    <rect x="0" y="0" width="320" height="180" rx="10" fill="#0f0f1a" stroke="#2d2d44" stroke-width="2"/>
    <text x="160" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#a0a0a0">PREVIEW</text>
    <!-- Grid pattern -->
    <g id="grid" stroke="#1a1a2e" stroke-width="1">
      <line x1="20" y1="30" x2="280" y2="30"/>
      <line x1="20" y1="60" x2="280" y2="60"/>
      <line x1="20" y1="90" x2="280" y2="90"/>
      <line x1="20" y1="120" x2="280" y2="120"/>
      <line x1="20" y1="150" x2="280" y2="150"/>
      <line x1="20" y1="30" x2="20" y2="160"/>
      <line x1="80" y1="30" x2="80" y2="160"/>
      <line x1="140" y1="30" x2="140" y2="160"/>
      <line x1="200" y1="30" x2="200" y2="160"/>
      <line x1="260" y1="30" x2="260" y2="160"/>
    </g>
    <!-- Laser path simulation -->
    <path d="M50 100 Q100 50 150 100 T250 100" fill="none" stroke="#00fff5" stroke-width="2" opacity="0.6"/>
    <circle cx="50" cy="100" r="4" fill="#e94560"/>
    <circle cx="150" cy="50" r="4" fill="#e94560"/>
    <circle cx="250" cy="100" r="4" fill="#e94560"/>
    <!-- Atomstak P1 logo placeholder -->
    <rect x="130" y="140" width="60" height="20" rx="3" fill="#1a1a2e"/>
    <text x="160" y="154" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#00fff5">ATOMSTAK P1</text>
  </g>

  <!-- Status Bar -->
  <g id="status-bar" transform="translate(40, 780)">
    <rect x="0" y="0" width="320" height="35" rx="5" fill="#16213e"/>
    <text x="20" y="22" font-family="Arial, sans-serif" font-size="10" fill="#a0a0a0">Connected</text>
    <circle cx="300" cy="15" r="3" fill="#00ff00"/>
    <text x="310" y="22" font-family="Arial, sans-serif" font-size="10" fill="#00ff00">●</text>
  </g>
</svg>