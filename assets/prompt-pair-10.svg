<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <title>ATMOS Stak P1 - Laser Control App</title>
  
  <!-- Definitions for reusable components -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1e24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#15151a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4cc9f0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4361ee;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#bgGradient)" />

  <!-- Grid Pattern (Subtle background) -->
  <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
    <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#2b2b36" stroke-width="0.5"/>
  </pattern>
  <rect width="100%" height="100%" fill="url(#grid)" opacity="0.5" />

  <!-- App Layout: Sidebar + Main Content -->
  
  <!-- Sidebar -->
  <g id="sidebar" transform="translate(0, 0)">
    <rect x="0" y="0" width="220" height="600" fill="#25252e" stroke="#333340" stroke-width="1" />
    
    <!-- Logo Area -->
    <g transform="translate(20, 40)">
      <rect x="0" y="0" width="60" height="60" rx="12" fill="#3a3a45" stroke="#4cc9f0" stroke-width="2"/>
      <path d="M15 20 L20 35 L30 15 L40 35 L45 20" stroke="#4cc9f0" stroke-width="2" fill="none" stroke-linejoin="round"/>
      <text x="75" y="35" font-family="Arial, sans-serif" font-weight="bold" font-size="24" fill="#ffffff">ATOMSTAK</text>
      <text x="75" y="55" font-family="Arial, sans-serif" font-size="14" fill="#888899">P1 CONTROL</text>
    </g>

    <!-- Navigation Items -->
    <g transform="translate(20, 140)">
      <text x="0" y="0" font-family="Arial, sans-serif" font-size="16" fill="#ffffff" font-weight="bold">FONCTIONS</text>
      
      <!-- Import Lightburn Item -->
      <g transform="translate(0, 40)" id="btn-import">
        <rect x="0" y="0" width="180" height="50" rx="8" fill="#2f2f3b" stroke="#4cc9f0" stroke-width="1"/>
        <circle cx="15" cy="25" r="8" fill="#4cc9f0" />
        <path d="M13 21 L17 21 L17 16 L19 16 L19 23 L26 23 L26 25 L15 25 Z" fill="white" transform="translate(2, -2)"/>
        <path d="M15 33 L25 33 L25 40 L23 40 L23 35 L17 35 L17 40 L15 40 Z" fill="white" transform="translate(2, -2)"/>
        <text x="35" y="29" font-family="Arial, sans-serif" font-size="14" fill="#ffffff">Importer LightBurn</text>
      </g>

      <!-- Export SVG Item -->
      <g transform="translate(0, 110)" id="btn-export">
        <rect x="0" y="0" width="180" height="50" rx="8" fill="#2f2f3b" stroke="#4361ee" stroke-width="1"/>
        <circle cx="15" cy="25" r="8" fill="#4361ee" />
        <path d="M12 18 L20 18 L20 22 L16 22 L16 30 L14 30 L14 22 L10 22 Z" fill="white" transform="translate(2, -2)"/>
        <text x="35" y="29" font-family="Arial, sans-serif" font-size="14" fill="#ffffff">Exporter en SVG</text>
      </g>

      <!-- Settings Item -->
      <g transform="translate(0, 180)">
        <rect x="0" y="0" width="180" height="50" rx="8" fill="#2f2f3b"/>
        <rect x="25" y="10" width="30" height="30" rx="4" fill="#555566"/>
        <text x="35" y="29" font-family="Arial, sans-serif" font-size="14" fill="#ffffff">Paramètres</text>
      </g>
    </g>
  </g>

  <!-- Main Workspace -->
  <g id="workspace">
    <!-- Header Bar -->
    <rect x="220" y="0" width="580" height="60" fill="#25252e" stroke="#333340" stroke-width="0"/>
    <text x="240" y="35" font-family="Arial, sans-serif" font-size="20" fill="#ffffff" font-weight="bold">PROJET ACTUEL</text>
    <text x="240" y="55" font-family="Arial, sans-serif" font-size="12" fill="#888899">Fichier non nommé.lbrn (Prévisualisation)</text>
    
    <!-- Toolbar -->
    <g transform="translate(220, 70)">
      <rect x="0" y="0" width="580" height="40" fill="#2f2f3b"/>
      <!-- Tools -->
      <circle cx="20" cy="20" r="6" fill="#555566"/>
      <circle cx="40" cy="20" r="6" fill="#555566"/>
      <circle cx="60" cy="20" r="6" fill="#555566"/>
      <rect x="80" y="12" width="8" height="16" rx="2" fill="#555566"/>
      
      <!-- Play Button -->
      <rect x="480" y="10" width="40" height="20" rx="4" fill="#4cc9f0"/>
      <polygon points="490,14 500,20 490,26" fill="white"/>
      
      <!-- Stop Button -->
      <rect x="530" y="10" width="30" height="20" rx="4" fill="#e63946"/>
      <rect x="534" y="14" width="22" height="12" rx="1" fill="white"/>
    </g>

    <!-- Canvas Area -->
    <g transform="translate(220, 120)">
      <!-- Frame -->
      <rect x="0" y="0" width="580" height="480" fill="#1e1e24" stroke="#444450" stroke-width="2"/>
      
      <!-- Status Info -->
      <text x="20" y="20" font-family="monospace" font-size="12" fill="#4cc9f0">
        <tspan x="20" dy="0">STATUT: PRÊT</tspan>
        <tspan x="20" dy="20">VITESSE: 1500 mm/s</tspan>
        <tspan x="20" dy="20">POSS: 50%</tspan>
      </text>

      <!-- The Laser Job (SVG Paths representing engraving) -->
      <g id="laser-job" transform="translate(50, 50)" filter="url(#glow)">
        <!-- Shape 1: Hexagon -->
        <path d="M0 0 L20 -10 L40 0 L40 20 L20 30 L0 20 Z" 
              fill="none" 
              stroke="#ff9e00" 
              stroke-width="1.5"
              stroke-dasharray="2,2"/>
        
        <!-- Shape 2: Circle with pattern -->
        <circle cx="100" cy="15" r="25" 
                fill="none" 
                stroke="#00b4d8" 
                stroke-width="1"/>
        <path d="M100 15 L95 5 M100 15 L105 25 M100 15 L90 15 M100 15 L110 15" 
              stroke="#00b4d8" stroke-width="1"/>
              
        <!-- Shape 3: Triangle (Cut) -->
        <path d="M160 0 L200 40 L120 40 Z" 
              fill="rgba(255, 0, 0, 0.2)" 
              stroke="#ef233c" 
              stroke-width="2"/>
              
        <!-- Shape 4: Abstract Path (Engrave) -->
        <path d="M260 10 Q280 0 300 10 T340 10" 
              fill="none" 
              stroke="#7209b7" 
              stroke-width="2"/>
              
        <!-- Shape 5: Text simulation -->
        <text x="260" y="40" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" stroke="none" opacity="0.6">ATOMSTAK</text>
        <text x="260" y="55" font-family="Arial, sans-serif" font-size="10" fill="#ffffff" stroke="none" opacity="0.4">P1</text>
      </g>

      <!-- Laser Head Indicator (Ghost) -->
      <g transform="translate(480, 380)">
        <rect x="-15" y="-15" width="30" height="30" fill="none" stroke="#ff0000" stroke-width="2" stroke-dasharray="4,2"/>
        <circle cx="0" cy="0" r="5" fill="#ff0000"/>
      </g>
    </g>

    <!-- Export Modal Overlay (Visual representation of the action) -->
    <g transform="translate(400, 250)" opacity="0.9">
      <rect x="0" y="0" width="350" height="150" rx="10" fill="#2a2a35" stroke="#ffffff" stroke-width="1"/>
      <text x="20" y="30" font-family="Arial, sans-serif" font-size="18" fill="#ffffff" font-weight="bold">EXPORTER LE PROJET</text>
      
      <text x="20" y="60" font-family="Arial, sans-serif" font-size="14" fill="#cccccc">Format de fichier :</text>
      <rect x="20" y="70" width="310" height="30" rx="4" fill="#1e1e24" stroke="#4cc9f0"/>
      <text x="25" y="90" font-family="Arial, sans-serif" font-size="14" fill="#ffffff">SVG (Scalable Vector Graphics)</text>
      
      <text x="20" y="120" font-family="Arial, sans-serif" font-size="12" fill="#888899">Compatible Lightburn &amp; Inkscape</text>
    </g>
  </g>
</svg>