<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 375 667" width="375" height="667">
  <!-- Phone Frame -->
  <g id="phone-frame">
    <rect x="0" y="0" width="375" height="667" fill="#1a1a2e"/>
    <rect x="10" y="10" width="355" height="647" rx="30" fill="#16213e" stroke="#0f3460" stroke-width="2"/>
  </g>

  <!-- App Header -->
  <g id="app-header">
    <rect x="0" y="0" width="375" height="80" fill="#0f3460"/>
    <text x="187" y="35" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#ffffff" text-anchor="middle">ATOMSTAK P1</text>
    <text x="187" y="55" font-family="Arial, sans-serif" font-size="11" fill="#b8c5d6" text-anchor="middle">Graveur Laser</text>
  </g>

  <!-- Import Section -->
  <g id="import-section">
    <rect x="25" y="100" width="325" height="120" rx="15" fill="#1f4068" stroke="#4a90e2" stroke-width="1"/>
    <circle cx="60" cy="160" r="35" fill="#4a90e2"/>
    <path d="M52 152 L60 160 L68 152 L64 156 L64 144 L66 144 L66 154 L58 154 L58 144 L60 144 Z" fill="#ffffff"/>
    <text x="110" y="155" font-family="Arial, sans-serif" font-size="15" fill="#ffffff" font-weight="bold">Importer</text>
    <text x="110" y="175" font-family="Arial, sans-serif" font-size="11" fill="#b8c5d6">Fichier Lightburn (.lbrn)</text>
  </g>

  <!-- Divider Arrow -->
  <g id="divider-arrow">
    <line x1="187" y1="235" x2="187" y2="265" stroke="#6b7280" stroke-width="2"/>
    <polygon points="187,260 180,250 194,250" fill="#6b7280"/>
  </g>

  <!-- Export Section -->
  <g id="export-section">
    <rect x="25" y="280" width="325" height="120" rx="15" fill="#1f4068" stroke="#4a90e2" stroke-width="1"/>
    <circle cx="60" cy="340" r="35" fill="#4a90e2"/>
    <path d="M55 332 L60 337 L65 332 L63 342 L73 342 L67 348 L67 362 L65 362 L65 344 L55 344 Z" fill="#ffffff"/>
    <text x="110" y="335" font-family="Arial, sans-serif" font-size="15" fill="#ffffff" font-weight="bold">Exporter</text>
    <text x="110" y="355" font-family="Arial, sans-serif" font-size="11" fill="#b8c5d6">Format SVG</text>
  </g>

  <!-- File Preview Area -->
  <g id="file-preview">
    <rect x="25" y="430" width="325" height="150" rx="15" fill="#16213e" stroke="#4a90e2" stroke-width="1"/>
    <rect x="40" y="445" width="60" height="120" rx="5" fill="#0f3460" stroke="#6b7280"/>
    <rect x="60" y="465" width="40" height="5" rx="2" fill="#6b7280"/>
    <rect x="60" y="480" width="35" height="5" rx="2" fill="#6b7280"/>
    <rect x="60" y="495" width="45" height="5" rx="2" fill="#6b7280"/>
    <text x="115" y="470" font-family="Arial, sans-serif" font-size="14" fill="#ffffff">design.lbrn</text>
    <text x="115" y="490" font-family="Arial, sans-serif" font-size="11" fill="#b8c5d6">1.2 MB • Prévisualisation</text>
  </g>

  <!-- Action Button -->
  <g id="action-button">
    <rect x="100" y="600" width="175" height="50" rx="25" fill="#4a90e2"/>
    <text x="187" y="630" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#ffffff" text-anchor="middle">Traiter</text>
  </g>

  <!-- Footer Status -->
  <g id="footer-status">
    <line x1="0" y1="650" x2="375" y2="650" stroke="#4a90e2" stroke-width="1"/>
    <text x="20" y="665" font-family="Arial, sans-serif" font-size="9" fill="#6b7280">▲ READY</text>
    <text x="200" y="665" font-family="Arial, sans-serif" font-size="9" fill="#6b7280">ATOMSTAK P1 • CONNECTED</text>
  </g>
</svg>