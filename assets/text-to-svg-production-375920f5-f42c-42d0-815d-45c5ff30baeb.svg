<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- White background -->
  <rect width="400" height="400" fill="#ffffff"/>
  
  <!-- Centered hexagon with rounded corners -->
  <path id="hexagon"
        d="M 200 60 
           L 320 130 
           L 320 270 
           L 200 340 
           L 80 270 
           L 80 130 
           Z"
        fill="none"
        stroke="#4a5568"
        stroke-width="8"
        stroke-linejoin="round"
        stroke-linecap="round"/>
</svg>