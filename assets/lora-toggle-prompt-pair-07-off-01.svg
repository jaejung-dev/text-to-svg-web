<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" aria-labelledby="title desc">
  <title id="title">Progetto Lavanderia Burkina Faso</title>
  <desc id="desc">Infografica per il progetto di lavanderia self-service a Burkina Faso</desc>
  
  <defs>
    <linearGradient id="skyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f6fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#dfe6e9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="machineGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3498db;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2980b9;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#skyGradient)" />

  <!-- Group: City & University Location -->
  <g id="location-area">
    <!-- Ground -->
    <rect x="0" y="400" width="800" height="200" fill="#bdc3c7" />
    
    <!-- University Building (Left) -->
    <g id="university" transform="translate(50, 300)">
      <rect x="0" y="0" width="120" height="100" fill="#95a5a6" />
      <rect x="20" y="20" width="80" height="60" fill="#ecf0f1" /> <!-- Windows -->
      <path d="M-10 0 L60 -40 L130 0 Z" fill="#d35400" /> <!-- Roof -->
      <text x="60" y="-30" text-anchor="middle" fill="#d35400" font-family="Arial" font-weight="bold" font-size="12">UNI</text>
    </g>

    <!-- City Building (Right) -->
    <g id="city-center" transform="translate(600, 250)">
      <rect x="0" y="0" width="100" height="150" fill="#7f8c8d" />
      <rect x="10" y="20" width="30" height="20" fill="#ecf0f1" />
      <rect x="60" y="20" width="30" height="20" fill="#ecf0f1" />
      <rect x="10" y="60" width="30" height="20" fill="#ecf0f1" />
      <rect x="60" y="60" width="30" height="20" fill="#ecf0f1" />
      <rect x="0" y="-20" width="100" height="20" fill="#7f8c8d" />
    </g>

    <!-- Path Connecting Location -->
    <line x1="170" y1="450" x2="630" y2="450" stroke="#95a5a6" stroke-width="4" stroke-dasharray="10,5" />
    <text x="400" y="440" text-anchor="middle" fill="#7f8c8d" font-family="Arial" font-size="14">Tratto Strategico</text>
  </g>

  <!-- Group: Laundry Service (Central Focus) -->
  <g id="laundry-service">
    <!-- Main Title -->
    <text x="400" y="220" text-anchor="middle" font-family="Arial" font-size="24" font-weight="bold" fill="#2c3e50">Lavanderia Self-Service</text>
    
    <!-- Machine 1 -->
    <g transform="translate(250, 280)">
      <rect x="0" y="0" width="100" height="120" rx="5" fill="url(#machineGradient)" stroke="#2980b9" stroke-width="2"/>
      <circle cx="50" cy="45" r="30" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="2"/>
      <circle cx="50" cy="45" r="15" fill="#3498db" opacity="0.5"/>
      <rect x="60" y="20" width="20" height="20" fill="#e74c3c" rx="2"/> <!-- Button -->
      <rect x="60" y="60" width="20" height="20" fill="#2ecc71" rx="2"/> <!-- Button -->
    </g>

    <!-- Machine 2 -->
    <g transform="translate(450, 280)">
      <rect x="0" y="0" width="100" height="120" rx="5" fill="url(#machineGradient)" stroke="#2980b9" stroke-width="2"/>
      <rect x="10" y="10" width="80" height="60" fill="#bdc3c7" rx="5"/> <!-- Door -->
      <circle cx="50" cy="40" r="20" fill="#3498db" opacity="0.3"/>
      <rect x="60" y="20" width="20" height="20" fill="#f1c40f" rx="2"/> <!-- Button -->
      <rect x="60" y="60" width="20" height="20" fill="#9b59b6" rx="2"/> <!-- Button -->
    </g>
  </g>

  <!-- Group: Target Audience -->
  <g id="target-audience" transform="translate(150, 450)">
    <circle cx="40" cy="40" r="15" fill="#95a5a6" /> <!-- Head -->
    <path d="M25 55 L55 55 L40 85 Z" fill="#95a5a6" /> <!-- Body -->
    <text x="40" y="110" text-anchor="middle" font-family="Arial" font-size="12" fill="#2c3e50">Studenti</text>
  </g>
  
  <g id="target-audience" transform="translate(350, 450)">
    <circle cx="40" cy="40" r="15" fill="#7f8c8d" />
    <path d="M25 55 L55 55 L40 85 Z" fill="#7f8c8d" />
    <text x="40" y="110" text-anchor="middle" font-family="Arial" font-size="12" fill="#2c3e50">Lavoratori</text>
  </g>

  <g id="target-audience" transform="translate(550, 450)">
    <circle cx="40" cy="40" r="15" fill="#95a5a6" />
    <path d="M25 55 L55 55 L40 85 Z" fill="#95a5a6" />
    <text x="40" y="110" text-anchor="middle" font-family="Arial" font-size="12" fill="#2c3e50">Residenti</text>
  </g>

  <!-- Group: Modern Payment Systems -->
  <g id="payment-systems" transform="translate(600, 280)">
    <!-- Mobile Money Icon -->
    <g transform="translate(0, 0)">
      <rect x="0" y="0" width="60" height="90" rx="5" fill="#2c3e50" stroke="#fff" stroke-width="2"/>
      <rect x="5" y="10" width="50" height="30" fill="#ecf0f1" rx="2"/> <!-- Screen -->
      <circle cx="30" cy="50" r="10" fill="#2ecc71" stroke="#fff" stroke-width="2"/> <!-- Button -->
      <line x1="30" y1="35" x2="30" y2="70" stroke="#fff" stroke-width="2"/>
      <text x="30" y="110" text-anchor="middle" font-family="Arial" font-size="12" fill="#2c3e50">Mobile</text>
    </g>
    
    <!-- Cash Icon -->
    <g transform="translate(80, 10)">
      <rect x="0" y="0" width="60" height="70" rx="2" fill="#27ae60" stroke="#2ecc71" stroke-width="2"/>
      <text x="30" y="40" text-anchor="middle" fill="white" font-family="Arial" font-size="20">$</text>
      <text x="30" y="95" text-anchor="middle" font-family="Arial" font-size="12" fill="#2c3e50">Contanti</text>
    </g>
  </g>

  <!-- Group: Benefits -->
  <g id="benefits" transform="translate(400, 520)">
    <rect x="-100" y="-10" width="200" height="30" rx="5" fill="#f1c40f" opacity="0.8"/>
    <text x="0" y="10" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="14" fill="#2c3e50">Costi Personale Ridotti</text>
  </g>
</svg>