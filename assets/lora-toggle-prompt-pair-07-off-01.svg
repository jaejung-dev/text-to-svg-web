<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <!-- Define styles -->
  <defs>
    <style>
      .bg-gradient { fill: url(#gradientBackground); }
      .building { fill: #4A90A4; stroke: #2C3E50; stroke-width: 2; }
      .window { fill: #87CEEB; opacity: 0.8; }
      .door { fill: #6B4423; }
      .machine { fill: #E8E8E8; stroke: #333; stroke-width: 2; }
      .machine-door { fill: #4A90A4; opacity: 0.6; }
      .wheel { fill: #333; }
      .person { fill: #F5A623; }
      .payment-icon { fill: #50E3C2; }
      .text-title { font-family: Arial, sans-serif; font-size: 28px; font-weight: bold; fill: #2C3E50; }
      .text-subtitle { font-family: Arial, sans-serif; font-size: 18px; fill: #555; }
      .text-detail { font-family: Arial, sans-serif; font-size: 14px; fill: #666; }
      .circle-bg { fill: #fff; opacity: 0.9; }
      .highlight { fill: #F39C12; }
      .mobile-money { fill: #27AE60; }
      .cash-money { fill: #E67E22; }
    </style>
    <linearGradient id="gradientBackground" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f7fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e4e9f2;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" class="bg-gradient"/>

  <!-- Title Section -->
  <text x="400" y="60" text-anchor="middle" class="text-title">Lavanderia Self-Service</text>
  <text x="400" y="90" text-anchor="middle" class="text-subtitle">Burkina Faso - Centro Città & Zona Universitaria</text>

  <!-- Main Building Illustration -->
  <g transform="translate(150, 150)">
    <!-- Building Base -->
    <rect x="0" y="100" width="250" height="200" class="building" rx="5"/>
    <rect x="10" y="110" width="230" height="180" fill="#D5D5D5" rx="3"/>
    
    <!-- Roof -->
    <polygon points="0,100 125,60 250,100" class="building"/>
    
    <!-- Windows -->
    <rect x="30" y="140" width="80" height="100" class="window" rx="3"/>
    <rect x="140" y="140" width="80" height="100" class="window" rx="3"/>
    
    <!-- Door -->
    <rect x="110" y="230" width="30" height="70" class="door" rx="2"/>
    <circle cx="135" cy="265" r="3" fill="#F5A623"/>
    
    <!-- Sign -->
    <rect x="50" y="70" width="150" height="40" fill="#F39C12" rx="5"/>
    <text x="125" y="97" text-anchor="middle" fill="white" font-size="16" font-weight="bold">LAVANDERIA</text>
  </g>

  <!-- Washing Machines Section -->
  <g transform="translate(480, 180)">
    <rect x="0" y="0" width="200" height="180" fill="#fff" stroke="#ccc" rx="10"/>
    <text x="100" y="25" text-anchor="middle" font-size="12" fill="#333">Macchine Automatiche</text>
    
    <!-- Machine 1 -->
    <g transform="translate(15, 40)">
      <rect x="0" y="0" width="70" height="90" class="machine"/>
      <circle cx="35" cy="45" r="20" class="machine-door"/>
      <rect x="10" y="75" width="50" height="15" fill="#444"/>
    </g>
    
    <!-- Machine 2 -->
    <g transform="translate(95, 40)">
      <rect x="0" y="0" width="70" height="90" class="machine"/>
      <circle cx="35" cy="45" r="20" class="machine-door"/>
      <rect x="10" y="75" width="50" height="15" fill="#444"/>
    </g>
  </g>

  <!-- Payment Methods -->
  <g transform="translate(150, 400)">
    <text x="100" y="25" text-anchor="middle" class="text-detail" font-weight="bold">Sistemi di Pagamento Moderni</text>
    
    <!-- Mobile Money Icon -->
    <g transform="translate(30, 50)">
      <circle cx="35" cy="35" r="35" class="circle-bg"/>
      <path d="M20,30 L20,45 M25,30 L25,45 M30,30 L30,45 M35,30 L35,45 M40,30 L40,45 M45,30 L45,45 M50,30 L50,45 M55,30 L55,45" stroke="#27AE60" stroke-width="2" stroke-linecap="round"/>
      <rect x="18" y="20" width="34" height="20" fill="#27AE60" rx="3"/>
      <text x="35" y="18" text-anchor="middle" fill="#fff" font-size="10">📱</text>
    </g>
    <text x="35" y="105" text-anchor="middle" class="text-detail">Mobile Money</text>
    
    <!-- Cash Icon -->
    <g transform="translate(170, 50)">
      <circle cx="35" cy="35" r="35" class="circle-bg"/>
      <rect x="18" y="20" width="34" height="25" fill="#E67E22" rx="3"/>
      <text x="35" y="40" text-anchor="middle" fill="#fff" font-size="14">€</text>
    </g>
    <text x="175" y="105" text-anchor="middle" class="text-detail">Contanti</text>
  </g>

  <!-- Target Audience Section -->
  <g transform="translate(520, 400)">
    <text x="100" y="25" text-anchor="middle" class="text-detail" font-weight="bold">Target Principale</text>
    
    <!-- Students -->
    <g transform="translate(20, 50)">
      <circle cx="35" cy="35" r="35" class="circle-bg"/>
      <circle cx="35" cy="25" r="12" class="person"/>
      <path d="M20,55 Q35,45 50,55 L50,65 L20,65 Z" class="person"/>
      <rect x="27" y="13" width="16" height="5" fill="#2C3E50"/>
    </g>
    <text x="35" y="105" text-anchor="middle" class="text-detail">Studenti</text>
    
    <!-- Workers -->
    <g transform="translate(100, 50)">
      <circle cx="35" cy="35" r="35" class="circle-bg"/>
      <circle cx="35" cy="25" r="12" class="person"/>
      <path d="M20,55 Q35,45 50,55 L50,65 L20,65 Z" class="person"/>
      <rect x="25" y="10" width="20" height="10" fill="#34495E"/>
    </g>
    <text x="135" y="105" text-anchor="middle" class="text-detail">Lavoratori</text>
    
    <!-- Residents -->
    <g transform="translate(180, 50)">
      <circle cx="35" cy="35" r="35" class="circle-bg"/>
      <circle cx="35" cy="25" r="12" class="person"/>
      <path d="M20,55 Q35,45 50,55 L50,65 L20,65 Z" class="person"/>
      <circle cx="35" cy="55" r="10" fill="#4A90A4"/>
    </g>
    <text x="215" y="105" text-anchor="middle" class="text-detail">Residenti</text>
  </g>

  <!-- Benefits Section -->
  <g transform="translate(150, 500)">
    <rect x="0" y="0" width="500" height="80" fill="#fff" stroke="#ccc" rx="10"/>
    
    <g transform="translate(30, 25)">
      <circle cx="15" cy="15" r="12" fill="#50E3C2"/>
      <text x="15" y="19" text-anchor="middle" fill="#fff" font-size="10">⏱</text>
      <text x="35" y="18" class="text-detail">Veloce & Efficiente</text>
    </g>
    
    <g transform="translate(200, 25)">
      <circle cx="15" cy="15" r="12" fill="#50E3C2"/>
      <text x="15" y="19" text-anchor="middle" fill="#fff" font-size="10">💰</text>
      <text x="35" y="18" class="text-detail">Costi Ridotti</text>
    </g>
    
    <g transform="translate(370, 25)">
      <circle cx="15" cy="15" r="12" fill="#50E3C2"/>
      <text x="15" y="19" text-anchor="middle" fill="#fff" font-size="10">🔄</text>
      <text x="35" y="18" class="text-detail">Self-Service</text>
    </g>
  </g>

  <!-- Location Map Indicator -->
  <g transform="translate(650, 150)">
    <circle cx="50" cy="50" r="45" fill="#fff" stroke="#4A90A4" stroke-width="2"/>
    <circle cx="50" cy="50" r="30" fill="#4A90A4" opacity="0.3"/>
    <circle cx="50" cy="50" r="8" fill="#F39C12"/>
    <text x="50" y="75" text-anchor="middle" class="text-detail">Centro</text>
  </g>

  <!-- University Icon -->
  <g transform="translate(520, 35)">
    <rect x="0" y="0" width="60" height="50" fill="#4A90A4" rx="3"/>
    <rect x="10" y="10" width="40" height="30" fill="#fff"/>
    <path d="M20,10 L30,0 L40,10 Z" fill="#F39C12"/>
    <text x="30" y="58" text-anchor="middle" class="text-detail">Università</text>
  </g>
</svg>