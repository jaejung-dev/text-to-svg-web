<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 150">
  <defs>
    <!-- Gradient for bell icon -->
    <linearGradient id="bellGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    
    <!-- Subtle glow effect -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  
  <!-- Main background -->
  <rect width="400" height="150" fill="#ffffff"/>
  
  <!-- Bell Icon Group -->
  <g id="bell-icon" transform="translate(60, 35)">
    <!-- Bell silhouette -->
    <path d="M 25 8 Q 25 35 55 35 Q 85 35 85 8 L 85 0 Q 85 0 55 0 Q 25 0 25 0 Z" 
          fill="url(#bellGradient)" filter="url(#glow)"/>
    
    <!-- Bell bottom curve -->
    <path d="M 15 35 Q 25 55 40 65 Q 55 55 65 35" 
          fill="none" stroke="url(#bellGradient)" stroke-width="3" stroke-linecap="round"/>
    
    <!-- Bell clapper -->
    <circle cx="40" cy="45" r="4" fill="#ffffff" opacity="0.9"/>
    
    <!-- Sound waves -->
    <g id="sound-waves" opacity="0.6">
      <path d="M 95 25 Q 105 25 115 35" fill="none" stroke="url(#bellGradient)" stroke-width="2"/>
      <path d="M 95 35 Q 105 35 115 45" fill="none" stroke="url(#bellGradient)" stroke-width="2"/>
      <path d="M 95 45 Q 105 45 115 55" fill="none" stroke="url(#bellGradient)" stroke-width="2"/>
    </g>
  </g>
  
  <!-- Company Name -->
  <g id="company-name" transform="translate(160, 90)">
    <!-- Primary text -->
    <text font-family="'Arial', sans-serif" font-size="42" font-weight="700" fill="url(#bellGradient)">
      Bell
    </text>
    
    <!-- Tagline -->
    <text y="28" font-family="'Arial', sans-serif" font-size="14" font-weight="400" fill="#6b7280" letter-spacing="2">
      COMMUNICATIONS
    </text>
    
    <!-- Decorative line -->
    <line x1="0" y1="12" x2="140" y2="12" stroke="url(#bellGradient)" stroke-width="2" opacity="0.3"/>
  </g>
  
  <!-- Subtle corner accent -->
  <path d="M 370 10 L 390 10 L 390 30" fill="none" stroke="url(#bellGradient)" stroke-width="2" stroke-linecap="round"/>
</svg>