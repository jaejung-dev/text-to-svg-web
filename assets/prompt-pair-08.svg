<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 150">
  <!-- Logo Background (subtle gradient) -->
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Bell Icon Group -->
  <g id="bell-icon" transform="translate(40, 50)">
    <!-- Bell body -->
    <path id="bell-shape" fill="url(#logoGradient)" d="M 60,5 L 95,70 A 35,35 0 0,1 25,70 Z" />
    <!-- Bell clapper -->
    <circle id="bell-clapper" cx="50" cy="65" r="12" fill="#ffffff" opacity="0.9" />
    <!-- Bell sound waves (3 arcs) -->
    <path id="wave1" d="M 50,5 A 40,40 0 0,1 30,35" fill="none" stroke="#ffffff" stroke-width="3" opacity="0.6" />
    <path id="wave2" d="M 50,5 A 55,55 0 0,1 20,45" fill="none" stroke="#ffffff" stroke-width="3" opacity="0.4" />
    <path id="wave3" d="M 50,5 A 70,70 0 0,1 10,55" fill="none" stroke="#ffffff" stroke-width="3" opacity="0.3" />
    <!-- Top bell mount -->
    <path id="bell-mount" d="M 45,5 L 55,5 L 55,10 L 45,10 Z" fill="#ffffff" opacity="0.8" />
  </g>

  <!-- Text Group -->
  <g id="text-elements">
    <!-- Company Name -->
    <text id="company-name" x="140" y="85" font-family="Arial, Helvetica, sans-serif" font-size="42" font-weight="bold" fill="url(#logoGradient)" letter-spacing="2">Bell</text>
    <!-- Tagline -->
    <text id="tagline" x="140" y="115" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#6b7280" letter-spacing="4">CONNECTING WORLD</text>
  </g>

  <!-- Decorative line -->
  <line id="decorative-line" x1="140" y1="75" x2="280" y2="75" stroke="#2563eb" stroke-width="2" opacity="0.3" />
</svg>