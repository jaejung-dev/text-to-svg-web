<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <!-- Tile definition for 2D top-down game map -->
  
  <!-- Group: Carpet Base Layer -->
  <g id="carpet-base">
    <!-- Main crimson background -->
    <rect x="0" y="0" width="128" height="128" fill="#8B0000"/>
    <!-- Subtle texture overlay -->
    <rect x="0" y="0" width="128" height="128" fill="url(#texture-gradient)" opacity="0.1"/>
  </g>
  
  <!-- Group: Ornate Persian Pattern -->
  <g id="persian-pattern">
    <!-- Central medallion -->
    <ellipse cx="64" cy="64" rx="32" ry="28" fill="#6B0000" stroke="#1A1A1A" stroke-width="2"/>
    <ellipse cx="64" cy="64" rx="24" ry="20" fill="#990000" stroke="#2D0000" stroke-width="1"/>
    
    <!-- Medallion inner details -->
    <circle cx="64" cy="64" r="8" fill="#1A1A1A"/>
    <circle cx="64" cy="64" r="5" fill="#3D0000"/>
    
    <!-- Corner ornamental motifs -->
    <path d="M 10 10 L 25 10 L 25 25 Z" fill="#6B0000" opacity="0.8"/>
    <path d="M 118 10 L 103 10 L 103 25 Z" fill="#6B0000" opacity="0.8"/>
    <path d="M 10 118 L 25 118 L 25 103 Z" fill="#6B0000" opacity="0.8"/>
    <path d="M 118 118 L 103 118 L 103 103 Z" fill="#6B0000" opacity="0.8"/>
  </g>
  
  <!-- Group: Decorative Border -->
  <g id="carpet-border">
    <!-- Outer border frame -->
    <rect x="4" y="4" width="120" height="120" fill="#1A1A1A" stroke="#8B0000" stroke-width="4"/>
    <rect x="6" y="6" width="116" height="116" fill="none" stroke="#B8860B" stroke-width="2" stroke-dasharray="4,2"/>
    
    <!-- Corner diamond accents -->
    <path d="M 8 8 L 16 16 L 8 24 Z" fill="#B8860B" opacity="0.6"/>
    <path d="M 120 8 L 112 16 L 120 24 Z" fill="#B8860B" opacity="0.6"/>
    <path d="M 8 120 L 16 112 L 8 104 Z" fill="#B8860B" opacity="0.6"/>
    <path d="M 120 120 L 112 112 L 120 104 Z" fill="#B8860B" opacity="0.6"/>
  </g>
  
  <!-- Group: Corporate Noir Accents -->
  <g id="cyberpunk-accent">
    <!-- Subtle metallic sheen -->
    <rect x="0" y="0" width="128" height="128" fill="url(#metallic-sheen)" opacity="0.15"/>
    
    <!-- Dark shadow zones for depth -->
    <rect x="4" y="4" width="120" height="120" fill="none" stroke="#0A0A0A" stroke-width="3" opacity="0.4"/>
  </g>
  
  <!-- Group: Fringe Details -->
  <g id="fringe-details">
    <line x1="64" y1="4" x2="64" y2="10" stroke="#6B0000" stroke-width="2" opacity="0.8"/>
    <line x1="64" y1="124" x2="64" y2="120" stroke="#6B0000" stroke-width="2" opacity="0.8"/>
    <line x1="4" y1="64" x2="10" y2="64" stroke="#6B0000" stroke-width="2" opacity="0.8"/>
    <line x1="124" y1="64" x2="118" y2="64" stroke="#6B0000" stroke-width="2" opacity="0.8"/>
  </g>
  
  <!-- Gradients -->
  <defs>
    <radialGradient id="texture-gradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#8B0000;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#6B0000;stop-opacity:1"/>
    </radialGradient>
    
    <linearGradient id="metallic-sheen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#B8860B;stop-opacity:0.3"/>
      <stop offset="50%" style="stop-color:#8B0000;stop-opacity:0.1"/>
      <stop offset="100%" style="stop-color:#B8860B;stop-opacity:0.2"/>
    </linearGradient>
  </defs>
</svg>