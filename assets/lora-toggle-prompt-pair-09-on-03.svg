<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Definitions for gradients and effects -->
  <defs>
    <!-- Main blue gradient for SAP-inspired look -->
    <linearGradient id="sapBlueGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#78A6DC"/>
      <stop offset="50%" style="stop-color:#2E5C8A"/>
      <stop offset="100%" style="stop-color:#1E3A5F"/>
    </linearGradient>
    
    <!-- Light blue gradient for highlights -->
    <linearGradient id="lightBlueGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#B8D4E8"/>
      <stop offset="100%" style="stop-color:#78A6DC"/>
    </linearGradient>
    
    <!-- Support base gradient -->
    <linearGradient id="baseGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4A90C7"/>
      <stop offset="100%" style="stop-color:#1E5F8A"/>
    </linearGradient>
    
    <!-- Drop shadow for depth -->
    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="4" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Glow effect -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Main Background Circle - Foundation Base -->
  <g id="foundation">
    <circle cx="200" cy="200" r="160" fill="#F5F7FA" stroke="#E8ECEF" stroke-width="2"/>
  </g>
  
  <!-- Core SAP-style Blue Element -->
  <g id="core-element">
    <!-- Outer blue ring with gradient -->
    <circle cx="200" cy="200" r="120" fill="url(#sapBlueGradient)" opacity="0.9"/>
    
    <!-- Inner white circle for contrast -->
    <circle cx="200" cy="200" r="95" fill="#FFFFFF" opacity="0.95"/>
  </g>
  
  <!-- Abstract SAP Shape Elements (without text) -->
  <g id="sap-arrows" filter="url(#glow)">
    <!-- Upper right arrow shape -->
    <path d="M 200 120 L 250 150 L 230 165 L 190 140 Z" fill="#FFFFFF" opacity="0.9"/>
    
    <!-- Upper left arrow shape -->
    <path d="M 200 120 L 150 150 L 170 165 L 210 140 Z" fill="#FFFFFF" opacity="0.9"/>
    
    <!-- Center connecting shape -->
    <path d="M 185 155 L 195 145 L 205 145 L 215 155 L 200 175 Z" fill="#2E5C8A" opacity="0.8"/>
    
    <!-- Lower right connection -->
    <path d="M 210 160 L 240 190 L 225 200 L 195 170 Z" fill="#FFFFFF" opacity="0.85"/>
    
    <!-- Lower left connection -->
    <path d="M 190 160 L 160 190 L 175 200 L 205 170 Z" fill="#FFFFFF" opacity="0.85"/>
  </g>
  
  <!-- Supporting Infrastructure Layer -->
  <g id="infrastructure-layer">
    <!-- Base platform -->
    <rect x="140" y="260" width="120" height="12" rx="6" fill="url(#baseGradient)" filter="url(#dropShadow)"/>
    
    <!-- Connection lines to base -->
    <line x1="180" y1="260" x2="170" y2="280" stroke="#4A90C7" stroke-width="2"/>
    <line x1="220" y1="260" x2="230" y2="280" stroke="#4A90C7" stroke-width="2"/>
    
    <!-- Additional support brackets -->
    <path d="M 150 260 L 150 285 L 250 285 L 250 260" fill="none" stroke="#6CA3C5" stroke-width="1.5"/>
  </g>
  
  <!-- Support Indicators -->
  <g id="support-indicators">
    <!-- Clock/24h support symbol -->
    <circle cx="200" cy="200" r="80" fill="none" stroke="#B8D4E8" stroke-width="1" opacity="0.6"/>
    
    <!-- Status dots -->
    <circle cx="200" cy="180" r="3" fill="#4CAF50"/>
    <circle cx="220" cy="190" r="2" fill="#4CAF50"/>
    <circle cx="190" cy="190" r="2" fill="#4CAF50"/>
    
    <!-- Pulse/glow effect -->
    <circle cx="200" cy="200" r="85" fill="none" stroke="#78A6DC" stroke-width="1" opacity="0.4">
      <animate attributeName="r" from="80" to="90" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" from="0.4" to="0.1" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Technical Nodes/Connections -->
  <g id="network-nodes" opacity="0.7">
    <circle cx="150" cy="180" r="3" fill="#78A6DC"/>
    <circle cx="250" cy="180" r="3" fill="#78A6DC"/>
    <circle cx="200" cy="250" r="3" fill="#78A6DC"/>
    <circle cx="160" cy="220" r="2" fill="#78A6DC"/>
    <circle cx="240" cy="220" r="2" fill="#78A6DC"/>
  </g>
  
  <!-- Corner accents for modern look -->
  <g id="accent-corners" stroke="#78A6DC" stroke-width="3" stroke-linecap="round">
    <path d="M 160 160 L 175 160" opacity="0.8"/>
    <path d="M 240 160 L 225 160" opacity="0.8"/>
    <path d="M 175 240 L 160 240" opacity="0.8"/>
    <path d="M 225 240 L 240 240" opacity="0.8"/>
  </g>
</svg>