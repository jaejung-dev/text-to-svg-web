<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background/Transparency handled by viewer, no fill rect -->
  
  <!-- 1. DLP Protection Layer (The Shield) -->
  <g id="shield-layer">
    <path d="M32 4 C 46 4 56 14 56 28 L 56 40 C 56 52 46 60 32 62 C 18 60 8 52 8 40 L 8 28 C 8 14 18 4 32 4 Z" 
          fill="#1976D2" stroke="#1565C0" stroke-width="1.5" />
  </g>

  <!-- 2. Data/File Layer (SFTP File) -->
  <g id="file-layer">
    <path d="M14 24 H 50 V 48 H 14 Z M 14 24 L 22 16 H 40" 
          fill="#FFFFFF" stroke="#1976D2" stroke-width="1.5" stroke-linejoin="miter" />
  </g>

  <!-- 3. Encryption/Security Lock -->
  <g id="lock-layer">
    <!-- Lock Body -->
    <rect x="24" y="36" width="16" height="12" rx="2" ry="2" fill="#1976D2" />
    <!-- Keyhole -->
    <circle cx="32" cy="40" r="1.5" fill="#FFFFFF" />
    <!-- Lock Shackle (U-Shape) -->
    <path d="M22 36 V 28 A 6 6 0 0 1 34 28 V 36" 
          fill="none" stroke="#FF9800" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
  </g>
  
  <!-- 4. Data Prevention Indicator (Optional subtle shield detail) -->
  <g id="detail-layer">
     <path d="M32 44 L30 46 L34 46 Z" fill="#4FC3F7" opacity="0.6" />
  </g>
</svg>