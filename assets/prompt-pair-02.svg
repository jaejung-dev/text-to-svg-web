<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Definitions for gradients and filters -->
  <defs>
    <!-- Gradient for the background circle -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90e2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#003366;stop-opacity:1" />
    </linearGradient>
    
    <!-- Gradient for the Shield (SFTP/DLP Security) -->
    <linearGradient id="shieldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b3d9ff;stop-opacity:0.9" />
    </linearGradient>

    <!-- Gradient for the Data Files -->
    <linearGradient id="fileGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e6f2ff;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Group: Background Container -->
  <g id="group-background" opacity="1">
    <!-- Main Icon Circle -->
    <circle cx="256" cy="256" r="240" fill="url(#bgGradient)" />
    <!-- Inner Highlight Ring -->
    <circle cx="256" cy="256" r="230" stroke="white" stroke-width="4" stroke-opacity="0.1" fill="none"/>
  </g>

  <!-- Group: SFTP Elements (Data & Transfer) -->
  <g id="group-sftp" transform="translate(256, 256)">
    <!-- Central File Stack (The Data) -->
    <path d="M-60 -20 L-60 40 L60 40 L60 -40 L-40 -40 Z" fill="url(#fileGradient)" stroke="#4a90e2" stroke-width="2" stroke-linejoin="round" />
    <path d="M-40 -40 L-40 -60 L60 -60 L60 -40" fill="none" stroke="#4a90e2" stroke-width="2" stroke-linejoin="round"/>
    
    <!-- Transfer Arrows (Up/Down) -->
    <g id="group-transfer-arrows" stroke="#333" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <!-- Up Arrow (Upload) -->
      <path d="M-80 -10 L-80 -60" />
      <path d="M-85 -60 L-80 -45 L-75 -60" />
      
      <!-- Down Arrow (Download) -->
      <path d="M80 10 L80 60" />
      <path d="M75 60 L80 45 L85 60" />
    </g>
    
    <!-- Folder Tab visual accent -->
    <circle cx="-45" cy="-40" r="6" fill="#003366" />
  </g>

  <!-- Group: DLP Elements (Security/Shield) -->
  <g id="group-dlp" transform="translate(256, 256)">
    <!-- Shield Overlay -->
    <path d="M0 120 C-130 120 -160 40 -160 0 L-160 -120 C-160 -180 -60 -200 0 -200 C60 -200 160 -180 160 -120 L160 0 C160 40 130 120 0 120 Z" 
          fill="url(#shieldGradient)" 
          stroke="#ffffff" 
          stroke-width="12" 
          opacity="0.95">
      <animate attributeName="opacity" values="0.9;0.85;0.9" dur="3s" repeatCount="indefinite" />
    </path>
    
    <!-- Keyhole / Lock Symbol in center of Shield -->
    <g fill="#003366" transform="translate(0, -10)">
      <!-- Lock Body -->
      <rect x="-20" y="20" width="40" height="35" rx="5" ry="5" />
      <!-- Lock Shackle (top arch) -->
      <path d="M-25 20 L-25 5 C-25 -5 -15 -15 0 -15 C15 -15 25 -5 25 5 L25 20" stroke="#003366" stroke-width="10" fill="none" />
    </g>
  </g>
</svg>