    </defs>
    <path d="M 20 30 Q 30 15 40 30 T 60 30 T 80 30 T 100 30 T 120 30 T 140 30 T 160 30 T 180 30 T 200 30 T 220 30 T 240 30 T 260 30 T 280 30 T 300 30 T 320 30 T 340 30 T 360 30 T 380 30 T 380 50 T 380 70 L 380 90 Q 365 105 380 120 T 380 140 T 380 160 T 380 180 T 380 200 T 380 220 T 380 240 T 380 260 T 380 280 T 380 300 T 380 320 T 380 340 T 380 360 T 380 380 T 380 400 T 380 420 L 380 440 T 360 440 T 340 440 T 320 440 T 300 440 T 280 440 T 260 440 T 240 440 T 220 440 T 200 440 T 180 440 T 160 440 T 140 440 T 120 440 T 100 440 T 80 440 T 60 440 T 40 440 T 20 440 T 20 420 T 20 400 T 20 380 T 20 360 T 20 340 T 20 320 T 20 300 T 20 280 T 20 260 T 20 240 T 20 220 T 20 200 T 20 180 T 20 160 T 20 140 T 20 120 T 20 100 T 20 80 T 20 60 T 20 50 T 20 30 Z" fill="none" stroke="#D48C8C" stroke-width="25" stroke-linejoin="round" opacity="0.9"/>
