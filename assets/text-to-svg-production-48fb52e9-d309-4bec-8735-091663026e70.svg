<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Definitions for reusable patterns -->
  <defs>
    <!-- Cream background -->
    <style>
      .card { fill: #F5F0E8; }
      .red-border { fill: #D4A5A5; }
      .yellow-scallop { fill: #FFE066; }
      .purple-line { stroke: #9B7EBD; stroke-width: 2; fill: none; }
      .crease-line { stroke: #B8B8B8; stroke-width: 1; fill: none; opacity: 0.4; }
    </style>
  </defs>

  <!-- Main cream card base -->
  <g id="cream-card">
    <rect class="card" x="50" y="40" width="300" height="220" rx="5" ry="5"/>
  </g>

  <!-- Red scalloped border -->
  <g id="red-scalloped-border">
    <path class="red-border" d="M 60 250 L 140 250 L 160 230 L 180 250 L 260 250 L 280 230 L 300 250 L 350 250 L 350 80 L 330 60 L 310 80 L 290 60 L 270 80 L 250 60 L 230 80 L 210 60 L 190 80 L 170 60 L 150 80 L 130 60 L 110 80 L 90 60 L 70 80 L 60 100 L 60 250 Z" fill-rule="evenodd"/>
  </g>

  <!-- Yellow scalloped element (bottom right overlap) -->
  <g id="yellow-scalloped-element">
    <path class="yellow-scallop" d="M 280 250 L 300 270 L 320 250 L 340 270 L 350 260 L 350 220 L 330 200 L 310 220 L 280 250 Z" fill-rule="evenodd"/>
  </g>

  <!-- Small purple line -->
  <g id="purple-accent-line">
    <line class="purple-line" x1="320" y1="260" x2="340" y2="280"/>
  </g>

  <!-- Subtle crease lines on cream surface (top right) -->
  <g id="texture-crease-lines">
    <line class="crease-line" x1="240" y1="70" x2="280" y2="90"/>
    <line class="crease-line" x1="260" y1="65" x2="300" y2="85"/>
  </g>
</svg>