<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="blueGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#87D3F7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0066B2;stop-opacity:1" />
    </linearGradient>
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="200" cy="200" r="190" fill="#FFFFFF" stroke="#E8E8E8" stroke-width="1"/>
  
  <!-- Main SAP-style geometric icon group -->
  <g id="main-icon" filter="url(#softShadow)">
    <!-- Top-left square -->
    <rect x="100" y="100" width="55" height="55" rx="6" fill="url(#blueGradient)" opacity="0.9"/>
    
    <!-- Top-right square -->
    <rect x="160" y="100" width="55" height="55" rx="6" fill="#5CC8FF" opacity="0.9"/>
    
    <!-- Bottom-left square -->
    <rect x="100" y="160" width="55" height="55" rx="6" fill="#4A9CD9" opacity="0.9"/>
    
    <!-- Bottom-right square -->
    <rect x="160" y="160" width="55" height="55" rx="6" fill="#3C8BBF" opacity="0.9"/>
  </g>
  
  <!-- Shield/support symbol behind icon -->
  <g id="support-symbol">
    <path d="M 200 280 L 280 240 L 280 180 C 280 140 240 120 200 120 C 160 120 120 140 120 180 L 120 240 Z" 
          fill="none" stroke="#B8E9FF" stroke-width="3" opacity="0.4"/>
    <path d="M 200 295 L 285 255 L 285 190 C 285 150 245 130 200 130 C 155 130 115 150 115 190 L 115 255 Z" 
          fill="none" stroke="#6EC6EE" stroke-width="2" opacity="0.3"/>
    <!-- Center shield element -->
    <polygon points="190,150 200,145 210,150 210,160 200,165 190,160" 
             fill="#4CAF50" opacity="0.8"/>
    <!-- Check mark for support -->
    <polyline points="195,155 200,160 207,152" 
              fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- Connection lines suggesting network/infrastructure -->
  <g id="connection-lines" opacity="0.3">
    <line x1="80" y1="200" x2="100" y2="200" stroke="#87D3F7" stroke-width="2"/>
    <line x1="300" y1="200" x2="280" y2="200" stroke="#87D3F7" stroke-width="2"/>
    <line x1="200" y1="70" x2="200" y2="100" stroke="#87D3F7" stroke-width="2"/>
    <line x1="200" y1="300" x2="200" y2="270" stroke="#87D3F7" stroke-width="2"/>
    <circle cx="100" cy="200" r="3" fill="#87D3F7"/>
    <circle cx="300" cy="200" r="3" fill="#87D3F7"/>
    <circle cx="200" cy="100" r="3" fill="#87D3F7"/>
    <circle cx="200" cy="300" r="3" fill="#87D3F7"/>
  </g>
  
  <!-- Technical server/server rack icon at bottom -->
  <g id="server-icon" transform="translate(0, 100)">
    <rect x="140" y="295" width="120" height="35" rx="4" fill="#4CAF50" opacity="0.8"/>
    <rect x="150" y="305" width="100" height="8" rx="2" fill="#388E3C"/>
    <rect x="160" y="318" width="80" height="6" rx="1" fill="#388E3C"/>
    <circle cx="155" cy="326" r="2" fill="#FFEB3B" opacity="0.8"/>
    <circle cx="165" cy="326" r="2" fill="#FFEB3B" opacity="0.8"/>
    <circle cx="175" cy="326" r="2" fill="#FFEB3B" opacity="0.8"/>
    <circle cx="185" cy="326" r="2" fill="#FFEB3B" opacity="0.8"/>
    <circle cx="195" cy="326" r="2" fill="#FFEB3B" opacity="0.8"/>
    <circle cx="205" cy="326" r="2" fill="#FFEB3B" opacity="0.8"/>
    <circle cx="215" cy="326" r="2" fill="#FFEB3B" opacity="0.8"/>
    <circle cx="225" cy="326" r="2" fill="#FFEB3B" opacity="0.8"/>
  </g>
  
  <!-- Text indicator for "BASIS" support -->
  <g id="text-indicator" transform="translate(0, 365)">
    <rect x="140" y="-25" width="120" height="25" rx="8" fill="#3C8BBF" opacity="0.15"/>
    <circle cx="200" cy="-15" r="8" fill="#4CAF50" opacity="0.9"/>
    <text x="200" y="-15" font-family="Arial, sans-serif" font-size="14" font-weight="bold" 
          fill="#FFFFFF" text-anchor="middle" alignment-baseline="central">✓</text>
  </g>
</svg>