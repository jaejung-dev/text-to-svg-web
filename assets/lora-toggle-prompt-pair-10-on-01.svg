<svg viewBox="0 0 400 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect id="app-background" x="0" y="0" width="400" height="600" fill="#1a1a2e"/>

  <!-- App Container Frame -->
  <rect id="app-frame" x="10" y="10" width="380" height="580" rx="8" fill="#252542" stroke="#3a3a5c" stroke-width="2"/>

  <!-- Header -->
  <g id="app-header">
    <rect x="10" y="10" width="380" height="70" fill="#16213e"/>
    <text x="200" y="35" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle">ATOMSTAK P1</text>
    <text x="200" y="52" font-family="Arial, sans-serif" font-size="10" fill="#a0a0a0" text-anchor="middle">Laser Engraver Control</text>
  </g>

  <!-- Import Lightburn Section -->
  <g id="import-section" transform="translate(20, 90)">
    <rect x="0" y="0" width="360" height="100" rx="6" fill="#2d2d4a" stroke="#444466" stroke-width="1"/>
    <circle id="import-icon" cx="40" cy="50" r="25" fill="#4a4a6e" stroke="#6a6a8e" stroke-width="2"/>
    <path id="import-arrow" d="M 32 50 L 48 50 M 40 42 L 40 58" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
    <path id="import-laser" d="M 38 45 L 42 45 L 42 55 L 38 55 Z" fill="#ffffff" opacity="0.8"/>
    <text x="80" y="40" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ffffff">Import LightBurn</text>
    <text x="80" y="60" font-family="Arial, sans-serif" font-size="11" fill="#a0a0a0">.lbrn file</text>
  </g>

  <!-- Export SVG Section -->
  <g id="export-section" transform="translate(20, 210)">
    <rect x="0" y="0" width="360" height="100" rx="6" fill="#2d2d4a" stroke="#444466" stroke-width="1"/>
    <circle id="export-icon" cx="40" cy="50" r="25" fill="#4a4a6e" stroke="#6a6a8e" stroke-width="2"/>
    <path id="export-arrow" d="M 32 50 L 48 50 M 40 42 L 40 58" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
    <path id="export-svg" d="M 38 40 L 42 40 L 42 50 L 38 50 Z" fill="#ffffff" opacity="0.8"/>
    <text x="80" y="40" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ffffff">Export SVG</text>
    <text x="80" y="60" font-family="Arial, sans-serif" font-size="11" fill="#a0a0a0">.svg file</text>
  </g>

  <!-- Preview Area -->
  <g id="preview-area">
    <rect x="20" y="330" width="360" height="200" rx="6" fill="#252542" stroke="#3a3a5c" stroke-width="2"/>
    <text x="200" y="355" font-family="Arial, sans-serif" font-size="12" fill="#a0a0a0" text-anchor="middle">Preview Area</text>
    <!-- Laser Path Preview -->
    <path id="laser-path" d="M 80 400 Q 200 360 320 400 L 320 450 Q 200 490 80 450 Z" fill="none" stroke="#00ff88" stroke-width="2" stroke-dasharray="4,2"/>
    <!-- Laser Beam Effect -->
    <circle cx="200" cy="390" r="3" fill="#00ff88">
      <animate attributeName="opacity" values="1;0.5;1" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Status Bar -->
  <g id="status-bar">
    <rect x="20" y="540" width="360" height="45" rx="4" fill="#16213e"/>
    <text x="30" y="562" font-family="Arial, sans-serif" font-size="11" fill="#00ff88">● Connected: ATOMSTAK P1</text>
    <text x="200" y="562" font-family="Arial, sans-serif" font-size="11" fill="#a0a0a0" text-anchor="middle">Ready</text>
    <text x="360" y="562" font-family="Arial, sans-serif" font-size="11" fill="#a0a0a0" text-anchor="end">v2.1.0</text>
  </g>

  <!-- Decorative Elements -->
  <g id="decorative-laser">
    <line x1="200" y1="70" x2="200" y2="100" stroke="#00ff88" stroke-width="1" stroke-dasharray="2,2" opacity="0.3"/>
    <rect x="195" y="70" width="10" height="10" fill="#00ff88" opacity="0.2"/>
  </g>

  <!-- App Icons Decoration -->
  <g id="app-icons">
    <circle cx="365" cy="45" r="5" fill="#00ff88" opacity="0.8"/>
    <circle cx="355" cy="45" r="5" fill="#00ff88" opacity="0.8"/>
  </g>
</svg>