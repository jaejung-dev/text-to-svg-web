<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Icon group for SFTP DLP Feature -->
  <g id="sftp-dlp-icon" transform="translate(10, 10)">
    
    <!-- Background circle/shield base -->
    <circle cx="90" cy="90" r="80" fill="#1e3a5f" stroke="#2d5a87" stroke-width="4"/>
    
    <!-- Shield outline layer -->
    <path d="M 50 35 L 90 30 L 130 35 L 130 70 L 110 145 L 90 145 L 70 145 L 50 70 Z" 
          fill="#2d5a87" stroke="#3d7ab7" stroke-width="3" opacity="0.7"/>
    
    <!-- Lock icon (security/encryption) -->
    <g id="lock" transform="translate(65, 50)">
      <rect x="0" y="20" width="50" height="35" rx="3" fill="#ffffff" opacity="0.9"/>
      <path d="M 10 20 L 10 10 A 15 15 0 0 1 40 10 L 40 20" fill="#ff6b35" opacity="0.85"/>
      <rect x="20" y="25" width="30" height="25" rx="2" fill="#ffffff"/>
      <circle cx="35" cy="37.5" r="5" fill="#1e3a5f"/>
    </g>
    
    <!-- Data transfer arrows (SFTP aspect) -->
    <g id="transfer-arrows" transform="translate(90, 85)">
      <path d="M 0 -15 L 0 0 L -10 -10" fill="none" stroke="#00d4aa" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M 0 15 L 0 0 L 10 -10" fill="none" stroke="#00d4aa" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    
    <!-- Data/file layer (DLP protection) -->
    <g id="data-protection" transform="translate(90, 110)">
      <rect x="-20" y="-15" width="40" height="30" rx="3" fill="#ffffff" opacity="0.3"/>
      <rect x="-15" y="-10" width="30" height="3" fill="#ffffff" opacity="0.5"/>
      <rect x="-15" y="-3" width="25" height="3" fill="#ffffff" opacity="0.5"/>
      <rect x="-15" y="4" width="20" height="3" fill="#ffffff" opacity="0.5"/>
    </g>
    
    <!-- Scan line for monitoring (DLP scanning) -->
    <path d="M 45 75 L 135 75" stroke="#00ff88" stroke-width="2" opacity="0.6"/>
    <circle cx="135" cy="75" r="4" fill="#00ff88" opacity="0.6"/>
    
  </g>
</svg>