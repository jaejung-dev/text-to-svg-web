<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="600" fill="#1a1a2e"/>
  
  <!-- Definition of gradients -->
  <defs>
    <linearGradient id="gradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e94560;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f9a826;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradient2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0f3460;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="gradient3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#e94560;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#e94560;stop-opacity:0" />
    </radialGradient>
  </defs>
  
  <!-- Main design group -->
  <g id="main-design">
    <!-- Central geometric shapes -->
    <g id="central-shapes">
      <circle cx="400" cy="300" r="150" fill="url(#gradient3)"/>
      <circle cx="400" cy="300" r="120" fill="none" stroke="#e94560" stroke-width="3" opacity="0.6"/>
      <rect x="350" y="250" width="100" height="100" fill="url(#gradient1)" opacity="0.8" transform="rotate(45 400 300)"/>
      <polygon points="400,180 450,260 350,260" fill="url(#gradient2)"/>
    </g>
    
    <!-- Side decorative elements -->
    <g id="side-elements">
      <circle cx="200" cy="200" r="60" fill="url(#gradient1)" opacity="0.7"/>
      <circle cx="600" cy="400" r="80" fill="url(#gradient2)" opacity="0.7"/>
      <circle cx="250" cy="450" r="50" fill="url(#gradient3)"/>
      <circle cx="550" cy="150" r="40" fill="url(#gradient3)"/>
    </g>
    
    <!-- Connecting lines -->
    <g id="connecting-lines">
      <line x1="300" y1="250" x2="350" y2="280" stroke="#e94560" stroke-width="2"/>
      <line x1="450" y1="280" x2="500" y2="250" stroke="#f9a826" stroke-width="2"/>
      <line x1="350" y1="350" x2="300" y2="400" stroke="#0f3460" stroke-width="2"/>
      <line x1="450" y1="350" x2="500" y2="400" stroke="#e94560" stroke-width="2"/>
    </g>
    
    <!-- Corner accents -->
    <g id="corner-accents">
      <polygon points="0,0 50,0 0,50" fill="#e94560" opacity="0.3"/>
      <polygon points="750,0 800,0 800,50" fill="#f9a826" opacity="0.3"/>
      <polygon points="0,550 50,550 0,600" fill="#0f3460" opacity="0.3"/>
      <polygon points="750,550 800,550 800,600" fill="#e94560" opacity="0.3"/>
    </g>
    
    <!-- Floating particles -->
    <g id="particles">
      <circle cx="150" cy="300" r="5" fill="#e94560"/>
      <circle cx="650" cy="300" r="5" fill="#f9a826"/>
      <circle cx="400" cy="150" r="4" fill="#0f3460"/>
      <circle cx="400" cy="450" r="4" fill="#e94560"/>
      <circle cx="100" cy="150" r="3" fill="#f9a826"/>
      <circle cx="700" cy="450" r="3" fill="#e94560"/>
    </g>
  </g>
</svg>