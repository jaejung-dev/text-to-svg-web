<svg viewBox="0 0 400 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="ghostGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:0.4"/>
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0099ff;stop-opacity:0.6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Vector Triangle Element -->
  <g id="vector-shape" opacity="0.8">
    <polygon points="30,60 90,60 60,10" 
             fill="url(#accentGradient)" 
             stroke="#00d4ff" 
             stroke-width="2"
             filter="url(#glow)"/>
    <polygon points="35,55 85,55 60,20" 
             fill="none" 
             stroke="#ffffff" 
             stroke-width="1" 
             opacity="0.5"/>
  </g>
  
  <!-- Ghost Element -->
  <g id="ghost-figure" opacity="0.7">
    <path d="M 110,50 
             Q 120,30 130,50 
             L 140,80 
             L 140,100 
             Q 130,110 120,100 
             Q 110,110 100,100 
             L 100,80 
             Z" 
          fill="url(#ghostGradient)" 
          stroke="#ffffff" 
          stroke-width="1.5"
          filter="url(#glow)"/>
    
    <!-- Ghost Eyes -->
    <ellipse cx="118" cy="70" rx="4" ry="6" 
             fill="#ffffff" opacity="0.9"/>
    <ellipse cx="132" cy="70" rx="4" ry="6" 
             fill="#ffffff" opacity="0.9"/>
    
    <!-- Ghost Mouth -->
    <path d="M 120,85 Q 125,88 128,85" 
          fill="none" 
          stroke="#ffffff" 
          stroke-width="1.5" 
          opacity="0.7"/>
  </g>
  
  <!-- Connecting Vector Lines -->
  <g id="vector-lines" opacity="0.6">
    <line x1="90" y1="60" x2="110" y2="50" 
          stroke="url(#accentGradient)" 
          stroke-width="2" 
          stroke-dasharray="3,3"/>
    <line x1="140" y1="80" x2="160" y2="80" 
          stroke="url(#accentGradient)" 
          stroke-width="2" 
          stroke-dasharray="3,3"/>
    <circle cx="100" cy="50" r="2" fill="#00d4ff"/>
    <circle cx="160" cy="80" r="2" fill="#00d4ff"/>
  </g>
  
  <!-- Text Element -->
  <g id="logo-text" font-family="Arial, sans-serif" filter="url(#glow)">
    <text x="175" y="70" 
          font-size="28" 
          font-weight="bold"
          fill="#ffffff">Ghost</text>
    <text x="175" y="95" 
          font-size="28" 
          font-weight="bold"
          fill="url(#accentGradient)">Vector</text>
  </g>
  
  <!-- Bottom Accent Line -->
  <line x1="175" y1="110" x2="280" y2="110" 
        stroke="url(#accentGradient)" 
        stroke-width="2" 
        opacity="0.8"/>
</svg>