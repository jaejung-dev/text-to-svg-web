<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" width="600" height="800">
  <!-- Definitions for gradients and effects -->
  <defs>
    <linearGradient id="phoneBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d2d2d;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="laserGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff4d4d;stop-opacity:0" />
      <stop offset="50%" style="stop-color:#ff0000;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff4d4d;stop-opacity:0" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="5"/>
      <feOffset dx="2" dy="2" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="800" fill="#f0f2f5" />

  <!-- Phone Frame -->
  <g id="phone-frame" transform="translate(75, 50)">
    <rect x="0" y="0" width="450" height="700" rx="35" ry="35" fill="#000" stroke="#333" stroke-width="8"/>
    <rect x="20" y="20" width="410" height="660" rx="15" ry="15" fill="url(#phoneBg)" />
    <!-- Notch -->
    <path d="M200,20 h100 a30,30 0 0 1 30,30 v10 h-160 v-10 a30,30 0 0 1 30,-30 z" fill="#000" />
  </g>

  <!-- Screen Content -->
  <g id="screen-content" transform="translate(85, 60)">
    
    <!-- Header -->
    <g id="header">
      <rect width="430" height="80" fill="#222" />
      <text x="215" y="35" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#fff" text-anchor="middle" letter-spacing="2">ATOMSTAK P1</text>
      <text x="215" y="55" font-family="Arial, sans-serif" font-size="14" fill="#aaa" text-anchor="middle">Module de Conversion</text>
    </g>

    <!-- Import LightBurn Button -->
    <g id="import-btn" transform="translate(25, 120)" filter="url(#shadow)">
      <rect width="380" height="100" rx="15" fill="#333" stroke="#ffcc00" stroke-width="2"/>
      <rect width="380" height="100" rx="15" fill="url(#laserGlow)" opacity="0.2" />
      <path d="M30,40 h20 a10,10 0 0 1 10,10 v20 a10,10 0 0 1 -10,10 h-20" fill="#ffcc00"/>
      <path d="M80,50 h120 v40 h-120 z" fill="none" stroke="#ffcc00" stroke-width="2"/>
      <text x="190" y="65" font-family="Arial, sans-serif" font-size="20" fill="#fff" text-anchor="middle">Importer LightBurn</text>
    </g>

    <!-- Conversion Arrow/Process -->
    <g id="process-visual" transform="translate(215, 250)">
      <line x1="-30" y1="0" x2="30" y2="0" stroke="#555" stroke-width="4" />
      <polygon points="30,0 20,-10 20,10" fill="#ff4d4d" />
      <circle cx="0" cy="0" r="15" fill="#444" />
      <text x="0" y="5" font-family="Arial, sans-serif" font-size="10" fill="#fff" text-anchor="middle" font-weight="bold">LBR</text>
      <line x1="-30" y1="20" x2="30" y2="20" stroke="#ff4d4d" stroke-width="4" stroke-dasharray="5,5" />
      <polygon points="-30,20 -20,30 -20,10" fill="#ff4d4d" />
    </g>

    <!-- Export SVG Button -->
    <g id="export-btn" transform="translate(25, 300)" filter="url(#shadow)">
      <rect width="380" height="100" rx="15" fill="#333" stroke="#00ff00" stroke-width="2"/>
      <path d="M30,50 h20 a10,10 0 0 1 10,10 v20 a10,10 0 0 1 -10,10 h-20" fill="#00ff00"/>
      <path d="M80,55 h120 v40 h-120 z" fill="none" stroke="#00ff00" stroke-width="2"/>
      <text x="190" y="70" font-family="Arial, sans-serif" font-size="20" fill="#fff" text-anchor="middle">Exporter SVG</text>
    </g>

    <!-- Status Bar at Bottom -->
    <g id="status-bar" transform="translate(25, 450)">
      <rect width="380" height="60" rx="5" fill="#111"/>
      <text x="190" y="25" font-family="Arial, sans-serif" font-size="12" fill="#00ff00" text-anchor="middle" font-weight="bold">PRÊT À TRAVAILLER</text>
      <text x="190" y="45" font-family="Arial, sans-serif" font-size="10" fill="#666" text-anchor="middle">Compatible ATOMSTAK P1</text>
    </g>
  </g>

  <!-- Decorative Laser Beam Overlay -->
  <line x1="150" y1="100" x2="150" y2="700" stroke="#ff0000" stroke-width="1" opacity="0.1" />
  <line x1="200" y1="100" x2="200" y2="700" stroke="#ff0000" stroke-width="1" opacity="0.1" />
  <line x1="250" y1="100" x2="250" y2="700" stroke="#ff0000" stroke-width="1" opacity="0.1" />
  <line x1="300" y1="100" x2="300" y2="700" stroke="#ff0000" stroke-width="1" opacity="0.1" />
  <line x1="350" y1="100" x2="350" y2="700" stroke="#ff0000" stroke-width="1" opacity="0.1" />
  <line x1="400" y1="100" x2="400" y2="700" stroke="#ff0000" stroke-width="1" opacity="0.1" />
  <line x1="450" y1="100" x2="450" y2="700" stroke="#ff0000" stroke-width="1" opacity="0.1" />

</svg>